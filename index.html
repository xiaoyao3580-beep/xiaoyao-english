<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>肖瑶启言 · 学习中心</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #F8F9FF; font-family: 'Nunito', 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    .dot-inactive { width: 6px; height: 6px; border-radius: 9999px; background: rgba(255,255,255,0.4); transition: all 0.3s; }
    .dot-active { width: 20px; height: 6px; border-radius: 9999px; background: rgba(255,255,255,1); }
    .card-shadow { box-shadow: 0 1px 3px rgba(92, 45, 255, 0.04), 0 4px 20px rgba(92, 45, 255, 0.06); }
    .modal-overlay { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body class="bg-[#F8F9FF]">
  <div id="root" class="min-h-screen"></div>

  <!-- ============================================= -->
  <!-- 核心数据(直接内联,绝对不会加载失败) -->
  <!-- ============================================= -->
  <script>
    // ======= 班级信息 =======
    const XY_CLASSES = [
      { code: 'adult',   name: '成人0基础口语',  level: 'ADULT · ZERO BASE',         time: '周四下午', icon: 'fa-briefcase',      gradient: 'from-violet-600 to-purple-700',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' },
      { code: 'swsy',    name: '深外素养',       level: 'SWSY · ELITE',              time: '周四晚上', icon: 'fa-crosshairs',     gradient: 'from-indigo-600 to-violet-700',  iconBg: 'bg-indigo-100', iconColor: 'text-indigo-600' },
      { code: 'f2',      name: 'F2班',          level: 'TALENT F2 · FOUNDATION',    time: '周五晚上', icon: 'fa-baby',           gradient: 'from-pink-500 to-rose-500',      iconBg: 'bg-pink-100',   iconColor: 'text-pink-600' },
      { code: 'a2-1',    name: 'A2班(1班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周六早上', icon: 'fa-graduation-cap', gradient: 'from-violet-500 to-purple-600',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' },
      { code: 'a1-plus', name: 'A1+班',         level: 'TALENT A1+ · BEGINNER+',    time: '周六下午', icon: 'fa-star',           gradient: 'from-amber-400 to-yellow-500',   iconBg: 'bg-amber-100',  iconColor: 'text-amber-600' },
      { code: 'ms',      name: '初中能力提升',    level: 'MIDDLE SCHOOL · ADVANCED',  time: '周六下午', icon: 'fa-trophy',         gradient: 'from-purple-600 to-fuchsia-600', iconBg: 'bg-purple-100', iconColor: 'text-purple-600' },
      { code: 'econ',    name: '经济学人班',     level: 'ECONOMIST · PREMIUM',       time: '周六晚上', icon: 'fa-newspaper',      gradient: 'from-rose-600 to-pink-700',      iconBg: 'bg-rose-100',   iconColor: 'text-rose-600' },
      { code: 'a2-plus', name: 'A2+班',         level: 'TALENT A2+ · ADVANCED',     time: '周日早上', icon: 'fa-rocket',         gradient: 'from-violet-600 to-indigo-700',  iconBg: 'bg-violet-100', iconColor: 'text-violet-700' },
      { code: 'a2-2',    name: 'A2班(2班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周日下午', icon: 'fa-book',           gradient: 'from-violet-500 to-purple-600',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' }
    ];

    // ======= 学生名册 =======
    const XY_STUDENTS = [
      { id: 'S01', password: '1234', name: '学生S01', classes: ['a2-1'] },
      { id: 'S02', password: '2345', name: '学生S02', classes: ['a2-1', 'f2'] },
      { id: 'S03', password: '3456', name: '学生S03', classes: ['swsy'] }
    ];

    // ======= 老师账号 =======
    const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };

    // ======= 作业清单 =======
    const XY_HOMEWORK = [
      { id: 'a2-1-u6-1', classCode: 'a2-1', unit: 'U6-1', title: 'The Life Columnist', date: '2026-04-20', file: 'a2-1/A2_U6-1.html', status: 'open' }
    ];

    // ======= 新闻 =======
    const XY_NEWS = [
      { title: '肖瑶老师说', subtitle: '致所有正在学英语的孩子', content: '英语不是一门考试学科,而是一种真正能用的能力。我们更看重孩子敢说、会说、说得漂亮——这才是十年后还能留在孩子身上的东西。', date: '2026-04-21', bgColor: 'from-violet-600 to-purple-600', tag: '教育理念' },
      { title: '本周教学重点', subtitle: '口语素养·情境表达', content: '本周各班聚焦"生活化情境表达"训练,让孩子能把学过的句型在真实场景里自然说出来。家长可以在家配合做"角色扮演"小练习。', date: '2026-04-20', bgColor: 'from-pink-500 to-rose-500', tag: '本周重点' },
      { title: '肖瑶启言·工作室动态', subtitle: '10年专注青少年英语', content: '从2016年至今,陪伴了数百个孩子的英语成长。感谢每一位家长的信任。我们继续用小班精品+口语输出+专业纠音,把每个孩子的英语真正做扎实。', date: '2026-04-19', bgColor: 'from-amber-400 to-orange-500', tag: '工作室动态' }
    ];

    // ======= 登录/权限系统 =======
    const XY_AUTH = {
      login: function(id, password) {
        if (id === XY_TEACHER.id && password === XY_TEACHER.password) {
          localStorage.setItem('xy_user', JSON.stringify({ id, role: 'teacher' }));
          return { user: XY_TEACHER, role: 'teacher' };
        }
        const student = XY_STUDENTS.find(s => s.id === id && s.password === password);
        if (student) {
          localStorage.setItem('xy_user', JSON.stringify({ id: student.id, role: 'student' }));
          return { user: student, role: 'student' };
        }
        return null;
      },
      getCurrentUser: function() {
        try {
          const data = localStorage.getItem('xy_user');
          if (!data) return null;
          const stored = JSON.parse(data);
          if (stored.role === 'teacher' && stored.id === XY_TEACHER.id) {
            return { user: XY_TEACHER, role: 'teacher' };
          }
          if (stored.role === 'student') {
            const student = XY_STUDENTS.find(s => s.id === stored.id);
            if (student) return { user: student, role: 'student' };
          }
          return null;
        } catch (e) { return null; }
      },
      logout: function() { localStorage.removeItem('xy_user'); }
    };

    // ======= 工具函数 =======
    const XY_UTILS = {
      getClass: function(code) { return XY_CLASSES.find(c => c.code === code); },
      getOpenHomework: function(classCode) {
        return XY_HOMEWORK.filter(hw => hw.classCode === classCode && hw.status === 'open');
      },
      getLatestHomework: function(classCode) {
        const opens = this.getOpenHomework(classCode);
        if (opens.length === 0) return null;
        return opens.sort((a, b) => (b.date || '').localeCompare(a.date || ''))[0];
      }
    };
  </script>

  <!-- ============================================= -->
  <!-- 页面渲染(纯原生 JS,无React/Babel) -->
  <!-- ============================================= -->
  <script>
    const root = document.getElementById('root');

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ============ 渲染顶部导航栏 ============
    function renderTopBar(auth) {
      const btnHtml = auth ? `
        <button id="logout-btn" class="active-scale bg-white px-4 py-2 rounded-full flex items-center gap-1.5 card-shadow">
          <i class="fa-solid fa-right-from-bracket text-gray-500 text-xs"></i>
          <span class="text-gray-600 font-bold text-xs tracking-wider">LOGOUT</span>
        </button>
      ` : `
        <button id="login-btn" class="active-scale bg-white px-4 py-2 rounded-full flex items-center gap-1.5 card-shadow">
          <i class="fa-solid fa-right-to-bracket text-violet-600 text-xs"></i>
          <span class="text-violet-700 font-bold text-xs tracking-wider">LOGIN</span>
        </button>
      `;
      return `
        <div class="pt-safe sticky top-0 z-40 bg-[#F8F9FF]/80 backdrop-blur-lg">
          <div class="px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
              <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-violet-600 to-purple-700 flex items-center justify-center shadow-lg shadow-violet-500/30">
                <i class="fa-solid fa-graduation-cap text-white text-lg"></i>
              </div>
              <div class="flex flex-col leading-tight">
                <span class="font-black text-violet-700 text-lg">肖瑶启言</span>
                <span class="text-[10px] text-gray-400 font-semibold tracking-widest">XIAOYAO STUDIO</span>
              </div>
            </div>
            ${btnHtml}
          </div>
        </div>
      `;
    }

    // ============ 渲染新闻横幅 ============
    let newsIndex = 0;
    let newsTimer = null;
    function renderNewsBanner() {
      if (!XY_NEWS.length) return '';
      const current = XY_NEWS[newsIndex];
      const dots = XY_NEWS.map((_, i) => `<button data-idx="${i}" class="news-dot ${i === newsIndex ? 'dot-active' : 'dot-inactive'}"></button>`).join('');
      return `
        <div class="px-5 mb-8 fade-in-up" style="animation-delay:0.1s">
          <div id="news-banner" class="relative rounded-3xl overflow-hidden bg-gradient-to-br ${current.bgColor} shadow-xl shadow-violet-500/20">
            <div class="absolute -top-12 -right-12 w-40 h-40 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-16 -left-10 w-48 h-48 rounded-full bg-white/5 blur-3xl"></div>
            <div class="relative p-6 pb-10 min-h-[180px]">
              ${current.tag ? `<div class="inline-flex items-center gap-1 bg-white/20 backdrop-blur-sm px-2.5 py-1 rounded-full mb-3">
                <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                <span class="text-white text-[10px] font-bold tracking-wider">${escapeHtml(current.tag)}</span>
              </div>` : ''}
              <h2 class="text-white text-2xl font-black leading-tight mb-1">${escapeHtml(current.title)}</h2>
              ${current.subtitle ? `<p class="text-white/90 text-sm font-semibold mb-3">${escapeHtml(current.subtitle)}</p>` : ''}
              <p class="text-white/85 text-sm leading-relaxed">${escapeHtml(current.content)}</p>
              ${current.date ? `<div class="absolute bottom-4 right-5 text-white/60 text-[10px] font-semibold">${escapeHtml(current.date)}</div>` : ''}
            </div>
            ${XY_NEWS.length > 1 ? `<div class="absolute bottom-4 left-0 right-0 flex justify-center gap-1.5">${dots}</div>` : ''}
          </div>
        </div>
      `;
    }
    function startNewsAutoplay() {
      if (newsTimer) clearInterval(newsTimer);
      if (XY_NEWS.length <= 1) return;
      newsTimer = setInterval(() => {
        newsIndex = (newsIndex + 1) % XY_NEWS.length;
        renderPage();
      }, 5000);
    }

    // ============ 渲染学生 Profile ============
    function renderStudentProfile(user) {
      const myClasses = user.classes.map(code => XY_UTILS.getClass(code)).filter(Boolean);
      const myHomework = [];
      user.classes.forEach(code => {
        const latest = XY_UTILS.getLatestHomework(code);
        if (latest) {
          const cls = XY_UTILS.getClass(code);
          myHomework.push({ ...latest, className: cls.name, classGradient: cls.gradient });
        }
      });

      const homeworkHtml = myHomework.length > 0 ? `
        <div class="mb-6">
          <div class="flex items-center gap-2 mb-3">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-xs font-black text-gray-500 tracking-widest">本周作业 · 待完成</span>
          </div>
          <div class="space-y-3">
            ${myHomework.map((hw, i) => `
              <button data-hw-goto="${hw.classCode}" class="hw-item scale-in active-scale w-full bg-white rounded-2xl p-4 card-shadow text-left flex items-center gap-4" style="animation-delay:${0.1 + i * 0.05}s">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br ${hw.classGradient} flex items-center justify-center flex-shrink-0">
                  <i class="fa-solid fa-book-open text-white"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <div class="text-xs text-gray-400 font-bold mb-0.5">${escapeHtml(hw.className)}</div>
                  <div class="text-sm font-black text-gray-900 truncate">Unit ${escapeHtml(hw.unit)} · ${escapeHtml(hw.title)}</div>
                  <div class="text-[10px] text-gray-400 font-semibold mt-0.5">${escapeHtml(hw.date)}</div>
                </div>
                <div class="bg-green-50 text-green-600 px-2.5 py-1 rounded-full text-[10px] font-black tracking-wider flex-shrink-0">NEW</div>
              </button>
            `).join('')}
          </div>
        </div>
      ` : `
        <div class="mb-6 bg-amber-50 rounded-2xl p-4 flex items-center gap-3">
          <i class="fa-solid fa-circle-info text-amber-500"></i>
          <span class="text-xs text-amber-800 font-semibold">本周作业准备中,老师会尽快更新~</span>
        </div>
      `;

      const classesHtml = `
        <div>
          <div class="flex items-center gap-2 mb-3">
            <i class="fa-solid fa-book-bookmark text-gray-400"></i>
            <span class="text-xs font-black text-gray-500 tracking-widest">我的班级 (${myClasses.length})</span>
          </div>
          <div class="grid grid-cols-2 gap-4">
            ${myClasses.map((cls, i) => `
              <button data-class-goto="${cls.code}" class="class-goto scale-in active-scale bg-white rounded-3xl p-5 card-shadow text-left" style="animation-delay:${0.2 + i * 0.05}s">
                <div class="w-12 h-12 rounded-2xl ${cls.iconBg} flex items-center justify-center mb-3">
                  <i class="fa-solid ${cls.icon} ${cls.iconColor} text-lg"></i>
                </div>
                <h3 class="font-black text-gray-900 text-sm leading-tight mb-0.5">${escapeHtml(cls.name)}</h3>
                <p class="text-[10px] font-bold text-gray-400 tracking-wider mb-3">${escapeHtml(cls.time)}</p>
                <div class="rounded-full py-2 text-center bg-gradient-to-r ${cls.gradient}">
                  <span class="text-white text-xs font-bold">进入</span>
                </div>
              </button>
            `).join('')}
          </div>
        </div>
      `;

      return `
        <div class="px-5 mb-6 fade-in-up">
          <div class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-violet-600 via-purple-600 to-fuchsia-600 p-6 shadow-xl shadow-violet-500/30 mb-5">
            <div class="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-12 -left-8 w-40 h-40 rounded-full bg-white/5 blur-3xl"></div>
            <div class="relative flex items-center gap-4">
              <div class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-sm flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-user-graduate text-white text-2xl"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-white/70 text-xs font-bold tracking-widest mb-0.5">欢迎回来</div>
                <div class="text-white text-2xl font-black">${escapeHtml(user.name)}</div>
                <div class="text-white/80 text-xs font-semibold mt-1">学员账号:${escapeHtml(user.id)}</div>
              </div>
            </div>
          </div>
          ${homeworkHtml}
          ${classesHtml}
        </div>
      `;
    }

    // ============ 渲染老师入口 ============
    function renderTeacherPanel(user) {
      return `
        <div class="px-5 mb-6 fade-in-up">
          <div class="relative rounded-3xl overflow-hidden bg-gradient-to-br from-gray-900 via-violet-900 to-purple-900 p-6 shadow-xl mb-5">
            <div class="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-violet-500/20 blur-2xl"></div>
            <div class="relative flex items-center gap-4 mb-4">
              <div class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-400 to-purple-500 flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-user-shield text-white text-2xl"></i>
              </div>
              <div>
                <div class="text-violet-300 text-xs font-bold tracking-widest mb-0.5">老师后台 · ADMIN</div>
                <div class="text-white text-2xl font-black">${escapeHtml(user.name)}</div>
              </div>
            </div>
            <a href="teacher.html" class="active-scale block w-full bg-white/90 backdrop-blur rounded-2xl py-4 flex items-center justify-center gap-2 hover:bg-white transition-all">
              <i class="fa-solid fa-gauge-high text-violet-700"></i>
              <span class="text-violet-700 font-black tracking-wider">进入管理后台</span>
            </a>
          </div>
        </div>
      `;
    }

    // ============ 渲染班级列表 ============
    function renderClassList(auth) {
      const classes = XY_CLASSES;
      const user = auth ? auth.user : null;
      const role = auth ? auth.role : null;

      const subtitle = role === 'teacher' ? '以老师身份查看所有班级' :
                       user ? '灰色的班级你暂无权限' : '查看肖瑶启言全部课程';

      const cards = classes.map((cls, i) => {
        const hasAccess = role === 'teacher' || (user && user.classes && user.classes.includes(cls.code));
        const lockIcon = (user && role === 'student' && !hasAccess) ? `
          <div class="absolute top-3 right-3 w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center">
            <i class="fa-solid fa-lock text-gray-400 text-xs"></i>
          </div>` : '';
        const opacityClass = (!hasAccess && user) ? 'opacity-60' : '';
        return `
          <button data-class-click="${cls.code}" class="class-card scale-in active-scale bg-white rounded-3xl p-5 card-shadow text-left w-full transition-all relative ${opacityClass}" style="animation-delay:${0.15 + i * 0.05}s">
            ${lockIcon}
            <div class="w-14 h-14 rounded-2xl ${cls.iconBg} flex items-center justify-center mb-4">
              <i class="fa-solid ${cls.icon} ${cls.iconColor} text-xl"></i>
            </div>
            <h3 class="font-black text-gray-900 text-base leading-tight mb-1">${escapeHtml(cls.name)}</h3>
            <p class="text-[10px] font-bold text-gray-400 tracking-widest mb-3">${escapeHtml(cls.level)}</p>
            <div class="flex items-center gap-1.5 mb-4 text-gray-500">
              <i class="fa-regular fa-clock text-xs"></i>
              <span class="text-xs font-semibold">${escapeHtml(cls.time)}</span>
            </div>
            <div class="rounded-full py-2.5 text-center bg-gradient-to-r ${cls.gradient} shadow-md">
              <span class="text-white text-sm font-bold tracking-wide">进入课堂</span>
            </div>
          </button>
        `;
      }).join('');

      return `
        <div class="px-5 mb-6">
          <div class="flex items-end justify-between mb-5 fade-in-up" style="animation-delay:0.15s">
            <div>
              <h2 class="text-2xl font-black text-gray-900 mb-0.5">所有班级</h2>
              <p class="text-sm text-gray-500 font-medium">${subtitle}</p>
            </div>
            <div class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center">
              <i class="fa-solid fa-table-cells-large text-violet-600"></i>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">${cards}</div>
        </div>
      `;
    }

    // ============ 渲染底部导航 ============
    function renderBottomNav() {
      return `
        <div class="fixed bottom-0 left-0 right-0 z-40 pointer-events-none">
          <div class="flex justify-center pb-4 px-4" style="padding-bottom:calc(1rem + env(safe-area-inset-bottom, 16px))">
            <div class="bg-white/90 backdrop-blur-xl rounded-full px-2 py-2 pointer-events-auto flex items-center gap-1" style="box-shadow:0 10px 40px rgba(92,45,255,0.15),0 2px 8px rgba(0,0,0,0.04)">
              <button class="flex items-center gap-2 rounded-full px-4 py-2.5 bg-gradient-to-r from-violet-600 to-purple-700 shadow-lg shadow-violet-500/40">
                <i class="fa-solid fa-folder-open text-sm text-white"></i>
                <span class="text-white text-[10px] font-black tracking-wider">COURSES</span>
              </button>
              <button class="nav-tba flex items-center gap-2 rounded-full px-4 py-2.5 text-gray-400">
                <i class="fa-solid fa-house text-sm"></i>
              </button>
              <button class="nav-tba flex items-center gap-2 rounded-full px-4 py-2.5 text-gray-400">
                <i class="fa-solid fa-user text-sm"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ 登录弹窗 ============
    let pendingTargetClass = null;
    function showLoginModal(targetClass) {
      pendingTargetClass = targetClass || null;
      const subtitle = targetClass ? `进入"${escapeHtml(targetClass.name)}"需要登录` : '欢迎来到肖瑶启言学习中心';
      const modalHtml = `
        <div id="login-modal" class="fixed inset-0 z-50 modal-overlay flex items-end sm:items-center justify-center p-4" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)">
          <div id="login-modal-card" class="modal-content bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-5">
              <div>
                <h2 class="text-2xl font-black text-gray-900">登录</h2>
                <p class="text-xs text-gray-500 font-medium mt-0.5">${subtitle}</p>
              </div>
              <button id="login-close" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center active-scale">
                <i class="fa-solid fa-xmark text-gray-500"></i>
              </button>
            </div>
            <form id="login-form">
              <div class="mb-3">
                <label class="text-xs font-bold text-gray-500 tracking-wider mb-1.5 block">账号</label>
                <div class="relative">
                  <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                  <input type="text" id="login-id" placeholder="输入你的账号" autocapitalize="none" autocomplete="username"
                    class="w-full bg-gray-50 rounded-xl py-3.5 pl-11 pr-4 text-gray-900 font-bold focus:bg-white focus:ring-2 focus:ring-violet-400 outline-none transition-all">
                </div>
              </div>
              <div class="mb-4">
                <label class="text-xs font-bold text-gray-500 tracking-wider mb-1.5 block">密码</label>
                <div class="relative">
                  <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                  <input type="password" id="login-pwd" placeholder="输入密码" autocomplete="current-password"
                    class="w-full bg-gray-50 rounded-xl py-3.5 pl-11 pr-4 text-gray-900 font-bold focus:bg-white focus:ring-2 focus:ring-violet-400 outline-none transition-all">
                </div>
              </div>
              <div id="login-error" class="hidden bg-red-50 text-red-600 text-xs font-bold px-4 py-2.5 rounded-xl mb-3 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i><span id="login-error-text"></span>
              </div>
              <button type="submit" id="login-submit" class="w-full bg-gradient-to-r from-violet-600 to-purple-700 text-white font-black py-4 rounded-xl tracking-wider active-scale shadow-lg shadow-violet-500/30">
                <span>立即登录</span>
              </button>
            </form>
            <div class="mt-4 text-center">
              <p class="text-xs text-gray-400">忘记账号/密码?请联系肖瑶老师</p>
            </div>
          </div>
        </div>
      `;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = modalHtml;
      document.body.appendChild(wrapper.firstElementChild);

      document.getElementById('login-modal').addEventListener('click', e => {
        if (e.target.id === 'login-modal') closeLoginModal();
      });
      document.getElementById('login-close').addEventListener('click', closeLoginModal);
      document.getElementById('login-form').addEventListener('submit', handleLoginSubmit);
      setTimeout(() => document.getElementById('login-id').focus(), 100);
    }

    function closeLoginModal() {
      const m = document.getElementById('login-modal');
      if (m) m.remove();
    }

    function handleLoginSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('login-id').value.trim();
      const pwd = document.getElementById('login-pwd').value.trim();
      const errDiv = document.getElementById('login-error');
      const errText = document.getElementById('login-error-text');
      const submitBtn = document.getElementById('login-submit');

      if (!id || !pwd) {
        errText.textContent = '请输入账号和密码';
        errDiv.classList.remove('hidden');
        return;
      }
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i>登录中...';
      submitBtn.disabled = true;

      setTimeout(() => {
        const result = XY_AUTH.login(id, pwd);
        if (result) {
          closeLoginModal();
          // 检查是否要跳转到班级
          if (pendingTargetClass) {
            if (result.role === 'teacher' ||
                (result.role === 'student' && result.user.classes.includes(pendingTargetClass.code))) {
              window.location.href = `class.html?code=${pendingTargetClass.code}`;
              return;
            }
          }
          renderPage();
        } else {
          errText.textContent = '账号或密码错误,请联系老师';
          errDiv.classList.remove('hidden');
          submitBtn.innerHTML = '<span>立即登录</span>';
          submitBtn.disabled = false;
        }
      }, 400);
    }

    // ============ 主渲染 ============
    function renderPage() {
      const auth = XY_AUTH.getCurrentUser();
      const user = auth ? auth.user : null;
      const role = auth ? auth.role : null;

      root.className = 'min-h-screen bg-[#F8F9FF] pb-safe';
      root.innerHTML = `
        ${renderTopBar(auth)}
        <div class="pt-2">
          ${role === 'teacher' ? renderTeacherPanel(user) : ''}
          ${role === 'student' ? renderStudentProfile(user) : ''}
          ${!auth ? renderNewsBanner() : ''}
          ${renderClassList(auth)}
        </div>
        ${renderBottomNav()}
      `;

      // 绑定事件
      const loginBtn = document.getElementById('login-btn');
      if (loginBtn) loginBtn.addEventListener('click', () => showLoginModal(null));

      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) logoutBtn.addEventListener('click', () => {
        if (confirm('确定要退出登录吗?')) {
          XY_AUTH.logout();
          renderPage();
        }
      });

      // 新闻轮播点
      document.querySelectorAll('.news-dot').forEach(dot => {
        dot.addEventListener('click', e => {
          newsIndex = parseInt(e.target.dataset.idx);
          renderPage();
        });
      });
      startNewsAutoplay();

      // 班级卡片点击
      document.querySelectorAll('.class-card').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.dataset.classClick;
          const cls = XY_UTILS.getClass(code);
          if (!cls) return;
          if (role === 'teacher') {
            window.location.href = `class.html?code=${code}`;
            return;
          }
          if (!user) {
            showLoginModal(cls);
            return;
          }
          if (user.classes && user.classes.includes(code)) {
            window.location.href = `class.html?code=${code}`;
          } else {
            alert(`你不是"${cls.name}"的学员,无法进入。`);
          }
        });
      });

      // Profile里的班级卡片
      document.querySelectorAll('.class-goto').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `class.html?code=${btn.dataset.classGoto}`;
        });
      });

      // Profile里的作业快捷按钮
      document.querySelectorAll('.hw-item').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `class.html?code=${btn.dataset.hwGoto}`;
        });
      });

      // TBA提示
      document.querySelectorAll('.nav-tba').forEach(btn => {
        btn.addEventListener('click', () => alert('此功能开发中,敬请期待 ✨'));
      });
    }

    // ============ 启动 ============
    renderPage();
  </script>
</body>
</html>
