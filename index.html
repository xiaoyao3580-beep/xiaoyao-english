<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xiaoyao Studio | Learning HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #F8F8FC; 
            color: #1C1C28; 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.8s ease-in-out;
            overflow-y: scroll; /* 强制显示滚动条防止页面抖动 */
        }
        .font-serif { font-family: Georgia, 'Times New Roman', serif; }
        
        .card-solid {
            background-color: #FFFFFF; border-radius: 24px;
            border: 1px solid rgba(107, 72, 255, 0.04);
            box-shadow: 0 10px 30px rgba(107, 72, 255, 0.04), 0 2px 6px rgba(0,0,0,0.02);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
        }

        .glass-header {
            background: rgba(248, 248, 252, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }

        .bottom-nav-bar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 -10px 30px rgba(107, 72, 255, 0.04); padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .bg-banner {
            background: linear-gradient(135deg, #8B6CEF 0%, #6B48FF 100%); position: relative; overflow: hidden;
        }
        .bg-banner::before {
            content: ''; position: absolute; top: -50%; right: -20%; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%); border-radius: 50%;
        }

        /* 高级 3D 页面切换动画 */
        .page-enter {
            animation: page3DEnter 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transform-origin: 50% 10vh;
            backface-visibility: hidden;
        }
        @keyframes page3DEnter {
            0% { opacity: 0; transform: perspective(1200px) translateZ(-60px) translateY(15px) rotateX(4deg); }
            100% { opacity: 1; transform: perspective(1200px) translateZ(0) translateY(0) rotateX(0); }
        }

        .animate-stagger { animation: slideUpFade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }

        .active-scale { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .active-scale:active { transform: scale(0.96); transition: transform 0.05s ease-out; }
        
        /* 隐藏滚动条保留滑动 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 丝滑原生级开关 */
        .toggle-switch { position: relative; display: inline-block; width: 48px; height: 26px; vertical-align: middle; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e5e7eb; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 26px; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .toggle-switch input:checked + .toggle-slider { background-color: #6B48FF; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(22px); }

        .chip { border: 1px solid #E5E7EB; cursor: pointer; transition: all 0.2s ease; }
        .chip.selected { background-color: #6B48FF; color: white; border-color: #6B48FF; font-weight: bold; }

        /* 3D 宠物展示 */
        .pet-3d-container { perspective: 1000px; }
        .pet-3d-model {
            animation: float3d 4s ease-in-out infinite;
            transform-style: preserve-3d;
            display: inline-block;
        }
        @keyframes float3d {
            0%, 100% { transform: translateY(0) rotateX(5deg) rotateY(-10deg); filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15)); }
            50% { transform: translateY(-15px) rotateX(-5deg) rotateY(15deg); filter: drop-shadow(0 25px 15px rgba(0,0,0,0.05)); }
        }
        #pet-aura-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; border-radius: 36px; }

        .pet-hero {
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 28px;
            box-shadow: 0 12px 32px rgba(107, 72, 255, 0.06); position: relative; overflow: hidden;
        }
        .pet-stage {
            width: 140px; height: 140px; display: flex; align-items: center; justify-content: center;
            border-radius: 36px; background: radial-gradient(circle at 50% 60%, rgba(255,255,255,0.4), transparent 60%);
        }
        @media (min-width: 768px) {
            .pet-stage { width: 180px; height: 180px; }
        }
        
        .energy-bar-wrapper { background: rgba(0, 0, 0, 0.08); border-radius: 99px; height: 8px; overflow: hidden; }
        .energy-bar {
            height: 100%; border-radius: 99px; background: linear-gradient(90deg, #8B6CEF, #6B48FF);
            transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .option-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .option-btn {
            flex: 0 0 auto; background: #FFF; border: 1px solid #E5E7EB; border-radius: 99px; padding: 12px 20px; font-size: 14px; font-weight: 600; color: #1C1C28; transition: all 0.2s;
        }
        .option-btn.active { background: #6B48FF; color: #FFF; border-color: #6B48FF; }
        .option-btn.locked { opacity: 0.4; cursor: not-allowed; }

        .star-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            color: #6B48FF; font-weight: 900; font-size: 22px;
            padding: 16px 36px; border-radius: 99px; opacity: 0; pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 30px rgba(107,72,255,0.15); animation: starGentlePop 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes starGentlePop {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50px) scale(0.95); }
        }
        
        .tab-content { display: none; animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="relative min-h-screen selection:bg-[#6B48FF] selection:text-white" id="main-body">
    
    <!-- 核心容器自适应更宽的尺寸 -->
    <div id="app-content" class="relative z-10 w-full max-w-[1100px] mx-auto min-h-screen pb-28 md:pb-32"></div>
    <div id="nav-root"></div>
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // Supabase DB Connection
        // ==========================================
        const SUPABASE_URL = 'https://avffxvpwzpvlohoyqshb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Bk22JrUqpC4nd5ucHr9I8A_mvPk3uXc';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let XY_STUDENTS = [];
        let XY_HOMEWORK = [];
        let XY_ALL_PETS = []; 
        let XY_BANNERS = null; 
        
        async function loadStudents() {
            const { data } = await sb.from('students').select('*').order('id', { ascending: false });
            return data || [];
        }
        async function loadHomework() {
            const { data } = await sb.from('homework').select('*').order('date', { ascending: false });
            return (data || []).map(h => ({ id: h.id, classCode: h.class_code, unit: h.unit, title: h.title, date: h.date, file: h.file, status: h.status }));
        }
        async function loadAllPets() {
            const { data } = await sb.from('students_pets').select('*'); return data || [];
        }
        async function loadBanners() {
            const { data } = await sb.from('banners').select('*').order('created_at', { ascending: false });
            return (!data || data.length === 0) ? null : data;
        }
        
        const XY_CLASSES = [
          { code: 'f2',      name: 'TALENT F2',    level: 'FOUNDATION',      gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-face-smile', color: 'text-[#FF4B72]', bg: 'bg-[#FFE5EC]' },
          { code: 'a1-plus', name: 'TALENT A1+',   level: 'BEGINNER+',       gradient: 'from-[#B270FF] to-[#8B48FF]', icon: 'fa-star', color: 'text-[#FFB800]', bg: 'bg-[#FFF4CC]' },
          { code: 'a2',      name: 'TALENT A2',    level: 'INTERMEDIATE',    gradient: 'from-[#8B6CEF] to-[#6B48FF]', icon: 'fa-trophy', color: 'text-[#6B48FF]', bg: 'bg-[#E9E5FF]' },
          { code: 'a2-plus', name: 'TALENT A2+',   level: 'ADVANCED INT.',   gradient: 'from-[#26D0CE] to-[#1A2980]', icon: 'fa-wand-magic-sparkles', color: 'text-[#00BFA5]', bg: 'bg-[#E0F2F1]' },
          { code: 'swsy',    name: '深外素养口语课', level: 'SPEAKING',        gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-comments', color: 'text-[#E91E63]', bg: 'bg-[#FCE4EC]' },
          { code: 'ms',      name: '初中能力提升',   level: 'JUNIOR HIGH PREP',gradient: 'from-[#5C6BC0] to-[#3949AB]', icon: 'fa-book-open', color: 'text-[#3F51B5]', bg: 'bg-[#E8EAF6]' },
          { code: 'econ',    name: '《经济学人》精读', level: 'PREMIUM READING', gradient: 'from-[#42A5F5] to-[#1E88E5]', icon: 'fa-newspaper', color: 'text-[#0088FF]', bg: 'bg-[#E5F4FF]' },
          { code: 'adult',   name: '成人零基础口语', level: 'ADULT SPEAKING',  gradient: 'from-[#AB47BC] to-[#8E24AA]', icon: 'fa-user-tie', color: 'text-[#9C27B0]', bg: 'bg-[#F3E5F5]' }
        ];

        const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };
        const XY_CAROUSEL = [
          { type: 'quote', text: 'The limits of my language mean the limits of my world.', author: 'Ludwig Wittgenstein' },
          { type: 'news', tag: 'NEW BOOK', title: '《英语学习方法论》', description: '肖瑶老师新书,深圳南山书城热销中' }
        ];

        const XY_AUTH = {
          login: async function(id, password) {
            if (id === XY_TEACHER.id && password === XY_TEACHER.password) {
              localStorage.setItem('xy_user', JSON.stringify({ id, role: 'teacher', name: XY_TEACHER.name }));
              return { user: XY_TEACHER, role: 'teacher' };
            }
            const { data: student, error } = await sb.from('students').select('*').eq('id', id.toUpperCase()).eq('password', password).maybeSingle();
            if (error) return { error: true, msg: '数据库连接失败，请联系管理员。' };
            if (!student) return { error: true, msg: '数据库中没有找到这个账号！' };

            localStorage.setItem('xy_user', JSON.stringify({ id: student.id, role: 'student', name: student.name, classes: student.classes || [] }));
            await PetManager.init(student.id);
            return { user: student, role: 'student' };
          },
          getCurrentUser: function() { try { return JSON.parse(localStorage.getItem('xy_user')); } catch (e) { return null; } },
          logout: function() { localStorage.removeItem('xy_user'); App.navigate('home'); }
        };

        function getHwOverrides() { return JSON.parse(localStorage.getItem('xy_hw_status_overrides') || '{}'); }
        function setHwOverrides(obj) { localStorage.setItem('xy_hw_status_overrides', JSON.stringify(obj)); }

        // ==========================================
        // 3D Evolution Game & Pet System 
        // ==========================================
        const PET_DB = [
          { id: 'fox', name: 'Luna', type: 'Explorer', stages: ['🥚', '🦊', '🦊🔥', '🦄'] },
          { id: 'owl', name: 'Oliver', type: 'Reader', stages: ['🥚', '🦉', '🦉✨', '🪽'] },
          { id: 'dragon', name: 'Ember', type: 'Challenger', stages: ['🥚', '🦎', '🐉', '🐲'] },
          { id: 'otter', name: 'Milo', type: 'Companion', stages: ['🥚', '🦦', '🦦✨', '🧜‍♂️'] },
          { id: 'deer', name: 'Nia', type: 'Dreamer', stages: ['🥚', '🦌', '🦌✨', '🦌🧚‍♀️'] },
          { id: 'whale', name: 'Blue', type: 'Vocalist', stages: ['🥚', '🐟', '🐳', '🐋✨'] }
        ];
        
        const ACCESSORIES = [
          { id: 'none', text: 'None', icon: '', size: '0', pos: '', unlockStars: 0 },
          { id: 'scarf', text: 'Scarf', icon: '🧣', size: '36px', pos: 'bottom: -4px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 0 },
          { id: 'bow', text: 'Bow', icon: '🎀', size: '26px', pos: 'top: -2px; right: -4px; transform: rotate(15deg); z-index: 20;', unlockStars: 10 },
          { id: 'star', text: 'Star', icon: '⭐', size: '24px', pos: 'top: -6px; left: 0px; transform: rotate(-15deg); z-index: -1;', unlockStars: 30 },
          { id: 'hat', text: 'Top Hat', icon: '🎩', size: '34px', pos: 'top: -22px; left: 50%; transform: translateX(-50%) rotate(-5deg); z-index: 20;', unlockStars: 60 },
          { id: 'crown', text: 'Crown', icon: '👑', size: '34px', pos: 'top: -24px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 100 }
        ];

        const AURAS = [
          { id: 'warm', text: '☀️ Warm Sun', gradient: 'from-[#FFF6CF] to-[#FFDAB9]' },
          { id: 'forest', text: '🌿 Forest', gradient: 'from-[#D4F0D4] to-[#B5E5B5]' },
          { id: 'night', text: '🌙 Starry', gradient: 'from-[#D8D8F5] to-[#B3B3E6]' },
          { id: 'sea', text: '🌊 Ocean', gradient: 'from-[#D8F0EE] to-[#AEE5DF]' }
        ];

        const LVL_THRESHOLDS = [0, 10, 25, 45, 70, 100, 150, 220, 300, 999];

        const PetManager = {
            state: null, userId: null,
            async init(userId) {
                this.userId = userId;
                const { data } = await sb.from('students_pets').select('*').eq('student_id', userId).maybeSingle();
                
                this.state = {
                    petId: data ? data.pet_id : null, 
                    accessoryId: data ? (data.accessory_id || 'none') : 'none',
                    auraId: data ? (data.aura_id || 'warm') : 'warm', 
                    stars: data ? (data.total_stars || 0) : 0,
                    hwScores: {}, 
                    adoptionDate: data ? data.adoption_date : new Date().toISOString()
                };

                const { data: logs } = await sb.from('growth_logs').select('homework_id, score, stars_earned').eq('student_id', userId);
                if (logs) {
                    logs.forEach(l => {
                        // 过滤豁免权数据
                        if (l.homework_id.startsWith('EXEMP_')) return;
                        if (!this.state.hwScores[l.homework_id] || this.state.hwScores[l.homework_id].score < l.score) {
                            this.state.hwScores[l.homework_id] = { score: l.score, stars: l.stars_earned || 0 };
                        }
                    });
                }
                
                if (!data) await this.save();
                this.applyAura();
            },
            async save() {
                if (!this.userId || !this.state) return;
                const dbData = { student_id: this.userId, pet_id: this.state.petId, accessory_id: this.state.accessoryId, aura_id: this.state.auraId, total_stars: this.state.stars, adoption_date: this.state.adoptionDate, updated_at: new Date().toISOString() };
                await sb.from('students_pets').upsert(dbData, { onConflict: 'student_id' });
            },
            getPet() { return PET_DB.find(p => p.id === this.state.petId) || PET_DB[0]; },
            getAccessory() { return ACCESSORIES.find(a => a.id === this.state.accessoryId) || ACCESSORIES[0]; },
            getLevel() {
                for (let i = LVL_THRESHOLDS.length - 1; i >= 0; i--) { if (this.state.stars >= LVL_THRESHOLDS[i]) return Math.min(i + 1, 10); }
                return 1;
            },
            getEvolutionStage() {
                const lvl = this.getLevel();
                let stageIdx = 0; let scale = 'scale(0.8)';
                if (lvl >= 4 && lvl <= 6) { stageIdx = 1; scale = 'scale(0.95)'; }
                else if (lvl >= 7 && lvl <= 9) { stageIdx = 2; scale = 'scale(1.1)'; }
                else if (lvl >= 10) { stageIdx = 3; scale = 'scale(1.25)'; }
                
                const pet = this.getPet();
                const stageNames = ['Incubating Egg', 'Baby Form', 'Mature Form', 'Evolved Spirit'];
                return { idx: stageIdx, emoji: pet.stages[stageIdx], name: stageNames[stageIdx], scale: scale };
            },
            getProgress() {
                const lvl = this.getLevel();
                if (lvl >= 10) return { cur: this.state.stars, max: 999, pct: 100 };
                const prev = LVL_THRESHOLDS[lvl - 1]; const next = LVL_THRESHOLDS[lvl];
                return { cur: this.state.stars, max: next, pct: Math.min(100, ((this.state.stars - prev) / (next - prev)) * 100) };
            },
            applyAura() {
                const b = document.getElementById('main-body');
                b.className = b.className.replace(/aura-\w+/g, '');
                if(this.state && this.state.auraId) b.classList.add(`aura-${this.state.auraId}`);
            },
            async processHomeworkScore(hwId, score, starsEarned) {
                const prevRecord = this.state.hwScores[hwId] || { score: -1, stars: 0 };
                await sb.from('growth_logs').insert({ student_id: this.userId, homework_id: hwId, score: score, stars_earned: starsEarned, attempt_count: 1, is_best_score: score > prevRecord.score });

                if (score > prevRecord.score) {
                    const extraStars = Math.max(0, starsEarned - prevRecord.stars);
                    this.state.hwScores[hwId] = { score: score, stars: Math.max(starsEarned, prevRecord.stars) };
                    
                    if (extraStars > 0) {
                        this.state.stars += extraStars;
                        await this.save();
                        if (prevRecord.score === -1) {
                            App.actions.showAlert(`太棒了！本次作业获得 ${score} 分！\n\n你的宠物收集到了 ${extraStars} ⭐ 成长值！`, '🎉 挑战成功');
                        } else {
                            App.actions.showAlert(`太棒啦！你在本次重做中突破了自我，拿到了 ${score} 分的新纪录！\n\n宠物额外获得了 ${extraStars} ⭐ 成长值！继续保持！`, '🔥 刷分成功');
                        }
                        App.actions.showStarToast(extraStars);
                    } else {
                        await this.save();
                        App.actions.showAlert(`太棒啦！你把最高分刷新到了 ${score} 分！虽然这次的分数档位相同，但你的努力让基础更扎实了！\n\n(宠物保持当前开心状态)`, '💪 突破自我');
                    }
                } else {
                    App.actions.showAlert(`本次得分为 ${score} 分。\n你之前的最高记录是 ${prevRecord.score} 分。\n\n一天不管做多少次，我们永远只取最高分！\n不要灰心，看看解析，随时欢迎再次挑战！`, '🔄 再接再厉');
                }
                App._isNavigating = true; // 触发刷新和回到顶部
                App.render();
            }
        };

        // Canvas Particle System
        const PetCanvasRenderer = {
            timer: null,
            init() {
                if(this.timer) cancelAnimationFrame(this.timer);
                const canvas = document.getElementById('pet-aura-canvas');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
                let particles = [];
                for(let i=0; i<40; i++) {
                    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 4 + 1, speedY: Math.random() * 1.5 + 0.5, opacity: Math.random() });
                }
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    particles.forEach(p => {
                        ctx.globalAlpha = p.opacity; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                        p.y -= p.speedY; if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                    });
                    this.timer = requestAnimationFrame(animate);
                };
                animate();
            }
        };

        // ==========================================
        // SPA Router & Views
        // ==========================================
        const App = {
            state: { 
                page: 'home', params: {}, 
                teacherForm: { classes: [] }, 
                teacherTab: 'students', 
                attendance: null,
                chartConfig: { classCode: '', mode: 'ALL', selectedStudents: [], startDate: '', endDate: '', datasets: null } 
            },
            _isNavigating: false, // 控制是否播放 3D 转场动画
            
            navigate(page, params = {}) {
                const user = XY_AUTH.getCurrentUser();
                if ((page === 'myhub' || page === 'pet') && (!user || user.role !== 'student')) return this.actions.toggleLoginModal(true);
                if (page === 'teacher' && (!user || user.role !== 'teacher')) return this.actions.toggleLoginModal(true);
                
                this.state.page = page; 
                this.state.params = params; 
                this._isNavigating = true; 
                this.render();
            },
            
            escape(str) { return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
            
            render() {
                const appContent = document.getElementById('app-content'); 
                const navRoot = document.getElementById('nav-root');
                
                let html = '';
                if (this.state.page === 'home') html = this.views.home();
                else if (this.state.page === 'myhub') html = this.views.myhub();

                _carouselTimer: null, _carouselIdx: 0,
                initCarousel() {
                    if (this._carouselTimer) { clearInterval(this._carouselTimer); this._carouselTimer = null; }
                    const wrapper = document.getElementById('carousel-wrapper'); const slides = document.querySelectorAll('.carousel-slide'); const dots = document.querySelectorAll('.carousel-dot');
                    if (!wrapper || slides.length === 0) return;
                    this._carouselIdx = 0;
                    const showSlide = (idx) => {
                        if (idx < 0) idx = slides.length - 1; if (idx >= slides.length) idx = 0;
                        slides.forEach((s, i) => { s.style.opacity = i===idx?'1':'0'; s.style.pointerEvents = i===idx?'auto':'none'; s.style.transition = 'opacity 0.6s cubic-bezier(0.2,0.8,0.2,1)'; });
                        dots.forEach((d, i) => { d.className = i===idx ? 'carousel-dot w-2 md:w-3 h-2 md:h-3 rounded-full bg-white transition-all' : 'carousel-dot w-2 h-2 rounded-full bg-white/40 transition-all'; });
                        this._carouselIdx = idx;
                    };
                    showSlide(0);
                    const startTimer = () => { if (this._carouselTimer) clearInterval(this._carouselTimer); this._carouselTimer = setInterval(() => showSlide(this._carouselIdx + 1), 5000); };
                    startTimer();
                    dots.forEach((dot, i) => { dot.addEventListener('click', () => { showSlide(i); startTimer(); }); });
                    let startX = 0; let endX = 0;
                    wrapper.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; }, { passive: true });
                    wrapper.addEventListener('touchend', e => { endX = e.changedTouches[0].screenX; if (endX < startX - 50) { showSlide(this._carouselIdx + 1); startTimer(); } if (endX > startX + 50) { showSlide(this._carouselIdx - 1); startTimer(); } }, { passive: true });

                // --- Attendance System (考勤管理) ---
                async generateAttendance() {
                    const classCode = document.getElementById('att-class').value;
                    const startDate = document.getElementById('att-start').value;
                    const endDate = document.getElementById('att-end').value;
                    if(!classCode || !startDate || !endDate) return this.showAlert('请完整选择班级和日期范围');
                    if(startDate > endDate) return this.showAlert('开始日期不能晚于结束日期');

                    const classStudents = XY_STUDENTS.filter(s => (s.classes || []).includes(classCode));
                    if(classStudents.length === 0) return this.showAlert('该班级暂无学生档案');

                    const btn = document.getElementById('btn-att-gen'); const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 正在拉取数据...'; btn.disabled = true;

                    const studentIds = classStudents.map(s => s.id);
                    const { data: logs, error } = await sb.from('growth_logs').select('student_id, homework_id, created_at').in('student_id', studentIds);
                    btn.innerHTML = orig; btn.disabled = false;
                    
                    if(error) return this.showAlert('获取打卡数据失败: ' + error.message);

                    const report = {};
                    classStudents.forEach(s => { report[s.id] = { name: s.name, actual: new Set(), exempt: new Set() }; });

                    logs.forEach(log => {
                        if(!report[log.student_id]) return;
                        let dateStr = '';
                        if(log.homework_id && log.homework_id.startsWith('EXEMP_')) {
                            dateStr = log.homework_id.split('_')[1];
                        } else {
                            const d = new Date(log.created_at);
                            dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                        }
                        if(dateStr >= startDate && dateStr <= endDate) {
                            if(log.homework_id && log.homework_id.startsWith('EXEMP_')) report[log.student_id].exempt.add(dateStr);
                            else report[log.student_id].actual.add(dateStr);
                        }
                    });

                    App.state.attendance = { classCode, startDate, endDate, report };
                    App.render();
                },

                },

                toggleChartStudent(uid) {
                    let sel = App.state.chartConfig.selectedStudents || [];
                    if (sel.includes(uid)) sel = sel.filter(id => id !== uid);
                    else if (sel.length < 5) sel.push(uid); 
                    else return this.showAlert('为了图表清晰，最多支持同时对比 5 名同学哦。');
                    App.state.chartConfig.selectedStudents = sel;
                    App.render();
                },

                async generateChart() {
                    const classCode = document.getElementById('chart-class').value;
                    const mode = App.state.chartConfig.mode;
                    const selectedIds = App.state.chartConfig.selectedStudents || [];
                    const startDate = document.getElementById('chart-start').value;
                    const endDate = document.getElementById('chart-end').value;

                    if(!classCode || !startDate || !endDate) return this.showAlert('请完整填写配置');
                    if(startDate > endDate) return this.showAlert('开始日期不能晚于结束日期');
                    if(mode === 'CUSTOM' && selectedIds.length === 0) return this.showAlert('请至少在上方选择一名学生进行对比分析。');

                    const btn = document.getElementById('btn-chart-gen'); const orig = btn.innerHTML;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> 数据聚合中...'; btn.disabled = true;

                    const classStudents = XY_STUDENTS.filter(s => (s.classes || []).includes(classCode));
                    const studentIds = classStudents.map(s => s.id);
                    if(studentIds.length === 0) { btn.innerHTML = orig; btn.disabled=false; return this.showAlert('该班级无学生'); }

                    const { data: logs, error } = await sb.from('growth_logs').select('student_id, score, created_at, homework_id').in('student_id', studentIds);
                    btn.innerHTML = orig; btn.disabled = false;
                    if(error) return this.showAlert('获取数据失败');

                    const dayMap = {}; 
                    logs.forEach(log => {
                        if(log.homework_id && log.homework_id.startsWith('EXEMP_')) return; 

                        const d = new Date(log.created_at);
                        const fullDateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                        if (fullDateStr >= startDate && fullDateStr <= endDate) {
                            const shortDate = String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
                            if (!dayMap[shortDate]) dayMap[shortDate] = {};
                            if (dayMap[shortDate][log.student_id] === undefined || dayMap[shortDate][log.student_id] < log.score) {
                                dayMap[shortDate][log.student_id] = log.score;
                            }
                        }
                    });

                    const datasets = [];
                    const palette = ['#6B48FF', '#00BFA5', '#FF4B72', '#FFB800', '#3949AB']; 

                    if (mode === 'ALL') {
                        const dataPts = {};
                        Object.keys(dayMap).sort().forEach(date => {
                            const scores = Object.values(dayMap[date]);
                            if(scores.length > 0) dataPts[date] = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
                        });
                        datasets.push({ id: 'ALL', name: '全班综合平均分', color: '#6B48FF', data: dataPts });
                    } else {
                        selectedIds.forEach((uid, idx) => {
                            const stu = classStudents.find(s => s.id === uid);
                            const dataPts = {};
                            Object.keys(dayMap).sort().forEach(date => {
                                if (dayMap[date][uid] !== undefined) dataPts[date] = dayMap[date][uid];
                            });
                            datasets.push({ id: uid, name: stu.name, color: palette[idx % palette.length], data: dataPts });
                        });
                    }

                    App.state.chartConfig = { classCode, mode, selectedStudents: selectedIds, startDate, endDate, datasets };
                    App.render();
                },

                drawCanvasChart(datasets) {
                    const canvas = document.getElementById('growth-chart-canvas');
                    if(!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width * 2; canvas.height = rect.height * 2;
                    ctx.scale(2, 2);
                    const w = rect.width; const h = rect.height;
                    ctx.clearRect(0,0,w,h);

                    const allDates = new Set();
                    datasets.forEach(ds => Object.keys(ds.data).forEach(d => allDates.add(d)));
                    const dates = Array.from(allDates).sort();

                    if(dates.length === 0) {
                        ctx.fillStyle = '#A0A5B1'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
                        ctx.fillText('该时间区间内无有效做题记录', w/2, h/2);
                        return;
                    }

                    const pad = {top: 50, bottom: 40, left: 35, right: 30};
                    const chartW = w - pad.left - pad.right; 
                    const chartH = h - pad.top - pad.bottom;

                    ctx.strokeStyle = '#F0F0F5'; ctx.lineWidth = 1; ctx.textAlign = 'right';
                    ctx.fillStyle = '#A0A5B1'; ctx.font = '12px sans-serif';
                    for(let i=0; i<=5; i++) {
                        const y = pad.top + chartH - (i/5)*chartH;
                        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
                        ctx.fillText(i*20, pad.left - 8, y + 4);
                    }

                    let legendX = pad.left;
                    datasets.forEach(ds => {
                        ctx.fillStyle = ds.color;
                        ctx.beginPath(); ctx.roundRect(legendX, 10, 16, 6, 3); ctx.fill();
                        ctx.fillStyle = '#2D2A4A'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
                        ctx.fillText(ds.name, legendX + 22, 18);
                        legendX += ctx.measureText(ds.name).width + 36; 
                    });

                    const stepX = dates.length > 1 ? chartW / (dates.length - 1) : chartW / 2;
                    
                    datasets.forEach(ds => {
                        ctx.beginPath();
                        let first = true;
                        dates.forEach((date, i) => {
                            if (ds.data[date] !== undefined) {
                                const x = pad.left + (dates.length > 1 ? i * stepX : stepX);
                                const y = pad.top + chartH - (ds.data[date]/100)*chartH;
                                if(first) { ctx.moveTo(x,y); first = false; }
                                else { ctx.lineTo(x,y); }
                            }
                        });
                        ctx.strokeStyle = ds.color; ctx.lineWidth = 4; ctx.stroke();

                        if (datasets.length === 1) {
                            ctx.lineTo(pad.left + (dates.length > 1 ? (dates.length-1)*stepX : stepX), pad.top + chartH);
                            ctx.lineTo(pad.left + (dates.length > 1 ? 0 : stepX), pad.top + chartH);
                            ctx.closePath();
                            const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
                            grad.addColorStop(0, ds.color + '40'); 
                            grad.addColorStop(1, ds.color + '00');
                            ctx.fillStyle = grad; ctx.fill();
                        }

                        ctx.textAlign = 'center';
                        dates.forEach((date, i) => {
                            if (ds.data[date] !== undefined) {
                                const x = pad.left + (dates.length > 1 ? i * stepX : stepX);
                                const y = pad.top + chartH - (ds.data[date]/100)*chartH;
                                
                                ctx.beginPath(); ctx.arc(x,y, 5, 0, Math.PI*2);
                                ctx.fillStyle = '#FFF'; ctx.fill();
                                ctx.lineWidth = 2.5; ctx.strokeStyle = ds.color; ctx.stroke();
                                
                                ctx.fillStyle = ds.color; ctx.font = 'bold 13px sans-serif';
                                ctx.fillText(ds.data[date], x, y - 12);
                            }
                        });
                    });

                    ctx.fillStyle = '#A0A5B1'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
                    dates.forEach((date, i) => {
                        const x = pad.left + (dates.length > 1 ? i * stepX : stepX);
                        ctx.fillText(date, x, pad.top + chartH + 22);
                    });
                },

                // --- 宠物系统 ---
                openPetSelection() {
                    const root = document.getElementById('modal-root');
                    const grid = PET_DB.map(p => `<div class="card-solid p-5 text-center cursor-pointer active-scale border-2 border-transparent hover:border-[#6B48FF] transition-colors" onclick="App.actions.selectPet('${p.id}')"><div class="text-[50px] mb-3">${p.stages[2]}</div><h4 class="font-bold text-base">${p.name}</h4><p class="text-[11px] text-gray-500 uppercase">${p.type}</p></div>`).join('');
                    root.innerHTML = `<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm fade-in"></div><div class="bg-white rounded-[32px] p-8 md:p-10 w-full max-w-lg relative z-10 shadow-2xl" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards"><h2 class="text-3xl font-black text-center text-[#2D2A4A] mb-2">Choose Companion</h2><p class="text-sm text-center text-gray-500 mb-8">This companion will grow with you.</p><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">${grid}</div></div></div>`;
                },
                selectPet(id) { PetManager.state.petId = id; PetManager.state.adoptionDate = new Date().toISOString(); PetManager.save(); document.getElementById('modal-root').innerHTML = ''; App.render(); },

                openChangePetModal() {
                    const root = document.getElementById('modal-root'); const canAfford = PetManager.state.stars >= 10;
                    root.innerHTML = `<div class="fixed inset-0 z-[9999] flex items-center justify-center p-6"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm fade-in" onclick="App.actions.closeModal()"></div><div class="bg-white rounded-[32px] p-8 w-full max-w-sm relative z-10 shadow-2xl text-center" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards"><div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 text-red-500 text-4xl"><i class="fa-solid fa-arrows-rotate"></i></div><h2 class="text-2xl font-black text-[#2D2A4A] mb-3">Change Companion?</h2><p class="text-[15px] text-gray-500 mb-8 leading-relaxed">This will release your current companion and let you choose a new one. <br><br><span class="font-bold text-[#2D2A4A]">Cost: 10 ⭐</span> (You have ${PetManager.state.stars} ⭐)</p><div class="flex gap-4"><button onclick="App.actions.closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-bold rounded-2xl py-4 active-scale">Cancel</button><button onclick="${canAfford ? 'App.actions.executeFarewell()' : 'App.actions.showAlert(\\\'Not enough stars!\\\', \\\'⚠️ Oops\\\')'}" class="flex-1 ${canAfford ? 'bg-[#6B48FF] text-white shadow-lg shadow-[#6B48FF]/30' : 'bg-gray-300 text-white cursor-not-allowed'} font-bold rounded-2xl py-4 active-scale">${canAfford ? 'Confirm' : 'Need 10 ⭐'}</button></div></div></div>`;
                },
                executeFarewell() { this.closeModal(); PetManager.state.stars -= 10; PetManager.save(); this.playFarewellEpic(); },
                closeModal() { document.getElementById('modal-root').innerHTML = ''; },

                playFarewellEpic() {
                    const overlay = document.createElement('div');
                    overlay.className = 'fixed inset-0 bg-[#0B0C10] z-[9999] flex flex-col items-center justify-center transition-opacity duration-1000';
                    overlay.innerHTML = `<div class="absolute inset-0 overflow-hidden z-0" id="fw-stars"></div><div class="text-[120px] md:text-[160px] z-10 animate-pulse" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); transform: translateY(-50px);">${PetManager.getPet().stages[PetManager.getEvolutionStage().idx]}</div><h2 class="text-3xl text-white font-serif italic mt-8 z-10 fade-in">Every journey has an end...</h2>`;
                    document.body.appendChild(overlay);
                    
                    const bg = document.getElementById('fw-stars');
                    for(let i=0; i<50; i++) {
                        let div = document.createElement('div'); div.className = 'absolute bg-white rounded-full animate-pulse';
                        div.style.left = Math.random() * 100 + '%'; div.style.top = Math.random() * 100 + '%'; div.style.width = Math.random() * 3 + 'px'; div.style.height = div.style.width; div.style.animationDelay = Math.random() * 2 + 's';
                        bg.appendChild(div);
                    }

                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        setTimeout(() => { overlay.remove(); PetManager.state.petId = null; PetManager.save(); App.navigate('pet'); }, 1000);
                    }, 3500);
                },

                showStarToast(amount) {
                    const toast = document.createElement('div'); toast.className = 'star-toast'; toast.innerHTML = `+${amount} ⭐`;
                    document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500);
                }
            }
        };

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes slideUpFade { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`;
        document.head.appendChild(style);

        window.onload = async () => {
            try {
                const [students, homework, pets, banners] = await Promise.all([ loadStudents(), loadHomework(), loadAllPets(), loadBanners() ]);
                XY_STUDENTS = students; XY_HOMEWORK = homework; XY_ALL_PETS = pets; XY_BANNERS = banners;
                
                const params = new URLSearchParams(window.location.search);
                const user = XY_AUTH.getCurrentUser();
                
                if (user && user.role === 'student') {
                    await PetManager.init(user.id);
                    if (params.has('score') && params.has('hwId')) {
                        const score = parseInt(params.get('score'));
                        const hwId = params.get('hwId');
                        let starsEarned = 0;
                        
                        if (score === 100) starsEarned = 5;
                        else if (score >= 85) starsEarned = 3;
                        else if (score >= 70) starsEarned = 2;
                        else if (score >= 60) starsEarned = 1;

                        await PetManager.processHomeworkScore(hwId, score, starsEarned);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
                App.render();
            } catch (err) { App.actions.showAlert('网络异常,请刷新重试。', '❌ 加载失败'); }
        };
    </script>
