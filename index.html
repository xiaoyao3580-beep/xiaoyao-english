<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xiaoyao Studio | Learning HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #F8F8FC; 
            color: #1C1C28; 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.8s ease-in-out;
        }
        .font-serif { font-family: Georgia, 'Times New Roman', serif; }
        
        .card-solid {
            background-color: #FFFFFF; border-radius: 20px;
            border: 1px solid rgba(107, 72, 255, 0.04);
            box-shadow: 0 10px 30px rgba(107, 72, 255, 0.04), 0 2px 6px rgba(0,0,0,0.02);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
        }

        .glass-header {
            background: rgba(248, 248, 252, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }

        .bottom-nav-bar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 -10px 30px rgba(107, 72, 255, 0.04); padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .bg-banner {
            background: linear-gradient(135deg, #8B6CEF 0%, #6B48FF 100%); position: relative; overflow: hidden;
        }
        .bg-banner::before {
            content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%); border-radius: 50%;
        }

        .page-enter { animation: smoothEnter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes smoothEnter { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        .animate-stagger { animation: slideUpFade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }

        .active-scale { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .active-scale:active { transform: scale(0.96); transition: transform 0.05s ease-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* 丝滑原生级开关样式 */
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; vertical-align: middle; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e5e7eb; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
        .toggle-switch input:checked + .toggle-slider { background-color: #6B48FF; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }

        .chip { border: 1px solid #E5E7EB; cursor: pointer; transition: all 0.2s ease; }
        .chip.selected { background-color: #6B48FF; color: white; border-color: #6B48FF; font-weight: bold; }

        /* 3D Pet System Styles */
        .pet-3d-container { perspective: 1000px; }
        .pet-3d-model {
            animation: float3d 4s ease-in-out infinite;
            transform-style: preserve-3d;
            display: inline-block;
        }
        @keyframes float3d {
            0%, 100% { transform: translateY(0) rotateX(5deg) rotateY(-10deg); filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15)); }
            50% { transform: translateY(-15px) rotateX(-5deg) rotateY(15deg); filter: drop-shadow(0 25px 15px rgba(0,0,0,0.05)); }
        }
        #pet-aura-canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; border-radius: 36px; }

        .pet-hero {
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 28px;
            box-shadow: 0 12px 32px rgba(107, 72, 255, 0.06); position: relative; overflow: hidden;
        }
        .pet-stage {
            width: 140px; height: 140px; display: flex; align-items: center; justify-content: center;
            border-radius: 36px; background: radial-gradient(circle at 50% 60%, rgba(255,255,255,0.4), transparent 60%);
        }
        .energy-bar-wrapper { background: rgba(0, 0, 0, 0.08); border-radius: 99px; height: 8px; overflow: hidden; }
        .energy-bar {
            height: 100%; border-radius: 99px; background: linear-gradient(90deg, #8B6CEF, #6B48FF);
            transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .option-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .option-btn {
            flex: 0 0 auto; background: #FFF; border: 1px solid #E5E7EB; border-radius: 99px; padding: 10px 16px; font-size: 13px; font-weight: 600; color: #1C1C28; transition: all 0.2s;
        }
        .option-btn.active { background: #6B48FF; color: #FFF; border-color: #6B48FF; }
        .option-btn.locked { opacity: 0.4; cursor: not-allowed; }

        .star-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            color: #6B48FF; font-weight: 900; font-size: 20px;
            padding: 12px 28px; border-radius: 99px; opacity: 0; pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 30px rgba(107,72,255,0.15); animation: starGentlePop 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes starGentlePop {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50px) scale(0.95); }
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUpFade { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden selection:bg-[#6B48FF] selection:text-white" id="main-body">
    
    <div id="app-content" class="relative z-10 w-full max-w-md mx-auto min-h-screen pb-24"></div>
    <div id="nav-root"></div>
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // Supabase DB Connection
        // ==========================================
        const SUPABASE_URL = 'https://avffxvpwzpvlohoyqshb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Bk22JrUqpC4nd5ucHr9I8A_mvPk3uXc';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let XY_STUDENTS = [];
        let XY_HOMEWORK = [];
        let XY_ALL_PETS = []; 
        let XY_BANNERS = null; 
        
        async function loadStudents() {
            const { data } = await sb.from('students').select('*').order('id', { ascending: false });
            return data || [];
        }
        async function loadHomework() {
            const { data } = await sb.from('homework').select('*').order('date', { ascending: false });
            return (data || []).map(h => ({ id: h.id, classCode: h.class_code, unit: h.unit, title: h.title, date: h.date, file: h.file, status: h.status }));
        }
        async function loadAllPets() {
            const { data } = await sb.from('students_pets').select('*'); return data || [];
        }
        async function loadBanners() {
            const { data } = await sb.from('banners').select('*').order('created_at', { ascending: false });
            return (!data || data.length === 0) ? null : data;
        }
        
        const XY_CLASSES = [
          { code: 'f2',      name: 'TALENT F2',    level: 'FOUNDATION',      gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-face-smile', color: 'text-[#FF4B72]', bg: 'bg-[#FFE5EC]' },
          { code: 'a1-plus', name: 'TALENT A1+',   level: 'BEGINNER+',       gradient: 'from-[#B270FF] to-[#8B48FF]', icon: 'fa-star', color: 'text-[#FFB800]', bg: 'bg-[#FFF4CC]' },
          { code: 'a2',      name: 'TALENT A2',    level: 'INTERMEDIATE',    gradient: 'from-[#8B6CEF] to-[#6B48FF]', icon: 'fa-trophy', color: 'text-[#6B48FF]', bg: 'bg-[#E9E5FF]' },
          { code: 'a2-plus', name: 'TALENT A2+',   level: 'ADVANCED INT.',   gradient: 'from-[#26D0CE] to-[#1A2980]', icon: 'fa-wand-magic-sparkles', color: 'text-[#00BFA5]', bg: 'bg-[#E0F2F1]' },
          { code: 'swsy',    name: '深外素养口语课', level: 'SPEAKING',        gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-comments', color: 'text-[#E91E63]', bg: 'bg-[#FCE4EC]' },
          { code: 'ms',      name: '初中能力提升',   level: 'JUNIOR HIGH PREP',gradient: 'from-[#5C6BC0] to-[#3949AB]', icon: 'fa-book-open', color: 'text-[#3F51B5]', bg: 'bg-[#E8EAF6]' },
          { code: 'econ',    name: '《经济学人》精读', level: 'PREMIUM READING', gradient: 'from-[#42A5F5] to-[#1E88E5]', icon: 'fa-newspaper', color: 'text-[#0088FF]', bg: 'bg-[#E5F4FF]' },
          { code: 'adult',   name: '成人零基础口语', level: 'ADULT SPEAKING',  gradient: 'from-[#AB47BC] to-[#8E24AA]', icon: 'fa-user-tie', color: 'text-[#9C27B0]', bg: 'bg-[#F3E5F5]' }
        ];

        const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };
        const XY_CAROUSEL = [
          { type: 'quote', text: 'The limits of my language mean the limits of my world.', author: 'Ludwig Wittgenstein' },
          { type: 'news', tag: 'NEW BOOK', title: '《英语学习方法论》', description: '肖瑶老师新书,深圳南山书城热销中' }
        ];

        const XY_AUTH = {
          login: async function(id, password) {
            if (id === XY_TEACHER.id && password === XY_TEACHER.password) {
              localStorage.setItem('xy_user', JSON.stringify({ id, role: 'teacher', name: XY_TEACHER.name }));
              return { user: XY_TEACHER, role: 'teacher' };
            }
            const { data: student, error } = await sb.from('students').select('*').eq('id', id.toUpperCase()).eq('password', password).maybeSingle();
            if (error) return { error: true, msg: '数据库连接失败，请联系管理员。' };
            if (!student) return { error: true, msg: '数据库中没有找到这个账号！' };

            localStorage.setItem('xy_user', JSON.stringify({ id: student.id, role: 'student', name: student.name, classes: student.classes || [] }));
            await PetManager.init(student.id);
            return { user: student, role: 'student' };
          },
          getCurrentUser: function() { try { return JSON.parse(localStorage.getItem('xy_user')); } catch (e) { return null; } },
          logout: function() { localStorage.removeItem('xy_user'); App.navigate('home'); }
        };

        function getHwOverrides() { return JSON.parse(localStorage.getItem('xy_hw_status_overrides') || '{}'); }
        function setHwOverrides(obj) { localStorage.setItem('xy_hw_status_overrides', JSON.stringify(obj)); }

        // ==========================================
        // 3D Evolution Game & Pet System 
        // ==========================================
        const PET_DB = [
          { id: 'fox', name: 'Luna', type: 'Explorer', stages: ['🥚', '🦊', '🦊🔥', '🦄'] },
          { id: 'owl', name: 'Oliver', type: 'Reader', stages: ['🥚', '🦉', '🦉✨', '🪽'] },
          { id: 'dragon', name: 'Ember', type: 'Challenger', stages: ['🥚', '🦎', '🐉', '🐲'] },
          { id: 'otter', name: 'Milo', type: 'Companion', stages: ['🥚', '🦦', '🦦✨', '🧜‍♂️'] },
          { id: 'deer', name: 'Nia', type: 'Dreamer', stages: ['🥚', '🦌', '🦌✨', '🦌🧚‍♀️'] },
          { id: 'whale', name: 'Blue', type: 'Vocalist', stages: ['🥚', '🐟', '🐳', '🐋✨'] }
        ];
        
        const ACCESSORIES = [
          { id: 'none', text: 'None', icon: '', size: '0', pos: '', unlockStars: 0 },
          { id: 'scarf', text: 'Scarf', icon: '🧣', size: '36px', pos: 'bottom: -4px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 0 },
          { id: 'bow', text: 'Bow', icon: '🎀', size: '26px', pos: 'top: -2px; right: -4px; transform: rotate(15deg); z-index: 20;', unlockStars: 10 },
          { id: 'star', text: 'Star', icon: '⭐', size: '24px', pos: 'top: -6px; left: 0px; transform: rotate(-15deg); z-index: -1;', unlockStars: 30 },
          { id: 'hat', text: 'Top Hat', icon: '🎩', size: '34px', pos: 'top: -22px; left: 50%; transform: translateX(-50%) rotate(-5deg); z-index: 20;', unlockStars: 60 },
          { id: 'crown', text: 'Crown', icon: '👑', size: '34px', pos: 'top: -24px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 100 }
        ];

        const AURAS = [
          { id: 'warm', text: '☀️ Warm Sun', gradient: 'from-[#FFF6CF] to-[#FFDAB9]' },
          { id: 'forest', text: '🌿 Forest', gradient: 'from-[#D4F0D4] to-[#B5E5B5]' },
          { id: 'night', text: '🌙 Starry', gradient: 'from-[#D8D8F5] to-[#B3B3E6]' },
          { id: 'sea', text: '🌊 Ocean', gradient: 'from-[#D8F0EE] to-[#AEE5DF]' }
        ];

        const LVL_THRESHOLDS = [0, 10, 25, 45, 70, 100, 150, 220, 300, 999];

        const PetManager = {
            state: null, userId: null,
            async init(userId) {
                this.userId = userId;
                const { data } = await sb.from('students_pets').select('*').eq('student_id', userId).maybeSingle();
                
                this.state = {
                    petId: data ? data.pet_id : null, 
                    accessoryId: data ? (data.accessory_id || 'none') : 'none',
                    auraId: data ? (data.aura_id || 'warm') : 'warm', 
                    stars: data ? (data.total_stars || 0) : 0,
                    hwScores: {}, 
                    adoptionDate: data ? data.adoption_date : new Date().toISOString()
                };

                const { data: logs } = await sb.from('growth_logs').select('homework_id, score, stars_earned').eq('student_id', userId);
                if (logs) {
                    logs.forEach(l => {
                        if (!this.state.hwScores[l.homework_id] || this.state.hwScores[l.homework_id].score < l.score) {
                            this.state.hwScores[l.homework_id] = { score: l.score, stars: l.stars_earned || 0 };
                        }
                    });
                }
                
                if (!data) await this.save();
                this.applyAura();
            },
            async save() {
                if (!this.userId || !this.state) return;
                const dbData = { student_id: this.userId, pet_id: this.state.petId, accessory_id: this.state.accessoryId, aura_id: this.state.auraId, total_stars: this.state.stars, adoption_date: this.state.adoptionDate, updated_at: new Date().toISOString() };
                await sb.from('students_pets').upsert(dbData, { onConflict: 'student_id' });
            },
            getPet() { return PET_DB.find(p => p.id === this.state.petId) || PET_DB[0]; },
            getAccessory() { return ACCESSORIES.find(a => a.id === this.state.accessoryId) || ACCESSORIES[0]; },
            getLevel() {
                for (let i = LVL_THRESHOLDS.length - 1; i >= 0; i--) { if (this.state.stars >= LVL_THRESHOLDS[i]) return Math.min(i + 1, 10); }
                return 1;
            },
            getEvolutionStage() {
                const lvl = this.getLevel();
                let stageIdx = 0; let scale = 'scale(0.8)';
                if (lvl >= 4 && lvl <= 6) { stageIdx = 1; scale = 'scale(0.95)'; }
                else if (lvl >= 7 && lvl <= 9) { stageIdx = 2; scale = 'scale(1.1)'; }
                else if (lvl >= 10) { stageIdx = 3; scale = 'scale(1.25)'; }
                
                const pet = this.getPet();
                const stageNames = ['Incubating Egg', 'Baby Form', 'Mature Form', 'Evolved Spirit'];
                return { idx: stageIdx, emoji: pet.stages[stageIdx], name: stageNames[stageIdx], scale: scale };
            },
            getProgress() {
                const lvl = this.getLevel();
                if (lvl >= 10) return { cur: this.state.stars, max: 999, pct: 100 };
                const prev = LVL_THRESHOLDS[lvl - 1]; const next = LVL_THRESHOLDS[lvl];
                return { cur: this.state.stars, max: next, pct: Math.min(100, ((this.state.stars - prev) / (next - prev)) * 100) };
            },
            applyAura() {
                const b = document.getElementById('main-body');
                b.className = b.className.replace(/aura-\w+/g, '');
                if(this.state && this.state.auraId) b.classList.add(`aura-${this.state.auraId}`);
            },
            async processHomeworkScore(hwId, score, starsEarned) {
                const prevRecord = this.state.hwScores[hwId] || { score: -1, stars: 0 };
                await sb.from('growth_logs').insert({ student_id: this.userId, homework_id: hwId, score: score, stars_earned: starsEarned, attempt_count: 1, is_best_score: score > prevRecord.score });

                if (score > prevRecord.score) {
                    const extraStars = Math.max(0, starsEarned - prevRecord.stars);
                    this.state.hwScores[hwId] = { score: score, stars: Math.max(starsEarned, prevRecord.stars) };
                    
                    if (extraStars > 0) {
                        this.state.stars += extraStars;
                        await this.save();
                        if (prevRecord.score === -1) {
                            App.actions.showAlert(`太棒了！本次作业获得 ${score} 分！\n\n你的宠物收集到了 ${extraStars} ⭐ 成长值！`, '🎉 挑战成功');
                        } else {
                            App.actions.showAlert(`太棒啦！你在本次重做中突破了自我，拿到了 ${score} 分的新纪录！\n\n宠物额外获得了 ${extraStars} ⭐ 成长值！继续保持！`, '🔥 刷分成功');
                        }
                        App.actions.showStarToast(extraStars);
                    } else {
                        await this.save();
                        App.actions.showAlert(`太棒啦！你把最高分刷新到了 ${score} 分！虽然这次的分数档位相同，但你的努力让基础更扎实了！\n\n(宠物保持当前开心状态)`, '💪 突破自我');
                    }
                } else {
                    App.actions.showAlert(`本次得分为 ${score} 分。\n你之前的最高记录是 ${prevRecord.score} 分。\n\n一天不管做多少次，我们永远只取最高分！\n不要灰心，看看解析，随时欢迎再次挑战！`, '🔄 再接再厉');
                }
                App.render();
            }
        };

        // Canvas Particle System
        const PetCanvasRenderer = {
            timer: null,
            init() {
                if(this.timer) cancelAnimationFrame(this.timer);
                const canvas = document.getElementById('pet-aura-canvas');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
                let particles = [];
                for(let i=0; i<30; i++) {
                    particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 3 + 1, speedY: Math.random() * 1 + 0.5, opacity: Math.random() });
                }
                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    particles.forEach(p => {
                        ctx.globalAlpha = p.opacity; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                        p.y -= p.speedY; if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                    });
                    this.timer = requestAnimationFrame(animate);
                };
                animate();
            }
        };

        // ==========================================
        // SPA Router & Views
        // ==========================================
        const App = {
            state: { page: 'home', params: {}, teacherForm: { classes: [] }, teacherTab: 'students' },
            navigate(page, params = {}) {
                const user = XY_AUTH.getCurrentUser();
                if ((page === 'myhub' || page === 'pet') && (!user || user.role !== 'student')) return this.actions.toggleLoginModal(true);
                if (page === 'teacher' && (!user || user.role !== 'teacher')) return this.actions.toggleLoginModal(true);
                this.state.page = page; this.state.params = params; window.scrollTo(0, 0); this.render();
            },
            escape(str) { return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
            render() {
                const appContent = document.getElementById('app-content'); const navRoot = document.getElementById('nav-root');
                appContent.classList.remove('page-enter'); void appContent.offsetWidth; appContent.classList.add('page-enter');
                
                let html = '';
                if (this.state.page === 'home') html = this.views.home();
                else if (this.state.page === 'myhub') html = this.views.myhub();
                else if (this.state.page === 'class') html = this.views.classDetail(this.state.params.code);
                else if (this.state.page === 'teacher') html = this.views.teacherPanel();
                else if (this.state.page === 'pet') html = this.views.pet();

                appContent.innerHTML = html;
                navRoot.innerHTML = (this.state.page !== 'class') ? this.views.bottomNav() : '';

                if (this.state.page === 'teacher') this.actions.initTeacherForm();
                if (this.state.page === 'home') this.actions.initCarousel();
                if (this.state.page === 'pet') {
                    if(!PetManager.state.petId) this.actions.openPetSelection();
                    else PetCanvasRenderer.init();
                }
            },

            views: {
                header(showBack = false) {
                    const user = XY_AUTH.getCurrentUser();
                    let rightArea = `<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-[#6B48FF] active-scale" onclick="App.actions.toggleLoginModal(true)"><i class="fa-solid fa-user"></i></button>`;

                                </div>

                                <div class="card-solid py-3 px-2 text-center"><div class="text-xl font-black text-[#2D2A4A]">${tasksDoneCount}</div><div class="text-[9px] text-gray-400 font-bold uppercase mt-1">Tasks</div></div>

                teacherPanel() {
                    const tab = App.state.teacherTab;
                    const overrides = getHwOverrides();
                    let openCount = 0; XY_HOMEWORK.forEach(hw => { if ((overrides[hw.id] !== undefined ? overrides[hw.id] : hw.status) === 'open') openCount++; });

                    const tabsHTML = `<div class="flex bg-gray-200/60 p-1 rounded-[16px] mb-6 animate-stagger overflow-x-auto hide-scrollbar"><button onclick="App.state.teacherTab='students'; App.render()" class="flex-1 shrink-0 px-3 py-2.5 text-[12px] font-bold rounded-xl transition-all ${tab === 'students' ? 'bg-white text-[#2D2A4A] shadow' : 'text-gray-500'}">学生管理</button><button onclick="App.state.teacherTab='homework'; App.render()" class="flex-1 shrink-0 px-3 py-2.5 text-[12px] font-bold rounded-xl transition-all ${tab === 'homework' ? 'bg-white text-[#2D2A4A] shadow' : 'text-gray-500'}">作业分发</button><button onclick="App.state.teacherTab='banners'; App.render()" class="flex-1 shrink-0 px-3 py-2.5 text-[12px] font-bold rounded-xl transition-all ${tab === 'banners' ? 'bg-white text-[#2D2A4A] shadow' : 'text-gray-500'}">主页宣传</button><button onclick="App.state.teacherTab='analytics'; App.render()" class="flex-1 shrink-0 px-3 py-2.5 text-[12px] font-bold rounded-xl transition-all ${tab === 'analytics' ? 'bg-white text-[#2D2A4A] shadow' : 'text-gray-500'}">数据分析</button></div>`;

                    let studentsPanelHTML = '';
                    XY_CLASSES.forEach(cls => {

                            const petData = XY_ALL_PETS.find(p => p.student_id === s.id); const stars = petData ? petData.total_stars : 0;
                            let lvl = 1; for (let i = LVL_THRESHOLDS.length - 1; i >= 0; i--) { if (stars >= LVL_THRESHOLDS[i]) { lvl = Math.min(i + 1, 10); break; } }

            actions: {
                _carouselTimer: null, _carouselIdx: 0,
                initCarousel() {
                    if (this._carouselTimer) { clearInterval(this._carouselTimer); this._carouselTimer = null; }
                    const wrapper = document.getElementById('carousel-wrapper'); const slides = document.querySelectorAll('.carousel-slide'); const dots = document.querySelectorAll('.carousel-dot');
                    if (!wrapper || slides.length === 0) return;
                    this._carouselIdx = 0;
                    const showSlide = (idx) => {
                        if (idx < 0) idx = slides.length - 1; if (idx >= slides.length) idx = 0;
                        slides.forEach((s, i) => { s.style.opacity = i===idx?'1':'0'; s.style.pointerEvents = i===idx?'auto':'none'; s.style.transition = 'opacity 0.6s cubic-bezier(0.2,0.8,0.2,1)'; });

                        this._carouselIdx = idx;
                    };
                    showSlide(0);
                    const startTimer = () => { if (this._carouselTimer) clearInterval(this._carouselTimer); this._carouselTimer = setInterval(() => showSlide(this._carouselIdx + 1), 5000); };
                    startTimer();
                    dots.forEach((dot, i) => { dot.addEventListener('click', () => { showSlide(i); startTimer(); }); });
                    let startX = 0; let endX = 0;
                    wrapper.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; }, { passive: true });

                    const id = document.getElementById('form-id').value; const pwd = document.getElementById('form-pwd').value; const name = document.getElementById('form-name').value.trim(); const classes = App.state.teacherForm.classes;
                    if (!name || classes.length === 0) return this.showAlert('请填写姓名并选择至少一个班级', '⚠️ 提示');
                    
                    this.showConfirm(`将要给 ${name} (${id}) 建立专属云端档案。`, '📝 添加学生', '确认添加', 'bg-[#2D2A4A] shadow-[#2D2A4A]/30', async () => {
                        try {
                            const { error } = await sb.from('students').insert({ id: id, password: pwd, name: name, classes: classes });
                            if (error) { if(error.code === '23505') return this.showAlert(`账号 ${id} 已存在，请修改ID后再试。`, '⚠️ 账号重复'); return this.showAlert('添加失败: ' + error.message, '❌ 错误'); } 
                            this.showAlert(`账号：${id}\n密码：${pwd}\n\n该学生现在可以正常登录了！`, '✅ 添加成功！');
                            XY_STUDENTS = await loadStudents(); App.render();
                        } catch (err) { this.showAlert('网络请求异常: ' + err.message, '❌ 网络错误'); }
                    });
                },
                
                deleteStudent(id, name) {
                    this.showConfirm(`确定要终止学生 ${name} (${id}) 的学习并删除其账号吗？\n所有宠物记录也将被清空，操作不可逆！`, '⚠️ 终止学习', '彻底删除', 'bg-red-500 shadow-red-500/30', async () => {
                        const { error } = await sb.from('students').delete().eq('id', id);
                        if(error) return this.showAlert('删除失败: ' + error.message, '❌ 错误');
                        XY_STUDENTS = await loadStudents(); App.render(); this.showAlert(`学生 ${name} 的记录已成功删除。`, '✅ 账号已清理');
                    });
                },

                addBannerToDB() {
                    const img = document.getElementById('ban-img').value.trim(); const link = document.getElementById('ban-link').value.trim(); const tag = document.getElementById('ban-tag').value.trim(); const title = document.getElementById('ban-title').value.trim();
                    if(!img || !title) return this.showAlert('图片直链和大标题必须填写', '⚠️ 提示');
                    
                    this.showConfirm(`确认将这张图片推送到全体学生的主页幻灯片吗？`, '🖼️ 上架宣传', '确认上架', 'bg-[#6B48FF] shadow-[#6B48FF]/30', async () => {
                        const { error } = await sb.from('banners').insert({ id: 'ban_' + Date.now(), image: img, link: link, tag: tag, title: title });
                        if(error) return this.showAlert('上传失败', '❌ 错误');
                        XY_BANNERS = await loadBanners(); App.render(); this.showAlert('宣传图已成功上架！', '✅ 成功');
                    });
                },
                
                deleteBanner(id) { 
                    this.showConfirm('确定要从主页删除这张宣传图吗？', '⚠️ 删除宣传图', '确认删除', 'bg-red-500 shadow-red-500/30', async () => {
                        await sb.from('banners').delete().eq('id', id); XY_BANNERS = await loadBanners(); App.render();
                    });
                },

                openPetSelection() {
                    const root = document.getElementById('modal-root');
                    const grid = PET_DB.map(p => `<div class="card-solid p-4 text-center cursor-pointer active-scale border-2 border-transparent hover:border-[#6B48FF] transition-colors" onclick="App.actions.selectPet('${p.id}')"><div class="text-[40px] mb-2">${p.stages[2]}</div><h4 class="font-bold text-sm">${p.name}</h4><p class="text-[9px] text-gray-500 uppercase">${p.type}</p></div>`).join('');
                    root.innerHTML = `<div class="fixed inset-0 z-[9999] flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm fade-in"></div><div class="bg-white rounded-[32px] p-6 w-full max-w-md relative z-10 shadow-2xl" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards"><h2 class="text-2xl font-black text-center text-[#2D2A4A] mb-1">Choose Companion</h2><p class="text-xs text-center text-gray-500 mb-6">This companion will grow with you.</p><div class="grid grid-cols-2 gap-3 mb-6">${grid}</div></div></div>`;
                },
                selectPet(id) { PetManager.state.petId = id; PetManager.state.adoptionDate = new Date().toISOString(); PetManager.save(); document.getElementById('modal-root').innerHTML = ''; App.render(); },

                openChangePetModal() {
                    const root = document.getElementById('modal-root'); const canAfford = PetManager.state.stars >= 10;
                    root.innerHTML = `<div class="fixed inset-0 z-[9999] flex items-center justify-center p-6"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm fade-in" onclick="App.actions.closeModal()"></div><div class="bg-white rounded-[32px] p-6 w-full max-w-sm relative z-10 shadow-2xl text-center" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards"><div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-3xl"><i class="fa-solid fa-arrows-rotate"></i></div><h2 class="text-xl font-black text-[#2D2A4A] mb-2">Change Companion?</h2><p class="text-[13px] text-gray-500 mb-6 leading-relaxed">This will release your current companion and let you choose a new one. <br><br><span class="font-bold text-[#2D2A4A]">Cost: 10 ⭐</span> (You have ${PetManager.state.stars} ⭐)</p><div class="flex gap-3"><button onclick="App.actions.closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-bold rounded-2xl py-3.5 active-scale">Cancel</button><button onclick="${canAfford ? 'App.actions.executeFarewell()' : 'App.actions.showAlert(\\\'Not enough stars!\\\', \\\'⚠️ Oops\\\')'}" class="flex-1 ${canAfford ? 'bg-[#6B48FF] text-white shadow-lg shadow-[#6B48FF]/30' : 'bg-gray-300 text-white cursor-not-allowed'} font-bold rounded-2xl py-3.5 active-scale">${canAfford ? 'Confirm' : 'Need 10 ⭐'}</button></div></div></div>`;
                },
                executeFarewell() { this.closeModal(); PetManager.state.stars -= 10; PetManager.save(); this.playFarewellEpic(); },
                closeModal() { document.getElementById('modal-root').innerHTML = ''; },

                playFarewellEpic() {
                    const overlay = document.createElement('div');
                    overlay.className = 'fixed inset-0 bg-[#0B0C10] z-[9999] flex flex-col items-center justify-center transition-opacity duration-1000';
                    overlay.innerHTML = `<div class="absolute inset-0 overflow-hidden z-0" id="fw-stars"></div><div class="text-[100px] z-10 animate-pulse" style="filter: drop-shadow(0 0 20px rgba(255,255,255,0.5)); transform: translateY(-50px);">${PetManager.getPet().stages[PetManager.getEvolutionStage().idx]}</div><h2 class="text-2xl text-white font-serif italic mt-8 z-10 fade-in">Every journey has an end...</h2>`;
                    document.body.appendChild(overlay);
                    
                    const bg = document.getElementById('fw-stars');
                    for(let i=0; i<50; i++) {
                        let div = document.createElement('div'); div.className = 'absolute bg-white rounded-full animate-pulse';
                        div.style.left = Math.random() * 100 + '%'; div.style.top = Math.random() * 100 + '%'; div.style.width = Math.random() * 3 + 'px'; div.style.height = div.style.width; div.style.animationDelay = Math.random() * 2 + 's';
                        bg.appendChild(div);
                    }

                    setTimeout(() => {
                        overlay.style.opacity = '0';
                        setTimeout(() => { overlay.remove(); PetManager.state.petId = null; PetManager.save(); App.navigate('pet'); }, 1000);
                    }, 3500);
                },

                showStarToast(amount) {
                    const toast = document.createElement('div'); toast.className = 'star-toast'; toast.innerHTML = `+${amount} ⭐`;
                    document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500);
                }
            }
        };

        const style = document.createElement('style');
        style.innerHTML = `@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } @keyframes slideUpFade { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`;
        document.head.appendChild(style);

        window.onload = async () => {
            try {
                const [students, homework, pets, banners] = await Promise.all([ loadStudents(), loadHomework(), loadAllPets(), loadBanners() ]);
                XY_STUDENTS = students; XY_HOMEWORK = homework; XY_ALL_PETS = pets; XY_BANNERS = banners;
                
                const params = new URLSearchParams(window.location.search);
                const user = XY_AUTH.getCurrentUser();
                
                if (user && user.role === 'student') {
                    await PetManager.init(user.id);
                    if (params.has('score') && params.has('hwId')) {
                        const score = parseInt(params.get('score'));
                        const hwId = params.get('hwId');
                        let starsEarned = 0;
                        
                        // ✨ 及格减负保底，满分封顶
                        if (score === 100) starsEarned = 5;
                        else if (score >= 85) starsEarned = 3;
                        else if (score >= 70) starsEarned = 2;
                        else if (score >= 60) starsEarned = 1;

                        await PetManager.processHomeworkScore(hwId, score, starsEarned);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
                App.render();
            } catch (err) { App.actions.showAlert('网络异常,请刷新重试。', '❌ 加载失败'); }
        };
    </script>
</body>
</html>
