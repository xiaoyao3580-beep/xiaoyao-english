<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Xiaoyao Studio | Learning Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24..48,500,1,0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--brand:#5827fc;--ink:#2c2f33;--muted:#74777c;--paper:#ffffff;--wash:#f5f6fc}
    *{box-sizing:border-box} html,body{min-height:100%;overflow-x:hidden}#app{width:100vw;max-width:100vw;overflow-x:hidden}
    body{margin:0;background:linear-gradient(180deg,#fcfcff 0%,#f5f6fc 42%,#f4f5fc 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif;-webkit-tap-highlight-color:transparent}
    button,input,select{font:inherit} button{touch-action:manipulation}.material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 48}
    .shell{min-height:100dvh;padding-bottom:calc(6.5rem + env(safe-area-inset-bottom,0px))}.topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.72);border-bottom:1px solid rgba(255,255,255,.74);backdrop-filter:blur(18px);box-shadow:0 12px 40px -24px rgba(88,39,252,.25)}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.7);box-shadow:0 12px 40px -20px rgba(92,45,255,.20);transition:transform .18s ease,box-shadow .18s ease}.card:active{transform:scale(.985)}
    .card-solid{max-width:100%;background-color:#fff;border-radius:24px;border:1px solid rgba(107,72,255,.04);box-shadow:0 10px 30px rgba(107,72,255,.04),0 2px 6px rgba(0,0,0,.02);transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s ease}
    .glass-header{background:rgba(248,248,252,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.02)}
    .bottom-nav-bar{width:100vw;max-width:100vw;overflow:hidden;background:rgba(255,255,255,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 -10px 30px rgba(107,72,255,.04);padding-bottom:env(safe-area-inset-bottom,0px)}
    .active-scale{transition:transform .18s ease}.active-scale:active{transform:scale(.96)}
    .chip{transition:all .2s ease}.chip.selected{background:#6B48FF!important;color:white!important;box-shadow:0 4px 12px rgba(107,72,255,.22)}
    .card-solid input,.card-solid select{width:100%;min-width:0}.card-solid button,.bottom-nav-bar button{min-width:0}.bottom-nav-bar span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .motion-in{animation:motionIn .34s cubic-bezier(.2,.8,.2,1) both}@keyframes motionIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .home-card{min-height:12rem}.icon-pill{box-shadow:inset 0 -4px 8px rgba(0,0,0,.08)}.bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:10px 12px calc(10px + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,.88);border-top:1px solid rgba(255,255,255,.8);backdrop-filter:blur(20px);box-shadow:0 -16px 40px -28px rgba(88,39,252,.38)}
    .tab-content{display:none}.tab-content.active{display:block}.toggle{position:relative;width:50px;height:28px;display:inline-block}.toggle input{opacity:0}.slider{position:absolute;inset:0;border-radius:99px;background:#d9deea;transition:.2s}.slider:before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:white;border-radius:50%;box-shadow:0 3px 8px rgba(0,0,0,.18);transition:.2s}.toggle input:checked+.slider{background:var(--brand)}.toggle input:checked+.slider:before{transform:translateX(22px)}
    .hide-scrollbar::-webkit-scrollbar{display:none}.hide-scrollbar{scrollbar-width:none}.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .home-viewport-frame,.level-viewport-frame{position:fixed;inset:0;height:100vh;height:100svh;overflow:hidden;--home-shell-top-offset:calc(5rem + .75rem);--level-shell-top-offset:calc(5rem + .75rem)}
    .home-shell-lock,.home-dashboard-shell,.level-scroll-shell{scrollbar-width:none}
    .home-shell-lock::-webkit-scrollbar,.home-dashboard-shell::-webkit-scrollbar,.level-scroll-shell::-webkit-scrollbar{display:none}
    .motion-nav-enter{animation:motionNavEnter .46s cubic-bezier(.16,1,.3,1) both}
    .motion-dock-enter{animation:motionDockEnter .48s cubic-bezier(.16,1,.3,1) both}
    .motion-page-enter{animation:motionPageEnter .42s cubic-bezier(.16,1,.3,1) both}
    .motion-hero-enter{animation:motionHeroEnter .52s cubic-bezier(.16,1,.3,1) both}
    .motion-list-item{animation:motionListItem .42s cubic-bezier(.16,1,.3,1) both;animation-delay:var(--motion-delay,0ms)}
    .motion-panel-enter{animation:motionPanelEnter .42s cubic-bezier(.16,1,.3,1) both}
    .motion-auth-panel-enter{animation:motionPanelEnter .28s cubic-bezier(.16,1,.3,1) both}
    .motion-card{transition:transform .2s ease,box-shadow .2s ease}
    .motion-card:active,.motion-button:active,.motion-tab:active{transform:scale(.96)}
    .motion-icon{transition:transform .2s ease}
    .motion-card:active .motion-icon{transform:scale(.95)}
    .motion-hero-symbol{animation:motionHeroSymbol 5s ease-in-out infinite}
    @keyframes motionNavEnter{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes motionDockEnter{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes motionPageEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes motionHeroEnter{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes motionListItem{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes motionPanelEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes motionHeroSymbol{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(3deg)}}
    @media (min-width:768px){.shell{padding-bottom:2rem}.home-card{min-height:13rem}.bottom-nav{display:none}.topbar{top:16px;margin:0 auto;border-radius:999px;max-width:1184px;border:1px solid rgba(255,255,255,.74)}.home-viewport-frame{--home-shell-top-offset:calc(7rem + .75rem)}.level-viewport-frame{--level-shell-top-offset:calc(7rem + .75rem)}}
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <script src="content-data.js?v=20260507"></script>
  <script src="vote-data.js?v=20260511"></script>
  <script src="app.js?v=20260511-vote-1"></script>
</body>
</html>
