<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xiaoyao Studio | Learning HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #F8F8FC; 
            color: #1C1C28; 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.8s ease-in-out;
        }
        .font-serif { font-family: Georgia, 'Times New Roman', serif; }
        
        .card-solid {
            background-color: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(107, 72, 255, 0.04);
            box-shadow: 0 10px 30px rgba(107, 72, 255, 0.04), 0 2px 6px rgba(0,0,0,0.02);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
        }

        .glass-header {
            background: rgba(248, 248, 252, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.02);
        }

        .bottom-nav-bar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 -10px 30px rgba(107, 72, 255, 0.04);
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .bg-banner {
            background: linear-gradient(135deg, #8B6CEF 0%, #6B48FF 100%);
            position: relative;
            overflow: hidden;
        }
        .bg-banner::before {
            content: ''; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
        }

        .page-enter { animation: smoothEnter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes smoothEnter {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-stagger { animation: slideUpFade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .active-scale { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .active-scale:active { transform: scale(0.96); transition: transform 0.05s ease-out; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        .toggle-checkbox:checked { right: 0; border-color: #6B48FF; }
        .toggle-checkbox:checked + .toggle-label { background-color: #6B48FF; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }
        .chip { border: 1px solid #E5E7EB; cursor: pointer; transition: all 0.2s ease; }
        .chip.selected { background-color: #6B48FF; color: white; border-color: #6B48FF; font-weight: bold; }

        @keyframes floatBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .animate-float-bounce { animation: floatBounce 3s ease-in-out infinite; }

        .pet-hero {
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            box-shadow: 0 12px 32px rgba(107, 72, 255, 0.06);
            position: relative;
            overflow: hidden;
        }
        .pet-stage {
            width: 140px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 36px;
            background: radial-gradient(circle at 50% 60%, rgba(255,255,255,0.4), transparent 60%);
        }
        .energy-bar-wrapper {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 99px; height: 8px; overflow: hidden;
        }
        .energy-bar {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #8B6CEF, #6B48FF);
            transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .option-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .option-btn {
            flex: 0 0 auto; background: #FFF; border: 1px solid #E5E7EB;
            border-radius: 99px; padding: 10px 16px; font-size: 13px; font-weight: 600;
            color: #1C1C28; transition: all 0.2s;
        }
        .option-btn.active { background: #6B48FF; color: #FFF; border-color: #6B48FF; }
        .option-btn.locked { opacity: 0.4; cursor: not-allowed; }

        .star-toast {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            color: #6B48FF; font-weight: 900; font-size: 20px;
            padding: 12px 28px; border-radius: 99px; opacity: 0; pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 30px rgba(107,72,255,0.15);
            animation: starGentlePop 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes starGentlePop {
            0% { opacity: 0; transform: translate(-50%, 0) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
            70% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50px) scale(0.95); }
        }

        .farewell-screen {
            position: fixed; inset: 0; background: #0B0C10; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }
        .farewell-screen.active { opacity: 1; pointer-events: auto; }
        .farewell-pet { font-size: 100px; transform: translateY(0); filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
        .farewell-screen.active .farewell-pet { animation: ascendToStars 4s ease-in-out forwards; }
        .farewell-text { color: white; text-align: center; margin-top: 40px; opacity: 0; }
        .farewell-screen.active .farewell-text { animation: textFadeIn 4s ease-in-out forwards; animation-delay: 1s; }
        
        @keyframes ascendToStars {
            0% { transform: translateY(0) scale(1); opacity: 1; filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
            100% { transform: translateY(-150px) scale(0.2); opacity: 0; filter: drop-shadow(0 0 50px rgba(255,255,255,1)); }
        }
        @keyframes textFadeIn {
            0% { opacity: 0; filter: blur(10px); }
            30% { opacity: 1; filter: blur(0); }
            80% { opacity: 1; filter: blur(0); }
            100% { opacity: 0; filter: blur(10px); }
        }
        .star-bg { position: absolute; inset: 0; overflow: hidden; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; transform: scale(1.5); } }
        
        /* Teacher Tab Animation */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden selection:bg-[#6B48FF] selection:text-white" id="main-body">
    
    <div id="app-content" class="relative z-10 w-full max-w-md mx-auto min-h-screen pb-24"></div>
    <div id="nav-root"></div>
    <div id="modal-root"></div>
    
    <div id="farewell-overlay" class="farewell-screen">
        <div class="star-bg" id="star-bg"></div>
        <div class="farewell-pet" id="farewell-emoji">🦊</div>
        <div class="farewell-text">
            <h2 class="font-serif text-2xl italic mb-2">Every journey has an end...</h2>
            <p class="text-sm text-gray-400">But the stars will keep our memories, <span id="fw-name" class="text-white font-bold"></span>.</p>
        </div>
    </div>

    <script>
        // ==========================================
        // Supabase 配置
        // ==========================================
        const SUPABASE_URL = 'https://avffxvpwzpvlohoyqshb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Bk22JrUqpC4nd5ucHr9I8A_mvPk3uXc';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let XY_STUDENTS = [];
        let XY_HOMEWORK = [];
        let XY_ALL_PETS = [];  // 用于老师后台查看进度
        let XY_BANNERS = null; // null 表示回退默认轮播图
        
        async function loadStudents() {
            const { data, error } = await sb.from('students').select('*').order('id', { ascending: false });
            if (error) return [];
            return data || [];
        }
        
        async function loadHomework() {
            const { data, error } = await sb.from('homework').select('*').order('date', { ascending: false });
            if (error) return [];
            return (data || []).map(h => ({
                id: h.id, classCode: h.class_code, unit: h.unit,
                title: h.title, date: h.date, file: h.file, status: h.status
            }));
        }

        async function loadAllPets() {
            const { data } = await sb.from('students_pets').select('*');
            return data || [];
        }

        async function loadBanners() {
            const { data, error } = await sb.from('banners').select('*').order('created_at', { ascending: false });
            if (error || !data || data.length === 0) return null;
            return data;
        }
        
        const XY_CLASSES = [
          { code: 'f2',      name: 'TALENT F2',    level: 'FOUNDATION',      gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-face-smile', color: 'text-[#FF4B72]', bg: 'bg-[#FFE5EC]' },
          { code: 'a1-plus', name: 'TALENT A1+',   level: 'BEGINNER+',       gradient: 'from-[#B270FF] to-[#8B48FF]', icon: 'fa-star', color: 'text-[#FFB800]', bg: 'bg-[#FFF4CC]' },
          { code: 'a2',      name: 'TALENT A2',    level: 'INTERMEDIATE',    gradient: 'from-[#8B6CEF] to-[#6B48FF]', icon: 'fa-trophy', color: 'text-[#6B48FF]', bg: 'bg-[#E9E5FF]' },
          { code: 'a2-plus', name: 'TALENT A2+',   level: 'ADVANCED INT.',   gradient: 'from-[#26D0CE] to-[#1A2980]', icon: 'fa-wand-magic-sparkles', color: 'text-[#00BFA5]', bg: 'bg-[#E0F2F1]' },
          { code: 'swsy',    name: '深外素养口语课', level: 'SPEAKING',        gradient: 'from-[#FF6B9E] to-[#FF4B72]', icon: 'fa-comments', color: 'text-[#E91E63]', bg: 'bg-[#FCE4EC]' },
          { code: 'ms',      name: '初中能力提升',   level: 'JUNIOR HIGH PREP',gradient: 'from-[#5C6BC0] to-[#3949AB]', icon: 'fa-book-open', color: 'text-[#3F51B5]', bg: 'bg-[#E8EAF6]' },
          { code: 'econ',    name: '《经济学人》精读', level: 'PREMIUM READING', gradient: 'from-[#42A5F5] to-[#1E88E5]', icon: 'fa-newspaper', color: 'text-[#0088FF]', bg: 'bg-[#E5F4FF]' },
          { code: 'adult',   name: '成人零基础口语', level: 'ADULT SPEAKING',  gradient: 'from-[#AB47BC] to-[#8E24AA]', icon: 'fa-user-tie', color: 'text-[#9C27B0]', bg: 'bg-[#F3E5F5]' }
        ];

        const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };

        const XY_CAROUSEL = [
          { type: 'quote', text: 'The limits of my language mean the limits of my world.', author: 'Ludwig Wittgenstein' },
          { type: 'news', tag: 'NEW BOOK', title: '《英语学习方法论》', description: '肖瑶老师新书,深圳南山书城热销中' }
        ];

        // ==========================================
        // Auth 
        // ==========================================
        const XY_AUTH = {
          login: async function(id, password) {
            if (id === XY_TEACHER.id && password === XY_TEACHER.password) {
              localStorage.setItem('xy_user', JSON.stringify({ id, role: 'teacher', name: XY_TEACHER.name }));
              return { user: XY_TEACHER, role: 'teacher' };
            }
            
            const { data: student, error } = await sb
              .from('students')
              .select('*')
              .eq('id', id.toUpperCase())
              .eq('password', password)
              .maybeSingle();
            
            if (error) return { error: true, msg: '数据库连接失败，请联系管理员。' };
            if (!student) return { error: true, msg: '云端数据库中没有找到这个账号！请先用老师账号登录，在后台添加该学生数据。' };

            localStorage.setItem('xy_user', JSON.stringify({ id: student.id, role: 'student', name: student.name, classes: student.classes || [] }));
            await PetManager.init(student.id);
            return { user: student, role: 'student' };
          },
          getCurrentUser: function() {
            try { return JSON.parse(localStorage.getItem('xy_user')); } catch (e) { return null; }
          },
          logout: function() { 
              localStorage.removeItem('xy_user'); 
              document.getElementById('main-body').className = 'relative min-h-screen overflow-x-hidden selection:bg-[#6B48FF] selection:text-white aura-default';
          }
        };

        function getHwOverrides() { return JSON.parse(localStorage.getItem('xy_hw_status_overrides') || '{}'); }
        function setHwOverrides(obj) { localStorage.setItem('xy_hw_status_overrides', JSON.stringify(obj)); }

        // ==========================================
        // Game & Pet System 
        // ==========================================
        const PET_DB = [
          { id: 'fox', emoji: '🦊', name: 'Luna', type: 'Explorer' },
          { id: 'owl', emoji: '🦉', name: 'Oliver', type: 'Reader' },
          { id: 'dragon', emoji: '🐉', name: 'Ember', type: 'Challenger' },
          { id: 'otter', emoji: '🦦', name: 'Milo', type: 'Companion' },
          { id: 'deer', emoji: '🦌', name: 'Nia', type: 'Dreamer' },
          { id: 'whale', emoji: '🐳', name: 'Blue', type: 'Vocalist' }
        ];
        
        const ACCESSORIES = [
          { id: 'none', text: 'None', icon: '', size: '0', pos: '', unlockStars: 0 },
          { id: 'scarf', text: 'Scarf', icon: '🧣', size: '36px', pos: 'bottom: -4px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 0 },
          { id: 'bow', text: 'Bow', icon: '🎀', size: '26px', pos: 'top: -2px; right: -4px; transform: rotate(15deg); z-index: 20;', unlockStars: 10 },
          { id: 'star', text: 'Star', icon: '⭐', size: '24px', pos: 'top: -6px; left: 0px; transform: rotate(-15deg); z-index: -1;', unlockStars: 30 },
          { id: 'hat', text: 'Top Hat', icon: '🎩', size: '34px', pos: 'top: -22px; left: 50%; transform: translateX(-50%) rotate(-5deg); z-index: 20;', unlockStars: 60 },
          { id: 'crown', text: 'Crown', icon: '👑', size: '34px', pos: 'top: -24px; left: 50%; transform: translateX(-50%); z-index: 20;', unlockStars: 100 }
        ];

        const AURAS = [
          { id: 'warm', text: '☀️ Warm Sun', gradient: 'from-[#FFF6CF] to-[#FFDAB9]' },
          { id: 'forest', text: '🌿 Forest', gradient: 'from-[#D4F0D4] to-[#B5E5B5]' },
          { id: 'night', text: '🌙 Starry', gradient: 'from-[#D8D8F5] to-[#B3B3E6]' },
          { id: 'sea', text: '🌊 Ocean', gradient: 'from-[#D8F0EE] to-[#AEE5DF]' }
        ];

        const LVL_THRESHOLDS = [0, 10, 25, 45, 70, 100, 150, 220, 300, 999];

        const PetManager = {
            state: null,
            userId: null,
            async init(userId) {
                this.userId = userId;
                const { data } = await sb.from('students_pets').select('*').eq('student_id', userId).maybeSingle();
                if (data) {
                    this.state = {
                        petId: data.pet_id, accessoryId: data.accessory_id || 'none',
                        auraId: data.aura_id || 'warm', stars: data.total_stars || 0,
                        hwCompleted: [], adoptionDate: data.adoption_date
                    };
                    const { data: logs } = await sb.from('growth_logs').select('homework_id').eq('student_id', userId);
                    if (logs) this.state.hwCompleted = [...new Set(logs.map(l => l.homework_id))];
                } else {
                    this.state = { petId: null, accessoryId: 'none', auraId: 'warm', stars: 0, hwCompleted: [], adoptionDate: new Date().toISOString() };
                    await this.save();
                }
                this.applyAura();
            },
            async save() {
                if (!this.userId || !this.state) return;
                const dbData = { student_id: this.userId, pet_id: this.state.petId, accessory_id: this.state.accessoryId, aura_id: this.state.auraId, total_stars: this.state.stars, adoption_date: this.state.adoptionDate, updated_at: new Date().toISOString() };
                await sb.from('students_pets').upsert(dbData, { onConflict: 'student_id' });
            },
            getPet() { return PET_DB.find(p => p.id === this.state.petId) || PET_DB[0]; },
            getAccessory() { return ACCESSORIES.find(a => a.id === this.state.accessoryId) || ACCESSORIES[0]; },
            getLevel() {
                for (let i = LVL_THRESHOLDS.length - 1; i >= 0; i--) {
                    if (this.state.stars >= LVL_THRESHOLDS[i]) return Math.min(i + 1, 10);
                }
                return 1;
            },
            getStage() {
                const lvl = this.getLevel();
                if (lvl <= 2) return { name: 'Baby', scale: 'scale(0.7)', filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.05))' };
                if (lvl <= 5) return { name: 'Youth', scale: 'scale(0.85)', filter: 'drop-shadow(0 6px 12px rgba(0,0,0,0.08))' };
                if (lvl <= 8) return { name: 'Adult', scale: 'scale(1.0)', filter: 'drop-shadow(0 8px 16px rgba(0,0,0,0.1))' };
                return { name: 'Mythic', scale: 'scale(1.15)', filter: 'drop-shadow(0 0 25px rgba(255,255,255,0.8))' };
            },
            getProgress() {
                const lvl = this.getLevel();
                if (lvl >= 10) return { cur: this.state.stars, max: 999, pct: 100 };
                const prev = LVL_THRESHOLDS[lvl - 1];
                const next = LVL_THRESHOLDS[lvl];
                return { cur: this.state.stars, max: next, pct: Math.min(100, ((this.state.stars - prev) / (next - prev)) * 100) };
            },
            applyAura() {
                const b = document.getElementById('main-body');
                b.className = b.className.replace(/aura-\w+/g, '');
                if(this.state && this.state.auraId) b.classList.add(`aura-${this.state.auraId}`);
                else b.classList.add('aura-default');
            },
            async processHomeworkScore(hwId, score, starsEarned) {
                if (this.state.hwCompleted.includes(hwId)) {
                    App.actions.showAlert('你已经提交过这份作业的成绩啦！去看看别的挑战吧！', '🎓 作业已完成'); return;
                }
                this.state.hwCompleted.push(hwId);
                this.state.stars += starsEarned;
                await sb.from('growth_logs').insert({ student_id: this.userId, homework_id: hwId, score: score, stars_earned: starsEarned, attempt_count: 1, is_best_score: true });
                await this.save();
                
                if(starsEarned > 0) {
                    App.actions.showAlert(`太棒了！本次作业正确率 ${score}%！\n\n你的宠物获得了 ${starsEarned} ⭐ 能量！`, '🎉 挑战成功');
                    App.actions.showStarToast(starsEarned);
                } else {
                    App.actions.showAlert(`本次作业正确率 ${score}%。不要气馁，复习一下再接再厉！\n\n(正确率80%以上才可获得宠物星星哦)`, '💪 继续努力');
                }
                App.render();
            }
        };

        // ==========================================
        // SPA Router & Views
        // ==========================================
        const App = {
            state: { page: 'home', params: {}, teacherForm: { classes: [] }, teacherTab: 'students' },

            navigate(page, params = {}) {
                const user = XY_AUTH.getCurrentUser();
                if ((page === 'myhub' || page === 'pet') && (!user || user.role !== 'student')) return this.actions.toggleLoginModal(true);
                if (page === 'teacher' && (!user || user.role !== 'teacher')) return this.actions.toggleLoginModal(true);
                
                this.state.page = page; this.state.params = params;
                window.scrollTo(0, 0); this.render();
            },

            escape(str) { return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },

            render() {
                const appContent = document.getElementById('app-content');
                const navRoot = document.getElementById('nav-root');
                
                appContent.classList.remove('page-enter'); void appContent.offsetWidth; appContent.classList.add('page-enter');
                
                let html = '';
                if (this.state.page === 'home') html = this.views.home();
                else if (this.state.page === 'myhub') html = this.views.myhub();
                else if (this.state.page === 'class') html = this.views.classDetail(this.state.params.code);
                else if (this.state.page === 'teacher') html = this.views.teacherPanel();
                else if (this.state.page === 'pet') html = this.views.pet();

                appContent.innerHTML = html;
                
                if (this.state.page !== 'class') navRoot.innerHTML = this.views.bottomNav();
                else navRoot.innerHTML = '';

                if (this.state.page === 'teacher') this.actions.initTeacherForm();
                if (this.state.page === 'home') this.actions.initCarousel();
                if (this.state.page === 'pet' && !PetManager.state.petId) this.actions.openPetSelection();
            },

            views: {
                header(showBack = false) {
                    const user = XY_AUTH.getCurrentUser();
                    let rightArea = `<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-[#6B48FF] active-scale" onclick="App.actions.toggleLoginModal(true)"><i class="fa-solid fa-user"></i></button>`;
                    if (user) rightArea = `<button onclick="App.actions.doLogout()" class="border border-gray-100 bg-white rounded-full px-3.5 py-1.5 flex items-center gap-1.5 active-scale shadow-sm text-[#6B48FF]"><i class="fa-solid fa-arrow-right-from-bracket text-[10px]"></i><span class="text-[10px] font-bold tracking-widest uppercase">Logout</span></button>`;
                    
                    const backTarget = user ? (user.role === 'teacher' ? 'teacher' : 'home') : 'home';
                    // 根据需求 (1) 还原原有字体颜色风格，仅增大大气字号
                    const leftArea = showBack 
                        ? `<button onclick="App.navigate('${backTarget}')" class="w-9 h-9 rounded-full bg-white shadow-sm flex items-center justify-center text-[#6B48FF] active-scale"><i class="fa-solid fa-arrow-left text-sm"></i></button>`
                        : `<div class="flex items-center gap-2">

                    }

                    const classInfo = `<section class="px-6 pt-4 mb-6 animate-stagger"><div class="relative overflow-hidden rounded-[20px] bg-gradient-to-r ${cls.gradient} p-6 text-white shadow-xl shadow-indigo-500/10"><i class="fa-solid ${cls.icon} absolute -right-6 -bottom-6 text-[130px] opacity-[0.12] transform -rotate-12 pointer-events-none"></i><div class="relative z-10"><span class="text-[9px] font-bold tracking-widest uppercase opacity-80">${App.escape(cls.level)} TRACK</span><h1 class="text-[28px] font-extrabold mt-1 tracking-tight">${App.escape(cls.name)}</h1></div></div></section>`;

                teacherPanel() {

                    // 1. 学生管理面板 (需求2：按班级分组，显示宠物等级)

                    XY_CLASSES.forEach(cls => {

                            const petData = XY_ALL_PETS.find(p => p.student_id === s.id);

                            let lvl = 1; for (let i = LVL_THRESHOLDS.length - 1; i >= 0; i--) { if (stars >= LVL_THRESHOLDS[i]) { lvl = Math.min(i + 1, 10); break; } }
                            
                            return `

                            </div>`;

                    const studentsPanel = `

                                <h2 class="text-sm font-extrabold text-[#2D2A4A] mb-4 pl-1">班级名单与进度概览</h2>

            actions: {
                _carouselTimer: null,

                initCarousel() {
                    if (this._carouselTimer) { clearInterval(this._carouselTimer); this._carouselTimer = null; }
                    const wrapper = document.getElementById('carousel-wrapper');
                    const slides = document.querySelectorAll('.carousel-slide');
                    const dots = document.querySelectorAll('.carousel-dot');
                    if (!wrapper || slides.length === 0) return;
                    
                    this._carouselIdx = 0;
                    const showSlide = (idx) => {
                        if (idx < 0) idx = slides.length - 1;
                        if (idx >= slides.length) idx = 0;
                        
                        slides.forEach((s, i) => {
                            if (i === idx) { s.style.opacity = '1'; s.style.pointerEvents = 'auto'; }
                            else { s.style.opacity = '0'; s.style.pointerEvents = 'none'; }
                            s.style.transition = 'opacity 0.6s cubic-bezier(0.2,0.8,0.2,1)';
                        });
                        dots.forEach((d, i) => {
                            if (i === idx) { d.classList.remove('bg-white/40'); d.classList.add('bg-white'); d.style.width = '18px'; }
                            else { d.classList.add('bg-white/40'); d.classList.remove('bg-white'); d.style.width = '6px'; }
                        });
                        this._carouselIdx = idx;
                    };
                    showSlide(0);

                    const startTimer = () => {
                        if (this._carouselTimer) clearInterval(this._carouselTimer);
                        this._carouselTimer = setInterval(() => showSlide(this._carouselIdx + 1), 5000);
                    };
                    startTimer();

                    dots.forEach((dot, i) => {
                        dot.addEventListener('click', () => { showSlide(i); startTimer(); });
                    });

                    // 需求1：原生支持手势滑动轮播图
                    let touchStartX = 0;
                    let touchEndX = 0;
                    wrapper.addEventListener('touchstart', e => {
                        touchStartX = e.changedTouches[0].screenX;
                    }, { passive: true });
                    
                    wrapper.addEventListener('touchend', e => {
                        touchEndX = e.changedTouches[0].screenX;
                        if (touchEndX < touchStartX - 50) { showSlide(this._carouselIdx + 1); startTimer(); } 
                        if (touchEndX > touchStartX + 50) { showSlide(this._carouselIdx - 1); startTimer(); } 
                    }, { passive: true });

                    if(error) return this.showAlert('删除失败: ' + error.message, '❌ 错误');
                    XY_STUDENTS = await loadStudents();
                    App.render();
                    this.showAlert(`学生 ${name} 的记录已成功删除。`, '✅ 账号已清理');
                },

                // 需求4: 后台动态传宣传图逻辑
                async addBannerToDB() {
                    const img = document.getElementById('ban-img').value.trim();
                    const link = document.getElementById('ban-link').value.trim();
                    const tag = document.getElementById('ban-tag').value.trim();
                    const title = document.getElementById('ban-title').value.trim();

                    if(!img || !title) return this.showAlert('图片直链和大标题必须填写', '⚠️ 提示');

                    const btn = document.getElementById('btn-add-ban');
                    const orig = btn.innerText; btn.innerText = '正在上传...'; btn.disabled = true;

                    const newBan = { id: 'ban_' + Date.now(), image: img, link: link, tag: tag, title: title };
                    const { error } = await sb.from('banners').insert(newBan);
                    
                    btn.innerText = orig; btn.disabled = false;

                    if(error) return this.showAlert('上传失败: 请检查是否已经在 Supabase 创建了 banners 表。', '❌ 错误');

                    XY_BANNERS = await loadBanners();
                    App.render();
                    this.showAlert('宣传图已成功上架至主页！', '✅ 成功');
                },

                async deleteBanner(id) {
                    if(!confirm('确定要从主页删除这张宣传图吗？')) return;
                    await sb.from('banners').delete().eq('id', id);
                    XY_BANNERS = await loadBanners();
                    App.render();
                },

                openPetSelection() {
                    const root = document.getElementById('modal-root');
                    const grid = PET_DB.map(p => `
                        <div class="card-solid p-4 text-center cursor-pointer active-scale border-2 border-transparent hover:border-[#6B48FF] transition-colors" onclick="App.actions.selectPet('${p.id}')">
                            <div class="text-[40px] mb-2">${p.emoji}</div>
                            <h4 class="font-bold text-sm">${p.name}</h4>
                            <p class="text-[9px] text-gray-500 uppercase">${p.type}</p>
                        </div>
                    `).join('');
                    root.innerHTML = `
                        <div class="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" style="animation: fadeIn 0.3s forwards"></div>
                            <div class="bg-white rounded-[32px] p-6 w-full max-w-md relative z-10 shadow-2xl" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards">
                                <h2 class="text-2xl font-black text-center text-[#2D2A4A] mb-1">Choose Companion</h2>
                                <p class="text-xs text-center text-gray-500 mb-6">This companion will grow with you.</p>
                                <div class="grid grid-cols-2 gap-3 mb-6">${grid}</div>
                            </div>
                        </div>
                    `;
                },

                selectPet(id) {
                    PetManager.state.petId = id;
                    PetManager.state.adoptionDate = new Date().toISOString();
                    PetManager.save();
                    document.getElementById('modal-root').innerHTML = '';
                    App.render();
                },

                openChangePetModal() {
                    const root = document.getElementById('modal-root');
                    const canAfford = PetManager.state.stars >= 20;
                    
                    root.innerHTML = `
                        <div class="fixed inset-0 z-[9999] flex items-center justify-center p-6">
                            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" style="animation: fadeIn 0.3s forwards" onclick="App.actions.closeModal()"></div>
                            <div class="bg-white rounded-[32px] p-6 w-full max-w-sm relative z-10 shadow-2xl text-center" style="animation: slideUpFade 0.4s cubic-bezier(0.2,0.8,0.2,1) forwards">
                                <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-3xl"><i class="fa-solid fa-arrows-rotate"></i></div>
                                <h2 class="text-xl font-black text-[#2D2A4A] mb-2">Change Companion?</h2>
                                <p class="text-[13px] text-gray-500 mb-6 leading-relaxed">This will release your current companion into the stars and let you choose a new one. <br><br><span class="font-bold text-[#2D2A4A]">Cost: 20 ⭐</span> (You have ${PetManager.state.stars} ⭐)</p>
                                <div class="flex gap-3">
                                    <button onclick="App.actions.closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-bold rounded-2xl py-3.5 active-scale">Cancel</button>
                                    <button onclick="${canAfford ? 'App.actions.executeFarewell()' : 'App.actions.showAlert(\\\'Not enough stars!\\\', \\\'⚠️ Oops\\\')'}" class="flex-1 ${canAfford ? 'bg-[#6B48FF] text-white shadow-lg shadow-[#6B48FF]/30' : 'bg-gray-300 text-white cursor-not-allowed'} font-bold rounded-2xl py-3.5 active-scale">
                                        ${canAfford ? 'Confirm' : 'Need 20 ⭐'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                },

                executeFarewell() {
                    this.closeModal();
                    PetManager.state.stars -= 20;
                    PetManager.save();
                    this.playFarewellEpic();
                },

                closeModal() { document.getElementById('modal-root').innerHTML = ''; },

                playFarewellEpic() {
                    const overlay = document.getElementById('farewell-overlay');
                    document.getElementById('farewell-emoji').textContent = PetManager.getPet().emoji;
                    document.getElementById('fw-name').textContent = PetManager.getPet().name;

                    const bg = document.getElementById('star-bg'); bg.innerHTML = '';
                    for(let i=0; i<50; i++) {
                        let div = document.createElement('div'); div.className = 'star';
                        div.style.left = Math.random() * 100 + '%'; div.style.top = Math.random() * 100 + '%';
                        div.style.width = Math.random() * 3 + 'px'; div.style.height = div.style.width;
                        div.style.animationDelay = Math.random() * 2 + 's';
                        bg.appendChild(div);
                    }

                    overlay.classList.add('active');
                    setTimeout(() => {
                        overlay.classList.remove('active');
                        PetManager.state.petId = null; PetManager.save();
                        App.navigate('pet');
                    }, 4000);
                },

                showStarToast(amount) {
                    const toast = document.createElement('div');
                    toast.className = 'star-toast';
                    toast.innerHTML = `+${amount} ⭐`;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 2500);
                }
            }
        };

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUpFade { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        `;
        document.head.appendChild(style);

        window.onload = async () => {
            try {
                // 并行拉取全量数据，为老师后台和系统做好准备
                const [students, homework, pets, banners] = await Promise.all([ 
                    loadStudents(), loadHomework(), loadAllPets(), loadBanners() 
                ]);
                XY_STUDENTS = students;
                XY_HOMEWORK = homework;
                XY_ALL_PETS = pets;
                XY_BANNERS = banners;
                
                // 判断是否带有作业成绩返回参数 (?score=xxx&hwId=yyy)
                const params = new URLSearchParams(window.location.search);
                const user = XY_AUTH.getCurrentUser();
                
                if (user && user.role === 'student') {
                    await PetManager.init(user.id);
                    if (params.has('score') && params.has('hwId')) {
                        const score = parseInt(params.get('score'));
                        const hwId = params.get('hwId');
                        let starsEarned = 0;
                        
                        if (score === 100) starsEarned = 5;
                        else if (score >= 90) starsEarned = 2;
                        else if (score >= 80) starsEarned = 1;

                        await PetManager.processHomeworkScore(hwId, score, starsEarned);
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                }
                
                App.render();
            } catch (err) {
                console.error('初始化失败:', err);
                App.actions.showAlert('网络异常,请刷新重试。Error: ' + err.message, '❌ 加载失败');
            }
        };
    </script>
</body>
</html>
