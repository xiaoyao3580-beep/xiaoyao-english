<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>A2+班 · 肖瑶启言</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background-color: #F8F9FF;
      font-family: 'Nunito', 'Noto Sans SC', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #root { width: 100%; min-height: 100vh; }

    .pb-safe { padding-bottom: calc(3rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }

    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }

    .card-shadow {
      box-shadow: 0 1px 3px rgba(92, 45, 255, 0.04), 0 4px 20px rgba(92, 45, 255, 0.06);
    }
  </style>
</head>
<body class="bg-[#F8F9FF]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ============================================
       ⚙️ 班级配置 - 每个班的作业页只需要改这里
       ============================================ */
    const CLASS_CONFIG = {
      name: 'A2+班',
      level: 'TALENT A2+ · ADVANCED',
      time: '周日早上',
      icon: 'fa-rocket',
      gradient: 'from-violet-600 to-indigo-700',
      iconBg: 'bg-violet-100',
      iconColor: 'text-violet-700'
    };

    /* ============================================
       📚 本班作业列表 - 每周更新时,在最前面加一条就行
       
       每条作业包含:
         - unit: 单元编号(显示用)
         - title: 作业标题
         - date: 日期
         - file: 作业的HTML文件名(放在 classes/a2-1/ 文件夹里)
         - isLatest: 是否最新(true / false,通常只有最新那条是true)
       ============================================ */
    const HOMEWORK_LIST = [
      // 👇 第一次添加作业,取消下面几行的注释并修改;以后每周在最前面加一条
      // {
      //   unit: 'U1-1',
      //   title: '作业标题',
      //   date: '2026-04-21',
      //   file: 'a2-plus/文件名.html',
      //   isLatest: true
      // }
    ];

    /* ============================================
       顶部导航
       ============================================ */
    const TopBar = () => (
      <div className="pt-safe sticky top-0 z-40 bg-[#F8F9FF]/80 backdrop-blur-lg">
        <div className="px-5 py-4 flex items-center justify-between">
          <button 
            onClick={() => window.location.href = '../index.html'}
            className="active-scale bg-white w-10 h-10 rounded-full flex items-center justify-center card-shadow"
          >
            <i className="fa-solid fa-chevron-left text-violet-600"></i>
          </button>
          <div className="flex flex-col items-center leading-tight">
            <span className="font-black text-gray-900 text-base">{CLASS_CONFIG.name}</span>
            <span className="text-[10px] text-gray-400 font-semibold tracking-widest">{CLASS_CONFIG.level}</span>
          </div>
          <div className="w-10 h-10"></div>
        </div>
      </div>
    );

    /* ============================================
       班级信息头部
       ============================================ */
    const ClassHeader = () => (
      <div className="px-5 mb-6 fade-in-up">
        <div className={`relative rounded-3xl overflow-hidden bg-gradient-to-br ${CLASS_CONFIG.gradient} p-6 shadow-xl shadow-violet-500/20`}>
          <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
          <div className="absolute -bottom-12 -left-8 w-40 h-40 rounded-full bg-white/5 blur-3xl"></div>
          
          <div className="relative">
            <div className="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4">
              <i className={`fa-solid ${CLASS_CONFIG.icon} text-white text-2xl`}></i>
            </div>
            <h1 className="text-white text-2xl font-black mb-1">{CLASS_CONFIG.name}</h1>
            <p className="text-white/80 text-xs font-bold tracking-widest mb-3">{CLASS_CONFIG.level}</p>
            <div className="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full">
              <i className="fa-regular fa-clock text-white text-xs"></i>
              <span className="text-white text-xs font-bold">{CLASS_CONFIG.time}</span>
            </div>
          </div>
        </div>
      </div>
    );

    /* ============================================
       最新作业卡片(大卡片,突出显示)
       ============================================ */
    const LatestHomework = ({ hw }) => (
      <div className="px-5 mb-6 scale-in" style={{animationDelay: '0.1s'}}>
        <div className="flex items-center gap-2 mb-3">
          <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span className="text-xs font-black text-gray-500 tracking-widest">本周最新作业</span>
        </div>
        
        <button
          onClick={() => window.location.href = hw.file}
          className="active-scale w-full bg-white rounded-3xl p-6 card-shadow text-left"
        >
          <div className="flex items-start justify-between mb-4">
            <div className={`w-12 h-12 rounded-2xl ${CLASS_CONFIG.iconBg} flex items-center justify-center`}>
              <i className={`fa-solid fa-book-open ${CLASS_CONFIG.iconColor} text-lg`}></i>
            </div>
            <div className="bg-green-50 text-green-600 px-2.5 py-1 rounded-full text-[10px] font-black tracking-wider">
              NEW
            </div>
          </div>

          <div className="mb-1">
            <span className={`text-xs font-black ${CLASS_CONFIG.iconColor} tracking-widest`}>UNIT {hw.unit}</span>
          </div>
          <h3 className="text-gray-900 text-xl font-black mb-3 leading-tight">{hw.title}</h3>
          
          <div className="flex items-center justify-between pt-3 border-t border-gray-100">
            <span className="text-xs text-gray-400 font-semibold">{hw.date}</span>
            <div className={`inline-flex items-center gap-1.5 bg-gradient-to-r ${CLASS_CONFIG.gradient} px-4 py-2 rounded-full shadow-md`}>
              <span className="text-white text-xs font-black tracking-wide">进入作业</span>
              <i className="fa-solid fa-arrow-right text-white text-xs"></i>
            </div>
          </div>
        </button>
      </div>
    );

    /* ============================================
       历史作业列表
       ============================================ */
    const HistoryList = ({ list }) => {
      if (list.length === 0) return null;
      
      return (
        <div className="px-5 mb-6">
          <div className="flex items-center gap-2 mb-3 fade-in-up" style={{animationDelay: '0.15s'}}>
            <i className="fa-regular fa-clock-rotate-left text-gray-400"></i>
            <span className="text-xs font-black text-gray-500 tracking-widest">往期作业</span>
          </div>

          <div className="space-y-3">
            {list.map((hw, i) => (
              <button
                key={hw.unit}
                onClick={() => window.location.href = hw.file}
                className="scale-in active-scale w-full bg-white rounded-2xl p-4 card-shadow text-left flex items-center gap-4"
                style={{animationDelay: `${0.2 + i * 0.05}s`}}
              >
                <div className={`w-11 h-11 rounded-xl ${CLASS_CONFIG.iconBg} flex items-center justify-center flex-shrink-0`}>
                  <i className={`fa-solid fa-book ${CLASS_CONFIG.iconColor}`}></i>
                </div>
                <div className="flex-1 min-w-0">
                  <div className={`text-[10px] font-black ${CLASS_CONFIG.iconColor} tracking-widest mb-0.5`}>
                    UNIT {hw.unit}
                  </div>
                  <div className="text-sm font-black text-gray-900 truncate">{hw.title}</div>
                  <div className="text-[10px] text-gray-400 font-semibold mt-0.5">{hw.date}</div>
                </div>
                <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
              </button>
            ))}
          </div>
        </div>
      );
    };

    /* ============================================
       空状态(没有任何作业时)
       ============================================ */
    const EmptyState = () => (
      <div className="px-5 py-12 text-center fade-in-up">
        <div className="w-20 h-20 rounded-full bg-violet-50 flex items-center justify-center mx-auto mb-4">
          <i className="fa-regular fa-folder-open text-violet-300 text-3xl"></i>
        </div>
        <p className="text-gray-500 font-bold mb-1">本周作业准备中</p>
        <p className="text-xs text-gray-400">肖瑶老师正在精心准备,请稍候~</p>
      </div>
    );

    /* ============================================
       主应用
       ============================================ */
    const App = () => {
      const latest = HOMEWORK_LIST.find(hw => hw.isLatest);
      const history = HOMEWORK_LIST.filter(hw => !hw.isLatest);

      return (
        <div className="min-h-screen bg-[#F8F9FF] pb-safe">
          <TopBar />
          <div className="pt-2">
            <ClassHeader />
            {latest ? <LatestHomework hw={latest} /> : <EmptyState />}
            <HistoryList list={history} />
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
