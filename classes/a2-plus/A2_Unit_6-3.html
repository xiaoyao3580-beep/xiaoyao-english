  <script>

    // ==========================================

    var GRAMMAR_NOTES = [
      { title: "1. ⏳ 没完没了的时态魔法", icon: "fa-person-running", color: "sky", content: ["<strong class='text-sky-600'>现在完成进行时 (have/has been + ing)：</strong>就像你跑完步气喘吁吁地说：“我一直跑一直跑，累死我了！”用来吐槽动作持续了<span class='pill-blue'>好久没停</span>，或者刚停下但满头大汗。", "<strong class='text-sky-600'>现在完成时 (have/has + 动词过去分词)：</strong>骄傲地宣布：“<span class='pill-blue'>我做完啦！</span>” 只要遇到明确的次数（比如3次、无数次），必须选它！", "🚨 <strong class='text-rose-500'>避坑指南：</strong>像 know(知道)、like(喜欢) 这种只在脑子里想的词，绝对不能加 -ing 哦！"], eg: "For the past two winters, I have been learning to ski. (这俩冬天我一直一直在学滑雪！)" },
      { title: "2. 🧲 So 和 Such 的争宠日常", icon: "fa-link", color: "orange", content: ["<strong class='text-orange-600'>So 说：</strong>“当形容词/副词宝宝一个人孤零零的时候，我来陪它！” (so + adj/adv + that)", "<strong class='text-orange-600'>Such 说：</strong>“如果有<span class='pill-orange'>名字(名词)老大</span>在场，那就必须用我！” (such + a/an + adj + noun + that)", "🚨 <strong class='text-rose-500'>避坑指南：</strong>像 weather(天气)、news(新闻) 这种数不清的东西，前面千万别加 a 或 an！"], eg: "It was such terrible weather that we stayed inside. (天气太糟糕啦！)" },
      { title: "3. 🧩 动词接龙魔法", icon: "fa-puzzle-piece", color: "rose", content: ["💖 <strong class='text-rose-600'>接 DOING 的兄弟：</strong>enjoy(享受), mind(介意), avoid(避免)。它们喜欢那些已经发生过的、“稳稳当当”的事情。", "🏹 <strong class='text-rose-600'>接 TO DO 的兄弟：</strong>decide(决定), promise(承诺), hope(希望)。它们像小箭头，充满干劲地指向<span class='pill-orange'>未来</span>要去做的事！"], eg: "I initially avoided going near the steeper slopes. (我一开始可不敢去陡坡哦。)" },
      { title: "4. 🔥 顶级情感炸弹", icon: "fa-bomb", color: "purple", content: ["有些词天生就是王者！比如 <span class='pill-blue'>freezing(冻僵了)</span>, <span class='pill-orange'>boiling(热爆了)</span>, exhausted(累瘫了)。", "🚨 <strong class='text-rose-500'>避坑指南：</strong>王不见王！它们绝对不能用普通的 'very'，只能搭配同样顶级的 'absolutely' 或 'totally'！"], eg: "The mountain air is absolutely freezing! (山里的风简直要把人冻成冰块了！)" }
    ];

    var POOL_P1 = [
      { q: "Look at his skis! He ______ them all morning, but they still don't work.", opts: ["has been fixing", "has fixed", "fixes"], a: "has been fixing", exp: "修了一早上还没修好，动作还在持续没结束，吐槽没完没了，用现在完成进行时！" },
      { q: "It's a tough journey. So far, she ______ down countless times!", opts: ["has fallen", "has been falling", "falls"], a: "has fallen", exp: "有明确数量词(countless times无数次)，强调结果和经历了多少次，绝对不能加ing，必须用现在完成时！" },
      { q: "I ______ my best friend since we were in kindergarten.", opts: ["have known", "have been knowing", "knew"], a: "have known", exp: "know(认识) 是在脑子里想的静态动词，绝对没有进行时态！避大坑！" },
      { q: "I am out of breath! I ______ through the deep snow for two hours.", opts: ["have been walking", "have walked", "walked"], a: "have been walking", exp: "“气喘吁吁”是刚刚持续了很久的动作留下的身体反应！用现在完成进行时。" },
      { q: "For the past two winters, they ______ to ski with an instructor.", opts: ["have been learning", "have learned", "learn"], a: "have been learning", exp: "“过去的两个冬天”，突出漫长的学习过程，用 have been learning。" },
      { q: "Look at his dirty hands! He ______ the car in the garage.", opts: ["has been repairing", "has repaired", "repaired"], a: "has been repairing", exp: "手是脏的（视觉结果），说明刚才一直在修车！选 has been repairing。" },
      { q: "My brother ______ video games for 3 hours. Tell him to stop!", opts: ["has been playing", "has played", "plays"], a: "has been playing", exp: "玩了3小时并且还在玩（快让他停下），强调连续不断的动作。" },
      { q: "How many times ______ Paris so far?", opts: ["have you visited", "have you been visiting", "did you visit"], a: "have you visited", exp: "问“去过几次”意味着动作已完成，只要算次数，绝不能用进行时。" },
      { q: "Look! Someone ______ the window. There is glass everywhere.", opts: ["has broken", "has been breaking", "broke"], a: "has broken", exp: "窗户被打破了，满地都是玻璃，强调“打破”这个动作产生的结果。" },
      { q: "I ______ snowboarding before, but I really want to try it today!", opts: ["have never tried", "never tried", "had never tried"], a: "have never tried", exp: "强调从出生到现在“一次都没试过”的经历，对今天想不想去有直接影响。" }
    ];

    var POOL_P2 = [
      { q: "It was ______ fascinating experience that I forgot all my fears!", opts: ["such a", "so", "such"], a: "such a", exp: "experience在这里是单数可数名词，修饰名词词组必须派出老大：such a！" },
      { q: "I was going ______ fast that I felt like a bird.", opts: ["so", "such", "such a"], a: "so", exp: "fast是个副词宝宝，孤零零的没有名词跟着，用 so 陪它！" },
      { q: "It was ______ terrible weather that we cancelled the trip.", opts: ["such", "such a", "so"], a: "such", exp: "weather(天气) 是数不清的东西，千万别加 a/an！直接用 such。" },
      { q: "Because of my fear of heights, I avoided ______ near steep slopes.", opts: ["going", "to go", "go"], a: "going", exp: "avoid(避免) 兄弟喜欢客观存在的事情，后接 doing！" },
      { q: "I promised ______ a higher trail.", opts: ["to try", "trying", "try"], a: "to try", exp: "promise(承诺) 就像指引未来的小箭头，接不定式 to do！" },
      { q: "I didn't mind ______ on the flat areas forever.", opts: ["practicing", "to practice", "practice"], a: "practicing", exp: "mind(介意) 后面喜欢接 doing 啦！" },
      { q: "If you hope ______ a thrilling hobby, try skiing!", opts: ["to find", "finding", "find"], a: "to find", exp: "hope(希望) 是对未来的愿景，箭头指向未来，接 to do！" },
      { q: "He finally decided ______ his comfort zone.", opts: ["to leave", "leaving", "leave"], a: "to leave", exp: "decide(决定) 去做某事，箭头指向未来，必须用 to do！" },
      { q: "The mountain air in January is always ______ freezing.", opts: ["absolutely", "very", "a bit"], a: "absolutely", exp: "freezing 是“冻成冰块”的顶级词汇，绝不能用 very 修饰！" },
      { q: "After wearing heavy gear, I feel totally ______.", opts: ["boiling", "hot", "warm"], a: "boiling", exp: "totally 用来放大感情，后面必须接同样顶级的词 boiling(热爆了)。" }
    ];

    var POOL_P3 = [
      { q: "I ______ my keys yesterday, so I couldn't get into the house.", opts: ["lost", "have lost", "was losing"], a: "lost", exp: "有yesterday，动作在过去结束了，规规矩矩用一般过去时。" },
      { q: "While we ______ down the mountain, it suddenly started to snow.", opts: ["were skiing", "skied", "had skied"], a: "were skiing", exp: "“当我们正滑雪时(过去进行时)”，突然下雪了。背景动作被突发动作打断！" },
      { q: "When I arrived at the station, the train ______ already.", opts: ["had left", "left", "has left"], a: "had left", exp: "火车离开发生在“我到达”之前，这叫“过去的过去”，必须用过去完成时。" },
      { q: "What ______ at 8 PM last night? I called you but you didn't answer.", opts: ["were you doing", "did you do", "have you been doing"], a: "were you doing", exp: "问昨晚8点整“正在”干嘛？这是过去的一个精确点，用过去进行时。" },
      { q: "In 2010, my family ______ to a small town in Switzerland.", opts: ["moved", "has moved", "had moved"], a: "moved", exp: "在2010年，过去发生的单纯动作，用一般过去时。" },
      { q: "I couldn't buy the ticket because I ______ my wallet at home.", opts: ["had forgotten", "forgot", "have forgotten"], a: "had forgotten", exp: "“忘记钱包”发生在“买不到票”之前，过去的过去用 had done！" },
      { q: "I ______ a book quietly when the lights suddenly went out.", opts: ["was reading", "read", "had read"], a: "was reading", exp: "灯突然熄灭时，我“当时正”读书，用过去进行时。" },
      { q: "She was nervous because she ______ on a plane before that trip.", opts: ["had never flown", "has never flown", "never flew"], a: "had never flown", exp: "在“那次旅行之前”的经历，依然是“过去的过去”。" },
      { q: "After he ______ his homework, he went out to play.", opts: ["had finished", "finishes", "has finished"], a: "had finished", exp: "“做完作业”发生在“出去玩(过去)”之前，用过去完成时。" },
      { q: "The ground is completely wet. ______?", opts: ["Has it been raining", "Did it rain", "Has it rained"], a: "Has it been raining", exp: "现在地面湿透了（视觉结果），说明刚才一直下雨没停过！" }
    ];

    var DAILY_POOL = {
      enjoy: [
        { q: "I enjoy <u class='deco-wavy'>to play</u> tennis on weekends.", a: "playing" },
        { q: "She really enjoys <u class='deco-wavy'>to read</u> mystery novels.", a: "reading" },
        { q: "We enjoy <u class='deco-wavy'>to watch</u> movies together.", a: "watching" }
      ],
      mind: [
        { q: "Do you mind <u class='deco-wavy'>to close</u> the window?", a: "closing" },
        { q: "I don't mind <u class='deco-wavy'>to wait</u> for a few more minutes.", a: "waiting" },
        { q: "Would you mind <u class='deco-wavy'>to help</u> me with this bag?", a: "helping" }
      ],
      avoid: [
        { q: "You should avoid <u class='deco-wavy'>to eat</u> too much junk food.", a: "eating" },
        { q: "They avoided <u class='deco-wavy'>to answer</u> my questions.", a: "answering" },
        { q: "He tries to avoid <u class='deco-wavy'>to drive</u> in heavy traffic.", a: "driving" }
      ],
      decide: [
        { q: "We decided <u class='deco-wavy'>going</u> to the beach tomorrow.", a: "to go" },
        { q: "She decided <u class='deco-wavy'>buying</u> the red dress.", a: "to buy" },
        { q: "They finally decided <u class='deco-wavy'>moving</u> to a new city.", a: "to move" }
      ],
      promise: [
        { q: "He promised <u class='deco-wavy'>helping</u> me with my homework.", a: "to help" },
        { q: "I promise <u class='deco-wavy'>calling</u> you when I arrive.", a: "to call" },
        { q: "They promised <u class='deco-wavy'>coming</u> to my party.", a: "to come" }
      ],
      hope: [
        { q: "I hope <u class='deco-wavy'>seeing</u> you soon.", a: "to see" },
        { q: "She hopes <u class='deco-wavy'>getting</u> a good grade on the test.", a: "to get" },
        { q: "We hope <u class='deco-wavy'>winning</u> the championship this year.", a: "to win" }
      ]
    };

    // ==========================================
    // 2. 状态控制与 ElevenLabs 引擎区
    // ==========================================
    var activeTab = 'review'; 
    var quizState = 'intro'; 
    var isMenuOpen = false;
    
    var quizItems = [];
    var currentQ = 0;
    var answers = {};
    var startTime = 0;
    var quizResult = null;

    var dailyItems = [];
    var dailyInputs = {};
    var dailySubmitted = false;
    var showDailyHint = false;
    var prevDailyHistory = null;

    // ElevenLabs API 配置
    var ELEVENLABS_API_KEY = "8afc05603ac30c7769ce6f76b2799b02e06773939d2704489ae66daef1ebdce1";
    var VOICE_ID = "21m00Tcm4TlvDq8ikWAM"; // Rachel 声音

    // 安全转义函数，保护带有单双引号的英文题干不会在 JS 拼接中阻断报错
    window.getSafeText = function(text) {
        return encodeURIComponent(text).replace(/'/g, "%27");
    };

    // ElevenLabs 带缓存极速发音引擎
    window.playElevenLabsAudio = async function(rawText, btnElement) {
        if (!rawText) return;

        // 1. 清理 HTML 标签和下划线，转化为空白停顿，提升朗读自然度
        var cleanText = rawText.replace(/<[^>]*>?/gm, '').replace(/_+/g, 'blank').replace(/&nbsp;/g, ' ').trim();
        if (!cleanText) return;

        // 2. 生成此文本的短 Cache Key，避免冗长的 base64 撑爆 key
        var textHash = btoa(unescape(encodeURIComponent(cleanText))).slice(0, 32); 
        var cacheKey = "el_audio_" + textHash;

        // 3. UI 按钮切换为 Loading 转圈状态
        var originalHTML = btnElement.innerHTML;
        btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-sm"></i>';
        btnElement.disabled = true;

        try {
            var cachedAudio = localStorage.getItem(cacheKey);
            if (cachedAudio) {
                // [命中缓存]：直接播放，实现 0 延迟且不耗费 API 额度！
                var audio = new Audio(cachedAudio);
                audio.play();
            } else {
                // [未命中]：首次点击，调用 ElevenLabs API 获取声音流
                var response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/" + VOICE_ID, {
                    method: "POST",
                    headers: {
                        "Accept": "audio/mpeg",
                        "Content-Type": "application/json",
                        "xi-api-key": ELEVENLABS_API_KEY
                    },
                    body: JSON.stringify({
                        text: cleanText,
                        model_id: "eleven_monolingual_v1",
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });

                if (!response.ok) {
                    throw new Error("API 请求失败");
                }

                // 转换二进制流为 Blob，再转储为 Base64 以便长期存在 LocalStorage
                var blob = await response.blob();
                var reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    var base64data = reader.result;
                    try {
                        localStorage.setItem(cacheKey, base64data);
                    } catch (e) {
                        console.warn("LocalStorage 容量已满，跳过长期缓存，仅本次播放。");
                    }
                    var audio = new Audio(base64data);
                    audio.play();
                }
            }
        } catch (error) {
            console.error("音频播放失败:", error);
            alert("语音生成失败，请检查网络环境或确认 ElevenLabs 额度是否用完。");
        } finally {
            // 恢复播放按钮状态
            btnElement.innerHTML = originalHTML;
            btnElement.disabled = false;
        }
    };

    function playTone(type) {
      try {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        var ctx = new AudioContext();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(700, ctx.currentTime);
          gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'correct') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, ctx.currentTime); osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.3);

          osc.start(); osc.stop(ctx.currentTime + 0.3);

    window.handleAnswer = function(optIndex) {
        if (answers[currentQ] !== undefined) return; 
        
        var optString = quizItems[currentQ].options[optIndex];
        var isCorrect = optString === quizItems[currentQ].a;
        if (isCorrect) playTone('correct'); else playTone('wrong');
        
        answers[currentQ] = optString;
        renderApp(true);

    window.submitQuiz = function() {

        var mistakes = [];
        
        var partStats = {
          1: { title: "单元时态", correct: 0, total: 0, colorText: "text-sky-600", bgGradient: "from-sky-400 to-sky-500" },
          2: { title: "其它语法", correct: 0, total: 0, colorText: "text-orange-600", bgGradient: "from-orange-400 to-orange-500" },
          3: { title: "混合时态", correct: 0, total: 0, colorText: "text-indigo-600", bgGradient: "from-indigo-400 to-indigo-500" }
        };

        for (var i = 0; i < quizItems.length; i++) {
            var q = quizItems[i];
            partStats[q.part].total++;

                correct++;

            } else {

            var history = prevDailyHistory.slice();
            var changeIdx = Math.floor(Math.random() * 6);
            var changeWord = history[changeIdx].word;
            
            var pool = shuffle(DAILY_POOL[changeWord]);

            }

            selected = history;

        prevDailyHistory = selected;

        dailyInputs = {};
        dailySubmitted = false;
        renderApp();

                <div>
                    <div class="flex justify-between text-[14px] md:text-[15px] font-bold mb-2">
                        <span class="text-slate-600">${stat.title}</span>
                        <span class="${stat.colorText} font-black">${percent}% <span class="opacity-60 text-[12px] ml-1">(${stat.correct}/${stat.total})</span></span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 md:h-4 rounded-full overflow-hidden shadow-inner">
                        <div class="bg-gradient-to-r ${stat.bgGradient} h-full rounded-full transition-all duration-1000 ease-out" style="width: ${percent}%"></div>
                    </div>
                </div>`;
        }

        html += `</div></div>`;

        if (quizResult.mistakes.length > 0) {
            html += `
            <div>
                <h3 class="text-xl md:text-2xl font-black text-slate-700 mb-6 pl-3 border-l-4 border-slate-700 rounded-sm">错题本 Review</h3>
                <div class="space-y-5">`;
            
            for(var m=0; m<quizResult.mistakes.length; m++) {
                var mistake = quizResult.mistakes[m];
                var safeMistakeQ = window.getSafeText(mistake.q.q);

                html += `
                    <div class="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-[1.5rem] shadow-sm border border-rose-100 relative">
                        <div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] md:text-xs font-black px-4 md:px-5 py-1.5 md:py-2 rounded-bl-[1rem] uppercase tracking-widest shadow-sm">Miss</div>
                        
                        <div class="flex items-start justify-between gap-4 mb-5 pr-10">
                            <p class="font-bold text-slate-800 text-[16px] md:text-lg font-serif-novel leading-relaxed flex-1">${mistake.q.q}</p>
                            <button onclick="playElevenLabsAudio(decodeURIComponent('${safeMistakeQ}'), this)" class="shrink-0 text-sky-500 hover:text-white bg-sky-100 hover:bg-sky-500 w-8 h-8 rounded-full transition-colors flex items-center justify-center shadow-sm" title="朗读">
                                <i class="fa-solid fa-volume-high text-xs"></i>
                            </button>
                        </div>

                        <div class="space-y-3 text-[14px] md:text-base font-bold bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100 mb-5">
                            <p class="text-rose-500 flex items-center"><i class="fa-solid fa-xmark mr-3 w-5 text-lg"></i><span class="line-through">${mistake.userAns || '未作答'}</span></p>
                            <p class="text-emerald-600 flex items-center"><i class="fa-solid fa-check mr-3 w-5 text-lg"></i><span>${mistake.q.a}</span></p>
                        </div>
                        <p class="text-sky-700 text-[13px] md:text-[15px] font-black leading-relaxed border-t border-slate-100 pt-4 md:pt-5 flex items-start">
                            <i class="fa-solid fa-lightbulb text-amber-500 mr-2.5 mt-0.5 text-base md:text-lg"></i>${mistake.q.exp}
                        </p>
                    </div>`;
            }
            html += `</div></div>`;
        }
        
        html += `</div>`;
        return html;
    }

    function renderDailyHTML() {
        var html = `<div class="flex-1 min-h-0 overflow-y-auto pb-safe-bar relative z-10 no-scrollbar mobile-scroll p-6 md:px-8 fade-in">`;
        
        if (showDailyHint) {
            html += `
            <div class="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 fade-in" onclick="toggleDailyHint(false)">
                <div class="bg-white p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl bounce-in" onclick="event.stopPropagation()">
                    <h3 class="text-2xl md:text-3xl font-black text-slate-800 mb-6 flex items-center border-b border-slate-100 pb-4"><i class="fa-solid fa-wand-magic-sparkles text-orange-500 mr-3"></i> 魔法动词法则</h3>
                    <div class="space-y-6 text-[15px] md:text-[16px] font-bold text-slate-600">
                        <div class="bg-sky-50 p-5 rounded-2xl border border-sky-100 shadow-inner">
                            <span class="text-sky-800 font-black text-lg md:text-xl block mb-2">接 DOING 的兄弟:</span>enjoy(享受), mind(介意), avoid(避免)
                        </div>
                        <div class="bg-orange-50 p-5 rounded-2xl border border-orange-100 shadow-inner">
                            <span class="text-orange-800 font-black text-lg md:text-xl block mb-2">接 TO DO 的兄弟:</span>decide(决定), promise(承诺), hope(希望)
                        </div>
                    </div>
                    <button onclick="toggleDailyHint(false)" class="mt-8 w-full bg-slate-800 text-white font-black py-4 md:py-5 rounded-2xl active-scale text-lg md:text-xl tracking-widest shadow-md">Got it!</button>
                </div>
            </div>`;
        }

        html += `
            <div class="bg-white/80 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-sm border border-slate-200/50 mb-6 md:mb-8 relative overflow-hidden">
                <div class="absolute -right-6 -bottom-6 text-[100px] md:text-[120px] text-orange-400/10 pointer-events-none"><i class="fa-solid fa-bullseye"></i></div>
                <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-2 font-serif-novel">Daily Check-in</h2>
                <p class="text-slate-500 font-bold text-[13px] md:text-[15px] mb-6">语法改错：写出划线部分正确的形式。</p>
                <div class="flex gap-3 md:gap-4">
                    <button onclick="toggleDailyHint(true)" class="bg-sky-100 hover:bg-sky-200 text-sky-700 px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-black shadow-sm flex items-center active-scale border border-sky-200 transition-colors">
                        <i class="fa-solid fa-circle-question mr-2 text-sm md:text-base"></i> 语法锦囊
                    </button>
                    <button onclick="generateDaily()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-black shadow-sm flex items-center active-scale border border-slate-200 transition-colors">
                        <i class="fa-solid fa-rotate mr-2 text-sm md:text-base"></i> 换一套
                    </button>
                </div>
            </div>
            
            <div class="bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl p-4 md:p-5 border border-orange-100 shadow-sm flex items-start mb-6 md:mb-8">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-orange-200 text-orange-600 flex items-center justify-center shrink-0 mr-3 shadow-inner">
                    <i class="fa-solid fa-lightbulb text-sm md:text-base"></i>
                </div>
                <p class="text-[12px] md:text-[14px] font-bold text-orange-800 leading-relaxed mt-0.5 md:mt-1 pr-2">
                    <span class="text-orange-600 font-black">小提示：</span>可以把正确的句子写在本子上之后大声读出来打卡，也可以直接点喇叭跟着屏幕读出来哦。不需要必须在这里填写～
                </p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">`;

        for(var idx=0; idx<dailyItems.length; idx++) {
            var item = dailyItems[idx];
            var userInput = dailyInputs[idx] || '';
            var isCorrect = userInput.trim().toLowerCase() === item.a.toLowerCase();
            
            var inputClass = 'daily-input';
            if (dailySubmitted) {
                if (isCorrect) inputClass += ' correct';
                else inputClass += ' wrong';
            }

            var safeItemQ = window.getSafeText(item.q);
            var delay = idx * 0.06;

            html += `
                <div class="bg-white/90 backdrop-blur-sm rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100 slide-in-right h-full flex flex-col" style="animation-delay: ${delay}s">
                    <div class="flex justify-between items-center mb-5">
                        <span class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-100 text-slate-500 font-black text-sm md:text-base flex items-center justify-center shadow-inner">${idx + 1}</span>
                        <span class="text-[11px] md:text-xs font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 shadow-sm">${item.word}</span>
                    </div>

                    <div class="flex items-start justify-between gap-4 mb-6">
                        <p class="text-[16px] md:text-[18px] font-serif-novel font-bold text-slate-800 leading-relaxed flex-1">${item.q}</p>
                        <button onclick="playElevenLabsAudio(decodeURIComponent('${safeItemQ}'), this)" class="shrink-0 text-orange-500 hover:text-white bg-orange-100 hover:bg-orange-500 w-8 h-8 rounded-full transition-colors flex items-center justify-center shadow-sm" title="朗读">
                            <i class="fa-solid fa-volume-high text-xs"></i>
                        </button>
                    </div>

                    <div class="relative mt-auto">
                        <input type="text" value="${userInput}" oninput="updateDailyInput(${idx}, this.value)" placeholder="Type correct form (可选)..." class="w-full px-5 py-3.5 md:py-4 rounded-xl font-mono font-bold text-[15px] md:text-[16px] ${inputClass}" ${dailySubmitted ? 'disabled' : ''} />`;
            
            if (dailySubmitted) {
                html += `
                        <div class="absolute right-4 top-1/2 transform -translate-y-1/2">
                            ${isCorrect ? '<i class="fa-solid fa-circle-check text-emerald-500 text-2xl"></i>' : '<i class="fa-solid fa-circle-xmark text-rose-500 text-2xl"></i>'}
                        </div>`;
            }
            html += `</div>`;

            if (dailySubmitted && !isCorrect) {
                html += `
                    <div class="mt-4 text-[14px] md:text-[15px] font-black text-emerald-600 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-100 flex items-center shadow-inner">
                        <i class="fa-solid fa-turn-up rotate-90 mr-3 text-emerald-400 text-lg"></i> Correct: <span class="ml-2 bg-white px-2 py-0.5 rounded shadow-sm">${item.a}</span>
                    </div>`;
            }
            html += `</div>`;
        }

        html += `</div><div class="mt-10 md:mt-12 mb-6">`;

        if (!dailySubmitted) {
            html += `
                <button onclick="submitDaily()" class="w-full md:w-2/3 mx-auto flex justify-center bg-slate-800 hover:bg-slate-700 text-white font-black py-4 md:py-5 rounded-2xl active-scale shadow-lg text-lg md:text-xl tracking-widest transition-colors">
                    一键核对 <i class="fa-solid fa-check-double ml-3 mt-1 text-sky-400"></i>
                </button>`;
        } else {
            html += `
                <div class="text-center bg-emerald-50 p-8 md:p-12 rounded-[2rem] border-2 border-emerald-200 bounce-in shadow-sm w-full md:w-2/3 mx-auto">
                    <i class="fa-solid fa-calendar-check text-5xl md:text-6xl text-emerald-500 mb-5 drop-shadow-md"></i>
                    <h3 class="text-2xl md:text-3xl font-black text-emerald-800 mb-3 font-serif-novel">打卡完成！</h3>
                    <p class="text-emerald-600 text-sm md:text-base font-bold mt-2 leading-relaxed">你的语言直觉越来越准了！<br/>明天同一时间，不见不散！</p>
                    <button onclick="playTone('pop'); generateDaily();" class="mt-8 px-8 py-3 md:py-4 bg-emerald-600 hover:bg-emerald-500 text-white text-[15px] md:text-[16px] font-black tracking-widest rounded-xl active-scale shadow-md transition-colors">再练一套</button>
                </div>`;
        }

        html += `</div><div class="h-8 w-full shrink-0"></div></div>`;
        return html;
    }

    function renderApp(keepScroll) {
        var scrollY = window.scrollY;
        
        var mainContent = '';
        if (activeTab === 'review') {
            if (quizState === 'intro') mainContent = renderQuizIntro();
            else if (quizState === 'quiz') mainContent = renderQuizView();
            else mainContent = renderQuizResult();
        } else {
            mainContent = renderDailyHTML();
        }

        var fullHTML = `
            <div class="absolute inset-x-0 top-0 z-[60]">
                ${getHeaderHTML()}
            </div>
            <div class="h-full min-h-0 overflow-hidden flex flex-col pt-[var(--header-height)] box-border">
                ${mainContent}
            </div>`;

        document.getElementById('root').innerHTML = fullHTML;
        
        var headerEl = document.getElementById('header');
        if (headerEl) {
            document.documentElement.style.setProperty('--header-height', headerEl.offsetHeight + 'px');
        }

        if (keepScroll) window.scrollTo(0, scrollY);
    }

    // ==========================================
    // 5. 启动应用
    // ==========================================
    if (activeTab === 'daily' && dailyItems.length === 0) {
        generateDaily();
    } else {
        renderApp();
    }

  </script>
</body>
</html>
