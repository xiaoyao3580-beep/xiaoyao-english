<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Unit 6-3 Grammar Master</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');

    :root {
      --app-height: 100vh;
      --header-height: 112px;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    @supports (height: 100dvh) {
      :root {
        --app-height: 100dvh;
      }
    }

    html {
      height: -webkit-fill-available;
    }

    html, body {
      margin: 0; padding: 0; width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      background-color: #e2e8f0; /* 外层背景 */
      font-family: 'Nunito', -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden; /* 防止外层滚动，交由内部接管 */
    }

    body {
      min-height: -webkit-fill-available;
    }

    #root {
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
    }

    .app-root {
      width: 100%;
      height: 100%;
      min-height: var(--app-height);
    }

    /* 高级纹理背景 (仅针对App主容器) */
    .bg-mesh {
      background-color: #f0f9ff;
      background-image: 
        radial-gradient(at 40% 20%, hsla(213,100%,94%,1) 0px, transparent 50%),
        radial-gradient(at 80% 0%, hsla(189,100%,91%,1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, hsla(355,100%,93%,1) 0px, transparent 50%),
        radial-gradient(at 80% 50%, hsla(340,100%,95%,1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, hsla(22,100%,92%,1) 0px, transparent 50%),
        radial-gradient(at 80% 100%, hsla(242,100%,95%,1) 0px, transparent 50%),
        radial-gradient(at 0% 0%, hsla(343,100%,96%,1) 0px, transparent 50%);
    }

    .font-cute { font-family: 'ZCOOL KuaiLe', cursive; }
    
    /* 增加底部的安全距离，防止遮挡文字 */
    .pb-safe-bar { padding-bottom: calc(3rem + var(--safe-area-bottom)); }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .mobile-scroll {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      touch-action: pan-y;
    }

    @media (max-width: 767px) {
      .app-shell {
        height: var(--app-height);
        min-height: var(--app-height);
        border-radius: 0;
        box-shadow: none;
      }
    }

    @media (min-width: 768px) {
      body, #root, .app-root {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    /* 动画 */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    
    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    @keyframes bounceIn { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* 菜单展开动画 */
    .menu-slide-down { animation: menuSlideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; transform-origin: top right; }
    @keyframes menuSlideDown { 0% { opacity: 0; transform: scale(0.9) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }

    /* 高亮波浪与药丸样式 */
    .deco-wavy { text-decoration: underline wavy #f43f5e; text-underline-offset: 4px; font-weight: 900; color: #e11d48; }
    .pill-blue { background: #e0f2fe; color: #0284c7; padding: 2px 6px; border-radius: 8px; font-weight: 900; border: 1px solid #bae6fd; }
    .pill-orange { background: #fff7ed; color: #ea580c; padding: 2px 6px; border-radius: 8px; font-weight: 900; border: 1px solid #fed7aa; }
    
    /* 每日打卡输入框高定UI */
    .daily-input {
      border: 2px dashed #cbd5e1; outline: none; transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(4px);
    }
    .daily-input:focus {
      border-color: #38bdf8; border-style: solid; box-shadow: 0 0 0 4px rgba(56,189,248,0.15);
      background: #ffffff;
    }
    .daily-input.correct {
      border-color: #10b981; border-style: solid; background-color: #ecfdf5; color: #059669; box-shadow: 0 4px 10px rgba(16,185,129,0.1);
    }
    .daily-input.wrong {
      border-color: #ef4444; border-style: solid; background-color: #fef2f2; color: #dc2626; box-shadow: 0 4px 10px rgba(239,68,68,0.1);
    }
  </style>
</head>
<body class="w-full h-full">
  <div id="root" class="app-root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const syncViewportHeight = () => {
      const viewport = window.visualViewport;
      const nextHeight = Math.round(viewport ? viewport.height : window.innerHeight);
      document.documentElement.style.setProperty('--app-height', `${nextHeight}px`);
    };

    syncViewportHeight();

    // --- 音效引擎 ---
    const playTone = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(700, ctx.currentTime);
          gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'correct') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, ctx.currentTime); osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        }
      } catch (e) {}
    };

    // --- 超白话文语法秘籍 ---
    const GRAMMAR_NOTES = [
      {
        title: "1. ⏳ 没完没了的时态魔法",
        icon: "fa-person-running", color: "sky",
        content: [
          "<strong class='text-sky-600'>现在完成进行时 (have/has been + ing)：</strong>就像你跑完步气喘吁吁地说：“我一直跑一直跑，累死我了！”用来吐槽动作持续了<span class='pill-blue'>好久没停</span>，或者刚停下但满头大汗。",
          "<strong class='text-sky-600'>现在完成时 (have/has + 动词过去分词)：</strong>骄傲地宣布：“<span class='pill-blue'>我做完啦！</span>” 只要遇到明确的次数（比如3次、无数次），必须选它！",
          "🚨 <strong class='text-rose-500'>避坑指南：</strong>像 know(知道)、like(喜欢) 这种只在脑子里想的词，绝对不能加 -ing 哦！"
        ],
        eg: "For the past two winters, I have been learning to ski. (这俩冬天我一直一直在学滑雪！)"
      },
      {
        title: "2. 🧲 So 和 Such 的争宠日常",
        icon: "fa-link", color: "orange",
        content: [
          "<strong class='text-orange-600'>So 说：</strong>“当形容词/副词宝宝一个人孤零零的时候，我来陪它！” (so + adj/adv + that)",
          "<strong class='text-orange-600'>Such 说：</strong>“如果有<span class='pill-orange'>名字(名词)老大</span>在场，那就必须用我！” (such + a/an + adj + noun + that)",
          "🚨 <strong class='text-rose-500'>避坑指南：</strong>像 weather(天气)、news(新闻) 这种数不清的东西，前面千万别加 a 或 an！"
        ],
        eg: "It was such terrible weather that we stayed inside. (天气太糟糕啦！)"
      },
      {
        title: "3. 🧩 动词接龙魔法",
        icon: "fa-puzzle-piece", color: "rose",
        content: [
          "💖 <strong class='text-rose-600'>接 DOING 的兄弟：</strong>enjoy(享受), mind(介意), avoid(避免)。它们喜欢那些已经发生过的、“稳稳当当”的事情。",
          "🏹 <strong class='text-rose-600'>接 TO DO 的兄弟：</strong>decide(决定), promise(承诺), hope(希望)。它们像小箭头，充满干劲地指向<span class='pill-orange'>未来</span>要去做的事！"
        ],
        eg: "I initially avoided going near the steeper slopes. (我一开始可不敢去陡坡哦。)"
      },
      {
        title: "4. 🔥 顶级情感炸弹",
        icon: "fa-bomb", color: "purple",
        content: [
          "有些词天生就是王者！比如 <span class='pill-blue'>freezing(冻僵了)</span>, <span class='pill-orange'>boiling(热爆了)</span>, exhausted(累瘫了)。",
          "🚨 <strong class='text-rose-500'>避坑指南：</strong>王不见王！它们绝对不能用普通的 'very'，只能搭配同样顶级的 'absolutely' 或 'totally'！"
        ],
        eg: "The mountain air is absolutely freezing! (山里的风简直要把人冻成冰块了！)"
      }
    ];

    // --- 测试题库 ---
    const POOL_P1 = [
      { q: "Look at his skis! He ______ them all morning, but they still don't work.", opts: ["has been fixing", "has fixed", "fixes"], a: "has been fixing", exp: "修了一早上还没修好，动作还在持续没结束，吐槽没完没了，用现在完成进行时！" },
      { q: "It's a tough journey. So far, she ______ down countless times!", opts: ["has fallen", "has been falling", "falls"], a: "has fallen", exp: "有明确数量词(countless times无数次)，强调结果和经历了多少次，绝对不能加ing，必须用现在完成时！" },
      { q: "I ______ my best friend since we were in kindergarten.", opts: ["have known", "have been knowing", "knew"], a: "have known", exp: "know(认识) 是在脑子里想的静态动词，绝对没有进行时态！避大坑！" },
      { q: "I am out of breath! I ______ through the deep snow for two hours.", opts: ["have been walking", "have walked", "walked"], a: "have been walking", exp: "“气喘吁吁”是刚刚持续了很久的动作留下的身体反应！用现在完成进行时。" },
      { q: "For the past two winters, they ______ to ski with an instructor.", opts: ["have been learning", "have learned", "learn"], a: "have been learning", exp: "“过去的两个冬天”，突出漫长的学习过程，用 have been learning。" },
      { q: "Look at his dirty hands! He ______ the car in the garage.", opts: ["has been repairing", "has repaired", "repaired"], a: "has been repairing", exp: "手是脏的（视觉结果），说明刚才一直在修车！选 has been repairing。" },
      { q: "My brother ______ video games for 3 hours. Tell him to stop!", opts: ["has been playing", "has played", "plays"], a: "has been playing", exp: "玩了3小时并且还在玩（快让他停下），强调连续不断的动作。" },
      { q: "How many times ______ Paris so far?", opts: ["have you visited", "have you been visiting", "did you visit"], a: "have you visited", exp: "问“去过几次”意味着动作已完成，只要算次数，绝不能用进行时。" },
      { q: "Look! Someone ______ the window. There is glass everywhere.", opts: ["has broken", "has been breaking", "broke"], a: "has broken", exp: "窗户被打破了，满地都是玻璃，强调“打破”这个动作产生的结果。" },
      { q: "I ______ snowboarding before, but I really want to try it today!", opts: ["have never tried", "never tried", "had never tried"], a: "have never tried", exp: "强调从出生到现在“一次都没试过”的经历，对今天想不想去有直接影响。" }
    ];

    const POOL_P2 = [
      { q: "It was ______ fascinating experience that I forgot all my fears!", opts: ["such a", "so", "such"], a: "such a", exp: "experience在这里是单数可数名词，修饰名词词组必须派出老大：such a！" },
      { q: "I was going ______ fast that I felt like a bird.", opts: ["so", "such", "such a"], a: "so", exp: "fast是个副词宝宝，孤零零的没有名词跟着，用 so 陪它！" },
      { q: "It was ______ terrible weather that we cancelled the trip.", opts: ["such", "such a", "so"], a: "such", exp: "weather(天气) 是数不清的东西，千万别加 a/an！直接用 such。" },
      { q: "Because of my fear of heights, I avoided ______ near steep slopes.", opts: ["going", "to go", "go"], a: "going", exp: "avoid(避免) 兄弟喜欢客观存在的事情，后接 doing！" },
      { q: "I promised ______ a higher trail.", opts: ["to try", "trying", "try"], a: "to try", exp: "promise(承诺) 就像指引未来的小箭头，接不定式 to do！" },
      { q: "I didn't mind ______ on the flat areas forever.", opts: ["practicing", "to practice", "practice"], a: "practicing", exp: "mind(介意) 后面喜欢接 doing 啦！" },
      { q: "If you hope ______ a thrilling hobby, try skiing!", opts: ["to find", "finding", "find"], a: "to find", exp: "hope(希望) 是对未来的愿景，箭头指向未来，接 to do！" },
      { q: "He finally decided ______ his comfort zone.", opts: ["to leave", "leaving", "leave"], a: "to leave", exp: "decide(决定) 去做某事，箭头指向未来，必须用 to do！" },
      { q: "The mountain air in January is always ______ freezing.", opts: ["absolutely", "very", "a bit"], a: "absolutely", exp: "freezing 是“冻成冰块”的顶级词汇，绝不能用 very 修饰！" },
      { q: "After wearing heavy gear, I feel totally ______.", opts: ["boiling", "hot", "warm"], a: "boiling", exp: "totally 用来放大感情，后面必须接同样顶级的词 boiling(热爆了)。" }
    ];

    const POOL_P3 = [
      { q: "I ______ my keys yesterday, so I couldn't get into the house.", opts: ["lost", "have lost", "was losing"], a: "lost", exp: "有yesterday，动作在过去结束了，规规矩矩用一般过去时。" },
      { q: "While we ______ down the mountain, it suddenly started to snow.", opts: ["were skiing", "skied", "had skied"], a: "were skiing", exp: "“当我们正滑雪时(过去进行时)”，突然下雪了。背景动作被突发动作打断！" },
      { q: "When I arrived at the station, the train ______ already.", opts: ["had left", "left", "has left"], a: "had left", exp: "火车离开发生在“我到达”之前，这叫“过去的过去”，必须用过去完成时。" },
      { q: "What ______ at 8 PM last night? I called you but you didn't answer.", opts: ["were you doing", "did you do", "have you been doing"], a: "were you doing", exp: "问昨晚8点整“正在”干嘛？这是过去的一个精确点，用过去进行时。" },
      { q: "In 2010, my family ______ to a small town in Switzerland.", opts: ["moved", "has moved", "had moved"], a: "moved", exp: "在2010年，过去发生的单纯动作，用一般过去时。" },
      { q: "I couldn't buy the ticket because I ______ my wallet at home.", opts: ["had forgotten", "forgot", "have forgotten"], a: "had forgotten", exp: "“忘记钱包”发生在“买不到票”之前，过去的过去用 had done！" },
      { q: "I ______ a book quietly when the lights suddenly went out.", opts: ["was reading", "read", "had read"], a: "was reading", exp: "灯突然熄灭时，我“当时正”读书，用过去进行时。" },
      { q: "She was nervous because she ______ on a plane before that trip.", opts: ["had never flown", "has never flown", "never flew"], a: "had never flown", exp: "在“那次旅行之前”的经历，依然是“过去的过去”。" },
      { q: "After he ______ his homework, he went out to play.", opts: ["had finished", "finishes", "has finished"], a: "had finished", exp: "“做完作业”发生在“出去玩(过去)”之前，用过去完成时。" },
      { q: "The ground is completely wet. ______?", opts: ["Has it been raining", "Did it rain", "Has it rained"], a: "Has it been raining", exp: "现在地面湿透了（视觉结果），说明刚才一直下雨没停过！" }
    ];

    // --- 每日打卡改错库 ---
    const DAILY_POOL = {
      enjoy: [
        { q: "I enjoy <u class='deco-wavy'>to play</u> tennis on weekends.", a: "playing" },
        { q: "She really enjoys <u class='deco-wavy'>to read</u> mystery novels.", a: "reading" },
        { q: "We enjoy <u class='deco-wavy'>to watch</u> movies together.", a: "watching" }
      ],
      mind: [
        { q: "Do you mind <u class='deco-wavy'>to close</u> the window?", a: "closing" },
        { q: "I don't mind <u class='deco-wavy'>to wait</u> for a few more minutes.", a: "waiting" },
        { q: "Would you mind <u class='deco-wavy'>to help</u> me with this bag?", a: "helping" }
      ],
      avoid: [
        { q: "You should avoid <u class='deco-wavy'>to eat</u> too much junk food.", a: "eating" },
        { q: "They avoided <u class='deco-wavy'>to answer</u> my questions.", a: "answering" },
        { q: "He tries to avoid <u class='deco-wavy'>to drive</u> in heavy traffic.", a: "driving" }
      ],
      decide: [
        { q: "We decided <u class='deco-wavy'>going</u> to the beach tomorrow.", a: "to go" },
        { q: "She decided <u class='deco-wavy'>buying</u> the red dress.", a: "to buy" },
        { q: "They finally decided <u class='deco-wavy'>moving</u> to a new city.", a: "to move" }
      ],
      promise: [
        { q: "He promised <u class='deco-wavy'>helping</u> me with my homework.", a: "to help" },
        { q: "I promise <u class='deco-wavy'>calling</u> you when I arrive.", a: "to call" },
        { q: "They promised <u class='deco-wavy'>coming</u> to my party.", a: "to come" }
      ],
      hope: [
        { q: "I hope <u class='deco-wavy'>seeing</u> you soon.", a: "to see" },
        { q: "She hopes <u class='deco-wavy'>getting</u> a good grade on the test.", a: "to get" },
        { q: "We hope <u class='deco-wavy'>winning</u> the championship this year.", a: "to win" }
      ]
    };

    const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

    // --- 极简高级头部与目录菜单 ---
    const StudioLogo = () => (
      <div className="flex items-center space-x-2.5">
        <div className="relative flex items-center justify-center w-10 h-10 bg-gradient-to-br from-sky-400 to-indigo-600 rounded-[12px] shadow-lg shadow-sky-500/20 border border-white/40 backdrop-blur-sm">
          <span className="text-white font-black text-xl font-cute leading-none tracking-tighter">Xy</span>
        </div>
        <div className="flex flex-col text-left justify-center">
          <span className="text-sky-800 font-sans font-black text-[12px] tracking-widest leading-none">XIAOYAO</span>
          <span className="text-[8px] text-sky-500 tracking-[0.3em] leading-none mt-1 font-bold">STUDIO</span>
        </div>
      </div>
    );

    const Header = ({ headerRef, title, sub, rightBtn, isMenuOpen, setIsMenuOpen, activeTab, setActiveTab }) => {
      // 当处于“正在测试”状态时，屏蔽菜单图标，只显示返回按钮
      return (
        <header ref={headerRef} className="bg-white/80 backdrop-blur-xl pt-8 md:pt-10 pb-4 px-6 md:px-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] z-50 relative border-b border-slate-200/50">
          <div className="relative z-10 flex justify-between items-center">
            <div className="flex items-center space-x-4">
              <StudioLogo />
              <div className="pl-4 border-l-2 border-slate-200 py-1">
                <h1 className="text-[1.35rem] font-black text-slate-800 leading-tight">{title}</h1>
                <p className="text-sky-500 text-[10px] mt-0.5 uppercase tracking-widest font-black">{sub}</p>
              </div>
            </div>
            
            <div className="relative">
              {rightBtn ? (
                <button onClick={rightBtn.onClick} className="text-sky-600 hover:text-white bg-sky-50 hover:bg-sky-500 px-3.5 py-2 rounded-xl border border-sky-100 active-scale text-xs font-black flex items-center transition-all shadow-sm">
                  <i className={`fa-solid ${rightBtn.icon} mr-1.5 text-sm`}></i> {rightBtn.text}
                </button>
              ) : (
                <button 
                  onClick={() => { playTone('pop'); setIsMenuOpen(!isMenuOpen); }} 
                  className={`text-slate-500 hover:text-sky-600 px-4 py-2.5 rounded-xl border active-scale shadow-sm transition-all flex items-center justify-center ${isMenuOpen ? 'bg-sky-50 border-sky-200 text-sky-600' : 'bg-white/60 hover:bg-white border-slate-200'}`}
                >
                  <i className={`fa-solid ${isMenuOpen ? 'fa-xmark' : 'fa-bars-staggered'} text-lg`}></i>
                </button>
              )}

              {/* 展开的下拉菜单 */}
              {isMenuOpen && !rightBtn && (
                <div className="absolute right-0 top-14 mt-2 w-48 bg-white/95 backdrop-blur-xl rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.15)] border border-slate-100 overflow-hidden menu-slide-down z-[100]">
                  <div className="p-2 space-y-1">
                    <button 
                      onClick={() => { playTone('pop'); setActiveTab('review'); setIsMenuOpen(false); }}
                      className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-black transition-colors ${activeTab === 'review' ? 'bg-sky-50 text-sky-600' : 'text-slate-600 hover:bg-slate-50 hover:text-sky-500'}`}
                    >
                      <i className="fa-solid fa-gamepad w-6 text-center mr-2 text-lg"></i> 魔法测试
                    </button>
                    <div className="h-px w-full bg-slate-100"></div>
                    <button 
                      onClick={() => { playTone('pop'); setActiveTab('daily'); setIsMenuOpen(false); }}
                      className={`w-full flex items-center px-4 py-3.5 rounded-xl text-sm font-black transition-colors ${activeTab === 'daily' ? 'bg-orange-50 text-orange-600' : 'text-slate-600 hover:bg-slate-50 hover:text-orange-500'}`}
                    >
                      <i className="fa-solid fa-fire w-6 text-center mr-2 text-lg"></i> 每日打卡
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
          
          {/* 点击外部关闭菜单的遮罩层 */}
          {isMenuOpen && !rightBtn && (
            <div className="fixed inset-0 z-0 bg-transparent" onClick={() => setIsMenuOpen(false)}></div>
          )}
        </header>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('review'); // review, daily
      const [quizState, setQuizState] = useState('intro'); // intro, quiz, result
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      
      const [quizItems, setQuizItems] = useState([]);
      const [currentQ, setCurrentQ] = useState(0);
      const [answers, setAnswers] = useState({});
      const [startTime, setStartTime] = useState(0);
      const [quizResult, setQuizResult] = useState(null);

      const [dailyItems, setDailyItems] = useState([]);
      const [dailyInputs, setDailyInputs] = useState({});
      const [dailySubmitted, setDailySubmitted] = useState(false);
      const [showDailyHint, setShowDailyHint] = useState(false);
      
      const headerRef = useRef(null);
      const prevDailyHistoryRef = useRef(null);

      useEffect(() => {
        const handleViewportChange = () => {
          window.requestAnimationFrame(syncViewportHeight);
        };

        handleViewportChange();
        window.addEventListener('resize', handleViewportChange);
        window.addEventListener('orientationchange', handleViewportChange);
        window.visualViewport?.addEventListener('resize', handleViewportChange);
        window.visualViewport?.addEventListener('scroll', handleViewportChange);

        return () => {
          window.removeEventListener('resize', handleViewportChange);
          window.removeEventListener('orientationchange', handleViewportChange);
          window.visualViewport?.removeEventListener('resize', handleViewportChange);
          window.visualViewport?.removeEventListener('scroll', handleViewportChange);
        };
      }, []);

      useEffect(() => {
        const updateHeaderHeight = () => {
          const nextHeight = Math.ceil(headerRef.current?.offsetHeight || 112);
          document.documentElement.style.setProperty('--header-height', `${nextHeight}px`);
        };

        updateHeaderHeight();

        const observer = typeof ResizeObserver === 'function'
          ? new ResizeObserver(updateHeaderHeight)
          : null;

        if (headerRef.current && observer) {
          observer.observe(headerRef.current);
        }

        window.addEventListener('resize', updateHeaderHeight);
        window.addEventListener('orientationchange', updateHeaderHeight);

        return () => {
          observer?.disconnect();
          window.removeEventListener('resize', updateHeaderHeight);
          window.removeEventListener('orientationchange', updateHeaderHeight);
        };
      }, [activeTab, quizState]);

      // --- 核心逻辑 ---
      const generateQuiz = () => {
        playTone('pop');
        let p1 = shuffle(POOL_P1).slice(0, 8).map(q => ({ ...q, part: 1, partTitle: "Part 1: 单元时态 (时态折跃法则)" }));
        let p2 = shuffle(POOL_P2).slice(0, 8).map(q => ({ ...q, part: 2, partTitle: "Part 2: 其它语法 (修辞/动词/词汇)" }));
        let p3 = shuffle(POOL_P3).slice(0, 9).map(q => ({ ...q, part: 3, partTitle: "Part 3: 混合时态 (时空悖论试炼)" }));
        
        let combined = [...p1, ...p2, ...p3].map(q => ({
          ...q, options: shuffle(q.opts), ansIdx: q.opts.findIndex(o => o === q.a)
        }));

        setQuizItems(combined);
        setCurrentQ(0);
        setAnswers({});
        setStartTime(Date.now());
        setQuizState('quiz');
      };

      const handleAnswer = (optString) => {
        if (answers[currentQ] !== undefined) return;
        const isCorrect = optString === quizItems[currentQ].a;
        if (isCorrect) playTone('correct'); else playTone('wrong');
        
        setAnswers(prev => ({ ...prev, [currentQ]: optString }));
        if (currentQ < quizItems.length - 1) {
          setTimeout(() => setCurrentQ(prev => prev + 1), 800);
        }
      };

      const submitQuiz = () => {
        playTone('success');
        let correct = 0; let mistakes = [];
        
        // Stats for Mastery Bars
        let partStats = {
          1: { title: "单元时态", correct: 0, total: 0, colorText: "text-sky-600", bgGradient: "from-sky-400 to-sky-500" },
          2: { title: "其它语法", correct: 0, total: 0, colorText: "text-orange-600", bgGradient: "from-orange-400 to-orange-500" },
          3: { title: "混合时态", correct: 0, total: 0, colorText: "text-indigo-600", bgGradient: "from-indigo-400 to-indigo-500" }
        };

        quizItems.forEach((q, i) => {
          partStats[q.part].total++;
          if (answers[i] === q.a) {
             correct++;
             partStats[q.part].correct++;
          } else {
             mistakes.push({ q, userAns: answers[i] });
          }
        });

        const score = Math.round((correct / quizItems.length) * 100);
        const timeTaken = Math.floor((Date.now() - startTime) / 1000);
        const submitDate = new Date();
        
        let grade = 'C'; let msg = "哎呀，魔法护盾被击破了。再复习一下规则，重新挑战吧！";
        if (score === 100) { grade = 'S'; msg = "无懈可击！你已经成为了真正的语法宗师，没有任何陷阱能迷惑你！"; }
        else if (score >= 85) { grade = 'A'; msg = "极其出色！只差一点点就能完美通关，继续保持对语言的敏锐度！"; }
        else if (score >= 60) { grade = 'B'; msg = "根基不错，但在一些混淆矩阵中迷失了方向。看看错题解析，下次一定能行！"; }

        setQuizResult({ score, timeTaken, grade, msg, mistakes, partStats, submitDate });
        setQuizState('result');
      };

      const generateDaily = () => {
        const words = ['enjoy', 'mind', 'avoid', 'decide', 'promise', 'hope'];
        let selected = [];
        
        if (!prevDailyHistoryRef.current) {
          words.forEach(w => {
            const variant = shuffle(DAILY_POOL[w])[0];
            selected.push({ word: w, ...variant });
          });
        } else {
          let history = [...prevDailyHistoryRef.current];
          let changeIdx = Math.floor(Math.random() * 6);
          let changeWord = history[changeIdx].word;
          
          let newVariant = shuffle(DAILY_POOL[changeWord]).find(v => v.q !== history[changeIdx].q);
          if(!newVariant) newVariant = shuffle(DAILY_POOL[changeWord])[0]; 
          
          history[changeIdx] = { word: changeWord, ...newVariant };
          selected = history;
        }

        prevDailyHistoryRef.current = selected;
        setDailyItems(shuffle(selected)); 
        setDailyInputs({});
        setDailySubmitted(false);
      };

      useEffect(() => { if (activeTab === 'daily' && dailyItems.length === 0) generateDaily(); }, [activeTab]);

      const submitDaily = () => {
        playTone('success');
        setDailySubmitted(true);
      };

      // --- 渲染：复习与测验 ---
      const renderQuizIntro = () => (
        <div className="flex-1 min-h-0 overflow-y-auto pb-safe-bar relative z-10 no-scrollbar mobile-scroll p-6 md:px-8 fade-in">
           <div className="bg-white/80 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-200/60 mb-8 flex items-center justify-between slide-in-right">
              <div>
                 <h2 className="text-2xl md:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-sky-600 to-indigo-600 font-serif-novel">Master Class</h2>
                 <p className="text-slate-400 font-bold text-[11px] md:text-sm tracking-wider mt-1 md:mt-2 uppercase">U6-3 核心语法复习</p>
              </div>
              <button onClick={generateQuiz} className="bg-gradient-to-br from-orange-400 to-rose-500 text-white w-[60px] h-[60px] md:w-[72px] md:h-[72px] rounded-[1.2rem] shadow-xl shadow-orange-500/30 flex items-center justify-center text-3xl active-scale bounce-in border-b-4 border-rose-600 active:border-b-0 active:translate-y-1 group">
                 <i className="fa-solid fa-file-signature drop-shadow-md group-hover:scale-110 transition-transform"></i>
              </button>
           </div>

           <div className="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
             {GRAMMAR_NOTES.map((note, idx) => (
               <div key={idx} className="bg-white/90 backdrop-blur-sm rounded-[1.5rem] p-6 md:p-8 shadow-sm border border-slate-200/50 slide-in-right h-full flex flex-col" style={{animationDelay: `${idx*0.08}s`}}>
                  <div className="flex items-center mb-5">
                     <div className={`w-10 h-10 rounded-[12px] bg-${note.color}-100 text-${note.color}-600 flex items-center justify-center mr-4 shrink-0 shadow-inner`}>
                       <i className={`fa-solid ${note.icon} text-lg`}></i>
                     </div>
                     <h3 className="text-[1.15rem] md:text-[1.25rem] font-black text-slate-800">{note.title}</h3>
                  </div>
                  <ul className="text-[14px] md:text-[15px] text-slate-600 font-bold space-y-3 mb-5 px-1 flex-1">
                     {note.content.map((c, i) => <li key={i} className="leading-relaxed" dangerouslySetInnerHTML={{__html: c}}></li>)}
                  </ul>
                  <div className="bg-slate-50/80 p-4 rounded-xl border border-slate-100 text-[13px] md:text-[14px] font-serif-novel font-bold text-slate-500 shadow-inner mt-auto">
                    ✨ {note.eg}
                  </div>
               </div>
             ))}
           </div>
        </div>
      );

      const renderQuizView = () => {
        const q = quizItems[currentQ];
        const hasAnswered = answers[currentQ] !== undefined;
        const total = quizItems.length;

        return (
          <div className="flex-1 min-h-0 overflow-hidden flex flex-col relative z-10 fade-in px-2 md:px-6">
             <div className="px-4 md:px-0 pt-6 pb-2 shrink-0">
                <div className="flex justify-between items-end mb-3">
                   <div className="text-[11px] md:text-sm font-black px-4 py-1.5 rounded-xl bg-gradient-to-r from-sky-200 to-indigo-200 text-indigo-900 shadow-sm border border-white/50">
                     {q.partTitle}
                   </div>
                   <div className="text-slate-400 font-black text-[13px] md:text-base">
                     <span className="text-xl md:text-2xl text-indigo-600">{currentQ + 1}</span> / {total}
                   </div>
                </div>
                <div className="w-full bg-slate-200/60 h-2.5 md:h-3 rounded-full overflow-hidden shadow-inner">
                   <div className="bg-gradient-to-r from-sky-400 to-indigo-500 h-full transition-all duration-300 ease-out" style={{width: `${((currentQ + 1) / total) * 100}%`}}></div>
                </div>
             </div>

             <div className="flex-1 min-h-0 overflow-y-auto mobile-scroll px-4 md:px-0 pb-8 pt-4">
                <div className="bg-white/90 backdrop-blur-md p-6 md:p-10 rounded-[2rem] shadow-[0_15px_40px_rgba(0,0,0,0.06)] border border-white bounce-in mt-2" key={currentQ}>
                   <p className="text-[19px] md:text-[22px] font-serif-novel font-black text-slate-800 leading-relaxed mb-8">{q.q}</p>
                   
                   <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                     {q.options.map((opt, i) => {
                        const isSelected = answers[currentQ] === opt;
                        const isCorrectAns = opt === q.a;
                        
                        let btnClass = 'border-slate-100 bg-slate-50/50 text-slate-600';
                        let icon = null;

                        if (hasAnswered) {
                           if (isCorrectAns) {
                              btnClass = 'border-emerald-400 bg-emerald-50 text-emerald-800 shadow-lg shadow-emerald-500/20 z-10';
                              icon = <i className="fa-solid fa-circle-check text-emerald-500 text-xl"></i>;
                           } else if (isSelected) {
                              btnClass = 'border-rose-400 bg-rose-50 text-rose-800 shadow-md';
                              icon = <i className="fa-solid fa-circle-xmark text-rose-500 text-xl"></i>;
                           }
                        } else if (isSelected) {
                           btnClass = 'border-sky-400 bg-sky-50 text-sky-800 shadow-md';
                        } else {
                           btnClass += ' active-scale hover:bg-sky-50 hover:border-sky-200';
                        }

                        return (
                          <button 
                            key={i} onClick={() => handleAnswer(opt)} disabled={hasAnswered}
                            className={`w-full text-left px-5 py-4 md:py-5 rounded-2xl border-2 transition-all duration-200 font-bold text-[16px] md:text-lg flex items-center justify-between ${btnClass}`}
                          >
                             <span><span className="opacity-50 mr-3 text-sm md:text-base">{['A', 'B', 'C'][i]}.</span>{opt}</span>
                             {icon}
                          </button>
                        )
                     })}
                   </div>
                   
                   {hasAnswered && (
                     <div className="mt-8 p-5 md:p-6 bg-gradient-to-r from-sky-50 to-indigo-50 rounded-2xl border border-sky-100 fade-in flex items-start shadow-inner">
                        <div className="bg-orange-100 w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center shrink-0 mr-4 mt-0.5">
                           <i className="fa-solid fa-lightbulb text-orange-500 text-sm md:text-base"></i>
                        </div>
                        <p className="text-[14px] md:text-[16px] font-black text-sky-900 leading-relaxed pt-1">{q.exp}</p>
                     </div>
                   )}
                </div>

                <div className="mt-8 flex justify-between items-center px-4">
                   <button onClick={() => setCurrentQ(Math.max(0, currentQ - 1))} disabled={currentQ === 0} className="w-14 h-14 md:w-16 md:h-16 rounded-[1rem] bg-white text-slate-400 shadow-md flex items-center justify-center disabled:opacity-30 border border-slate-100 active-scale transition-transform">
                     <i className="fa-solid fa-chevron-left text-lg md:text-xl"></i>
                   </button>
                   
                   {hasAnswered && currentQ === total - 1 ? (
                     <button onClick={submitQuiz} className="bg-gradient-to-r from-orange-400 to-rose-500 text-white px-10 py-4 md:py-5 rounded-[1rem] font-black shadow-[0_8px_20px_rgba(249,115,22,0.4)] active-scale bounce-in flex items-center text-lg md:text-xl tracking-widest border-b-4 border-rose-600 active:border-b-0 active:translate-y-1">
                       交卷 <i className="fa-solid fa-flag-checkered ml-3 text-xl"></i>
                     </button>
                   ) : (
                     <button onClick={() => setCurrentQ(Math.min(total - 1, currentQ + 1))} disabled={!hasAnswered || currentQ === total - 1} className="w-14 h-14 md:w-16 md:h-16 rounded-[1rem] bg-white text-sky-600 shadow-md flex items-center justify-center disabled:opacity-30 border border-slate-100 active-scale transition-transform">
                       <i className="fa-solid fa-chevron-right text-lg md:text-xl"></i>
                     </button>
                   )}
                </div>
             </div>
          </div>
        );
      };

      const renderQuizResult = () => {
        const formatTime = (secs) => { const m = Math.floor(secs/60); const s = secs%60; return `${m}分${s}秒`; };
        const pad = (n) => n.toString().padStart(2, '0');
        const submitDateStr = `${quizResult.submitDate.getFullYear()}/${pad(quizResult.submitDate.getMonth()+1)}/${pad(quizResult.submitDate.getDate())} ${pad(quizResult.submitDate.getHours())}:${pad(quizResult.submitDate.getMinutes())}`;

        return (
          <div className="flex-1 min-h-0 overflow-y-auto pb-safe-bar p-6 md:p-8 fade-in no-scrollbar mobile-scroll">
             <div className="bg-white/90 backdrop-blur-md rounded-[2.5rem] p-8 md:p-12 shadow-xl border border-white text-center relative overflow-hidden mb-8">
                <div className="absolute top-0 right-0 bg-gradient-to-l from-sky-500 to-indigo-500 text-white text-[10px] md:text-xs font-black px-6 py-2 rounded-bl-2xl shadow-sm uppercase tracking-widest">
                  Result
                </div>
                
                <div className="text-[60px] md:text-[80px] text-amber-400 mb-4 mt-4 drop-shadow-md"><i className="fa-solid fa-award"></i></div>
                <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2 font-serif-novel">Score Report</h2>
                
                <div className="flex justify-center items-end mb-6 mt-6">
                   <span className="text-[80px] md:text-[100px] font-black leading-none text-transparent bg-clip-text bg-gradient-to-br from-sky-500 to-indigo-600 tracking-tighter drop-shadow-sm">{quizResult.score}</span>
                   <span className="text-xl md:text-2xl font-black text-slate-300 ml-1 mb-4 md:mb-5">/100</span>
                </div>
                
                <div className="flex flex-wrap justify-center gap-3 text-xs md:text-sm font-bold text-slate-500 mb-8">
                   <div className="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 flex items-center shadow-inner"><i className="fa-regular fa-calendar-check mr-2 text-indigo-500"></i> {submitDateStr}</div>
                   <div className="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 flex items-center shadow-inner"><i className="fa-regular fa-clock mr-2 text-sky-500"></i> {formatTime(quizResult.timeTaken)}</div>
                   <div className="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 flex items-center shadow-inner"><i className="fa-solid fa-chart-simple mr-2 text-rose-500"></i> 评级 <span className="ml-1 text-rose-600 font-black text-sm md:text-base">{quizResult.grade}</span></div>
                </div>

                <div className="bg-orange-50/80 border border-orange-100 p-6 rounded-2xl mb-8 shadow-sm">
                   <p className="text-[15px] md:text-[17px] font-black text-orange-800 leading-relaxed">{quizResult.msg}</p>
                </div>
                
                <button onClick={() => { playTone('pop'); setQuizState('intro'); }} className="w-full md:w-2/3 mx-auto flex justify-center bg-slate-800 hover:bg-slate-700 text-white font-black py-4 md:py-5 rounded-2xl active-scale shadow-lg transition-colors text-lg md:text-xl tracking-widest">
                   重新测验 <i className="fa-solid fa-rotate-right ml-3 mt-1 text-sky-400"></i>
                </button>
             </div>

             {/* 知识点掌握度统计图 */}
             <div className="bg-white/90 backdrop-blur-sm rounded-[2rem] p-6 md:p-8 shadow-sm border border-slate-200/50 mb-8 slide-in-right">
                <h3 className="text-xl font-black text-slate-800 mb-6 flex items-center">
                  <i className="fa-solid fa-chart-pie text-indigo-500 mr-3"></i> 知识点掌握度
                </h3>
                <div className="space-y-5">
                   {Object.values(quizResult.partStats).map((stat, i) => {
                      const percent = Math.round((stat.correct / stat.total) * 100) || 0;
                      return (
                        <div key={i}>
                          <div className="flex justify-between text-[14px] md:text-[15px] font-bold mb-2">
                             <span className="text-slate-600">{stat.title}</span>
                             <span className={`${stat.colorText} font-black`}>{percent}% <span className="opacity-60 text-[12px] ml-1">({stat.correct}/{stat.total})</span></span>
                          </div>
                          <div className="w-full bg-slate-100 h-3 md:h-4 rounded-full overflow-hidden shadow-inner">
                             <div className={`bg-gradient-to-r ${stat.bgGradient} h-full rounded-full transition-all duration-1000 ease-out`} style={{width: `${percent}%`}}></div>
                          </div>
                        </div>
                      );
                   })}
                </div>
             </div>

             {quizResult.mistakes.length > 0 && (
               <div>
                 <h3 className="text-xl md:text-2xl font-black text-slate-700 mb-6 pl-3 border-l-4 border-slate-700 rounded-sm">错题本 Review</h3>
                 <div className="space-y-5">
                    {quizResult.mistakes.map((m, i) => (
                      <div key={i} className="bg-white/90 backdrop-blur-sm p-6 md:p-8 rounded-[1.5rem] shadow-sm border border-rose-100 relative">
                         <div className="absolute top-0 right-0 bg-rose-500 text-white text-[10px] md:text-xs font-black px-4 md:px-5 py-1.5 md:py-2 rounded-bl-[1rem] uppercase tracking-widest shadow-sm">Miss</div>
                         <p className="font-bold text-slate-800 text-[16px] md:text-lg font-serif-novel leading-relaxed mb-5 pr-10">{m.q.q}</p>
                         
                         <div className="space-y-3 text-[14px] md:text-base font-bold bg-slate-50 p-4 md:p-5 rounded-2xl border border-slate-100 mb-5">
                            <p className="text-rose-500 flex items-center"><i className="fa-solid fa-xmark mr-3 w-5 text-lg"></i><span className="line-through">{m.userAns || '未作答'}</span></p>
                            <p className="text-emerald-600 flex items-center"><i className="fa-solid fa-check mr-3 w-5 text-lg"></i><span>{m.q.a}</span></p>
                         </div>
                         
                         <p className="text-sky-700 text-[13px] md:text-[15px] font-black leading-relaxed border-t border-slate-100 pt-4 md:pt-5 flex items-start">
                            <i className="fa-solid fa-lightbulb text-amber-500 mr-2.5 mt-0.5 text-base md:text-lg"></i>{m.q.exp}
                         </p>
                      </div>
                    ))}
                 </div>
               </div>
             )}
          </div>
        );
      };

      const renderDaily = () => (
        <div className="flex-1 min-h-0 overflow-y-auto pb-safe-bar relative z-10 no-scrollbar mobile-scroll p-6 md:px-8 fade-in">
           
           {/* Hint Modal Overlay */}
           {showDailyHint && (
             <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-6 fade-in" onClick={() => setShowDailyHint(false)}>
                <div className="bg-white p-8 md:p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl bounce-in" onClick={e=>e.stopPropagation()}>
                   <h3 className="text-2xl md:text-3xl font-black text-slate-800 mb-6 flex items-center border-b border-slate-100 pb-4"><i className="fa-solid fa-wand-magic-sparkles text-orange-500 mr-3"></i> 魔法动词法则</h3>
                   <div className="space-y-6 text-[15px] md:text-[16px] font-bold text-slate-600">
                      <div className="bg-sky-50 p-5 rounded-2xl border border-sky-100 shadow-inner">
                         <span className="text-sky-800 font-black text-lg md:text-xl block mb-2">接 DOING 的兄弟:</span>
                         enjoy(享受), mind(介意), avoid(避免)
                      </div>
                      <div className="bg-orange-50 p-5 rounded-2xl border border-orange-100 shadow-inner">
                         <span className="text-orange-800 font-black text-lg md:text-xl block mb-2">接 TO DO 的兄弟:</span>
                         decide(决定), promise(承诺), hope(希望)
                      </div>
                   </div>
                   <button onClick={() => setShowDailyHint(false)} className="mt-8 w-full bg-slate-800 text-white font-black py-4 md:py-5 rounded-2xl active-scale text-lg md:text-xl tracking-widest shadow-md">Got it!</button>
                </div>
             </div>
           )}

           <div className="bg-white/80 backdrop-blur-md rounded-[2rem] p-6 md:p-8 shadow-sm border border-slate-200/50 mb-6 md:mb-8 relative overflow-hidden">
              <div className="absolute -right-6 -bottom-6 text-[100px] md:text-[120px] text-orange-400/10 pointer-events-none"><i className="fa-solid fa-bullseye"></i></div>
              <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-2 font-serif-novel">Daily Check-in</h2>
              <p className="text-slate-500 font-bold text-[13px] md:text-[15px] mb-6">语法改错：写出划线部分正确的形式。</p>
              
              <div className="flex gap-3 md:gap-4">
                <button onClick={() => setShowDailyHint(true)} className="bg-sky-100 hover:bg-sky-200 text-sky-700 px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-black shadow-sm flex items-center active-scale border border-sky-200 transition-colors">
                   <i className="fa-solid fa-circle-question mr-2 text-sm md:text-base"></i> 语法锦囊
                </button>
                <button onClick={generateDaily} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-black shadow-sm flex items-center active-scale border border-slate-200 transition-colors">
                   <i className="fa-solid fa-rotate mr-2 text-sm md:text-base"></i> 换一套
                </button>
              </div>
           </div>

           {/* 超贴心的小提示卡片 */}
           <div className="bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl p-4 md:p-5 border border-orange-100 shadow-sm flex items-start mb-6 md:mb-8">
              <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-orange-200 text-orange-600 flex items-center justify-center shrink-0 mr-3 shadow-inner">
                  <i className="fa-solid fa-lightbulb text-sm md:text-base"></i>
              </div>
              <p className="text-[12px] md:text-[14px] font-bold text-orange-800 leading-relaxed mt-0.5 md:mt-1 pr-2">
                  <span className="text-orange-600 font-black">小提示：</span>可以把正确的句子写在本子上之后大声读出来打卡，也可以直接看着屏幕读出来哦。不需要必须在这里填写～
              </p>
           </div>

           {/* 针对平板优化的双列网格 */}
           <div className="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
              {dailyItems.map((item, idx) => {
                 const userInput = dailyInputs[idx] || '';
                 const isCorrect = userInput.trim().toLowerCase() === item.a.toLowerCase();
                 
                 let inputClass = 'daily-input';
                 if (dailySubmitted) {
                    if (isCorrect) inputClass += ' correct';
                    else inputClass += ' wrong';
                 }

                 return (
                   <div key={idx} className="bg-white/90 backdrop-blur-sm rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100 slide-in-right h-full flex flex-col" style={{animationDelay: `${idx*0.06}s`}}>
                      <div className="flex justify-between items-center mb-5">
                         <span className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-100 text-slate-500 font-black text-sm md:text-base flex items-center justify-center shadow-inner">{idx + 1}</span>
                         <span className="text-[11px] md:text-xs font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100 shadow-sm">{item.word}</span>
                      </div>
                      
                      <p className="text-[16px] md:text-[18px] font-serif-novel font-bold text-slate-800 leading-relaxed mb-6 flex-1" dangerouslySetInnerHTML={{ __html: item.q }}></p>
                      
                      <div className="relative mt-auto">
                        <input 
                          type="text" 
                          value={userInput}
                          onChange={(e) => {
                             if(!dailySubmitted) setDailyInputs(prev => ({...prev, [idx]: e.target.value}));
                          }}
                          placeholder="Type correct form (可选)..."
                          className={`w-full px-5 py-3.5 md:py-4 rounded-xl font-mono font-bold text-[15px] md:text-[16px] ${inputClass}`}
                          disabled={dailySubmitted}
                        />
                        {dailySubmitted && (
                          <div className="absolute right-4 top-1/2 transform -translate-y-1/2">
                             {isCorrect ? <i className="fa-solid fa-circle-check text-emerald-500 text-2xl"></i> : <i className="fa-solid fa-circle-xmark text-rose-500 text-2xl"></i>}
                          </div>
                        )}
                      </div>

                      {dailySubmitted && !isCorrect && (
                         <div className="mt-4 text-[14px] md:text-[15px] font-black text-emerald-600 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-100 flex items-center shadow-inner">
                            <i className="fa-solid fa-turn-up rotate-90 mr-3 text-emerald-400 text-lg"></i> Correct: <span className="ml-2 bg-white px-2 py-0.5 rounded shadow-sm">{item.a}</span>
                         </div>
                      )}
                   </div>
                 )
              })}
           </div>

           <div className="mt-10 md:mt-12 mb-6">
              {!dailySubmitted ? (
                 <button onClick={submitDaily} className="w-full md:w-2/3 mx-auto flex justify-center bg-slate-800 hover:bg-slate-700 text-white font-black py-4 md:py-5 rounded-2xl active-scale shadow-lg text-lg md:text-xl tracking-widest transition-colors">
                    一键核对 <i className="fa-solid fa-check-double ml-3 mt-1 text-sky-400"></i>
                 </button>
              ) : (
                 <div className="text-center bg-emerald-50 p-8 md:p-12 rounded-[2rem] border-2 border-emerald-200 bounce-in shadow-sm w-full md:w-2/3 mx-auto">
                    <i className="fa-solid fa-calendar-check text-5xl md:text-6xl text-emerald-500 mb-5 drop-shadow-md"></i>
                    <h3 className="text-2xl md:text-3xl font-black text-emerald-800 mb-3 font-serif-novel">打卡完成！</h3>
                    <p className="text-emerald-600 text-sm md:text-base font-bold mt-2 leading-relaxed">你的语言直觉越来越准了！<br/>明天同一时间，不见不散！</p>
                    <button onClick={() => { playTone('pop'); generateDaily(); }} className="mt-8 px-8 py-3 md:py-4 bg-emerald-600 hover:bg-emerald-500 text-white text-[15px] md:text-[16px] font-black tracking-widest rounded-xl active-scale shadow-md transition-colors">再练一套</button>
                 </div>
              )}
           </div>

           {/* 底部防遮挡占位符 */}
           <div className="h-8 w-full shrink-0"></div>
        </div>
      );

      const currentHeader = activeTab === 'review'
        ? (quizState === 'intro'
            ? <Header headerRef={headerRef} title="Unit 6-3" sub="Grammar Review" isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} activeTab={activeTab} setActiveTab={setActiveTab} />
            : quizState === 'quiz'
              ? <Header headerRef={headerRef} title="In Progress" sub="Grammar Test" rightBtn={{text: "返回复习", icon: "fa-person-running", onClick: () => { playTone('pop'); setQuizState('intro'); }}} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} activeTab={activeTab} setActiveTab={setActiveTab} />
              : <Header headerRef={headerRef} title="Result" sub="Grammar Test" rightBtn={{text: "返回复习", icon: "fa-xmark", onClick: () => { playTone('pop'); setQuizState('intro'); }}} isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} activeTab={activeTab} setActiveTab={setActiveTab} />)
        : <Header headerRef={headerRef} title="Unit 6-3" sub="Daily Check-in" isMenuOpen={isMenuOpen} setIsMenuOpen={setIsMenuOpen} activeTab={activeTab} setActiveTab={setActiveTab} />;

      const currentContent = activeTab === 'review'
        ? (quizState === 'intro' ? renderQuizIntro() : quizState === 'quiz' ? renderQuizView() : renderQuizResult())
        : renderDaily();

      return (
        <div className="app-shell w-full h-full min-h-0 md:h-[90vh] md:max-h-[960px] md:max-w-2xl lg:max-w-4xl md:rounded-[2.5rem] font-sans relative shadow-[0_20px_60px_rgba(0,0,0,0.15)] overflow-hidden bg-mesh md:mx-auto">
          <div className="absolute inset-x-0 top-0 z-[60]">
            {currentHeader}
          </div>
          <div className="h-full min-h-0 overflow-hidden flex flex-col" style={{ paddingTop: 'var(--header-height)', boxSizing: 'border-box' }}>
            {currentContent}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
