    /* --- 移动端全屏绝对沉底适配 --- */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed; 
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

    /* 安全区域适配（iPhone 小白条等） */
    .pb-safe-bar {
      padding-bottom: calc(1.2rem + env(safe-area-inset-bottom, 16px));
    }
    .pb-safe-scroll {
      padding-bottom: calc(2rem + env(safe-area-inset-bottom, 16px));
    }
    
    .font-serif-novel { font-family: 'Merriweather', serif; }

    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Animations */
    .fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in-right { animation: slideInRight 0.3s ease-out forwards; }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .bounce-in { animation: bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    @keyframes bounceIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pulse-glow { animation: pulseGlow 2s infinite alternate; }
    @keyframes pulseGlow {
      from { box-shadow: 0 0 0 rgba(249, 115, 22, 0); }
      to { box-shadow: 0 0 15px rgba(249, 115, 22, 0.6); }

    .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }

    const playTone = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        }
      } catch (e) {}

      try {
        setPlayingState(true);
        if (audioRef.current) { audioRef.current.pause(); }
        const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
          method: 'POST',
          headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text: text, 
            model_id: 'eleven_turbo_v2_5',
            voice_settings: { stability: 0.45, similarity_boost: 0.8 }
          })
        });
        if (!response.ok) throw new Error("Audio fetch failed");
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => setPlayingState(false);
        audio.onerror = () => setPlayingState(false);
        audioRef.current = audio;
        await audio.play();
      } catch (error) {
        console.error(error);
        setPlayingState(false);
      }

              timer = setTimeout(() => {
                  setPreviewCountdown(prev => prev - 1);

        const selectedForQuiz = shuffledVocab.slice(0, 30);
        
        const generatedQuiz = selectedForQuiz.map(wordObj => {
           const otherWords = VOCAB_LIST.filter(v => v.id !== wordObj.id).sort(() => 0.5 - Math.random()).slice(0, 3);
           const optionsRaw = [
             { text: wordObj.meaning, isCorrect: true },
             ...otherWords.map(o => ({ text: o.meaning, isCorrect: false }))
           ].sort(() => 0.5 - Math.random());

           return {
              wordObj: wordObj,
              q: wordObj.word,
              phonetic: wordObj.phonetic,
              options: optionsRaw.map(o => o.text),
              ans: optionsRaw.findIndex(o => o.isCorrect)
           };
        });

        setQuizItems(generatedQuiz);
        setAnswers({});
        setCurrentQ(0);
        setMode('quiz');
      };

      const handleAnswer = (optIdx) => {
        if (answers[currentQ] !== undefined) return;
        const isCorrect = optIdx === quizItems[currentQ].ans;
        if (isCorrect) playTone('correct');
        else playTone('wrong');

        setAnswers(prev => ({ ...prev, [currentQ]: optIdx }));
        if (currentQ < 29) {
          setTimeout(() => setCurrentQ(prev => prev + 1), 1200);
        }
      };

      const submitQuiz = () => {
        if (Object.keys(answers).length < 30) return alert("请完成所有题目！");
        playTone('success');
        setMode('result');
      };

      const startDictationSession = (wordsToTest) => {
          playTone('pop');
          const items = wordsToTest.map(w => {
              const wrongMeanings = VOCAB_LIST.filter(v => v.id !== w.id).sort(() => 0.5 - Math.random()).slice(0, 3);
              const options = [w, ...wrongMeanings].sort(() => 0.5 - Math.random());
              return { ...w, options: options };
          });

          setDictItems(items);
          setDictIdx(0);
          setDictAnswers({});
          setDictHasSubmittedCurrent(false);
          setDictAttempts({});
          setPreviewCountdown(20);
          setMode('dictationPreview');
      };

      const handleDictAnswerChange = (field, value) => {
          setDictAnswers(prev => ({
              ...prev,
              [dictIdx]: { ...prev[dictIdx], [field]: value }
          }));
          setDictAttempts(prev => ({...prev, [dictIdx]: 0}));
      };

      const handleDictSubmitCurrent = () => {
          const q = dictItems[dictIdx];
          const ans = dictAnswers[dictIdx] || { spelling: '', meaningId: null };
          const sOk = ans.spelling?.trim().toLowerCase() === q.word.toLowerCase();
          const mOk = ans.meaningId === q.id;
          
          if (sOk && mOk) {
              playTone('success');
              setDictHasSubmittedCurrent(true); 
          } else {
              playTone('wrong');
              setDictAttempts(prev => ({...prev, [dictIdx]: (prev[dictIdx] || 0) + 1}));
          }
      };

      const handleShowAnswer = () => {
          playTone('pop');
          const q = dictItems[dictIdx];
          setDictAnswers(prev => ({
              ...prev,
              [dictIdx]: { ...prev[dictIdx], spelling: q.word, meaningId: q.id, usedShowAnswer: true }
          }));
          setDictHasSubmittedCurrent(true);
      };

      const handleDictNext = () => {
          if (dictIdx < dictItems.length - 1) {
              setDictHasSubmittedCurrent(false);
              setDictIdx(dictIdx + 1);
          } else {
              playTone('cheer');
              setMode('dictationResult');
          }
      };

      if (mode === 'review') {
        return (
          <div className="p-5 pb-safe-scroll overflow-y-auto h-full fade-in flex flex-col relative z-0">
            <div className="relative z-40 shrink-0 mb-4">
              <div className="absolute inset-0 bg-gradient-to-r from-sky-900 to-sky-700 rounded-2xl shadow-lg overflow-hidden pointer-events-none">
                 <i className="fa-solid fa-spell-check absolute -left-4 -bottom-4 text-7xl text-sky-800 opacity-50"></i>
              </div>
              <div className="relative z-10 p-5 flex justify-between items-center text-white">
                 <div className="pointer-events-none">
                    <h2 className="text-xl font-black font-serif-novel mb-1">Word List</h2>
                    <p className="text-sky-200 text-xs font-bold">词库 ({list.length}) 词，全方位能力考核</p>
                 </div>
              </div>
            </div>

            <div className="flex items-center bg-white p-3 rounded-2xl shadow-sm border border-slate-100 bounce-in gap-2 mb-4 shrink-0 overflow-x-auto no-scrollbar">
              <button onClick={() => setMode('dictationGroupSelect')} className="shrink-0 bg-sky-600 text-white px-3 py-2 rounded-xl font-black text-xs active-scale transition-colors shadow-sm flex items-center border border-sky-700">
                <i className="fa-solid fa-pen-clip mr-1.5"></i> 每日听写
              </button>

              <button onClick={startQuiz} className="shrink-0 bg-orange-500 text-white px-3 py-2 rounded-xl font-black text-xs active-scale transition-colors shadow-sm flex items-center">
                <i className="fa-solid fa-rocket mr-1.5"></i> 极速 30 词
              </button>

              <div className="flex gap-1.5 pl-1 border-l border-slate-200">
                <button onClick={() => {setDictationMode(!dictationMode); playTone('pop');}} className={`shrink-0 px-2.5 py-2 rounded-xl font-bold text-xs active-scale transition-colors shadow-sm border flex items-center ${dictationMode ? 'bg-sky-600 text-white border-sky-600' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                  <i className={`fa-solid ${dictationMode ? 'fa-eye-slash' : 'fa-mask'} mr-1.5`}></i> 盲猜
                </button>
                <button onClick={() => {setHideChinese(!hideChinese); playTone('pop');}} className={`shrink-0 px-2.5 py-2 rounded-xl font-bold text-xs active-scale transition-colors shadow-sm border flex items-center ${hideChinese ? 'bg-orange-400 text-white border-orange-400' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>
                  <i className={`fa-solid ${hideChinese ? 'fa-eye-slash' : 'fa-eye'} mr-1.5`}></i> 隐藏
                </button>
                <button onClick={() => {playTone('pop'); setList([...VOCAB_LIST].sort(() => 0.5 - Math.random()));}} className="shrink-0 bg-sky-50 text-sky-600 px-2.5 py-2 rounded-xl font-bold text-xs active-scale transition-colors shadow-sm flex items-center">
                  <i className="fa-solid fa-shuffle mr-1.5"></i> 打乱
                </button>
              </div>
            </div>

            <div className="flex-1 space-y-3 shrink-0 relative z-10">
              {list.map((v, i) => (
                <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between slide-in-right group" style={{animationDelay: `${(i % 10) * 0.05}s`}}>
                  <div className="flex items-center flex-1 pr-2">
                    <span className="w-6 text-slate-300 font-black text-sm shrink-0">{i + 1}.</span>
                    <div>
                      <div className="flex flex-wrap items-baseline mb-1">
                        <h3 className={`text-lg font-black text-sky-900 font-serif-novel mr-2 transition-all duration-300 rounded ${dictationMode ? 'text-transparent blur-[6px] bg-slate-200 select-none hover:blur-none hover:text-sky-900 hover:bg-transparent cursor-pointer px-2' : ''}`}>{v.word}</h3>
                        <span className={`text-[11px] text-slate-400 font-mono transition-opacity ${dictationMode ? 'opacity-0 select-none' : 'opacity-100'}`}>{v.phonetic}</span>
                      </div>
                      <p className={`text-sm font-bold text-slate-700 transition-all duration-300 ${hideChinese ? 'opacity-0 select-none cursor-pointer hover:opacity-100' : 'opacity-100'}`}>
                        <span className="text-orange-500 italic mr-1">{v.pos}</span> {v.meaning}
                      </p>
                    </div>
                  </div>
                  <button 
                    onClick={() => playWordAudio(v.word, v.id)}
                    className={`w-10 h-10 shrink-0 rounded-full flex items-center justify-center transition-all ${playingId === v.id ? 'bg-orange-500 text-white shadow-md animate-pulse' : 'bg-sky-50 text-sky-600 hover:bg-sky-100'}`}
                  >
                    <i className={`fa-solid ${playingId === v.id ? 'fa-volume-high' : 'fa-volume-up'}`}></i>
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (mode === 'dictationGroupSelect') {
        const groupSize = 5;
        const groupCount = Math.ceil(VOCAB_LIST.length / groupSize);
        const groups = Array.from({ length: groupCount }, (_, i) => {
            const start = i * groupSize;
            const end = start + groupSize;
            return {
                id: i + 1,
                label: `第 ${i + 1} 组`,
                range: `No. ${start + 1} - ${Math.min(end, VOCAB_LIST.length)}`,
                words: VOCAB_LIST.slice(start, end)
            };
        });

        return (
             <div className="p-5 pb-safe-scroll h-full flex flex-col fade-in bg-slate-100 relative">
               <div className="flex justify-between items-center mb-6 mt-2 shrink-0">
                 <button onClick={() => {playTone('pop'); setMode('review');}} className="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-500 active-scale border border-slate-200">
                   <i className="fa-solid fa-arrow-left"></i>
                 </button>
                 <div className="text-sm font-black text-sky-800 bg-sky-100 px-4 py-1.5 rounded-full border border-sky-200">
                   请选择今日听写分组
                 </div>
               </div>

               <div className="flex-1 overflow-y-auto pb-8 relative z-10 grid grid-cols-2 gap-3">
                 <button onClick={() => startDictationSession([...VOCAB_LIST].sort(() => 0.5 - Math.random()).slice(0, 5))}
                         className="col-span-2 bg-gradient-to-r from-orange-400 to-orange-500 text-white p-5 rounded-2xl shadow-sm active-scale flex items-center justify-between border border-orange-300">
                    <div className="text-left">
                      <h3 className="font-black text-xl mb-1">随机 5 词</h3>
                      <p className="text-xs font-bold opacity-90 tracking-wide uppercase">Random Challenge</p>
                    </div>
                    <i className="fa-solid fa-dice text-4xl opacity-50 drop-shadow-sm"></i>
                 </button>

                 {groups.map(g => (
                    <button key={g.id} onClick={() => startDictationSession(g.words)}
                            className="bg-white p-4 rounded-2xl shadow-sm border-2 border-slate-200 active-scale flex flex-col items-start hover:border-sky-400 transition-colors">
                       <h3 className="font-black text-sky-800 text-[17px] mb-1">{g.label}</h3>
                       <p className="text-xs font-bold text-slate-400">{g.range}</p>
                    </button>
                 ))}
               </div>
             </div>
        );
      }

      if (mode === 'dictationPreview') {
        return (
            <div className="p-5 pb-safe-scroll h-full flex flex-col fade-in bg-slate-100 relative">
               <div className="flex justify-between items-center mb-4 mt-2 shrink-0">
                 <button onClick={() => {playTone('pop'); setMode('dictationGroupSelect');}} className="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-500 active-scale border border-slate-200">
                   <i className="fa-solid fa-arrow-left"></i>
                 </button>
                 <div className="text-sm font-black text-orange-700 bg-orange-100 px-4 py-1.5 rounded-full border border-orange-200 flex items-center shadow-sm">
                   <i className="fa-solid fa-clock mr-2 text-orange-500 animate-pulse"></i> 倒计时 {previewCountdown} s
                 </div>
               </div>

               <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 mb-4 shrink-0 flex items-center justify-center">
                   <div className="text-center">
                       <h2 className="text-2xl font-black text-slate-800 mb-1">听写清单预览</h2>
                       <p className="text-slate-500 text-xs font-bold">请快速记忆，倒计时结束后开始听写</p>
                   </div>
               </div>

               <div className="flex-1 overflow-y-auto space-y-3 pb-8">
                 {dictItems.map((v, i) => (
                   <div key={v.id} className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between slide-in-right group" style={{animationDelay: `${i * 0.05}s`}}>
                     <div className="flex items-center flex-1 pr-2">
                       <span className="w-6 text-slate-300 font-black text-sm shrink-0">{i + 1}.</span>
                       <div>
                         <div className="flex flex-wrap items-baseline mb-1">
                           <h3 className="text-lg font-black text-sky-900 font-serif-novel mr-2">{v.word}</h3>
                           <span className="text-[11px] text-slate-400 font-mono">{v.phonetic}</span>
                         </div>
                         <p className="text-sm font-bold text-slate-700">
                           <span className="text-orange-500 italic mr-1">{v.pos}</span> {v.meaning}
                         </p>
                       </div>
                     </div>
                     <button 
                        onClick={() => playWordAudio(v.word, `preview_${v.id}`)}
                        className={`w-10 h-10 shrink-0 rounded-full flex items-center justify-center transition-all ${playingId === `preview_${v.id}` ? 'bg-orange-500 text-white shadow-md animate-pulse' : 'bg-sky-50 text-sky-600 hover:bg-sky-100'}`}
                     >
                        <i className={`fa-solid ${playingId === `preview_${v.id}` ? 'fa-volume-high' : 'fa-volume-up'}`}></i>
                     </button>
                   </div>
                 ))}
               </div>

               <div className="pt-2 pb-safe-bar shrink-0">
                 <button onClick={() => {playTone('pop'); setMode('dictation');}} className="w-full bg-sky-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg active-scale transition-colors">
                   跳过等待，开始听写 <i className="fa-solid fa-play ml-2"></i>
                 </button>
               </div>
            </div>
        );
      }

      if (mode === 'dictation') {
        const q = dictItems[dictIdx];
        const ans = dictAnswers[dictIdx] || { spelling: '', meaningId: null };
        const isSubmitted = dictHasSubmittedCurrent;
        
        const attempts = dictAttempts[dictIdx] || 0;
        const showErrors = attempts > 0;
        const sOk = ans.spelling?.trim().toLowerCase() === q.word.toLowerCase();
        
        let inputClass = 'border-slate-200 bg-slate-50 text-slate-800 focus:border-sky-500';
        if (isSubmitted) {
            inputClass = 'border-emerald-500 bg-emerald-50 text-emerald-700';
        } else if (showErrors && !sOk) {
            inputClass = 'border-rose-500 bg-rose-50 text-rose-700 shadow-inner';
        }

        return (
          <div className="p-5 pb-safe-scroll h-full flex flex-col fade-in bg-slate-100 relative">
             <div className="flex justify-between items-center mb-6 mt-2 shrink-0">
               <button onClick={() => {playTone('pop'); setMode('dictationGroupSelect');}} className="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-500 active-scale border border-slate-200">
                 <i className="fa-solid fa-arrow-left"></i>
               </button>
               <div className="text-sm font-black text-sky-800 bg-sky-100 px-4 py-1.5 rounded-full border border-sky-200">
                 Dictation <span className="text-orange-600 text-lg ml-1">{dictIdx + 1}</span> / {dictItems.length}
               </div>
             </div>

             <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden mb-6 shadow-inner shrink-0">
               <div className="bg-orange-400 h-full transition-all duration-300" style={{width: `${((dictIdx + 1) / dictItems.length) * 100}%`}}></div>
             </div>

             {/* 自适应防遮挡处理 */}
             <div className="flex-1 overflow-y-auto pb-8 flex flex-col justify-start">
                <div className="bg-white p-6 rounded-3xl shadow-lg border border-slate-200 relative bounce-in flex flex-col items-center my-auto shrink-0">
                    
                    <button 
                        onClick={() => playWordAudio(q.word, `dict_${dictIdx}`)}
                        className={`w-20 h-20 mb-6 rounded-full flex items-center justify-center text-4xl shadow-inner active-scale transition-all border-4 ${playingId === `dict_${dictIdx}` ? 'bg-orange-500 text-white border-orange-200 animate-pulse' : 'bg-sky-50 text-sky-500 border-sky-100 pulse-glow'}`}
                    >
                        <i className="fa-solid fa-volume-high"></i>
                    </button>

                    <p className="text-slate-400 font-bold text-sm mb-2 w-full text-left"><i className="fa-solid fa-1 mr-1"></i> 听音频，拼写单词</p>
                    <div className="w-full relative mb-6">
                        <input 
                            type="text"
                            value={ans.spelling || ''}
                            onChange={(e) => handleDictAnswerChange('spelling', e.target.value)}
                            disabled={isSubmitted}
                            placeholder="Type English word..."
                            className={`w-full text-center font-serif-novel text-2xl font-black p-4 rounded-xl border-2 outline-none transition-colors ${inputClass}`}
                        />
                        {isSubmitted && (
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-2xl">
                                <i className="fa-solid fa-check text-emerald-500 bounce-in"></i>
                            </div>
                        )}
                        {!isSubmitted && showErrors && !sOk && (
                            <div className="absolute right-4 top-1/2 -translate-y-1/2 text-xl">
                                <i className="fa-solid fa-pen text-rose-500 bounce-in"></i>
                            </div>
                        )}
                    </div>

                    <p className="text-slate-400 font-bold text-sm mb-2 w-full text-left"><i className="fa-solid fa-2 mr-1"></i> 选择正确释义</p>
                    <div className="w-full space-y-2">
                        {q.options.map(opt => {
                            let btnClass = 'border-slate-200 bg-white text-slate-600 hover:bg-slate-50';
                            let icon = null;

                            if (isSubmitted) {
                                if (opt.id === q.id) {
                                    btnClass = 'border-emerald-500 bg-emerald-50 text-emerald-700';
                                    icon = <i className="fa-solid fa-check text-emerald-500 bounce-in"></i>;
                                } else {
                                    btnClass = 'border-slate-100 bg-slate-50 text-slate-400 opacity-50';
                                }
                            } else {
                                const isSelected = ans.meaningId === opt.id;
                                if (showErrors && isSelected && opt.id !== q.id) {
                                    btnClass = 'border-rose-500 bg-rose-50 text-rose-700 shadow-inner';
                                    icon = <i className="fa-solid fa-xmark text-rose-500 bounce-in"></i>;
                                } else if (isSelected) {
                                    btnClass = 'border-orange-500 bg-orange-50 text-orange-700 shadow-sm transform scale-[1.02] ring-2 ring-orange-200';
                                }
                            }

                            return (
                                <button 
                                    key={opt.id}
                                    onClick={() => handleDictAnswerChange('meaningId', opt.id)}
                                    disabled={isSubmitted}
                                    className={`w-full p-3 rounded-xl border-2 font-bold text-sm text-left transition-all flex justify-between items-center ${btnClass} ${!isSubmitted ? 'active-scale' : ''}`}
                                >
                                    <span>{opt.meaning} <span className="text-xs opacity-60 ml-1 italic">{opt.pos}</span></span>
                                    {icon}
                                </button>
                            );
                        })}
                    </div>
                </div>
             </div>

             <div className="pt-2 pb-safe-bar shrink-0 space-y-3 bg-slate-100 relative z-10">
                {showErrors && !isSubmitted && (
                    <div className="flex justify-between items-center bg-rose-50 p-3 rounded-xl border border-rose-200 shadow-sm fade-in">
                        <span className="text-rose-600 text-sm font-bold"><i className="fa-solid fa-circle-exclamation mr-1"></i>拼写或释义有误！请重听修改。</span>
                        <button onClick={handleShowAnswer} className="text-xs bg-white text-rose-600 px-3 py-2 rounded-lg shadow-sm border border-rose-200 active-scale font-black shrink-0">
                            查看答案
                        </button>
                    </div>
                )}

                {!isSubmitted ? (
                    <button 
                        onClick={handleDictSubmitCurrent}
                        disabled={!ans.spelling || !ans.meaningId}
                        className="w-full bg-sky-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg active-scale disabled:opacity-50 disabled:bg-slate-400 transition-all border border-sky-700"
                    >
                        Check Answer
                    </button>
                ) : (
                    <button 
                        onClick={handleDictNext}
                        className="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-lg shadow-[0_8px_20px_rgba(249,115,22,0.4)] active-scale pulse-glow bounce-in border border-orange-600"
                    >
                        {dictIdx === dictItems.length - 1 ? 'See Results' : 'Next Word'} <i className="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                )}
             </div>
          </div>
        )
      }

      if (mode === 'dictationResult') {
        let score = 0;
        let wrongWords = [];

        dictItems.forEach((q, idx) => {
            const ans = dictAnswers[idx];
            if (!ans.usedShowAnswer) {
                score += 20;
            } else {
                wrongWords.push(q);
            }
        });
        
        const now = new Date();
        const dateStr = now.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
        const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        const fullTimeStr = `${dateStr} ${timeStr}`;

        return (
            <div className="h-full flex flex-col fade-in bg-[#f8f9fa] relative overflow-y-auto pb-safe-scroll">
                 <div className="flex items-center p-4 sticky top-0 z-20">
                    <button onClick={() => {playTone('pop'); setMode('dictationGroupSelect');}} className="w-10 h-10 bg-white shadow-md rounded-full flex items-center justify-center text-slate-500 active-scale border border-slate-100"><i className="fa-solid fa-arrow-left"></i></button>
                 </div>
                 
                 <div className="px-4 pb-12 flex flex-col items-center">
                    <div className="w-full bg-white rounded-[2rem] shadow-md border border-slate-200 relative overflow-hidden pt-10 pb-8 px-6 text-center">
                        <div className="absolute inset-0 pointer-events-none opacity-[0.03]" style={{backgroundImage: 'repeating-linear-gradient(transparent, transparent 39px, #000 39px, #000 40px)'}}></div>
                        
                        <div className={`absolute top-6 right-4 rotate-[15deg] border-4 ${score >= 80 ? 'border-rose-500 text-rose-500' : 'border-slate-400 text-slate-400'} font-black text-xl px-3 py-1 rounded-sm opacity-80 uppercase tracking-widest`}>
                            {score >= 80 ? 'EXCELLENT' : 'REVIEW'}
                        </div>
                        
                        <div className="text-[55px] text-amber-400 mb-2 drop-shadow-md leading-none mt-2"><i className="fa-solid fa-trophy"></i></div>
                        
                        <h2 className="text-4xl font-black text-slate-800 mb-1">Test Paper</h2>
                        <p className="text-sm font-bold text-slate-400 mb-6">Dictation Challenge</p>
                        
                        <div className="text-[100px] font-black leading-none text-rose-500 mb-2 tracking-tighter">{score}</div>
                        <p className="text-sm font-bold text-slate-400 mb-6">Total Points</p>
                        
                        <div className="flex items-center justify-center text-xs font-bold text-slate-500 mb-6 bg-slate-50 py-1.5 px-4 rounded-full border border-slate-200">
                           <i className="fa-regular fa-clock mr-1.5"></i> 完成时间: {fullTimeStr}
                        </div>
                        
                        <div className="bg-amber-50 text-amber-800 text-sm font-bold py-3 px-4 rounded-xl border border-amber-200/50 mb-8 flex justify-center items-center relative z-10 shadow-sm">
                            <i className="fa-solid fa-camera mr-2 opacity-70"></i> 请截图本页（含时间），转发打卡！
                        </div>
                        
                        <div className="space-y-3 w-full px-2 relative z-10">
                            {wrongWords.length > 0 && (
                                <button onClick={() => { playTone('pop'); startDictationSession(wrongWords); }} className="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex justify-center items-center text-lg active-scale shadow-md">
                                    <i className="fa-solid fa-rotate-right mr-2"></i> 重练错题 (Try Again)
                                </button>
                            )}
                            <button onClick={() => { playTone('pop'); setMode('dictationGroupSelect'); }} className="w-full bg-white text-slate-800 border-2 border-slate-200 font-bold py-4 rounded-2xl flex justify-center items-center text-lg active-scale">
                                <i className="fa-solid fa-book mr-2 text-slate-400"></i> 返回选题 (Back to Notes)
                            </button>
                        </div>
                    </div>

                    <div className="w-full mt-8 space-y-4">

      ];

      return (
        <div className="flex flex-col h-full w-full bg-sky-50 font-sans max-w-md mx-auto relative shadow-2xl overflow-hidden">
          <Snowflakes />
          <Header tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} />
          <main className="flex-1 overflow-hidden relative flex flex-col z-10">
            {activeTab === 'grammar' && <GrammarTab />}
            {activeTab === 'vocab' && <VocabTab />}
            {activeTab === 'essay' && <EssayTab />}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
