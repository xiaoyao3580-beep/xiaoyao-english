    function shuffle(list) {
      const arr = list.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function normalizeAnswer(value) {
      return String(value || '').trim().toLowerCase().replace(/[’']/g, "'").replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ');

    function pickUnused(pool, count, skills = null) {
      const source = shuffle(pool.filter(item => !state.usedIds.has(item.id) && (!skills || skills.includes(item.skill))));
      const picked = source.slice(0, count);
      picked.forEach(item => state.usedIds.add(item.id));
      return picked;
    }
    function pickTenseSet() {
      const groups = ['present_simple','simple_past','present_perfect','past_perfect'];
      const counts = [4,4,4,3];
      let result = [];
      groups.forEach((skill, index) => {
        result = result.concat(pickUnused(TENSE_BANK, counts[index], [skill]));
      });
      while (result.length < 15) result = result.concat(pickUnused(TENSE_BANK.concat(EXTRA_BANK), 1));
      return shuffle(result).slice(0, 15);
    }

      passageItems.forEach(item => state.usedIds.add(item.id));
      const tenseItems = pickTenseSet();
      state.currentBatch = passageItems.concat(tenseItems).map((item, index) => ({ ...item, no:index + 1 }));

    function statFor(skill) {
      if (!state.skillStats[skill]) state.skillStats[skill] = { skill, attempts:0, wrong:0, correct:0, timeMs:0, examples:[], reinforce:0 };
      return state.skillStats[skill];
    }
    function submitBatch() {
      const elapsed = Math.max(1000, Date.now() - state.batchStart);
      const avgTime = elapsed / Math.max(1, state.currentBatch.length);
      const wrong = [];
      let correctCount = 0;
      state.currentBatch.forEach((item, index) => {
        const input = $('answer-' + index);
        const value = input.value;
        const ok = isCorrect(item, value);
        input.classList.toggle('correct', ok);
        input.classList.toggle('wrong', !ok);
        input.disabled = true;
        const stat = statFor(item.skill);
        stat.attempts += 1;
        stat.timeMs += avgTime;
        if (ok) {
          correctCount += 1;
          stat.correct += 1;
        } else {
          stat.wrong += 1;
          stat.examples.push({ question:item.stem || item.prompt, selected:value || '(空白)', answer:item.answer, explanation:item.explanation });
          wrong.push({ ...item, selected:value || '(空白)' });
        }
        state.attempts.push({ time:new Date().toISOString(), id:item.id, phrase:skillLabel(item.skill), category:item.section, phase:state.round === 1 ? 'initial' : 'reinforce', round:state.round, correct:ok, selected:value, answer:item.answer, duration_ms:Math.round(avgTime) });
      });
      if (state.round === 1) state.initialCorrect = correctCount;
      state.wrongItems = wrong;
      renderFeedback(wrong, correctCount);
    }
    function renderFeedback(wrong, correctCount) {
      $('feedback-area').classList.remove('hide');

        $('progress-bar').style.width = '100%';
        updateActionReserve();
        return;
      }
      const grouped = wrong.map((item, idx) => {
        return '<div class="wrong-card"><h3>' + (idx + 1) + '. ' + esc(skillLabel(item.skill)) + '</h3><p><b>你的答案：</b>' + esc(item.selected) + '</p><p><b>正确答案：</b>' + esc(item.answer) + '</p><p><b>解析：</b>' + esc(item.explanation) + '</p></div>';
      }).join('');
      $('feedback-area').innerHTML = grouped;
      $('action-box').innerHTML = '<button class="fixed-action" onclick="continueReinforce()">看完解析，继续巩固同类考点</button>';

      setTimeout(() => $('feedback-area').scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);

    function continueReinforce() {
      const skills = Array.from(new Set(state.wrongItems.map(item => item.skill)));
      state.reinforceRounds += 1;
      state.round += 1;
      skills.forEach(skill => { statFor(skill).reinforce += 1; });
      let next = [];
      skills.forEach(skill => {
        next = next.concat(pickUnused(TENSE_BANK.concat(EXTRA_BANK), 2, [skill]));
      });
      while (next.length < Math.min(12, skills.length * 3)) {
        const more = pickUnused(TENSE_BANK.concat(EXTRA_BANK), 1, skills);
        if (!more.length) break;
        next = next.concat(more);
      }
      if (!next.length) {
        next = state.wrongItems.map((item, index) => ({ ...item, id:item.id + '-retry-' + state.round + '-' + index }));
      }
      state.currentBatch = shuffle(next).slice(0, 14).map((item, index) => ({ ...item, no:index + 1 }));
      renderBatch(null);
      window.scrollTo({ top:0, behavior:'smooth' });
    }
    function buildPracticeDetail(report) {
      const phraseDetails = Object.values(state.skillStats).map(stat => {
        const examples = stat.examples.slice(-3).map(ex => ({ en:ex.question, zh:'正确答案：' + ex.answer + '；解析：' + ex.explanation }));
        return {
          id:stat.skill,
          phrase:skillLabel(stat.skill),
          meaning:'语法考点',
          category:'语法填空',
          clozeAttempts:stat.attempts,
          clozeWrong:stat.wrong,
          meaningAttempts:0,
          meaningWrong:0,
          studyCount:stat.reinforce,
          firstClozePassed:stat.wrong === 0,
          clozeTimeSeconds:Math.round(stat.timeMs / 1000),
          meaningTimeSeconds:0,
          studyTimeSeconds:0,
          clozeQuestion:examples[0]?.en || '',
          examples
        };
      }).sort((a,b) => b.clozeWrong - a.clozeWrong || b.studyCount - a.studyCount);
      const weak = phraseDetails.filter(item => item.clozeWrong || item.studyCount);
      return {
        homework_id:HOMEWORK_ID,
        module_title:MODULE_TITLE,
        selected_category:'语法填空 + 四大时态',
        total_phrases:phraseDetails.length,
        started_at:new Date(state.startedAt).toISOString(),

          initial_accuracy:report.score,
          reinforcement_rounds:state.reinforceRounds,
          confidence:report.score
        },
        weak_phrases:weak,
        phrase_details:phraseDetails,
        attempts:state.attempts
      };
    }
    function renderResult(report, detail) {
      $('r-basic').textContent = state.initialCorrect + '/' + state.initialTotal;
      $('r-score').textContent = report.score + '%';
      $('r-rounds').textContent = state.reinforceRounds;
      $('r-time').textContent = formatTime(state.endedAt - state.startedAt);
      const rows = detail.phrase_details.map((item, idx) => {
        const samples = (item.examples || []).map(ex => '<p><b>题目：</b>' + esc(ex.en) + '<br><b>' + esc(ex.zh) + '</b></p>').join('');
        return '<details class="report-item" ' + (idx < 3 ? 'open' : '') + '><summary><span>' + (idx + 1) + '. ' + esc(item.phrase) + '</span><span style="color:#dc2626">错 ' + item.clozeWrong + ' · 补 ' + item.studyCount + '</span></summary><div><p>尝试 ' + item.clozeAttempts + ' 次，用时约 ' + item.clozeTimeSeconds + ' 秒。</p>' + (samples || '<p>本次没有错题样本。</p>') + '</div></details>';
      }).join('');
      $('result-list').innerHTML = rows || '<div style="padding:22px;color:#16a34a;font-weight:900;">没有明显薄弱考点。</div>';
    }
    async function submitPracticeReport(detail, report) {
      localStorage.setItem(PENDING_REPORT_KEY, JSON.stringify({ detail, report }));
      setSyncStatus('loading', '正在同步老师后台...');
      try {
        window.XY_RECORD_SCORE?.({
          homework_id:HOMEWORK_ID,
          score:report.score,
          correct_count:state.initialCorrect,
          total_count:state.initialTotal,
          module_title:MODULE_TITLE,
          event_type:'score_complete',
          metadata:detail,
          report:detail
        });
      } catch (err) {}
      try {
        if (typeof window.XY_RECORD_PRACTICE_REPORT !== 'function') throw new Error('详细报告通道未加载，请从大站作业入口打开。');
        const result = await window.XY_RECORD_PRACTICE_REPORT({
          homework_id:HOMEWORK_ID,
          score:report.score,
          correct_count:state.initialCorrect,
          total_count:state.initialTotal,
          module_title:MODULE_TITLE,
          metadata:detail,
          report:detail
        });
        if (!result || result.error || result.skipped) throw (result && result.error) || new Error(result && result.skipped || '详细报告未写入');
        localStorage.removeItem(PENDING_REPORT_KEY);
        setSyncStatus('ok', '已同步老师后台。');
      } catch (err) {
        setSyncStatus('fail', '详细报告同步失败：' + (err.message || err), true);
      }
    }
    function setSyncStatus(type, text, canRetry = false) {
      const box = $('sync-status');
      box.className = 'sync ' + type;
      box.innerHTML = esc(text) + (canRetry ? ' <button class="secondary" style="min-height:36px;padding:7px 12px;margin-left:8px;" onclick="retryPracticeReport()">重试</button>' : '');
    }
    function retryPracticeReport() {
      try {
        const saved = JSON.parse(localStorage.getItem(PENDING_REPORT_KEY) || 'null');
        if (!saved) return setSyncStatus('fail', '没有找到可重试的报告。');
        submitPracticeReport(saved.detail, saved.report);
      } catch (err) {
        setSyncStatus('fail', '重试失败：' + (err.message || err), true);
      }
    }
    function finish() {
      state.endedAt = Date.now();
      stopTimer();
      const score = Math.round(state.initialCorrect / Math.max(1, state.initialTotal) * 100);
      const report = { score };
      const detail = buildPracticeDetail(report);
      renderResult(report, detail);
      show('result');
      $('action-container').classList.add('hide');
      document.documentElement.style.setProperty('--action-reserve', '0px');
      submitPracticeReport(detail, report);
    }
  </script>
</body>
</html>
