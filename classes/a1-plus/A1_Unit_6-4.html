<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>A1+ Unit 6 Magic Review & Challenge</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap');

    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Nunito', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc;
    }

    #root { width: 100%; height: 100%; }
    
    .font-serif-novel { font-family: 'Playfair Display', serif; }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.6); }

    /* Animations */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    .pulse-glow { animation: pulseGlow 2s infinite alternate; }
    @keyframes pulseGlow { from { box-shadow: 0 0 10px rgba(99, 102, 241, 0.4); } to { box-shadow: 0 0 25px rgba(99, 102, 241, 0.8); } }
    
    .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }

    .game-card {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      box-shadow: 0 4px 0 #e2e8f0, 0 8px 10px rgba(0,0,0,0.03);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .game-card:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #cbd5e1, 0 12px 15px rgba(0,0,0,0.05); }

    .trophy-3d {
      filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.1)) drop-shadow(0px 0px 15px rgba(245, 158, 11, 0.6));
      animation: trophy-bounce 2s infinite ease-in-out;
    }
    @keyframes trophy-bounce {
      0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.1)) drop-shadow(0px 0px 10px rgba(245, 158, 11, 0.4)); }
      50% { transform: translateY(-8px) scale(1.03); filter: drop-shadow(0px 12px 10px rgba(0,0,0,0.15)) drop-shadow(0px 0px 25px rgba(245, 158, 11, 0.8)); }
    }
    
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236366f1' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Audio Feedback Engine ---
    const playTone = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      } catch (e) {}
    };

    // --- Theme Color Map for Dynamic Rendering ---
    const cTheme = {
        indigo: { bg: 'bg-indigo-50', border: 'border-indigo-500', text: 'text-indigo-800', textLight: 'text-indigo-600', iconBg: 'bg-indigo-100', borderLight: 'border-indigo-200', btn: 'bg-indigo-500 text-white' },
        purple: { bg: 'bg-purple-50', border: 'border-purple-500', text: 'text-purple-800', textLight: 'text-purple-600', iconBg: 'bg-purple-100', borderLight: 'border-purple-200', btn: 'bg-purple-500 text-white' },
        sky: { bg: 'bg-sky-50', border: 'border-sky-500', text: 'text-sky-800', textLight: 'text-sky-600', iconBg: 'bg-sky-100', borderLight: 'border-sky-200', btn: 'bg-sky-500 text-white' },
        rose: { bg: 'bg-rose-50', border: 'border-rose-500', text: 'text-rose-800', textLight: 'text-rose-600', iconBg: 'bg-rose-100', borderLight: 'border-rose-200', btn: 'bg-rose-500 text-white' }
    };

    // --- Data Repository with Child-Friendly Explanations & Translations ---
    const RAW_DATA = [
      {
        id: "sec1", title: "I. Magic Spellbook", sub: "魔法词汇书 (2 pts each)", points: 2, icon: "fa-book-journal-whills", color: "indigo",
        items: [
          { id: 'v1', q: "A person who looks for clues and solves crimes is a ________.", options: ["detective", "thief", "driver", "suspect"], a: "detective", cn: "寻找线索并侦破犯罪的人是________。", hint: "💡 选 detective (侦探)。\n侦探专门负责寻找线索和解决谜团。" },
          { id: 'v2', q: "We don't know who did it. The man in the black coat is our main ________.", options: ["clue", "suspect", "footprint", "mystery"], a: "suspect", cn: "我们不知道是谁干的。穿黑外套的男人是我们主要的________。", hint: "💡 选 suspect (嫌疑人)。\n嫌疑人 (suspect) 是被怀疑犯罪的人。" },
          { id: 'v3', q: "The police found a huge ________ in the mud in the garden.", options: ["clue", "footprint", "thief", "solve"], a: "footprint", cn: "警察在花园的泥地里发现了一个巨大的________。", hint: "💡 选 footprint (脚印)。\n在泥地 (mud) 上发现的通常是物理印记，比如脚印 (footprint)。" },
          { id: 'v4', q: "They need more ________ to find the missing painting.", options: ["clues", "suspects", "footprints", "thieves"], a: "clues", cn: "他们需要更多________来寻找丢失的画。", hint: "💡 选 clues (线索)。\n寻找丢失的东西需要线索 (clues) 的帮助。" },
          { id: 'v5', q: "He is a ________. He stole my bag!", options: ["detective", "clue", "suspect", "thief"], a: "thief", cn: "他是个________。他偷了我的包！", hint: "💡 选 thief (小偷)。\n偷 (stole) 东西的人是小偷 (thief)。" },
          { id: 'v6', q: "Can you ________ this difficult mystery?", options: ["steal", "solve", "hide", "find"], a: "solve", cn: "你能________这个困难的谜团吗？", hint: "💡 选 solve (解决/解答)。\nsolve a mystery 意为“解开谜团”。" },
          { id: 'v7', q: "Sherlock Holmes is the most famous ________ in the world. He solves every case.", options: ["suspect", "detective", "thief", "clue"], a: "detective", cn: "夏洛克·福尔摩斯是世界上最著名的________。他侦破每一个案件。", hint: "💡 选 detective (侦探)。\n福尔摩斯是家喻户晓的侦探 (detective)。" },
          { id: 'v8', q: "The ________ took the expensive diamond and ran away in the dark.", options: ["detective", "clue", "thief", "footprint"], a: "thief", cn: "那个________拿走了昂贵的钻石并在黑暗中逃跑了。", hint: "💡 选 thief (小偷)。\n拿走钻石逃跑的是小偷 (thief)。" },
          { id: 'v9', q: "It is hard to ________ this difficult math problem.", options: ["solve", "hide", "steal", "guess"], a: "solve", cn: "________这道困难的数学题很难。", hint: "💡 选 solve (解决)。\nsolve 也可以用来表示解决数学题。" },
          { id: 'v10', q: "Look! The police found some fresh ________ on the ground.", options: ["footprint", "suspect", "footprints", "clue"], a: "footprints", cn: "看！警察在地上发现了一些新鲜的________。", hint: "💡 选 footprints (脚印)。\n地上发现的，前面有 some 修饰，要用复数形式 footprints。" }
        ]
      },
      {
        id: "sec2", title: "II. Past Core", sub: "一般过去时沙漏 (3 pts each)", points: 3, icon: "fa-hourglass-half", color: "purple",
        items: [
          { id: 'g1', q: "I ________ to the museum yesterday to look for clues.", options: ["go", "went", "goed", "was going"], a: "went", cn: "昨天我________去博物馆寻找线索。", hint: "💡 选 went。\ngo 的一般过去时是不规则变化，变成了 went！" },
          { id: 'g2', q: "They ________ find the missing cat last night.", options: ["don't", "didn't", "wasn't", "weren't"], a: "didn't", cn: "昨晚他们________找到丢失的猫。", hint: "💡 选 didn't。\n实义动词 (find) 的过去时否定，必须请出超级助动词 didn't！" },
          { id: 'g3', q: "We ________ a scary shadow in the window an hour ago.", options: ["see", "saw", "seed", "seeing"], a: "saw", cn: "一小时前我们从窗户________一个可怕的黑影。", hint: "💡 选 saw。\nsee 的一般过去时也是不规则变化，变成了 saw。" },
          { id: 'g4', q: "________ she call the police after the robbery?", options: ["Did", "Was", "Does", "Were"], a: "Did", cn: "抢劫后她报警了________？", hint: "💡 选 Did。\n一般过去时的疑问句，由超级助动词 Did 来打头阵！" },
          { id: 'g5', q: "He didn't ________ the painting. He is innocent!", options: ["stole", "steal", "steals", "stealing"], a: "steal", cn: "他没有________那幅画。他是无辜的！", hint: "💡 选 steal。\n🚨有了 didn't，后面的动词直接被打回原形 (steal)，绝不能用 stole！" },
          { id: 'g6', q: "I ________ a great mystery book yesterday.", options: ["readed", "read", "reading", "is reading"], a: "read", cn: "昨天我________一本很棒的悬疑书。", hint: "💡 选 read。\nread 的过去式拼写不变，依然是 read (读音变成/red/)。" },
          { id: 'g7', q: "The detective ________ a footprint in the garden.", options: ["finded", "found", "find", "finding"], a: "found", cn: "侦探在花园里________一个脚印。", hint: "💡 选 found。\nfind 是不规则动词！它的过去式是 found。" },
          { id: 'g8', q: "We ________ video games all night yesterday.", options: ["play", "plaied", "played", "were play"], a: "played", cn: "昨天我们一整晚都在________电子游戏。", hint: "💡 选 played。\n规则动词 play 直接加 -ed 即可，不需要变 y 为 i。" },
          { id: 'g9', q: "She didn't ________ the answer to the question.", options: ["knew", "know", "knows", "knowing"], a: "know", cn: "她不________这个问题的答案。", hint: "💡 选 know。\ndidn't 后面必须是动词原形 know。" },
          { id: 'g10', q: "The thief ________ the money and ran away.", options: ["steal", "stole", "was stealing", "steals"], a: "stole", cn: "小偷________钱逃跑了。", hint: "💡 选 stole。\n一连串过去发生的动作 (stole ... and ran away)，都用一般过去时。" }
        ]
      },
      {
        id: "sec3", title: "III. Time Radar", sub: "过去进行时水晶球 (3 pts each)", points: 3, icon: "fa-wand-magic-sparkles", color: "sky",
        items: [
          { id: 'l1', q: "What ________ you doing at 8 PM last night?", options: ["was", "were", "are", "did"], a: "were", cn: "昨晚8点你正在________什么？", hint: "💡 选 were。\n主语是 you，配合过去进行时，必须用 were + doing。" },
          { id: 'l2', q: "I ________ when the alarm rang.", options: ["sleep", "was sleeping", "slept", "am sleeping"], a: "was sleeping", cn: "闹钟响的时候我________。", hint: "💡 选 was sleeping。\n表示过去某个时间点正在进行的动作，用 was/were + doing。" },
          { id: 'l3', q: "They ________ watching TV. They were reading a book.", options: ["wasn't", "didn't", "weren't", "don't"], a: "weren't", cn: "他们________在看电视。他们当时在看书。", hint: "💡 选 weren't。\n主语是 They，否定形式用 weren't (were not)。" },
          { id: 'l4', q: "________ she looking for clues in the garden at that time?", options: ["Did", "Was", "Were", "Does"], a: "Was", cn: "那时她正在花园里寻找线索________？", hint: "💡 选 Was。\n主语是 she，过去进行时疑问句把 Was 提前。" },
          { id: 'l5', q: "While I ________ home, I saw a car crash.", options: ["walked", "was walking", "walking", "walk"], a: "was walking", cn: "当我________回家时，我看到了一场车祸。", hint: "💡 选 was walking。\nWhile 经常引导过去进行时，表示在一个较长的动作进行期间发生了另一件事。" },
          { id: 'l6', q: "What ________ doing when the lights went out?", options: ["you were", "were you", "are you", "you are"], a: "were you", cn: "停电时你________？", hint: "💡 选 were you。\n特殊疑问句语序：疑问词 + be动词 + 主语 + doing。" },
          { id: 'l7', q: "While he was watching TV, his phone ________.", options: ["ring", "was ringing", "rang", "ringed"], a: "rang", cn: "当他正在看电视时，他的电话________了。", hint: "💡 选 rang。\n看电视的过程 (长动作) 中，电话突然响了 (短促的突发动作, 一般过去时 rang)。" },
          { id: 'l8', q: "She ________ dinner at 7 PM yesterday.", options: ["was making", "made", "makes", "is making"], a: "was making", cn: "昨天晚上7点她________晚饭。", hint: "💡 选 was making。\n7 PM yesterday 是过去的一个具体时刻，强调当时正在做的事，用过去进行时。" },
          { id: 'l9', q: "I was sleeping ________ my mom came in.", options: ["while", "when", "because", "so"], a: "when", cn: "我正在睡觉________我妈妈进来了。", hint: "💡 选 when。\nwhen 后面通常跟一般过去时（短促动作），表示“当...时候”。" },
          { id: 'l10', q: "________ you at home last night?", options: ["Did", "Was", "Were", "Are"], a: "Were", cn: "昨晚你________家吗？", hint: "💡 选 Were。\n提问状态或位置，没有实义动词，所以用 be 动词的过去式 Were。" }
        ]
      },
      {
        id: "sec4", title: "IV. Final Boss: Error Correction", sub: "大魔法师试炼 (4 pts each)", points: 4, icon: "fa-ghost", color: "rose",
        items: [
          { id: 'f1', q: "Fix the mistake: \"I didn't <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>went</u> to school yesterday.\"", options: ["(Delete it / 删掉此词)", "go", "going", "goes"], a: "go", cn: "改错：“我昨天没有去上学。”", hint: "🐅 选 go。\n被 didn't 附体后，动词必须立刻现出原形 go！" },
          { id: 'f2', q: "Fix the mistake: \"He was <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>play</u> football at 5 PM.\"", options: ["playing", "played", "plays", "to play"], a: "playing", cn: "改错：“下午5点他正在踢足球。”", hint: "🐅 选 playing。\n过去进行时是 was/were + doing 组合，缺一不可！请加上 -ing。" },
          { id: 'f3', q: "Fix the mistake: \"Did you <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>saw</u> the thief?\"", options: ["see", "seen", "seeing", "sees"], a: "see", cn: "改错：“你看到小偷了吗？”", hint: "💡 选 see。\n疑问句里有 Did 扛大旗，后面的动词也要用原形 see！" },
          { id: 'f4', q: "Fix the mistake: \"They <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>wasn't</u> happy about the missing cake.\"", options: ["weren't", "didn't", "don't", "aren't"], a: "weren't", cn: "改错：“他们对丢失的蛋糕感到不高兴。”", hint: "💡 选 weren't。\nThey 是复数，必须搭配 weren't (were not)！" },
          { id: 'f5', q: "Fix the mistake: \"<u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>Was</u> you sleeping?\"", options: ["Were", "Did", "Are", "Do"], a: "Were", cn: "改错：“你当时在睡觉吗？”", hint: "💡 选 Were。\n跟 you 搭配的永远是 Were，不能用 Was！" }
        ]
      }
    ];

    const shuffleArray = (arr) => [...arr].sort(() => Math.random() - 0.5);

    const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}分${s}秒`;
    };

    // --- Components ---
    const StudioLogo = () => (
      <div className="flex items-center space-x-2">
        <div className="relative flex items-center justify-center w-9 h-9 md:w-10 md:h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg shadow-lg border border-indigo-300">
          <span className="text-white font-black text-xl md:text-2xl font-serif-novel leading-none">X</span>
        </div>
        <div className="flex flex-col text-left hidden sm:flex">
          <span className="text-indigo-400 font-sans font-black text-[11px] tracking-widest leading-none">XIAOYAO</span>
          <span className="text-[7px] text-indigo-200 tracking-[0.4em] leading-none mt-1 font-bold">STUDIO</span>
        </div>
      </div>
    );

    const Header = ({ appState, initQuiz, backToReview }) => (
      <header className="bg-indigo-900 pt-10 pb-4 px-6 md:px-10 shadow-xl z-50 flex-shrink-0 relative border-b-4 border-amber-400">
        <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500 rounded-full mix-blend-screen filter blur-[40px] opacity-20 pointer-events-none"></div>
        <div className="relative z-10 flex justify-between items-center max-w-6xl mx-auto w-full">
          <div className="flex items-center space-x-3 md:space-x-5">
            <StudioLogo />
            <div className="pl-3 md:pl-5 border-l border-indigo-600">
              <h1 className="text-xl md:text-2xl font-black font-serif-novel tracking-wider text-indigo-50 leading-tight">Talent A1+</h1>
              <p className="text-indigo-300 text-[10px] md:text-xs mt-0.5 uppercase tracking-widest font-bold">Unit 6 魔法复习与考核</p>
            </div>
          </div>
          
          {appState === 'review' && (
            <button 
                onClick={initQuiz} 
                className="hidden md:flex bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-6 py-2.5 rounded-xl font-black text-sm md:text-base shadow-[0_4px_15px_rgba(99,102,241,0.4)] active:scale-95 transition-transform items-center hover:shadow-[0_6px_20px_rgba(99,102,241,0.6)]"
            >
               <i className="fa-solid fa-wand-magic-sparkles mr-2"></i> 每日魔法师打卡
            </button>
          )}
          {appState === 'quiz' && (
            <button 
                onClick={backToReview}
                className="flex bg-rose-100/10 text-rose-300 hover:bg-rose-500 hover:text-white px-4 md:px-5 py-2 md:py-2.5 rounded-xl text-xs md:text-sm font-black tracking-widest border border-rose-300 active:scale-95 transition-all items-center shadow-sm"
                title="返回考前复习"
            >
               <i className="fa-solid fa-person-running mr-2 text-lg"></i> <span className="hidden sm:inline">返回复习</span>
            </button>
          )}
        </div>
      </header>
    );

    function App() {
      const [appState, setAppState] = useState('intro'); // intro, review, quiz, result
      const [quizData, setQuizData] = useState([]);
      const [answers, setAnswers] = useState({});
      const [showTranslation, setShowTranslation] = useState({}); // Track translation visibility
      const [scoreInfo, setScoreInfo] = useState({ score: 0, grade: 'C', message: '', timeTaken: 0, dateStr: '' });
      const [startTime, setStartTime] = useState(0);
      const [showModal, setShowModal] = useState(false);

      const toggleTranslation = (qId) => {
          playTone('pop');
          setShowTranslation(prev => ({ ...prev, [qId]: !prev[qId] }));
      };

      const backToReview = () => {
          playTone('pop');
          setAppState('review');
          window.scrollTo(0, 0);
      };

      // Start the actual random quiz
      const initQuiz = () => {
          playTone('pop');
          const generated = RAW_DATA.map(sec => ({
              ...sec,
              items: shuffleArray(sec.items).map(item => ({ ...item, options: shuffleArray(item.options) }))
          }));
          setQuizData(generated);
          setAnswers({});
          setShowTranslation({}); // Reset translations on new quiz
          setStartTime(Math.floor(Date.now() / 1000));
          setAppState('quiz');
          window.scrollTo(0, 0);
      };

      const handleOptionSelect = (qId, option) => {
          playTone('pop');
          setAnswers(prev => ({ ...prev, [qId]: option }));
      };

      const submitQuiz = () => {
          let totalQ = 0;
          let answeredQ = 0;
          quizData.forEach(sec => {
              totalQ += sec.items.length;
              sec.items.forEach(q => { if(answers[q.id]) answeredQ++; });
          });

          if (answeredQ < totalQ && appState === 'quiz') {
              setShowModal(true);
              return;
          }

          playTone('success');
          let totalScore = 0;
          quizData.forEach(sec => {
              sec.items.forEach(q => {
                  if (answers[q.id] === q.a) totalScore += sec.points;
              });
          });

          let grade = 'C';
          let message = "Keep Going! 每一次做错都是重新学习的契机。好好吸收下方的“说人话”解析，重整旗鼓，下次必定惊艳全场！";
          if (totalScore === 100) {
              grade = 'S'; message = "Perfect Score! The Master Wizard is YOU! 你对所有魔法词汇与时态咒语都掌握得炉火纯青，保持这份无懈可击的魔法状态！";
          } else if (totalScore >= 85) {
              grade = 'A'; message = "Excellent! 你已经具备了极强的逻辑推理思维，距离大满贯只差一点点细节。继续保持饥饿与好奇！";
          } else if (totalScore >= 70) {
              grade = 'B'; message = "Good Effort! 基础很扎实，但在一些高频陷阱上还需要更多打磨。去看看下面带表情符号的趣味解析，巩固你的魔法护盾！";
          }

          const now = new Date();
          const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
          const timeTaken = Math.floor(Date.now() / 1000) - startTime;

          setScoreInfo({ score: totalScore, grade, message, timeTaken, dateStr });
          setShowModal(false);
          setShowTranslation({}); // Close translations for result view
          setAppState('result');
          window.scrollTo(0, 0);
      };

      // Intro View
      const renderIntro = () => (
          <div className="flex-1 flex items-center justify-center p-6 fade-in relative z-10 w-full h-full min-h-[80vh]">
              <div className="max-w-2xl w-full bg-white rounded-[2.5rem] p-10 md:p-14 shadow-2xl border-4 border-slate-100 text-center relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-40 h-40 bg-indigo-100 rounded-bl-full pointer-events-none -z-10 opacity-50"></div>
                  <div className="trophy-3d text-[6rem] text-indigo-500 mb-8"><i className="fa-solid fa-hat-wizard"></i></div>
                  <h2 className="text-3xl md:text-5xl font-black font-serif-novel text-slate-800 mb-6 uppercase tracking-wide">魔法考前大复盘</h2>
                  <p className="text-slate-500 font-bold text-lg mb-10 leading-relaxed max-w-lg mx-auto">
                    欢迎来到 Unit 6 考前综合复盘！本系统涵盖了魔法谜团词汇、一般过去时与过去进行时的所有核心咒语。<br/>
                    请先查阅原题与“趣味解析”夯实基础，准备好后即可开启<span className="text-indigo-500 font-black mx-1">随机乱序</span>的魔法打卡挑战！
                  </p>
                  <button onClick={() => { playTone('pop'); setAppState('review'); }} className="bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black text-xl px-12 py-5 rounded-2xl shadow-[0_10px_20px_rgba(99,102,241,0.3)] hover:shadow-[0_15px_30px_rgba(99,102,241,0.5)] hover:-translate-y-1 transition-all active:scale-95 group">
                      进入魔法复习区 <i className="fa-solid fa-arrow-right ml-3 group-hover:translate-x-2 transition-transform"></i>
                  </button>
              </div>
          </div>
      );

      // Review View (Shows all questions, un-shuffled, with explanations & translations)
      const renderReview = () => (
          <div className="max-w-5xl mx-auto w-full p-4 md:p-8 pb-32 fade-in relative z-10">
              <div className="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                  <div className="mb-4 md:mb-0">
                      <h3 className="font-black text-slate-700 text-lg md:text-2xl"><i className="fa-solid fa-scroll text-indigo-500 mr-2"></i> 核心咒语复盘</h3>
                      <p className="text-sm md:text-base font-bold text-slate-400 mt-1">请仔细阅读以下原题与深度解析。遇到不懂的句子，可以点击紫蓝色的翻译按钮。复习完毕后，点击开始每日魔法打卡。</p>
                  </div>
              </div>
              
              <div className="space-y-12">
                  {RAW_DATA.map((sec) => {
                      const t = cTheme[sec.color];
                      return (
                      <div key={sec.id} className="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-200">
                          <div className="border-b-2 border-slate-100 pb-5 mb-8 flex items-center">
                              <div className={`w-12 h-12 rounded-xl ${t.iconBg} ${t.textLight} flex items-center justify-center text-2xl mr-4 shadow-inner`}><i className={`fa-solid ${sec.icon}`}></i></div>
                              <div>
                                  <h3 className={`text-xl md:text-2xl font-black ${t.text} font-serif-novel`}>{sec.title}</h3>
                                  <p className="text-slate-400 font-bold text-sm uppercase tracking-widest">{sec.sub}</p>
                              </div>
                          </div>

                          <div className="space-y-8">
                              {sec.items.map((q, idx) => (
                                  <div key={q.id} className="p-6 md:p-8 rounded-3xl border-2 border-slate-100 relative bg-slate-50/50">
                                      <span className={`absolute -top-3 -left-3 w-8 h-8 rounded-full ${t.btn} flex items-center justify-center font-black text-sm shadow-md`}>{idx + 1}</span>
                                      
                                      <div className="flex items-start justify-between gap-4 mb-4">
                                          <p className="text-lg md:text-xl font-bold text-slate-800 leading-relaxed flex-1" dangerouslySetInnerHTML={{ __html: q.q }}></p>
                                          <button onClick={() => toggleTranslation(q.id)} className="shrink-0 text-indigo-500 hover:text-white bg-indigo-100 hover:bg-indigo-500 w-10 h-10 rounded-full transition-colors flex items-center justify-center shadow-sm" title="查看中文翻译">
                                              <i className="fa-solid fa-language text-lg"></i>
                                          </button>
                                      </div>

                                      {/* Translation Dropdown */}
                                      {showTranslation[q.id] && (
                                          <div className="slide-down bg-indigo-50 p-4 rounded-xl border border-indigo-200 mb-6 flex items-start shadow-inner">
                                              <i className="fa-solid fa-language text-indigo-400 mt-0.5 mr-3 text-lg"></i>
                                              <p className="text-sm md:text-[15px] font-bold text-indigo-900 leading-relaxed">{q.cn}</p>
                                          </div>
                                      )}
                                      
                                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 mb-6 mt-2">
                                          {q.options.map((opt, oIdx) => {
                                              const isCorrect = opt === q.a;
                                              const alphabet = ['A', 'B', 'C', 'D'][oIdx];
                                              return (
                                                  <div key={opt} className={`px-5 py-3 rounded-xl border-2 font-bold text-base md:text-lg flex items-center ${isCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm' : 'bg-white border-slate-200 text-slate-400 opacity-60'}`}>
                                                      {isCorrect ? <i className="fa-solid fa-circle-check text-emerald-500 mr-3"></i> : <i className="fa-regular fa-circle text-slate-300 mr-3"></i>}
                                                      <span className={`w-8 font-black ${isCorrect ? 'text-emerald-500' : 'text-slate-400'}`}>{alphabet}.</span>
                                                      <span>{opt}</span>
                                                  </div>
                                              )
                                          })}
                                      </div>
                                      
                                      <div className="bg-white border-2 border-amber-200 p-5 rounded-xl flex items-start shadow-sm mt-4">
                                          <p className="text-slate-700 font-bold text-[15px] leading-relaxed whitespace-pre-line">{q.hint}</p>
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  )})}
              </div>

              {/* Mobile FAB for Starting Quiz */}
              <button 
                  onClick={initQuiz}
                  className="md:hidden fixed bottom-8 right-6 z-50 bg-gradient-to-br from-indigo-500 to-purple-600 text-white h-[72px] w-[72px] rounded-full shadow-[0_10px_30px_rgba(99,102,241,0.6)] hover:scale-105 active:scale-95 transition-all flex flex-col items-center justify-center group border-4 border-white"
              >
                  <i className="fa-solid fa-broom text-2xl mb-0.5 group-hover:-translate-y-1 transition-transform"></i>
                  <span className="text-[11px] font-black tracking-widest">打卡</span>
              </button>
          </div>
      );

      // Quiz View (Randomized Options & Questions)
      const renderQuiz = () => (
          <div className="max-w-4xl mx-auto w-full p-4 md:p-8 pb-32 fade-in relative z-10">
              <div className="mb-8 flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                  <h3 className="font-black text-slate-700 text-lg md:text-xl"><i className="fa-solid fa-hourglass-half text-amber-500 mr-2 animate-pulse"></i> 每日魔法师打卡中...</h3>
                  <span className="text-indigo-600 font-bold bg-indigo-50 px-4 py-1.5 rounded-full text-sm">Total 100 pts</span>
              </div>
              
              <div className="space-y-12">
                  {quizData.map((sec) => {
                      const t = cTheme[sec.color];
                      return(
                      <div key={sec.id} className="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-200">
                          <div className="border-b-2 border-slate-100 pb-5 mb-8 flex items-center">
                              <div className={`w-12 h-12 rounded-xl ${t.iconBg} ${t.textLight} flex items-center justify-center text-2xl mr-4 shadow-inner`}><i className={`fa-solid ${sec.icon}`}></i></div>
                              <div>
                                  <h3 className={`text-xl md:text-2xl font-black ${t.text} font-serif-novel`}>{sec.title}</h3>
                                  <p className="text-slate-400 font-bold text-sm uppercase tracking-widest">{sec.sub}</p>
                              </div>
                          </div>

                          <div className="space-y-8">
                              {sec.items.map((q, idx) => (
                                  <div key={q.id} className="game-card p-6 md:p-8 rounded-3xl border-2 border-slate-100 relative">
                                      <span className={`absolute -top-3 -left-3 w-8 h-8 rounded-full ${t.btn} flex items-center justify-center font-black text-sm shadow-md`}>{idx + 1}</span>
                                      
                                      <p className="text-lg md:text-xl font-bold text-slate-800 mb-6 leading-relaxed" dangerouslySetInnerHTML={{ __html: q.q }}></p>

                                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                                          {q.options.map((opt, oIdx) => {
                                              const isSelected = answers[q.id] === opt;
                                              const alphabet = ['A', 'B', 'C', 'D'][oIdx];
                                              return (
                                                  <button 
                                                      key={oIdx} 
                                                      onClick={() => handleOptionSelect(q.id, opt)}
                                                      className={`text-left px-5 py-4 rounded-xl border-2 font-bold text-base md:text-lg transition-all flex items-center active-scale ${isSelected ? `${t.bg} ${t.border} ${t.text} shadow-md` : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100 hover:border-slate-300'}`}
                                                  >
                                                      <span className={`w-8 font-black ${isSelected ? t.textLight : 'text-slate-400'}`}>{alphabet}.</span>
                                                      <span className="flex-1">{opt}</span>
                                                  </button>
                                              );
                                          })}
                                      </div>
                                  </div>
                              ))}
                          </div>
                      </div>
                  )})}
              </div>

              {/* Fixed Bottom Submit Bar for Quiz */}
              <div className="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t-2 border-slate-200 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-40 flex justify-center">
                  <div className="max-w-4xl w-full flex justify-between items-center px-2 md:px-8">
                      <span className="text-slate-500 font-bold hidden md:block"><i className="fa-regular fa-clock mr-2"></i> 选项和题目顺序已打乱，请仔细作答。</span>
                      <button onClick={submitQuiz} className="w-full md:w-auto bg-amber-500 hover:bg-amber-400 text-white font-black text-xl px-12 py-4 rounded-xl shadow-[0_6px_20px_rgba(245,158,11,0.4)] active:scale-95 transition-all">
                          提交考核 <i className="fa-solid fa-paper-plane ml-2"></i>
                      </button>
                  </div>
              </div>

              {/* Incomplete Modal */}
              {showModal && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 fade-in">
                      <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl bounce-in">
                          <i className="fa-solid fa-triangle-exclamation text-5xl text-rose-500 mb-4 drop-shadow-md"></i>
                          <h3 className="text-2xl font-black text-slate-800 mb-2">Wait a second!</h3>
                          <p className="text-slate-500 font-medium mb-8">You haven't answered all the questions yet. Are you sure you want to submit?</p>
                          <div className="flex gap-4">
                              <button onClick={() => setShowModal(false)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-black py-3 rounded-xl transition-colors">Keep Doing</button>
                              <button onClick={() => { setShowModal(false); playTone('success'); setTimeout(submitQuiz, 100); }} className="flex-1 bg-rose-500 hover:bg-rose-400 text-white font-black py-3 rounded-xl shadow-md transition-colors">Submit Anyway</button>
                          </div>
                      </div>
                  </div>
              )}
          </div>
      );

      // Result View
      const renderResult = () => (
          <div className="max-w-7xl mx-auto w-full p-4 md:p-8 fade-in relative z-10 flex flex-col xl:flex-row gap-8 items-start">
              
              {/* Left Content Area (Scores & Review) */}
              <div className="flex-1 w-full space-y-8">
                  {/* Score Card Mobile/Tablet */}
                  <div className="bg-white rounded-[2rem] p-8 md:p-12 shadow-xl border-t-8 border-amber-400 relative overflow-hidden text-center">
                      <div className="absolute inset-0 bg-pattern opacity-30 pointer-events-none"></div>
                      
                      <div className="relative z-10">
                          <div className="inline-block relative mb-6">
                              <svg className="w-40 h-40 transform -rotate-90">
                                  <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                                  <circle cx="80" cy="80" r="70" stroke="currentColor" strokeWidth="12" fill="transparent" strokeDasharray="439.8" strokeDashoffset={439.8 - (439.8 * scoreInfo.score) / 100} className="text-amber-400 transition-all duration-1000 ease-out" />
                              </svg>
                              <div className="absolute inset-0 flex flex-col items-center justify-center">
                                  <span className="text-5xl font-black text-slate-800 font-serif-novel">{scoreInfo.score}</span>
                                  <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Points</span>
                              </div>
                              <div className="absolute -bottom-2 -right-4 w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-white text-3xl font-black shadow-lg border-4 border-white animate-bounce">
                                  {scoreInfo.grade}
                              </div>
                          </div>

                          <h2 className="text-2xl font-black text-slate-800 mb-4">{scoreInfo.score >= 85 ? 'Outstanding Performance!' : 'Spell Completed'}</h2>
                          <div className="bg-amber-50 border border-amber-100 p-5 rounded-2xl mb-8">
                              <p className="text-amber-800 font-bold leading-relaxed">{scoreInfo.message}</p>
                          </div>

                          <div className="flex flex-wrap justify-center gap-4 text-sm font-bold text-slate-500">
                              <div className="bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 flex items-center shadow-sm"><i className="fa-solid fa-calendar-check mr-2 text-indigo-500"></i> {scoreInfo.dateStr}</div>
                              <div className="bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 flex items-center shadow-sm"><i className="fa-regular fa-clock mr-2 text-rose-500"></i> {formatTime(scoreInfo.timeTaken)}</div>
                          </div>
                      </div>
                  </div>

                  {/* Review Section */}
                  <div className="bg-white rounded-[2rem] p-6 md:p-10 shadow-sm border border-slate-200">
                      <h3 className="text-2xl font-black text-slate-800 mb-8 border-b-2 border-slate-100 pb-4"><i className="fa-solid fa-list-check text-indigo-500 mr-3"></i> 错题解析与复盘</h3>
                      
                      <div className="space-y-12">
                          {quizData.map((sec) => {
                              const t = cTheme[sec.color];
                              return(
                              <div key={sec.id}>
                                  <h4 className={`text-xl font-black ${t.text} mb-6 ${t.bg} px-4 py-2 rounded-xl inline-block border ${t.borderLight}`}>{sec.title}</h4>
                                  <div className="space-y-6">
                                      {sec.items.map((q, idx) => {
                                          const userAns = answers[q.id];
                                          const isCorrect = userAns === q.a;
                                          return (
                                              <div key={q.id} className={`p-6 rounded-2xl border-2 relative ${isCorrect ? 'bg-emerald-50/50 border-emerald-100' : 'bg-rose-50/50 border-rose-200'}`}>
                                                  <div className="absolute top-4 right-4 text-2xl">
                                                      {isCorrect ? <i className="fa-solid fa-circle-check text-emerald-500 bg-white rounded-full shadow-sm"></i> : <i className="fa-solid fa-circle-xmark text-rose-500 bg-white rounded-full shadow-sm"></i>}
                                                  </div>
                                                  
                                                  <div className="flex items-start justify-between gap-4 mb-4 pr-8">
                                                      <p className="text-lg font-bold text-slate-800 leading-relaxed" dangerouslySetInnerHTML={{ __html: `${idx+1}. ${q.q}` }}></p>
                                                      <button onClick={() => toggleTranslation(q.id)} className="shrink-0 text-indigo-500 hover:text-white bg-white hover:bg-indigo-500 w-8 h-8 rounded-full transition-colors flex items-center justify-center border border-indigo-100 shadow-sm" title="查看中文翻译">
                                                          <i className="fa-solid fa-language text-sm"></i>
                                                      </button>
                                                  </div>

                                                  {/* Translation Dropdown in Result */}
                                                  {showTranslation[q.id] && (
                                                      <div className="slide-down bg-white p-3 rounded-xl border border-indigo-100 mb-4 flex items-start shadow-sm">
                                                          <i className="fa-solid fa-language text-indigo-400 mt-0.5 mr-2 text-base"></i>
                                                          <p className="text-sm font-bold text-indigo-900 leading-relaxed">{q.cn}</p>
                                                      </div>
                                                  )}
                                                  
                                                  <div className="space-y-2 mb-4 text-[15px] font-medium bg-white/60 p-4 rounded-xl border border-white">
                                                      <div className="flex items-start">
                                                          <span className="w-24 text-slate-400 font-bold shrink-0">你的答案:</span>
                                                          <span className={isCorrect ? "text-emerald-600 font-black" : "text-rose-600 font-black line-through"}>{userAns || "未作答"}</span>
                                                      </div>
                                                      {!isCorrect && (
                                                          <div className="flex items-start mt-2">
                                                              <span className="w-24 text-slate-400 font-bold shrink-0">正确答案:</span>
                                                              <span className="text-emerald-600 font-black bg-emerald-100 px-2 rounded">{q.a}</span>
                                                          </div>
                                                      )}
                                                  </div>
                                                  
                                                  <div className={`mt-4 p-5 rounded-xl border-2 flex items-start ${isCorrect ? 'bg-white border-emerald-100' : 'bg-white border-amber-200 shadow-sm'}`}>
                                                      <p className={`text-[15px] font-bold leading-relaxed whitespace-pre-line ${isCorrect ? 'text-slate-600' : 'text-slate-800'}`}>{q.hint}</p>
                                                  </div>
                                              </div>
                                          );
                                      })}
                                  </div>
                              </div>
                          )})}
                      </div>
                  </div>
              </div>

              {/* Right Sidebar (Desktop only) / Floating Action Button (Mobile) */}
              
              {/* Desktop Fixed Panel */}
              <div className="hidden xl:block w-80 shrink-0 relative">
                  <div className="sticky top-10 bg-white rounded-[2rem] p-8 shadow-2xl border-4 border-amber-100 text-center relative overflow-hidden">
                      <div className="absolute top-0 right-0 w-24 h-24 bg-indigo-100 rounded-bl-full pointer-events-none -z-10 opacity-50"></div>
                      <div className="text-[5rem] text-indigo-500 mb-4 animate-float"><i className="fa-solid fa-hat-wizard"></i></div>
                      <h3 className="text-2xl font-black text-slate-800 mb-3 leading-tight">准备好再次<br/>施放魔法了吗？</h3>
                      <p className="text-sm font-bold text-slate-500 mb-8">每次重做，题目和选项的顺序都会打乱哦。</p>
                      
                      <button onClick={initQuiz} className="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black text-xl py-4 rounded-xl shadow-[0_8px_20px_rgba(99,102,241,0.4)] hover:shadow-[0_12px_25px_rgba(99,102,241,0.6)] hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center mb-4">
                          <i className="fa-solid fa-rotate-right mr-3"></i> 重新打卡
                      </button>
                      <button onClick={backToReview} className="w-full bg-slate-100 text-slate-600 font-black text-lg py-3 rounded-xl hover:bg-slate-200 transition-all active:scale-95 flex items-center justify-center">
                          <i className="fa-solid fa-scroll mr-2"></i> 返回复习区
                      </button>
                  </div>
              </div>

              {/* Mobile / Tablet Floating Button */}
              <button 
                  onClick={initQuiz}
                  className="xl:hidden fixed bottom-8 right-6 z-50 bg-gradient-to-br from-indigo-500 to-purple-600 text-white h-[72px] w-[72px] rounded-full shadow-[0_10px_30px_rgba(99,102,241,0.6)] hover:scale-105 active:scale-95 transition-all flex flex-col items-center justify-center group border-4 border-white"
              >
                  <i className="fa-solid fa-rotate-right text-2xl md:text-3xl mb-0.5 group-hover:-rotate-180 transition-transform duration-500"></i>
                  <span className="text-[11px] font-black tracking-widest uppercase">重做</span>
              </button>

          </div>
      );

      return (
        <div className="flex flex-col min-h-screen bg-slate-50 bg-pattern">
          <Header appState={appState} initQuiz={initQuiz} backToReview={backToReview} />
          <main className="flex-1 flex flex-col relative pb-10">
            {appState === 'intro' && renderIntro()}
            {appState === 'review' && renderReview()}
            {appState === 'quiz' && renderQuiz()}
            {appState === 'result' && renderResult()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
