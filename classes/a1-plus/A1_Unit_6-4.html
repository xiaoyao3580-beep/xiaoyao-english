<!DOCTYPE html>
<html lang="zh-CN">
<!--
  =========================================
  文件用途：A1+ Unit 6 魔法复习与考核
  题目数量：35道（单选题）
  新增功能：基于 ElevenLabs 的极速发音与防烧钱缓存机制。
  如何修改题目内容：
  向下滑动找到 <script> 标签下的 "RAW_DATA" 数组。
  每一道题都在这个数组里，你可以直接修改 "q" (英文题干), "options" (四个选项), "a" (正确答案), "cn" (中文翻译) 和 "hint" (解析)。
  =========================================
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>A1+ Unit 6 Magic Review & Challenge</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc;
    }

    #root { width: 100%; height: 100%; }
    
    .font-serif-novel { font-family: Georgia, 'Times New Roman', serif; }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.6); }

    /* Animations */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .bounce-in { animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    @keyframes bounceIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    
    .active-scale:active { transform: scale(0.96); transition: transform 0.1s; }

    .game-card {
      background: linear-gradient(180deg, #ffffff, #f8fafc);
      box-shadow: 0 4px 0 #e2e8f0, 0 8px 10px rgba(0,0,0,0.03);

    .trophy-3d {
      filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.1)) drop-shadow(0px 0px 15px rgba(245, 158, 11, 0.6));
      animation: trophy-bounce 2s infinite ease-in-out;
    }

      0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.1)) drop-shadow(0px 0px 10px rgba(245, 158, 11, 0.4)); }
      50% { transform: translateY(-8px) scale(1.03); filter: drop-shadow(0px 12px 10px rgba(0,0,0,0.15)) drop-shadow(0px 0px 25px rgba(245, 158, 11, 0.8)); }
    }
    
    .bg-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%236366f1' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
    }

</head>
<body>
  <div id="root"></div>

  <script>
    // ==========================================
    // 1. 数据配置区 (老师可以在这里修改题目)

    var RAW_DATA = [
      {
        id: "sec1", title: "I. Magic Spellbook", sub: "魔法词汇书 (2 pts each)", points: 2, icon: "fa-book-journal-whills", color: "indigo",
        items: [
          { id: 'v1', q: "A person who looks for clues and solves crimes is a ________.", options: ["detective", "thief", "driver", "suspect"], a: "detective", cn: "寻找线索并侦破犯罪的人是________。", hint: "💡 选 detective (侦探)。\n侦探专门负责寻找线索和解决谜团。" },
          { id: 'v2', q: "We don't know who did it. The man in the black coat is our main ________.", options: ["clue", "suspect", "footprint", "mystery"], a: "suspect", cn: "我们不知道是谁干的。穿黑外套的男人是我们主要的________。", hint: "💡 选 suspect (嫌疑人)。\n嫌疑人 (suspect) 是被怀疑犯罪的人。" },
          { id: 'v3', q: "The police found a huge ________ in the mud in the garden.", options: ["clue", "footprint", "thief", "solve"], a: "footprint", cn: "警察在花园的泥地里发现了一个巨大的________。", hint: "💡 选 footprint (脚印)。\n在泥地 (mud) 上发现的通常是物理印记，比如脚印 (footprint)。" },
          { id: 'v4', q: "They need more ________ to find the missing painting.", options: ["clues", "suspects", "footprints", "thieves"], a: "clues", cn: "他们需要更多________来寻找丢失的画。", hint: "💡 选 clues (线索)。\n寻找丢失的东西需要线索 (clues) 的帮助。" },
          { id: 'v5', q: "He is a ________. He stole my bag!", options: ["detective", "clue", "suspect", "thief"], a: "thief", cn: "他是个________。他偷了我的包！", hint: "💡 选 thief (小偷)。\n偷 (stole) 东西的人是小偷 (thief)。" },
          { id: 'v6', q: "Can you ________ this difficult mystery?", options: ["steal", "solve", "hide", "find"], a: "solve", cn: "你能________这个困难的谜团吗？", hint: "💡 选 solve (解决/解答)。\nsolve a mystery 意为“解开谜团”。" },
          { id: 'v7', q: "Sherlock Holmes is the most famous ________ in the world. He solves every case.", options: ["suspect", "detective", "thief", "clue"], a: "detective", cn: "夏洛克·福尔摩斯是世界上最著名的________。他侦破每一个案件。", hint: "💡 选 detective (侦探)。\n福尔摩斯是家喻户晓的侦探 (detective)。" },
          { id: 'v8', q: "The ________ took the expensive diamond and ran away in the dark.", options: ["detective", "clue", "thief", "footprint"], a: "thief", cn: "那个________拿走了昂贵的钻石并在黑暗中逃跑了。", hint: "💡 选 thief (小偷)。\n拿走钻石逃跑的是小偷 (thief)。" },
          { id: 'v9', q: "It is hard to ________ this difficult math problem.", options: ["solve", "hide", "steal", "guess"], a: "solve", cn: "________这道困难的数学题很难。", hint: "💡 选 solve (解决)。\nsolve 也可以用来表示解决数学题。" },
          { id: 'v10', q: "Look! The police found some fresh ________ on the ground.", options: ["footprint", "suspect", "footprints", "clue"], a: "footprints", cn: "看！警察在地上发现了一些新鲜的________。", hint: "💡 选 footprints (脚印)。\n地上发现的，前面有 some 修饰，要用复数形式 footprints。" }
        ]
      },
      {
        id: "sec2", title: "II. Past Core", sub: "一般过去时沙漏 (3 pts each)", points: 3, icon: "fa-hourglass-half", color: "purple",
        items: [
          { id: 'g1', q: "I ________ to the museum yesterday to look for clues.", options: ["go", "went", "goed", "was going"], a: "went", cn: "昨天我________去博物馆寻找线索。", hint: "💡 选 went。\ngo 的一般过去时是不规则变化，变成了 went！" },
          { id: 'g2', q: "They ________ find the missing cat last night.", options: ["don't", "didn't", "wasn't", "weren't"], a: "didn't", cn: "昨晚他们________找到丢失的猫。", hint: "💡 选 didn't。\n实义动词 (find) 的过去时否定，必须请出超级助动词 didn't！" },
          { id: 'g3', q: "We ________ a scary shadow in the window an hour ago.", options: ["see", "saw", "seed", "seeing"], a: "saw", cn: "一小时前我们从窗户________一个可怕的黑影。", hint: "💡 选 saw。\nsee 的一般过去时也是不规则变化，变成了 saw。" },
          { id: 'g4', q: "________ she call the police after the robbery?", options: ["Did", "Was", "Does", "Were"], a: "Did", cn: "抢劫后她报警了________？", hint: "💡 选 Did。\n一般过去时的疑问句，由超级助动词 Did 来打头阵！" },
          { id: 'g5', q: "He didn't ________ the painting. He is innocent!", options: ["stole", "steal", "steals", "stealing"], a: "steal", cn: "他没有________那幅画。他是无辜的！", hint: "💡 选 steal。\n🚨有了 didn't，后面的动词直接被打回原形 (steal)，绝不能用 stole！" },
          { id: 'g6', q: "I ________ a great mystery book yesterday.", options: ["readed", "read", "reading", "is reading"], a: "read", cn: "昨天我________一本很棒的悬疑书。", hint: "💡 选 read。\nread 的过去式拼写不变，依然是 read (读音变成/red/)。" },
          { id: 'g7', q: "The detective ________ a footprint in the garden.", options: ["finded", "found", "find", "finding"], a: "found", cn: "侦探在花园里________一个脚印。", hint: "💡 选 found。\nfind 是不规则动词！它的过去式是 found。" },
          { id: 'g8', q: "We ________ video games all night yesterday.", options: ["play", "plaied", "played", "were play"], a: "played", cn: "昨天我们一整晚都在________电子游戏。", hint: "💡 选 played。\n规则动词 play 直接加 -ed 即可，不需要变 y 为 i。" },
          { id: 'g9', q: "She didn't ________ the answer to the question.", options: ["knew", "know", "knows", "knowing"], a: "know", cn: "她不________这个问题的答案。", hint: "💡 选 know。\ndidn't 后面必须是动词原形 know。" },
          { id: 'g10', q: "The thief ________ the money and ran away.", options: ["steal", "stole", "was stealing", "steals"], a: "stole", cn: "小偷________钱逃跑了。", hint: "💡 选 stole。\n一连串过去发生的动作 (stole ... and ran away)，都用一般过去时。" }
        ]
      },
      {
        id: "sec3", title: "III. Time Radar", sub: "过去进行时水晶球 (3 pts each)", points: 3, icon: "fa-wand-magic-sparkles", color: "sky",
        items: [
          { id: 'l1', q: "What ________ you doing at 8 PM last night?", options: ["was", "were", "are", "did"], a: "were", cn: "昨晚8点你正在________什么？", hint: "💡 选 were。\n主语是 you，配合过去进行时，必须用 were + doing。" },
          { id: 'l2', q: "I ________ when the alarm rang.", options: ["sleep", "was sleeping", "slept", "am sleeping"], a: "was sleeping", cn: "闹钟响的时候我________。", hint: "💡 选 was sleeping。\n表示过去某个时间点正在进行的动作，用 was/were + doing。" },
          { id: 'l3', q: "They ________ watching TV. They were reading a book.", options: ["wasn't", "didn't", "weren't", "don't"], a: "weren't", cn: "他们________在看电视。他们当时在看书。", hint: "💡 选 weren't。\n主语是 They，否定形式用 weren't (were not)。" },
          { id: 'l4', q: "________ she looking for clues in the garden at that time?", options: ["Did", "Was", "Were", "Does"], a: "Was", cn: "那时她正在花园里寻找线索________？", hint: "💡 选 Was。\n主语是 she，过去进行时疑问句把 Was 提前。" },
          { id: 'l5', q: "While I ________ home, I saw a car crash.", options: ["walked", "was walking", "walking", "walk"], a: "was walking", cn: "当我________回家时，我看到了一场车祸。", hint: "💡 选 was walking。\nWhile 经常引导过去进行时，表示在一个较长的动作进行期间发生了另一件事。" },
          { id: 'l6', q: "What ________ doing when the lights went out?", options: ["you were", "were you", "are you", "you are"], a: "were you", cn: "停电时你________？", hint: "💡 选 were you。\n特殊疑问句语序：疑问词 + be动词 + 主语 + doing。" },
          { id: 'l7', q: "While he was watching TV, his phone ________.", options: ["ring", "was ringing", "rang", "ringed"], a: "rang", cn: "当他正在看电视时，他的电话________了。", hint: "💡 选 rang。\n看电视的过程 (长动作) 中，电话突然响了 (短促的突发动作, 一般过去时 rang)。" },
          { id: 'l8', q: "She ________ dinner at 7 PM yesterday.", options: ["was making", "made", "makes", "is making"], a: "was making", cn: "昨天晚上7点她________晚饭。", hint: "💡 选 was making。\n7 PM yesterday 是过去的一个具体时刻，强调当时正在做的事，用过去进行时。" },
          { id: 'l9', q: "I was sleeping ________ my mom came in.", options: ["while", "when", "because", "so"], a: "when", cn: "我正在睡觉________我妈妈进来了。", hint: "💡 选 when。\nwhen 后面通常跟一般过去时（短促动作），表示“当...时候”。" },
          { id: 'l10', q: "________ you at home last night?", options: ["Did", "Was", "Were", "Are"], a: "Were", cn: "昨晚你________家吗？", hint: "💡 选 Were。\n提问状态或位置，没有实义动词，所以用 be 动词的过去式 Were。" }
        ]
      },
      {
        id: "sec4", title: "IV. Final Boss: Error Correction", sub: "大魔法师试炼 (4 pts each)", points: 4, icon: "fa-ghost", color: "rose",
        items: [
          { id: 'f1', q: "Fix the mistake: \"I didn't <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>went</u> to school yesterday.\"", options: ["(Delete it / 删掉此词)", "go", "going", "goes"], a: "go", cn: "改错：“我昨天没有去上学。”", hint: "🐅 选 go。\n被 didn't 附体后，动词必须立刻现出原形 go！" },
          { id: 'f2', q: "Fix the mistake: \"He was <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>play</u> football at 5 PM.\"", options: ["playing", "played", "plays", "to play"], a: "playing", cn: "改错：“下午5点他正在踢足球。”", hint: "🐅 选 playing。\n过去进行时是 was/were + doing 组合，缺一不可！请加上 -ing。" },
          { id: 'f3', q: "Fix the mistake: \"Did you <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>saw</u> the thief?\"", options: ["see", "seen", "seeing", "sees"], a: "see", cn: "改错：“你看到小偷了吗？”", hint: "💡 选 see。\n疑问句里有 Did 扛大旗，后面的动词也要用原形 see！" },
          { id: 'f4', q: "Fix the mistake: \"They <u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>wasn't</u> happy about the missing cake.\"", options: ["weren't", "didn't", "don't", "aren't"], a: "weren't", cn: "改错：“他们对丢失的蛋糕感到不高兴。”", hint: "💡 选 weren't。\nThey 是复数，必须搭配 weren't (were not)！" },
          { id: 'f5', q: "Fix the mistake: \"<u class='decoration-wavy decoration-rose-500 text-rose-600 font-black'>Was</u> you sleeping?\"", options: ["Were", "Did", "Are", "Do"], a: "Were", cn: "改错：“你当时在睡觉吗？”", hint: "💡 选 Were。\n跟 you 搭配的永远是 Were，不能用 Was！" }
        ]
      }
    ];

    // --- 主题颜色配置 ---
    var cTheme = {
        indigo: { bg: 'bg-indigo-50', border: 'border-indigo-500', text: 'text-indigo-800', textLight: 'text-indigo-600', iconBg: 'bg-indigo-100', borderLight: 'border-indigo-200', btn: 'bg-indigo-500 text-white' },
        purple: { bg: 'bg-purple-50', border: 'border-purple-500', text: 'text-purple-800', textLight: 'text-purple-600', iconBg: 'bg-purple-100', borderLight: 'border-purple-200', btn: 'bg-purple-500 text-white' },
        sky: { bg: 'bg-sky-50', border: 'border-sky-500', text: 'text-sky-800', textLight: 'text-sky-600', iconBg: 'bg-sky-100', borderLight: 'border-sky-200', btn: 'bg-sky-500 text-white' },
        rose: { bg: 'bg-rose-50', border: 'border-rose-500', text: 'text-rose-800', textLight: 'text-rose-600', iconBg: 'bg-rose-100', borderLight: 'border-rose-200', btn: 'bg-rose-500 text-white' }
    };

    // ==========================================
    // 2. 状态控制与 ElevenLabs 引擎区
    // ==========================================
    var appState = 'intro'; 
    var quizData = [];
    var answers = {};
    var showTranslation = {};
    var scoreInfo = { score: 0, grade: 'C', message: '', timeTaken: 0, dateStr: '' };
    var startTime = 0;
    var showModal = false;

    // ElevenLabs API 配置
    var ELEVENLABS_API_KEY = "8afc05603ac30c7769ce6f76b2799b02e06773939d2704489ae66daef1ebdce1";
    var VOICE_ID = "21m00Tcm4TlvDq8ikWAM"; // Rachel 声音
    
    // 安全转义函数，保护带有单双引号的英文题干不会在 JS 拼接中阻断报错
    window.getSafeText = function(text) {
        return encodeURIComponent(text).replace(/'/g, "%27");
    };

    // ElevenLabs 带缓存极速发音引擎
    window.playElevenLabsAudio = async function(rawText, btnElement) {
        if (!rawText) return;

        // 1. 清理 HTML 标签和下划线，转化为空白停顿，提升朗读自然度
        var cleanText = rawText.replace(/<[^>]*>?/gm, '').replace(/_+/g, 'blank').replace(/&nbsp;/g, ' ').trim();
        if (!cleanText) return;

        // 2. 生成此文本的短 Cache Key，避免冗长的 base64 撑爆 key
        var textHash = btoa(unescape(encodeURIComponent(cleanText))).slice(0, 32); 
        var cacheKey = "el_audio_" + textHash;

        // 3. UI 按钮切换为 Loading 转圈状态
        var originalHTML = btnElement.innerHTML;
        btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-sm"></i>';
        btnElement.disabled = true;

        try {
            var cachedAudio = localStorage.getItem(cacheKey);
            if (cachedAudio) {
                // [命中缓存]：直接播放，实现 0 延迟且不耗费 API 额度！
                var audio = new Audio(cachedAudio);
                audio.play();
            } else {
                // [未命中]：首次点击，调用 ElevenLabs API 获取声音流
                var response = await fetch("https://api.elevenlabs.io/v1/text-to-speech/" + VOICE_ID, {
                    method: "POST",
                    headers: {
                        "Accept": "audio/mpeg",
                        "Content-Type": "application/json",
                        "xi-api-key": ELEVENLABS_API_KEY
                    },
                    body: JSON.stringify({
                        text: cleanText,
                        model_id: "eleven_monolingual_v1",
                        voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                    })
                });

                if (!response.ok) {
                    throw new Error("API 请求失败");
                }

                // 转换二进制流为 Blob，再转储为 Base64 以便长期存在 LocalStorage
                var blob = await response.blob();
                var reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function() {
                    var base64data = reader.result;
                    try {
                        localStorage.setItem(cacheKey, base64data);
                    } catch (e) {
                        console.warn("LocalStorage 容量已满，跳过长期缓存，仅本次播放。");
                    }
                    var audio = new Audio(base64data);
                    audio.play();
                }
            }
        } catch (error) {
            console.error("音频播放失败:", error);
            alert("语音生成失败，请检查网络环境或确认 ElevenLabs 额度是否用完。");
        } finally {
            // 恢复播放按钮状态
            btnElement.innerHTML = originalHTML;
            btnElement.disabled = false;
        }
    };

    // 系统短频 UI 音效 (依然使用原生无损音频合成，用于点击、反馈)
    function playTone(type) {
      try {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        var ctx = new AudioContext();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'success') {
          osc.type = 'triangle'; osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        }
      } catch (e) {}
    }

    // ==========================================
    // 3. 核心功能函数区
    // ==========================================
    function shuffleArray(arr) {
      var newArr = arr.slice();
      newArr.sort(function() { return Math.random() - 0.5; });
      return newArr;
    }

    function formatTime(seconds) {
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        return m + "分" + s + "秒";
    }

    window.toggleTranslation = function(qId) {
        playTone('pop');
        showTranslation[qId] = !showTranslation[qId];

    window.initQuiz = function() {
        playTone('pop');
        quizData = [];
        for(var i = 0; i < RAW_DATA.length; i++) {
            var sec = RAW_DATA[i];
            var newItems = shuffleArray(sec.items).map(function(item) {
                return Object.assign({}, item, { options: shuffleArray(item.options) });
            });
            quizData.push(Object.assign({}, sec, { items: newItems }));
        }
        answers = {};
        showTranslation = {};
        startTime = Math.floor(Date.now() / 1000);
        appState = 'quiz';
        renderApp();
        window.scrollTo(0, 0);
    };

    window.handleOptionSelect = function(qId, optIndex, secIndex, itemIndex) {
        playTone('pop');
        var opt = quizData[secIndex].items[itemIndex].options[optIndex];
        answers[qId] = opt;
        renderApp(true); 
    };

    window.confirmSubmit = function() {
        showModal = false;
        playTone('success');
        setTimeout(submitQuizLogic, 100);
    };

    window.closeModal = function() {
        showModal = false;
        renderApp();
    };

    window.submitQuiz = function() {
        var totalQ = 0;
        var answeredQ = 0;
        for(var i=0; i<quizData.length; i++){
            totalQ += quizData[i].items.length;
            for(var j=0; j<quizData[i].items.length; j++){
                if (answers[quizData[i].items[j].id]) answeredQ++;
            }
        }

        if (answeredQ < totalQ && appState === 'quiz') {
            showModal = true;
            renderApp();
            return;
        }
        submitQuizLogic();
    };

    function submitQuizLogic() {
        playTone('success');
        var totalScore = 0;
        for(var i=0; i<quizData.length; i++){
            var sec = quizData[i];
            for(var j=0; j<sec.items.length; j++){
                var q = sec.items[j];
                if (answers[q.id] === q.a) totalScore += sec.points;
            }
        }

        var grade = 'C';
        var message = "Keep Going! 每一次做错都是重新学习的契机。好好吸收下方的“说人话”解析，重整旗鼓，下次必定惊艳全场！";
        if (totalScore === 100) {
            grade = 'S'; message = "Perfect Score! The Master Wizard is YOU! 你对所有魔法词汇与时态咒语都掌握得炉火纯青，保持这份无懈可击的魔法状态！";
        } else if (totalScore >= 85) {
            grade = 'A'; message = "Excellent! 你已经具备了极强的逻辑推理思维，距离大满贯只差一点点细节。继续保持饥饿与好奇！";
        } else if (totalScore >= 70) {
            grade = 'B'; message = "Good Effort! 基础很扎实，但在一些高频陷阱上还需要更多打磨。去看看下面带表情符号的趣味解析，巩固你的魔法护盾！";
        }

        var now = new Date();
        function pad(n) { return n < 10 ? '0'+n : n; }
        var dateStr = now.getFullYear() + "年" + (now.getMonth()+1) + "月" + now.getDate() + "日 " + pad(now.getHours()) + ":" + pad(now.getMinutes());
        var timeTaken = Math.floor(Date.now() / 1000) - startTime;

        scoreInfo = { score: totalScore, grade: grade, message: message, timeTaken: timeTaken, dateStr: dateStr };
        showModal = false;
        showTranslation = {};
        appState = 'result';
        renderApp();
        window.scrollTo(0, 0);
    }

                        <div class="absolute top-4 right-4 text-2xl">${markIcon}</div>
                        <div class="flex items-start justify-between gap-4 mb-4 pr-8">
                            <p class="text-lg font-bold text-slate-800 leading-relaxed">${j+1}. ${q.q}</p>
                            <div class="flex shrink-0 space-x-2">
                                <button onclick="playElevenLabsAudio(decodeURIComponent('${safeQ}'), this)" class="text-sky-500 hover:text-white bg-white hover:bg-sky-500 w-8 h-8 rounded-full transition-colors flex items-center justify-center border border-sky-100 shadow-sm" title="朗读英文">
                                    <i class="fa-solid fa-volume-high text-xs"></i>
                                </button>
                                <button onclick="toggleTranslation('${q.id}')" class="text-indigo-500 hover:text-white bg-white hover:bg-indigo-500 w-8 h-8 rounded-full transition-colors flex items-center justify-center border border-indigo-100 shadow-sm" title="查看中文翻译">
                                    <i class="fa-solid fa-language text-sm"></i>
                                </button>
                            </div>
                        </div>`;

                if (showTranslation[q.id]) {
                    html += `
                        <div class="slide-down bg-white p-3 rounded-xl border border-indigo-100 mb-4 flex items-start shadow-sm">
                            <i class="fa-solid fa-language text-indigo-400 mt-0.5 mr-2 text-base"></i>
                            <p class="text-sm font-bold text-indigo-900 leading-relaxed">${q.cn}</p>
                        </div>`;
                }

                html += `
                        <div class="space-y-2 mb-4 text-[15px] font-medium bg-white/60 p-4 rounded-xl border border-white">
                            <div class="flex items-start">
                                <span class="w-24 text-slate-400 font-bold shrink-0">你的答案:</span>
                                <span class="${userAnsClass}">${userAns || "未作答"}</span>
                            </div>`;
                
                if (!isCorrect) {
                    html += `
                            <div class="flex items-start mt-2">
                                <span class="w-24 text-slate-400 font-bold shrink-0">正确答案:</span>
                                <span class="text-emerald-600 font-black bg-emerald-100 px-2 rounded">${q.a}</span>
                            </div>`;
                }

                var hintBg = isCorrect ? 'bg-white border-emerald-100' : 'bg-white border-amber-200 shadow-sm';
                var hintColor = isCorrect ? 'text-slate-600' : 'text-slate-800';
                
                html += `
                        </div>
                        <div class="mt-4 p-5 rounded-xl border-2 flex items-start ${hintBg}">
                            <p class="text-[15px] font-bold leading-relaxed whitespace-pre-line ${hintColor}">${q.hint}</p>
                        </div>
                    </div>`;
            }
            html += `</div></div>`;
        }

        html += `
                </div>
            </div>
            
            <div class="hidden xl:block w-80 shrink-0 relative">
                <div class="sticky top-10 bg-white rounded-[2rem] p-8 shadow-2xl border-4 border-amber-100 text-center relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-indigo-100 rounded-bl-full pointer-events-none -z-10 opacity-50"></div>
                    <div class="text-[5rem] text-indigo-500 mb-4 animate-float"><i class="fa-solid fa-hat-wizard"></i></div>
                    <h3 class="text-2xl font-black text-slate-800 mb-3 leading-tight">准备好再次<br/>施放魔法了吗？</h3>
                    <p class="text-sm font-bold text-slate-500 mb-8">每次重做，题目和选项的顺序都会打乱哦。</p>
                    <button onclick="initQuiz()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-black text-xl py-4 rounded-xl shadow-[0_8px_20px_rgba(99,102,241,0.4)] hover:shadow-[0_12px_25px_rgba(99,102,241,0.6)] hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center mb-4">
                        <i class="fa-solid fa-rotate-right mr-3"></i> 重新打卡
                    </button>
                    <button onclick="backToReview()" class="w-full bg-slate-100 text-slate-600 font-black text-lg py-3 rounded-xl hover:bg-slate-200 transition-all active:scale-95 flex items-center justify-center">
                        <i class="fa-solid fa-scroll mr-2"></i> 返回复习区
                    </button>
                </div>
            </div>
            
            <button onclick="initQuiz()" class="xl:hidden fixed bottom-8 right-6 z-50 bg-gradient-to-br from-indigo-500 to-purple-600 text-white h-[72px] w-[72px] rounded-full shadow-[0_10px_30px_rgba(99,102,241,0.6)] hover:scale-105 active:scale-95 transition-all flex flex-col items-center justify-center group border-4 border-white">
                <i class="fa-solid fa-rotate-right text-2xl md:text-3xl mb-0.5 group-hover:-rotate-180 transition-transform duration-500"></i>
                <span class="text-[11px] font-black tracking-widest uppercase">重做</span>
            </button>
        </div>`;

        return html;
    }

    // 主渲染函数，每次数据改变时更新页面的 innerHTML
    function renderApp(keepScroll) {
        var scrollY = window.scrollY; // 记录当前滚动条位置
        
        var mainContent = '';
        if (appState === 'intro') mainContent = renderIntroHTML();
        else if (appState === 'review') mainContent = renderReviewHTML();
        else if (appState === 'quiz') mainContent = renderQuizHTML();
        else if (appState === 'result') mainContent = renderResultHTML();

        var fullHTML = `
        <div class="flex flex-col min-h-screen bg-slate-50 bg-pattern">
            ${getHeaderHTML()}
            <main class="flex-1 flex flex-col relative pb-10">
                ${mainContent}
            </main>
        </div>`;

        document.getElementById('root').innerHTML = fullHTML;
        
        if (keepScroll) {
            window.scrollTo(0, scrollY);
        }
    }

    // ==========================================
    // 5. 启动应用
    // ==========================================
    renderApp();

  </script>
</body>
</html>
