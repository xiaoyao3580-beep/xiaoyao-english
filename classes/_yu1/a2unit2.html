    const playTone = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'success') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.start(); osc.stop(ctx.currentTime + 0.08);
        } else if (type === 'error') {
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'cheer') {
          const freqs = [523.25, 659.25, 783.99, 1046.50]; 
          let startTime = ctx.currentTime;
          freqs.forEach((freq, idx) => {
            const tempOsc = ctx.createOscillator();
            const tempGain = ctx.createGain();
            tempOsc.connect(tempGain); tempGain.connect(ctx.destination);
            tempOsc.type = 'sine'; tempOsc.frequency.setValueAtTime(freq, startTime + idx * 0.08);
            tempGain.gain.setValueAtTime(0.1, startTime + idx * 0.08);
            tempGain.gain.exponentialRampToValueAtTime(0.01, startTime + idx * 0.08 + 0.3);
            tempOsc.start(startTime + idx * 0.08); tempOsc.stop(startTime + idx * 0.08 + 0.3);
          });
        }
      } catch (e) { console.log("Audio not supported"); }
    };

    const useEnhancedAudio = () => {
      const [speed, setSpeed] = useState(1.0);
      const [audioState, setAudioState] = useState({ source: null, status: 'idle', voice: null });
      const audioRef = useRef(new Audio());
      const cacheRef = useRef({});
      const currentFetchRef = useRef(0);
      const API_KEY = "sk_4299808cce5c3a9dd32917410f631fc345cd7be54dff0070";

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = speed;
      }, [speed]);

      useEffect(() => {
        const audio = audioRef.current;
        const handleEnded = () => setAudioState(prev => ({ ...prev, status: 'idle' }));
        audio.addEventListener('ended', handleEnded);
        return () => {
          audio.removeEventListener('ended', handleEnded);
          audio.pause();
        };
      }, []);

      const playAudio = async (sourceId, displayContent, voiceId, customAudioText = null) => {
        const textToPlay = customAudioText || displayContent;
        const audio = audioRef.current;
        const cacheKey = `${sourceId}_${voiceId}`;

        // 相同音频切换播放/暂停 (保留当前 currentTime，实现连贯语调续播)
        if (audioState.source === sourceId && audioState.voice === voiceId) {
          if (audioState.status === 'playing') {
            audio.pause();
            setAudioState(prev => ({ ...prev, status: 'paused' }));
            return;
          }
          if (audioState.status === 'paused') {
            audio.play();
            setAudioState(prev => ({ ...prev, status: 'playing' }));
            return;
          }
        }

        // 播放新音频前，先中断所有正在播放的并重置时间
        audio.pause();
        currentFetchRef.current += 1;
        const fetchId = currentFetchRef.current;
        setAudioState({ source: sourceId, status: 'loading', voice: voiceId });

        // 使用缓存直接播放
        if (cacheRef.current[cacheKey]) {
          audio.src = cacheRef.current[cacheKey];
          audio.playbackRate = speed;
          audio.play();
          setAudioState({ source: sourceId, status: 'playing', voice: voiceId });
          return;
        }

        // 调用 ElevenLabs API
        try {
          const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: 'POST',
            headers: { 'Accept': 'audio/mpeg', 'xi-api-key': API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              text: textToPlay, 
              model_id: 'eleven_turbo_v2_5', 
              voice_settings: { stability: 0.35, similarity_boost: 0.8 } 
            })
          });

          if (!response.ok) throw new Error('API Error');

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          
          if (currentFetchRef.current === fetchId) {
            cacheRef.current[cacheKey] = url;
            audio.src = url;
            audio.playbackRate = speed;
            audio.play();
            setAudioState({ source: sourceId, status: 'playing', voice: voiceId });
          }
        } catch (error) {
          console.error("TTS Error:", error);
          if (currentFetchRef.current === fetchId) {
            alert("语音生成失败，请检查网络。");
            setAudioState({ source: null, status: 'idle', voice: null });
          }
        }
      };

      const stopAudio = () => {
        currentFetchRef.current += 1;
        const audio = audioRef.current;
        audio.pause();
        audio.currentTime = 0; // 点击Stop彻底重置
        setAudioState({ source: null, status: 'idle', voice: null });
      };

      return { speed, setSpeed, audioState, playAudio, stopAudio };
    };

                <div className="absolute -top-5 left-1/2 transform -translate-x-1/2 w-14 h-14 bg-gradient-to-br from-sky-400 to-primary text-white rounded-2xl flex items-center justify-center font-display text-xl shadow-lg border-2 border-white">{currentIdx + 1}</div>
                
                <p className="text-[20px] font-serif font-bold text-slate-800 leading-relaxed mt-4 mb-8 px-2 text-center">{currentQ.q}</p>

                <div className="space-y-3">
                  {currentQ.options.map((opt, i) => {
                    const isRevealed = answers[currentIdx] !== undefined;
                    const isSelected = answers[currentIdx] === i;
                    const isCorrectOption = currentQ.ans === i;
                    
                    let btnClass = 'border-slate-100 bg-slate-50 text-slate-600 hover:border-sky-200 hover:bg-white active-scale';
                    let icon = null;

                    if (isRevealed) {
                      if (isCorrectOption) {
                        btnClass = 'border-emerald-500 bg-emerald-50 text-emerald-600 shadow-md';
                        icon = <i className="fa-solid fa-circle-check text-emerald-500 text-2xl bounce-in"></i>;
                      } else if (isSelected) {
                        btnClass = 'border-rose-500 bg-rose-50 text-rose-600 shadow-md';
                        icon = <i className="fa-solid fa-circle-xmark text-rose-500 text-2xl bounce-in"></i>;
                      } else {
                        btnClass = 'border-slate-100 bg-slate-50 text-slate-400 opacity-50';
                     }
                   }

                   return (
                     <button key={i} disabled={isRevealed} onClick={() => handleOptionSelect(currentIdx, i)} className={`w-full text-left p-4 rounded-2xl border-2 transition-all duration-200 font-bold text-lg flex items-center justify-between ${btnClass}`}>
                       <span><span className={`inline-block w-8 font-mono text-sm ${isRevealed ? (isCorrectOption ? 'text-emerald-500' : isSelected ? 'text-rose-500' : 'text-slate-400') : 'text-primary'}`}>{String.fromCharCode(65+i)}.</span> {opt}</span>
                       {icon}
                     </button>
                   );
                 })}
               </div>

               <div className="mt-6 pb-6 flex items-center justify-between gap-4">
                 <button onClick={() => { playTone('pop'); setCurrentIdx(Math.max(0, currentIdx - 1)); }} disabled={currentIdx === 0} className={`w-12 h-12 rounded-full flex items-center justify-center text-lg transition-all active-scale ${currentIdx === 0 ? 'bg-slate-100 text-slate-300' : 'bg-white text-slate-600 shadow-sm border border-slate-200'}`}><i className="fa-solid fa-chevron-left"></i></button>
                 
                 {Object.keys(answers).length === 10 ? (
                   <button onClick={handleSubmit} className="bg-gradient-to-r from-sky-400 to-primary text-white px-6 py-3 rounded-full font-black text-[15px] shadow-[0_8px_20px_rgba(14,165,233,0.4)] active-scale transition-all flex items-center bounce-in pulse-glow border-2 border-white">提交测试 <i className="fa-solid fa-paper-plane ml-2 text-lg"></i></button>
                 ) : (
                   <button onClick={() => { playTone('pop'); setCurrentIdx(Math.min(9, currentIdx + 1)); }} disabled={currentIdx === 9 || answers[currentIdx] === undefined} className={`w-12 h-12 rounded-full flex items-center justify-center text-lg transition-all active-scale ${currentIdx === 9 || answers[currentIdx] === undefined ? 'bg-slate-100 text-slate-300' : 'bg-white text-sky-600 shadow-md border border-slate-200 pulse-glow'}`}><i className="fa-solid fa-chevron-right"></i></button>
                 )}
               </div>
             </div>
           </div>
        </div>
      );
    };

    // --- TAB 4: SPEAKER'S STAGE (全新艺术感+连贯音频模块) ---
    const SpeechSection = () => {
      const { speed, setSpeed, audioState, playAudio, stopAudio } = useEnhancedAudio();

      const stepMapping = [
        { step: 1, title: 'Hook', zh: '钩子', bg: 'bg-rose-500', text: 'text-rose-600', light: 'bg-rose-50', textLight: 'text-rose-400', border: 'border-rose-100', textMono: 'text-rose-700', desc: '用痛点抓住听众', ex: 'Because we work so hard...' },
        { step: 2, title: 'Position', zh: '观点', bg: 'bg-sky-500', text: 'text-sky-600', light: 'bg-sky-50', textLight: 'text-sky-400', border: 'border-sky-100', textMono: 'text-sky-700', desc: '大声说出你的方案', ex: 'Next term, we will have...' },
        { step: 3, title: 'Reasons', zh: '理由', bg: 'bg-amber-500', text: 'text-amber-600', light: 'bg-amber-50', textLight: 'text-amber-400', border: 'border-amber-100', textMono: 'text-amber-700', desc: '用逻辑说服大家', ex: 'We are tired, so...' },
        { step: 4, title: 'Action', zh: '号召', bg: 'bg-emerald-500', text: 'text-emerald-600', light: 'bg-emerald-50', textLight: 'text-emerald-400', border: 'border-emerald-100', textMono: 'text-emerald-700', desc: '告诉大家现在做什么', ex: 'Vote for me!' }
      ];

      return (
        <div className="p-4 pb-24 h-full overflow-y-auto fade-in">
          
          {/* Header Banner */}
          <div className="bg-gradient-to-r from-amber-500 to-rose-500 p-6 rounded-3xl shadow-lg text-white mb-6 relative overflow-hidden bounce-in">
             <i className="fa-solid fa-microphone-lines absolute -bottom-4 -right-2 text-6xl opacity-20 transform rotate-12"></i>
             <h2 className="text-3xl font-serif font-black tracking-widest uppercase mb-1">Speaker's Stage</h2>
             <p className="text-amber-100 font-bold text-sm">口语大师：跟着范文读出感情！</p>
          </div>

          {/* 4-Step Method 思维导图 */}
          <div className="mb-8">
            <h3 className="text-[17px] font-black text-slate-800 mb-4 flex items-center justify-center border-b border-slate-200/60 pb-3">
              <div className="w-7 h-7 bg-amber-100 text-amber-500 rounded-lg flex items-center justify-center mr-2 shadow-sm"><i className="fa-solid fa-layer-group text-sm"></i></div>
              The 4-Step Method <span className="text-xs text-slate-400 ml-2 font-bold tracking-widest">(逻辑大纲)</span>
            </h3>
            
            <div className="grid grid-cols-2 gap-3 relative z-10">
              {stepMapping.map((s) => (
                <div key={s.step} className={`bg-white border ${s.border} rounded-2xl p-4 relative shadow-sm transform transition-all duration-300 hover:scale-[1.03] hover:shadow-md`}>
                  <div className={`absolute -top-3 -left-2 w-8 h-8 ${s.bg} text-white rounded-full flex justify-center items-center font-black text-sm shadow-md border-2 border-white`}>{s.step}</div>
                  <h4 className={`font-black ${s.text} text-[15px] mb-1 mt-1 text-center`}>{s.title}<span className={`text-[10px] ${s.textLight} font-bold ml-1`}>({s.zh})</span></h4>
                  <p className="text-slate-500 font-bold text-center text-[11px] mb-2">{s.desc}</p>
                  <div className={`${s.light} p-2 rounded-xl text-[10px] font-mono ${s.textMono} text-center leading-tight shadow-inner`}>{s.ex}</div>
                </div>
              ))}
            </div>
          </div>

          {/* 口语题目与范文卡片 (采用艺术感的 zoom-in-up 局部放大入场效果) */}
          <div className="space-y-6 overflow-hidden pt-2">
            <div className="flex items-center justify-center mb-4">
              <div className="h-0.5 w-8 bg-gradient-to-r from-transparent to-slate-300"></div>
              <h3 className="text-sm font-black text-slate-400 mx-3 tracking-widest uppercase">Speaking Missions</h3>
              <div className="h-0.5 w-8 bg-gradient-to-l from-transparent to-slate-300"></div>
            </div>
            
            {speakingTopics.map((topic, index) => {
              const sourceId = `speech_${topic.id}`;
              
              return (
                <div key={topic.id} className="zoom-in-up relative bg-white/95 backdrop-blur-sm rounded-[2rem] p-6 shadow-md border border-slate-100 overflow-hidden transform transition-all duration-500 hover:shadow-xl group" style={{animationDelay: `${index * 0.15}s`}}>
                  {/* 艺术大数字背景，随鼠标有微小浮动 */}
                  <div className="absolute -bottom-6 -right-2 text-[120px] font-black font-serif italic text-slate-50 leading-none select-none z-0 pointer-events-none group-hover:scale-110 transition-transform duration-700">
                    0{index + 1}
                  </div>
                  
                  <div className="relative z-10">
                    <div className="flex items-center mb-3">
                       <span className="bg-slate-800 text-white px-3 py-1 rounded-full font-black text-[10px] tracking-widest uppercase shadow-sm">Mission 0{index + 1}</span>
                    </div>

                    <h4 className="text-[22px] font-serif font-black bg-clip-text text-transparent bg-gradient-to-r from-sky-600 to-amber-500 mb-4 leading-tight tracking-wide">
                      <i className="fa-solid fa-quote-left text-sky-200 mr-2 text-lg"></i>{topic.title}
                    </h4>
                    
                    <p className="text-slate-700 font-bold mb-5 text-[13px] bg-slate-50 p-4 rounded-2xl border-l-4 border-amber-400 shadow-sm leading-relaxed">
                      "{topic.task}"
                    </p>

                    <div className="bg-slate-800 text-slate-200 p-5 rounded-2xl shadow-inner mb-6 font-serif leading-relaxed text-[15px] relative">
                      <div className="absolute top-0 right-0 opacity-[0.05] text-[60px] text-white pointer-events-none transform translate-x-2 -translate-y-2"><i className="fa-solid fa-quote-right"></i></div>
                      {topic.modelText}
                    </div>

                    {/* 播放器组件，传入改良后连贯的音频文本 */}
                    <AudioPlayer 
                       sourceId={sourceId}
                       content={topic.modelText}
                       audioText={topic.audioText}
                       audioState={audioState}
                       playAudio={playAudio}
                       stopAudio={stopAudio}
                       speed={speed}
                       setSpeed={setSpeed}
                    />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // --- MAIN APP ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('speech'); // 默认展示口语大师方便您查看

      const tabs = [
        { id: 'reading', icon: 'fa-book-open', label: '课文精讲' },
        { id: 'vocab', icon: 'fa-spell-check', label: '词汇打卡' },
        { id: 'grammar', icon: 'fa-wand-magic-sparkles', label: '语法通关' },
        { id: 'speech', icon: 'fa-microphone-lines', label: '口语大师' }
      ];

      return (
        <div className="flex flex-col h-screen w-full bg-background font-sans max-w-md mx-auto relative shadow-2xl overflow-hidden">
          {activeTab !== 'vocabTest' && activeTab !== 'grammarTest' && (
            <Header tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} />
          )}
          
          <main className="flex-1 overflow-hidden relative">
            {activeTab === 'reading' && <ReadingSection />}
            
            {activeTab === 'vocab' && <VocabSection onStartTest={() => setActiveTab('vocabTest')} />}
            {activeTab === 'vocabTest' && <VocabTest onBack={() => setActiveTab('vocab')} />}
            
            {activeTab === 'grammar' && <GrammarSection onStartTest={() => setActiveTab('grammarTest')} />}
            {activeTab === 'grammarTest' && <GrammarTest onBack={() => setActiveTab('grammar')} />}

            {activeTab === 'speech' && <SpeechSection />}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
