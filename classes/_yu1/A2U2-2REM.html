    const playElevenLabsAudio = async (text, voiceId, audioRef, setPlayingState) => {
      try {
        setPlayingState(true);

           audioRef.current.pause(); 
           audioRef.current.currentTime = 0;
        }
        const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
          method: 'POST',
          headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },

        if (!response.ok) throw new Error("Audio fetch failed");
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => setPlayingState(false);
        audio.onerror = () => setPlayingState(false);
        audioRef.current = audio;
        
        const playPromise = audio.play();
        if (playPromise !== undefined) {
           playPromise.catch(error => {
              console.warn("Audio playback interrupted:", error);
              setPlayingState(false);
           });
        }

        console.error(error);

                        <p className="text-sm font-bold leading-relaxed text-slate-700">{activeAnalysis.data.craft}</p>
                      </div>
                    )}
                  </div>
               </div>
            </div>
          )}
        </div>
      );
    };

    // --- 2. Vocab Tab (词汇闯关，全面增强听写与极速测试) ---
    const VocabTab = () => {
      const [mode, setMode] = useState('review'); 
      const [quizItems, setQuizItems] = useState([]);
      const [currentQ, setCurrentQ] = useState(0);
      const [answers, setAnswers] = useState({});
      const [quizCompletedAt, setQuizCompletedAt] = useState(null);
      
      const audioRef = useRef(null);
      const [playingId, setPlayingId] = useState(null);
      const [list, setList] = useState(VOCAB_LIST);
      const [hideChinese, setHideChinese] = useState(false);
      const [dictationMode, setDictationMode] = useState(false);

      const [dictItems, setDictItems] = useState([]);
      const [dictIdx, setDictIdx] = useState(0);
      const [dictAnswers, setDictAnswers] = useState({}); 
      const [dictHasSubmittedCurrent, setDictHasSubmittedCurrent] = useState(false);
      const [dictWrongWords, setDictWrongWords] = useState([]); // 记录当前错题
      const [previewCountdown, setPreviewCountdown] = useState(30);
      const [dictGroupInfo, setDictGroupInfo] = useState({ id: null, label: '' });
      const [dictRoundInfo, setDictRoundInfo] = useState({ id: null, label: '' });
      const [dictRound, setDictRound] = useState(1);
      const [dictSessionWords, setDictSessionWords] = useState([]);
      const [dictMastery, setDictMastery] = useState({});
      const [dictStartedAt, setDictStartedAt] = useState(null);
      const [dictCompletedAt, setDictCompletedAt] = useState(null);

      const alphabet = ['A', 'B', 'C', 'D'];

      const playWordAudio = (word, id) => {
        if (playingId === id) return; 
        playElevenLabsAudio(word, VOICES.voiceA, audioRef, (isPlaying) => { // 使用声音A
          setPlayingId(isPlaying ? id : null);
        });
      };

      useEffect(() => {
          let timer;
          if (mode === 'dictationPreview' && previewCountdown > 0) {
              timer = setTimeout(() => setPreviewCountdown(prev => prev - 1), 1000);
          } else if (mode === 'dictationPreview' && previewCountdown === 0) {
              setMode('dictation');
          }
          return () => clearTimeout(timer);
      }, [mode, previewCountdown]);

      useEffect(() => {
          if (mode === 'dictation' && dictItems.length > 0 && !dictHasSubmittedCurrent) {
              const timer = setTimeout(() => playWordAudio(dictItems[dictIdx].word, `dict_${dictIdx}`), 400);
              return () => clearTimeout(timer);
          }
      }, [dictIdx, mode, dictItems, dictHasSubmittedCurrent]);

      const startQuiz = () => {
        playTone('pop');
        const shuffledVocab = [...VOCAB_LIST].sort(() => 0.5 - Math.random());
        const generatedQuiz = shuffledVocab.map(wordObj => {
           const otherWords = VOCAB_LIST.filter(v => v.id !== wordObj.id).sort(() => 0.5 - Math.random()).slice(0, 3);
           const optionsRaw = [{ text: wordObj.meaning, isCorrect: true }, ...otherWords.map(o => ({ text: o.meaning, isCorrect: false }))].sort(() => 0.5 - Math.random());
           return {
             wordObj: wordObj,
             q: wordObj.word,
             phonetic: wordObj.phonetic,
             options: optionsRaw.map(o => o.text),
             ans: optionsRaw.findIndex(o => o.isCorrect),
             explain: `${wordObj.word} 表示“${wordObj.meaning}”，词性是 ${wordObj.pos}。`
           };
        });
        setQuizItems(generatedQuiz); setAnswers({}); setCurrentQ(0); setQuizCompletedAt(null); setMode('quiz');
      };

      const handleAnswer = (optIdx) => {
        if (answers[currentQ] !== undefined) return;
        if (optIdx === quizItems[currentQ].ans) playTone('correct'); else playTone('wrong');
        setAnswers(prev => ({ ...prev, [currentQ]: optIdx }));
        if (currentQ < 29) setTimeout(() => setCurrentQ(prev => prev + 1), 1200);
      };

      const submitQuiz = () => {
        if (Object.keys(answers).length < 30) return alert("请完成所有题目！");
        playTone('success'); setQuizCompletedAt(Date.now()); setMode('result');
      };

      const startDictationSession = (wordsToTest, groupInfo, resetProgress = true) => {
          playTone('pop');
          const items = wordsToTest.map(w => {
              const wrongMeanings = VOCAB_LIST.filter(v => v.id !== w.id).sort(() => 0.5 - Math.random()).slice(0, 3);
              return { ...w, options: [w, ...wrongMeanings].sort(() => 0.5 - Math.random()) };
          });
          setDictItems(items); setDictIdx(0); setDictAnswers({}); setDictHasSubmittedCurrent(false);
          setDictWrongWords([]);
          setPreviewCountdown(30);
          setDictRoundInfo(groupInfo);
          setMode('dictationPreview');

          if (resetProgress) {
              setDictGroupInfo(groupInfo);
              setDictSessionWords(wordsToTest);
              setDictMastery(Object.fromEntries(wordsToTest.map(w => [w.id, false])));
              setDictRound(1);
              setDictStartedAt(Date.now());
              setDictCompletedAt(null);
          }
      };

      const resetVocabModes = () => {
        setMode('review');
        setAnswers({});
        setCurrentQ(0);
        setQuizCompletedAt(null);
        setDictAnswers({});
        setDictItems([]);
        setDictIdx(0);
        setDictWrongWords([]);
        setDictGroupInfo({ id: null, label: '' });
        setDictRoundInfo({ id: null, label: '' });
        setDictRound(1);
        setDictSessionWords([]);
        setDictMastery({});
        setDictStartedAt(null);
        setDictCompletedAt(null);
        setDictHasSubmittedCurrent(false);
      };

      if (mode === 'review') {
        return (
          <div className="p-4 md:p-8 pb-safe-scroll overflow-y-auto h-full fade-in flex flex-col relative z-0 custom-scrollbar max-w-6xl mx-auto w-full">
            <div className="relative z-40 shrink-0 mb-6">
              <div className="absolute inset-0 bg-gradient-to-r from-sky-800 to-sky-600 rounded-3xl shadow-lg overflow-hidden pointer-events-none">
                 <i className="fa-solid fa-spell-check absolute -left-4 -bottom-4 text-7xl md:text-9xl text-sky-900 opacity-20"></i>
              </div>
              <div className="relative z-10 p-6 md:p-8 flex justify-between items-center text-white">
                 <div className="pointer-events-none">
                    <h2 className="text-2xl md:text-3xl font-black font-serif-novel mb-2">Critic's Toolkit</h2>
                    <p className="text-sky-200 text-sm font-bold">词库 ({list.length}) 词，全方位能力考核</p>
                 </div>
              </div>
            </div>

            <div className="flex flex-wrap items-center bg-white p-4 rounded-3xl shadow-sm border border-slate-100 bounce-in gap-3 mb-6 shrink-0 w-full justify-start md:justify-center">
              <button onClick={() => setMode('dictationGroupSelect')} className="shrink-0 bg-sky-600 text-white px-4 py-2.5 rounded-xl font-black text-sm active-scale transition-colors shadow-sm flex items-center hover:bg-sky-500">
                <i className="fa-solid fa-pen-clip mr-2 text-lg"></i> 每日听写
              </button>
              <button onClick={startQuiz} className="shrink-0 bg-amber-500 text-white px-4 py-2.5 rounded-xl font-black text-sm active-scale transition-colors shadow-sm flex items-center hover:bg-amber-400">
                <i className="fa-solid fa-rocket mr-2 text-lg"></i> 极速测试
              </button>
              <div className="flex gap-2 pl-2 border-l-2 border-slate-100">
                <button onClick={() => {setDictationMode(!dictationMode); playTone('pop');}} className={`shrink-0 px-3 py-2.5 rounded-xl font-bold text-sm active-scale shadow-sm border flex items-center transition-colors ${dictationMode ? 'bg-sky-600 text-white border-sky-600' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                  <i className="fa-solid fa-mask mr-2"></i> 盲猜
                </button>
                <button onClick={() => {setHideChinese(!hideChinese); playTone('pop');}} className={`shrink-0 px-3 py-2.5 rounded-xl font-bold text-sm active-scale shadow-sm border flex items-center transition-colors ${hideChinese ? 'bg-amber-400 text-white border-amber-400' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                  <i className="fa-solid fa-eye-slash mr-2"></i> 隐藏
                </button>
                <button onClick={() => {playTone('pop'); setList([...VOCAB_LIST].sort(() => 0.5 - Math.random()));}} className="shrink-0 bg-sky-50 text-sky-600 px-3 py-2.5 rounded-xl font-bold text-sm active-scale shadow-sm flex items-center hover:bg-sky-100 border border-sky-100">
                  <i className="fa-solid fa-shuffle mr-2"></i> 打乱
                </button>
              </div>
            </div>

            <div className="flex-1 relative z-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-8">
              {list.map((v, i) => (
                <div key={v.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between slide-in-right hover:shadow-md hover:border-sky-300 transition-all group">
                  <div className="flex items-center flex-1 pr-3 overflow-hidden">
                    <span className="w-8 text-slate-300 font-black text-sm shrink-0">{i + 1}.</span>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-baseline mb-1 flex-wrap">
                        <h3 className={`text-lg md:text-xl font-black text-sky-900 font-serif-novel mr-2 transition-all duration-300 rounded truncate ${dictationMode ? 'text-transparent blur-[5px] bg-slate-200 select-none hover:blur-none hover:bg-transparent' : ''}`}>{v.word}</h3>
                        <span className={`text-[11px] md:text-xs text-slate-400 font-mono ${dictationMode ? 'opacity-0' : 'opacity-100'}`}>{v.phonetic}</span>
                      </div>
                      <p className={`text-sm font-bold text-slate-700 transition-opacity truncate ${hideChinese ? 'opacity-0 hover:opacity-100' : 'opacity-100'}`}>
                        <span className="text-amber-500 italic mr-1.5">{v.pos}</span> {v.meaning}
                      </p>
                    </div>
                  </div>
                  <button onClick={() => playWordAudio(v.word, v.id)} className={`w-12 h-12 shrink-0 rounded-full flex items-center justify-center transition-all border ${playingId === v.id ? 'bg-amber-500 text-white border-amber-400 shadow-md animate-pulse scale-110' : 'bg-sky-50 text-sky-600 border-sky-100 hover:bg-sky-100 hover:scale-105'}`}>
                    <i className="fa-solid fa-volume-up text-lg"></i>
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      }

      if (mode === 'dictationGroupSelect') {
        const groups = Array.from({ length: 6 }, (_, i) => ({ id: i + 1, label: `第 ${i + 1} 组`, range: `No. ${i*5 + 1} - ${i*5 + 5}`, words: VOCAB_LIST.slice(i*5, i*5 + 5) }));
        return (
             <div className="p-4 md:p-8 pb-safe-scroll h-full flex flex-col fade-in bg-slate-100 max-w-4xl mx-auto w-full">
               <div className="flex justify-between items-center mb-8 mt-2 shrink-0">
                 <button onClick={() => {playTone('pop'); setMode('review');}} className="w-12 h-12 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-500 active-scale hover:bg-slate-50"><i className="fa-solid fa-arrow-left text-lg"></i></button>
                 <div className="text-sm font-black text-sky-800 bg-sky-100 px-5 py-2 rounded-full border border-sky-200 shadow-sm">请选择今日听写分组</div>
               </div>
               <div className="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4 pb-8 custom-scrollbar px-2">
                 <button onClick={() => startDictationSession([...VOCAB_LIST].sort(() => 0.5 - Math.random()).slice(0, 5), { id: 'random', label: '随机 5 词' })} className="md:col-span-2 bg-gradient-to-r from-amber-400 to-orange-500 text-white p-6 rounded-[2rem] shadow-md active-scale flex justify-between items-center hover:shadow-lg transition-shadow">
                    <div className="text-left"><h3 className="font-black text-2xl mb-1">随机 5 词</h3><p className="text-sm font-bold opacity-90 uppercase tracking-widest">Random Challenge</p></div><i className="fa-solid fa-dice text-5xl opacity-50"></i>
                 </button>
                 {groups.map(g => (
                    <button key={g.id} onClick={() => startDictationSession(g.words, { id: g.id, label: g.label })} className="bg-white p-5 rounded-2xl shadow-sm border-2 border-slate-200 active-scale flex flex-col items-start hover:border-sky-400 transition-colors">
                       <h3 className="font-black text-sky-800 text-lg mb-1">{g.label}</h3><p className="text-xs font-bold text-slate-400 tracking-wider">{g.range}</p>
                    </button>
                 ))}
               </div>
             </div>
        );
      }
      
      if (mode === 'dictationPreview' || mode === 'dictation' || mode === 'dictationSummary' || mode === 'dictationResult' || mode === 'quiz' || mode === 'result') {
          const dictDurationSeconds = dictStartedAt ? Math.max(1, Math.round(((dictCompletedAt || Date.now()) - dictStartedAt) / 1000)) : 0;
          const dictMasteredCount = dictSessionWords.filter(w => dictMastery[w.id]).length;
          const dictAccuracy = dictSessionWords.length ? Math.round((dictMasteredCount / dictSessionWords.length) * 100) : 0;
          const quizScore = quizItems.reduce((sum, item, idx) => sum + (answers[idx] === item.ans ? 1 : 0), 0);
          const quizAccuracy = quizItems.length ? Math.round((quizScore / quizItems.length) * 100) : 0;
          const wrongQuizItems = quizItems
            .map((item, idx) => ({ ...item, userAnswerIdx: answers[idx], index: idx }))
            .filter(item => item.userAnswerIdx !== undefined && item.userAnswerIdx !== item.ans);
          const quizPraise = getQuizPraise(quizAccuracy);

          return (
             <div className="p-4 md:p-8 pb-safe-scroll h-full min-h-0 overflow-y-auto custom-scrollbar flex flex-col fade-in bg-slate-100 max-w-4xl mx-auto w-full">
                <div className="flex justify-between items-center mb-6 mt-2 shrink-0">
                  <button onClick={() => {playTone('pop'); resetVocabModes();}} className="w-12 h-12 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-500 active-scale hover:bg-slate-50"><i className="fa-solid fa-arrow-left text-lg"></i></button>
                  <div className="text-sm font-black text-sky-800 bg-sky-100 px-5 py-2 rounded-full border border-sky-200 shadow-sm">
                    {mode.includes('dictation') ? 'Dictation Challenge' : 'Speed Quiz'}
                  </div>
                </div>
                
                {mode === 'dictationPreview' && (
                  <div className="flex-1 flex flex-col items-center">
                      <div className="text-base font-black text-amber-600 bg-amber-100 px-6 py-2.5 rounded-full inline-block mb-6 shadow-sm border border-amber-200">
                        <i className="fa-regular fa-clock mr-2 animate-pulse"></i> 倒计时 {previewCountdown} s
                      </div>
                      <div className="w-full max-w-lg bg-white p-6 rounded-[2rem] shadow-md border border-slate-200 space-y-3">
                          <h3 className="text-center font-black text-slate-800 border-b-2 border-slate-100 pb-3 mb-4 flex justify-between items-center">
                             <span>预览听写词汇</span>
                             <span className="text-xs font-bold text-sky-600 bg-sky-50 px-2 py-1 rounded">{dictRoundInfo.label || dictGroupInfo.label}</span>
                          </h3>
                          {dictItems.map((v, i) => (
                             <div key={v.id} className="font-bold border-b border-slate-100 pb-3 text-slate-700 flex items-center justify-between group">
                                <div className="flex items-center">
                                   <span className="text-sky-700 font-serif-novel text-lg mr-2">{v.word}</span>
                                   <span className="text-slate-400 font-mono text-sm hidden md:inline">{v.phonetic}</span>
                                </div>
                                <div className="flex items-center gap-3">
                                   <span className="text-slate-500 text-right">{v.meaning}</span>
                                   <button onClick={() => playWordAudio(v.word, `preview_${v.id}`)} className="w-8 h-8 rounded-full bg-sky-50 text-sky-500 hover:bg-sky-100 flex items-center justify-center transition-colors">
                                       <i className="fa-solid fa-volume-high text-xs"></i>
                                   </button>
                                </div>
                             </div>
                          ))}
                      </div>
                      <div className="mt-8 w-full max-w-lg grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button onClick={() => setPreviewCountdown(prev => prev + 15)} className="bg-white text-sky-700 w-full py-4 rounded-2xl font-black text-base active-scale shadow-md border border-sky-100 hover:bg-sky-50 transition-colors">再看 15 秒</button>
                        <button onClick={() => setMode('dictation')} className="bg-sky-600 text-white w-full py-4 rounded-2xl font-black text-lg active-scale shadow-lg hover:bg-sky-500 transition-colors">现在开始听写</button>
                      </div>
                  </div>
                )}

                {mode === 'dictation' && (
                  <div className="flex-1 flex flex-col items-center justify-center max-w-md mx-auto w-full">
                      <div className="w-full flex items-center justify-between mb-4 text-xs font-black text-slate-500">
                         <span className="bg-white px-3 py-2 rounded-full border border-slate-200 shadow-sm">{dictRoundInfo.label || dictGroupInfo.label}</span>
                         <span className="bg-white px-3 py-2 rounded-full border border-slate-200 shadow-sm">第 {dictRound} 轮</span>
                      </div>
                      <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden mb-8 shadow-inner shrink-0">
                         <div className="bg-amber-400 h-full transition-all duration-300" style={{width: `${((dictIdx + 1) / dictItems.length) * 100}%`}}></div>
                      </div>
                      
                      <div className="w-full bg-white p-8 rounded-[2rem] shadow-lg border border-slate-200 flex flex-col items-center text-center">
                        <button onClick={() => playWordAudio(dictItems[dictIdx].word, `dict`)} className="w-20 h-20 bg-sky-50 text-sky-500 border border-sky-100 rounded-full text-3xl mb-8 shadow-sm active-scale hover:bg-sky-100 transition-all flex items-center justify-center"><i className="fa-solid fa-volume-high"></i></button>
                        
                        {/* 听写输入框 */}
                        <input type="text" value={dictAnswers[dictIdx]?.spelling || ''} onChange={e => setDictAnswers(p => ({...p, [dictIdx]: {...p[dictIdx], spelling: e.target.value}}))} disabled={dictHasSubmittedCurrent} className={`w-full text-center text-2xl font-serif-novel font-black p-4 border-2 rounded-2xl mb-4 bg-slate-50 focus:border-sky-500 outline-none transition-colors ${dictHasSubmittedCurrent && dictAnswers[dictIdx]?.isCorrect === false ? 'border-rose-400 text-rose-500 bg-rose-50' : ''}`} placeholder="拼写单词..." />
                        
                        {dictHasSubmittedCurrent ? (
                           <div className={`w-full rounded-2xl p-4 mb-6 text-left font-bold text-sm slide-in-right border ${dictAnswers[dictIdx]?.isCorrect ? 'text-emerald-700 bg-emerald-50 border-emerald-200' : 'text-rose-700 bg-rose-50 border-rose-200'}`}>
                               <div className="flex items-center justify-between gap-3 mb-2">
                                  <span className="flex items-center"><i className={`fa-solid ${dictAnswers[dictIdx]?.isCorrect ? 'fa-circle-check' : 'fa-circle-exclamation'} mr-2`}></i>{dictAnswers[dictIdx]?.isCorrect ? '本题已掌握' : '立刻纠错'}</span>
                                  <span className="font-serif-novel text-base">{dictItems[dictIdx].word}</span>
                               </div>
                               <p className="leading-relaxed">{dictAnswers[dictIdx]?.reviewText}</p>
                               <div className="mt-3 flex flex-wrap gap-2 text-xs">
                                  <span className="bg-white/70 px-3 py-1 rounded-full border border-current/20">音标 {dictItems[dictIdx].phonetic}</span>
                                  <span className="bg-white/70 px-3 py-1 rounded-full border border-current/20">词义 {dictItems[dictIdx].meaning}</span>
                               </div>
                           </div>
                        ) : <div className="mb-6"></div>}

                        <div className="w-full space-y-3">
                            {dictItems[dictIdx].options.map((o, i) => {
                                let btnClass = "border-slate-200 bg-white text-slate-600 hover:bg-slate-50";
                                if (dictHasSubmittedCurrent) {
                                    if (o.id === dictItems[dictIdx].id) {
                                        btnClass = "border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm";
                                    } else if (dictAnswers[dictIdx]?.meaningId === o.id) {
                                        btnClass = "border-rose-500 bg-rose-50 text-rose-700 shadow-sm";
                                    }
                                } else if (dictAnswers[dictIdx]?.meaningId === o.id) {
                                    btnClass = "border-amber-500 bg-amber-50 text-amber-700 shadow-sm";
                                }
                                return (
                                  <button key={o.id} onClick={() => setDictAnswers(p => ({...p, [dictIdx]: {...p[dictIdx], meaningId: o.id}}))} disabled={dictHasSubmittedCurrent} className={`w-full p-4 border-2 rounded-xl text-base font-bold text-left flex items-center ${btnClass}`}>
                                    <span className="mr-3 font-black text-slate-400 w-5 text-center">{alphabet[i]}.</span>
                                    <span>{o.meaning}</span>
                                  </button>
                                );
                            })}
                        </div>

                        {!dictHasSubmittedCurrent ? (
                           <button onClick={() => {
                               const ans = dictAnswers[dictIdx] || {};
                               const normalizedSpelling = (ans.spelling || '').trim().toLowerCase().replace(/\s+/g, ' ');
                               const targetSpelling = dictItems[dictIdx].word.toLowerCase().replace(/\s+/g, ' ');
                               const spellingCorrect = normalizedSpelling === targetSpelling;
                               const meaningCorrect = ans.meaningId === dictItems[dictIdx].id;
                               const isCorrect = spellingCorrect && meaningCorrect;
                               const reviewText = getDictationReview(dictItems[dictIdx], spellingCorrect, meaningCorrect);
                               if (isCorrect) { 
                                   playTone('success'); 
                                   setDictMastery(prev => ({ ...prev, [dictItems[dictIdx].id]: true }));
                                   setDictAnswers(p => ({...p, [dictIdx]: {...p[dictIdx], isCorrect: true, spellingCorrect, meaningCorrect, reviewText }}));
                               } else { 
                                   playTone('wrong'); 
                                   setDictAnswers(p => ({...p, [dictIdx]: {...p[dictIdx], isCorrect: false, spellingCorrect, meaningCorrect, reviewText }}));
                                   if (!dictWrongWords.find(w => w.id === dictItems[dictIdx].id)) {
                                       setDictWrongWords(prev => [...prev, dictItems[dictIdx]]);
                                   }
                               }
                               setDictHasSubmittedCurrent(true);
                           }} className="mt-8 bg-sky-600 text-white w-full py-4 rounded-2xl font-black text-lg shadow-md active-scale">检查答案</button>
                        ) : (
                           <button onClick={() => { 
                               if(dictIdx < dictItems.length-1){
                                   setDictIdx(dictIdx+1); setDictHasSubmittedCurrent(false);
                               } else { 
                                   setMode('dictationSummary'); // 进入总结页
                               } 
                           }} className="mt-8 bg-amber-500 text-white w-full py-4 rounded-2xl font-black text-lg shadow-[0_8px_20px_rgba(249,115,22,0.4)] active-scale pulse-glow">{dictIdx < dictItems.length-1 ? <>Next <i className="fa-solid fa-arrow-right ml-2"></i></> : <>查看本轮结果 <i className="fa-solid fa-flag-checkered ml-2"></i></>}</button>
                        )}
                      </div>
                  </div>
                )}

                {/* --- 听写总结页 (错题巩固) --- */}
                {mode === 'dictationSummary' && (
                  <div className="flex-1 flex items-center justify-center max-w-md mx-auto w-full fade-in">
                    <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-200 text-center w-full">
                        <div className="bg-sky-50 border border-sky-100 rounded-2xl px-4 py-3 mb-6 flex items-center justify-between text-sm font-black text-sky-800">
                           <span>{dictRoundInfo.label || dictGroupInfo.label}</span>
                           <span>已攻克 {dictMasteredCount} / {dictSessionWords.length}</span>
                        </div>
                        {dictWrongWords.length === 0 ? (
                           <>

                         {activeWords.map(w => (
                             <div key={w.id} className="absolute font-black text-white bg-sky-500 px-4 md:px-6 py-2 md:py-3 rounded-xl shadow-lg border-2 border-sky-300 text-lg md:text-xl z-10 whitespace-nowrap fall-anim"
                                  style={{ left: `${w.leftPos}%`, animationDuration: `${fallDiff}s` }}
                                  onAnimationEnd={() => { if (fallState === 'playing') { setFallState('gameover'); playTone('deduct'); } }}>
                                 {w.word}
                             </div>
                         ))}
                     </div>
                     <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                         {meaningOptions.map(opt => (
                             <button key={opt.word} onClick={() => handleFallMeaningClick(opt.meaning)} className="bg-slate-700 text-white border-2 border-slate-600 hover:bg-amber-500 hover:border-amber-400 hover:text-slate-900 font-black rounded-xl text-sm md:text-base transition-colors active-scale p-3 md:p-4 truncate shadow-md">
                                 {opt.meaning}
                             </button>
                         ))}
                     </div>
                  </div>
                )}
                {(fallState === 'gameover' || fallState === 'victory') && (
                  <div className="flex-1 flex flex-col items-center justify-center text-center fade-in">
                     <i className={`fa-solid ${fallState === 'victory' ? 'fa-crown text-amber-400' : 'fa-skull text-rose-500'} text-[100px] mb-6 drop-shadow-xl`}></i>
                     <h3 className="text-4xl font-black text-white mb-2 uppercase tracking-widest">{fallState === 'victory' ? 'Victory!' : 'Game Over'}</h3>
                     <p className="text-sky-200 text-xl mb-10 font-bold font-mono">Final Score: {fallScore}</p>
                     <button onClick={() => setFallState('menu')} className="bg-sky-500 text-white font-black px-10 py-4 rounded-2xl text-lg active-scale hover:bg-sky-400 border-b-4 border-sky-700 transition-all">Try Again <i className="fa-solid fa-rotate-right ml-2"></i></button>
                  </div>
                )}
             </div>
           </div>
        </div>
      );
    };

    // --- MAIN APP ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('reading');

      const tabs = [
        { id: 'reading', icon: 'fa-book-open', label: '课文精读' },
        { id: 'vocab', icon: 'fa-spell-check', label: '词汇闯关' },
        { id: 'practice', icon: 'fa-layer-group', label: '实战总结' },
        { id: 'game', icon: 'fa-meteor', label: '流星雨' }
      ];

      return (
        <div className="flex flex-col h-full w-full bg-sky-50 font-sans relative overflow-hidden">
          <Header tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} />
          <main className="flex-1 overflow-hidden relative flex flex-col z-10 bg-sky-50/60 bg-[url('https://www.transparenttextures.com/patterns/diagmonds-light.png')]">
            {activeTab === 'reading' && <ReadingTab />}
            {activeTab === 'vocab' && <VocabTab />}
            {activeTab === 'practice' && <PracticeTab />}
            {activeTab === 'game' && <GameTab />}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
