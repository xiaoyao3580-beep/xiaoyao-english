<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Xiaoyao Studio Lesson</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5f6fc;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif}
    iframe{display:block;width:100%;height:100vh;height:100dvh;border:0;background:#f5f6fc;opacity:0;transition:opacity .18s ease}
    iframe.ready{opacity:1}
    .state{position:fixed;inset:0;z-index:2;display:none;align-items:center;justify-content:center;padding:24px;text-align:center;color:#2D2A4A;background:#f5f6fc}
    .state.visible{display:flex}
    .state.hidden{display:none}
    .state>div{max-width:420px;border-radius:28px;background:#fff;padding:28px;box-shadow:0 20px 60px -30px rgba(92,45,255,.45)}
    .state h1{margin:0 0 10px;font-size:22px;font-weight:900}
    .state p{margin:0;color:#74777c;font-size:14px;line-height:1.7;font-weight:700;word-break:break-word}
    .spinner{display:inline-block;width:44px;height:44px;margin-bottom:18px;border:4px solid #ece9ff;border-top-color:#6B48FF;border-radius:999px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion:reduce){iframe{transition:none}.spinner{animation:none}}
  </style>
</head>
<body>
  <div class="state visible" id="state"><div><span class="spinner"></span><h1>正在打开作业</h1><p>页面马上出现，请稍等一下。</p></div></div>
  <script src="./lesson-auth-guard.js?v=20260512-auth-guard"></script>
  <script>
    (async function() {
      const auth = await (window.xyLessonAuthReady || Promise.resolve({ allowed:true }));
      if (!auth.allowed) return;
      const state = document.getElementById('state');
      const params = new URLSearchParams(location.search);
      const hwId = params.get('hwId') || '';
      const classCode = params.get('class') || '';
      const storedTarget = hwId ? localStorage.getItem('xy_remote_lesson:' + hwId) : '';
      const candidates = [];
      function addCandidate(url) {
        if (url && !candidates.includes(url)) candidates.push(url);
      }
      addCandidate(params.get('url'));
      addCandidate(storedTarget);
      async function addBackendCandidate() {
        if (!hwId || storedTarget || params.get('url')) return;
        try {
          const supabaseUrl = 'https://avffxvpwzpvlohoyqshb.supabase.co';
          const supabaseKey = 'sb_publishable_Bk22JrUqpC4nd5ucHr9I8A_mvPk3uXc';
          const query = new URL(supabaseUrl + '/rest/v1/homework');
          query.searchParams.set('id', 'eq.' + hwId);
          query.searchParams.set('select', 'id,class_code,file,status');
          const response = await fetch(query.href, {
            headers: { apikey:supabaseKey, Authorization:'Bearer ' + supabaseKey },
            cache:'no-store'
          });
          if (!response.ok) return;
          const rows = await response.json();
          const row = Array.isArray(rows) ? rows[0] : null;
          const rowClass = String(row?.class_code || '').toLowerCase();
          const requestedClass = String(classCode || '').toLowerCase();
          if (row?.file && row.status !== 'closed' && row.status !== 'deleted' && (!requestedClass || rowClass === requestedClass)) {
            localStorage.setItem('xy_remote_lesson:' + hwId, row.file);
            addCandidate(row.file);
          }
        } catch {}
      }
      function fail(message) {
        state.classList.remove('hidden');
        state.classList.add('visible');
        state.innerHTML = '<div><h1>课程打开失败</h1><p>' + String(message || '未知错误').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) + '</p></div>';
      }
      async function loadLesson() {
        let lastError = '';
        for (const target of candidates) {
          try {
            const response = await fetch(target, { cache:'default' });
            if (!response.ok) {
              lastError = target + '：' + response.status;
              continue;
            }
            return { target, html:await response.text() };
          } catch (err) {
            lastError = err && err.message ? err.message : String(err);
          }
        }
        throw new Error(lastError || '缺少课程文件地址。');
      }
      try {
        await addBackendCandidate();
        if (hwId) addCandidate(new URL('./' + hwId + '.html', location.href).href);
        if (!candidates.length) return fail('缺少课程文件地址。');
        const loaded = await loadLesson();
        const target = loaded.target;
        let html = loaded.html;
        const localTailwindCss = new URL('../../assets/tailwind.css?v=20260514-local-1', location.href).href;
        const localTailwindRuntimeJs = new URL('../../assets/vendor/tailwind/tailwindcss-3.4.17.js?v=3.4.17-local-1', location.href).href;
        const localFontAwesomeCss = new URL('../../assets/vendor/fontawesome/css/all.min.css?v=6.4.0-local-1', location.href).href;
        const lessonThemeCss =
          '<style>' +
          '.bg-primary{--tw-bg-opacity:1;background-color:rgb(225 29 72/var(--tw-bg-opacity,1))}' +
          '.bg-primary\\/10{background-color:rgba(225,29,72,.1)}' +
          '.bg-navy{--tw-bg-opacity:1;background-color:rgb(30 41 59/var(--tw-bg-opacity,1))}' +
          '.bg-roseDark{--tw-bg-opacity:1;background-color:rgb(76 5 25/var(--tw-bg-opacity,1))}' +
          '.bg-parchment{--tw-bg-opacity:1;background-color:rgb(250 250 249/var(--tw-bg-opacity,1))}' +
          '.text-primary{--tw-text-opacity:1;color:rgb(225 29 72/var(--tw-text-opacity,1))}' +
          '.text-primaryDark{--tw-text-opacity:1;color:rgb(190 18 60/var(--tw-text-opacity,1))}' +
          '.text-accent{--tw-text-opacity:1;color:rgb(234 88 12/var(--tw-text-opacity,1))}' +
          '.text-sunshine{--tw-text-opacity:1;color:rgb(234 179 8/var(--tw-text-opacity,1))}' +
          '.text-roseDark{--tw-text-opacity:1;color:rgb(76 5 25/var(--tw-text-opacity,1))}' +
          '.border-primary{--tw-border-opacity:1;border-color:rgb(225 29 72/var(--tw-border-opacity,1))}' +
          '.from-primaryLight{--tw-gradient-from:#fb7185 var(--tw-gradient-from-position);--tw-gradient-to:rgba(251,113,133,0) var(--tw-gradient-to-position);--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to)}' +
          '.from-roseDark{--tw-gradient-from:#4c0519 var(--tw-gradient-from-position);--tw-gradient-to:rgba(76,5,25,0) var(--tw-gradient-to-position);--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to)}' +
          '.from-sunshine{--tw-gradient-from:#eab308 var(--tw-gradient-from-position);--tw-gradient-to:rgba(234,179,8,0) var(--tw-gradient-to-position);--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to)}' +
          '.to-primary{--tw-gradient-to:#e11d48 var(--tw-gradient-to-position)}' +
          '</style>';
        const localResourceTags =
          '<link rel="stylesheet" href="' + localTailwindCss.replace(/"/g, '&quot;') + '">' +
          '<link rel="stylesheet" href="' + localFontAwesomeCss.replace(/"/g, '&quot;') + '">' +
          lessonThemeCss;
        const tailwindRuntimeTagPattern = /<script\b[^>]*src=["']https:\/\/cdn\.tailwindcss\.com\/?["'][^>]*>\s*<\/script>/gi;
        const hasTailwindRuntime = tailwindRuntimeTagPattern.test(html);
        tailwindRuntimeTagPattern.lastIndex = 0;
        const needsTailwindRuntime =
          hasTailwindRuntime &&
          (/tailwind\.config\s*=/i.test(html) ||
            /(?:^|[\s"'=])(?:bg|text|border|from|via|to|rounded|shadow|p|px|py|m|mx|my|w|h|min-h|max-w|bottom|top|left|right|translate|rotate|scale|animate|duration|delay|leading|tracking|grid-cols)-\[[^\]]+\]/i.test(html));
        html = needsTailwindRuntime
          ? html.replace(tailwindRuntimeTagPattern, '<script src="' + localTailwindRuntimeJs.replace(/"/g, '&quot;') + '" defer><\/script>')
          : html.replace(tailwindRuntimeTagPattern, '');
        html = html.replace(/<link\b[^>]*href=["']https:\/\/cdnjs\.cloudflare\.com\/ajax\/libs\/font-awesome\/[^"']*\/css\/all\.min\.css["'][^>]*>\s*(?:<\/link>)?/gi, '');
        html = /<\/head>/i.test(html) ? html.replace(/<\/head>/i, localResourceTags + '</head>') : localResourceTags + html;
        html = html.replace(/lesson-standalone\.html(?:\?v=[^"'#<\s]*)?/g, 'lesson-standalone.html?v=20260511-lesson-only');
        const standaloneSrc = new URL('../_yu1/lesson-standalone.html?v=20260511-lesson-only', location.href).href;
        html = html.replace(/(["'])((?:\.\.\/|\.\/)?_yu1\/)?lesson-standalone\.html(?:\?v=[^"'#<\s]*)?/g, '$1' + standaloneSrc);
        const baseHref = new URL('./', target).href;
        const baseTag = '<base href="' + baseHref.replace(/"/g, '&quot;') + '">';
        const bridgeSrc = new URL('../_yu1/xy-record-bridge.js?v=20260511-content-sync', location.href).href;
        const bridgeTag = '<script src="' + bridgeSrc.replace(/"/g, '&quot;') + '" defer><\/script>';
        html = /<head[^>]*>/i.test(html) ? html.replace(/<head([^>]*)>/i, '<head$1>' + baseTag) : baseTag + html;
        html = /<\/head>/i.test(html) ? html.replace(/<\/head>/i, bridgeTag + '</head>') : bridgeTag + html;
        const iframe = document.createElement('iframe');
        iframe.setAttribute('allow', 'autoplay; clipboard-read; clipboard-write; fullscreen; microphone; camera');
        iframe.setAttribute('allowfullscreen', '');
        let iframeVisible = false;
        function showIframe() {
          if (iframeVisible) return;
          iframeVisible = true;
          iframe.classList.add('ready');
          state.classList.remove('visible');
          state.classList.add('hidden');
        }
        iframe.addEventListener('load', showIframe, { once:true });
        iframe.srcdoc = html;
        document.body.appendChild(iframe);
        if (needsTailwindRuntime) setTimeout(showIframe, 1200);
      } catch (err) {
        fail(err && err.message ? err.message : err);
      }
    })();
  </script>
</body>
</html>
