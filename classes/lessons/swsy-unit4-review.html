    const playTone = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        if (type === 'pop') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        } else if (type === 'correct') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(523.25, ctx.currentTime);
          osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'wrong') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.05);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'success' || type === 'cheer') {
          osc.type = 'sine';
          const freqs = [440, 554, 659, 880];
          let startTime = ctx.currentTime;
          freqs.forEach((freq, idx) => {
            const tempOsc = ctx.createOscillator();
            const tempGain = ctx.createGain();
            tempOsc.connect(tempGain); tempGain.connect(ctx.destination);
            tempOsc.type = 'sine'; tempOsc.frequency.setValueAtTime(freq, startTime + idx * 0.1);
            tempGain.gain.setValueAtTime(0.1, startTime + idx * 0.1);
            tempGain.gain.exponentialRampToValueAtTime(0.01, startTime + idx * 0.1 + 0.2);
            tempOsc.start(startTime + idx * 0.1); tempOsc.stop(startTime + idx * 0.1 + 0.2);
          });
        }
      } catch (e) { }
    };

         }

      async play(text, onStart, onEnd) {
        this.stop(); 
        this.controller = new AbortController();
        if(onStart) onStart();
        
        try {
          const voiceId = this.voiceToggle ? RACHEL_ID : CLYDE_ID;
          this.voiceToggle = !this.voiceToggle; 

          const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: 'POST',
            signal: this.controller.signal,
            headers: {
              'xi-api-key': ELEVENLABS_API_KEY,
              'Content-Type': 'application/json',
              'Accept': 'audio/mpeg'
            },
            body: JSON.stringify({

              model_id: "eleven_turbo_v2_5", 
              voice_settings: { stability: 0.5, similarity_boost: 0.75 }
            })
          });

          if (!response.ok) throw new Error("ElevenLabs API Error");

          const audioBlob = await response.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          
          this.audio = new Audio(audioUrl);
          this.audio.playbackRate = this.playbackRate; 
          this.audio.onended = () => { if (onEnd) onEnd(); this.audio = null; };
          this.audio.onerror = () => { if (onEnd) onEnd(); this.audio = null; };

          await this.audio.play();
        } catch (error) {
          if (error.name !== 'AbortError') {
            console.error("TTS Error:", error.message);
            if ('speechSynthesis' in window) {
               const u = new SpeechSynthesisUtterance(text);
               u.lang = 'en-US';
               u.rate = this.playbackRate; 
               u.onend = () => { if (onEnd) onEnd(); };
               u.onerror = () => { if (onEnd) onEnd(); };
               window.speechSynthesis.speak(u);
            } else {
               if (onEnd) onEnd();
            }
          }
        }
      },
      pause() {
        if (this.audio) this.audio.pause();
        if ('speechSynthesis' in window) window.speechSynthesis.pause();
      },
      resume() {
        if (this.audio) this.audio.play();
        if ('speechSynthesis' in window) window.speechSynthesis.resume();
      },
      stop() {
        if (this.controller) this.controller.abort();
        if (this.audio) {
          this.audio.pause();
          this.audio.currentTime = 0;
          this.audio = null;
        }
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      }
    };

      const generateOptions = (correctItem, allItems, typeKey) => {
        const correctVal = correctItem[typeKey];
        const options = [correctVal];
        
        const otherVals = allItems
            .filter(i => i.en !== correctItem.en && i[typeKey] !== correctVal)
            .map(i => i[typeKey]);
            
        const uniqueOthers = [...new Set(otherVals)].filter(val => val && val.trim() !== "");
        uniqueOthers.sort(() => Math.random() - 0.5);
        
        options.push(...uniqueOthers.slice(0, 3));
        
        let fallbackCounter = 1;
        while(options.length < 4) {
           options.push(`(安全占位选项 ${fallbackCounter++})`);
        }
        
        return options.sort(() => Math.random() - 0.5);
      };

      const generateQuiz = () => {
        let bank = [...rawBank];
        bank.sort(() => Math.random() - 0.5); 

        const newQuestions = bank.map(item => {
           const types = ['zh-to-en', 'en-to-zh', 'audio-to-zh'];
           const qType = types[Math.floor(Math.random() * types.length)];
           
           let qText, correctAns, options;
           if (qType === 'zh-to-en') {
               qText = item.zh; correctAns = item.en;
               options = generateOptions(item, rawBank, 'en');
           } else if (qType === 'en-to-zh') {
               qText = item.en; correctAns = item.zh;
               options = generateOptions(item, rawBank, 'zh');
           } else {
               qText = item.en; correctAns = item.zh;
               options = generateOptions(item, rawBank, 'zh');
           }
           
           const correctIndex = options.indexOf(correctAns);
           return { ...item, qType, qText, correctAns, options, correctIndex };
        });

        setQuestions(newQuestions);
        setCurrentQ(0);
        setAnswers({});
        setStartTime(Date.now());
        setViewMode('quiz');
      };

      useEffect(() => {
        if (questions.length > 0 && viewMode === 'quiz') {
          const q = questions[currentQ];
          if (q && q.qType === 'audio-to-zh') {

            ElevenLabsTTS.play(q.en, null, () => setPlayingAudio(false));

        if (answers[currentQ] !== undefined) return;
        
        const q = questions[currentQ];

        if (isCorrect) playTone('correct'); else playTone('wrong');
        
        setAnswers(prev => ({ ...prev, [currentQ]: optIdx }));
        
        if (currentQ < questions.length - 1) {
          setTimeout(() => setCurrentQ(prev => prev + 1), 1200);
        } else {
          setTimeout(() => { 
            const end = Date.now();
            setTimeSpent(Math.floor((end - startTime) / 1000));
            playTone('success'); 
            setViewMode('result'); 
          }, 1200);
        }

      const getComment = (acc) => {
         if (acc >= 90) return { title: "太棒啦！王牌诞生！", msg: "你是最耀眼的英语小明星！满分姿势帅呆了！", icon: "🏆", bg: "bg-yellow-100", textColor: "text-yellow-600" };

         if (acc >= 50) return { title: "继续加油鸭！", msg: "不错哟！再复习一下错题，下次肯定拿100分！", icon: "🚀", bg: "bg-blue-100", textColor: "text-blue-600" };

          </div>

      }

      if (viewMode === 'result') {
        let correctCount = 0;

          else wrongItems.push({ q: questions[key], selectedOpt: answers[key] });

        const accuracy = Math.round((correctCount / questions.length) * 100);
        const dateStr = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
        const minutes = Math.floor(timeSpent / 60);
        const seconds = timeSpent % 60;
        const timeStr = minutes > 0 ? `${minutes}分 ${seconds}秒` : `${seconds}秒`;
        const comment = getComment(accuracy);

        return (
          <div className="absolute inset-0 z-[100] p-5 pb-safe-scroll flex flex-col bg-[#fdf2f8] relative fade-in overflow-y-auto">
             <div className="bg-white p-8 rounded-[32px] shadow-[0_10px_40px_rgba(225,29,72,0.15)] border-t-8 border-primary burst-in mb-6 relative overflow-hidden">

    const EssayBlock = ({ chunks }) => {
      const [explanation, setExplanation] = useState(null);
      const [playbackState, setPlaybackState] = useState('idle'); 
      const [speed, setSpeed] = useState(ElevenLabsTTS.playbackRate);

      const handleChunkClick = (chunk) => {
        if (chunk.type !== 'normal') {
          playTone('pop');
          setExplanation({ hint: chunk.hint, type: chunk.type, text: chunk.text, ipa: chunk.ipa });
        }
      };

      const handlePlayPause = async () => {
         playTone('pop');
         if (playbackState === 'playing') {
            ElevenLabsTTS.pause();
            setPlaybackState('paused');
         } else if (playbackState === 'paused') {
            ElevenLabsTTS.resume();
            setPlaybackState('playing');
         } else {
            setPlaybackState('playing');
            const fullText = chunks.map(c => c.text).join('');
            await ElevenLabsTTS.play(fullText, null, () => setPlaybackState('idle'));
         }
      };

      const handleStop = () => {
         if (playbackState !== 'idle') {
            playTone('pop');
            ElevenLabsTTS.stop();
            setPlaybackState('idle');
         }
      };

      const toggleSpeed = () => {
         playTone('pop');
         const newSpeed = speed === 1.0 ? 0.8 : 1.0;
         setSpeed(newSpeed);
         ElevenLabsTTS.setSpeed(newSpeed);
      };

      useEffect(() => {
         return () => ElevenLabsTTS.stop();
      }, [chunks]);

      return (
        <div className="bg-white/90 backdrop-blur-md p-5 rounded-[24px] shadow-sm border border-slate-200 relative mb-6">
          <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
             <h3 className="font-black text-primaryDark text-[16px] flex items-center">
               <i className="fa-solid fa-wand-magic-sparkles text-sunshine mr-2"></i> Elite Essay
             </h3>
             <div className="flex items-center space-x-2 bg-slate-50 p-1.5 rounded-full border border-slate-100 shadow-inner">
               <button onClick={toggleSpeed} className="px-2.5 py-1 rounded-full bg-white text-[11px] font-black text-slate-600 shadow-sm border border-slate-200 active-scale mr-1">
                  {speed}x
               </button>
               <button onClick={handleStop} className={`w-7 h-7 rounded-full flex items-center justify-center shadow-sm transition-all border active-scale ${playbackState !== 'idle' ? 'bg-white text-rose-400 border-rose-200' : 'bg-transparent text-slate-300 border-transparent'}`}>
                  <i className="fa-solid fa-stop text-[9px]"></i>
               </button>
               <button onClick={handlePlayPause} className={`w-8 h-8 rounded-full flex items-center justify-center shadow-sm transition-all active-scale ${playbackState === 'playing' ? 'bg-primary text-white pulse-fast border-primary' : 'bg-rose-50 text-primary border border-rose-200'}`}>
                  <i className={`fa-solid ${playbackState === 'playing' ? 'fa-pause' : 'fa-play'} text-[11px] ml-${playbackState==='playing'?'0':'0.5'}`}></i>
               </button>
             </div>
          </div>
          
          <p className="text-[15px] leading-[2.3] font-serif text-slate-800 relative z-10 text-justify">
            {chunks.map((chunk, i) => {
              if (chunk.type === 'normal') return <span key={i}>{chunk.text}</span>;
              if (chunk.type === 'hook') return <span key={i} onClick={() => handleChunkClick(chunk)} className="essay-interactive">{chunk.text}</span>;
              if (chunk.type === 'connector') return <span key={i} onClick={() => handleChunkClick(chunk)} className="essay-connector">{chunk.text}</span>;
              if (chunk.type === 'native') return <span key={i} onClick={() => handleChunkClick(chunk)} className="essay-native">{chunk.text}</span>;
            })}
          </p>

          {explanation && (
            <div className="mt-5 bg-rose-50 border border-rose-100 rounded-[20px] p-5 shadow-sm bounce-in relative">
              <button onClick={() => setExplanation(null)} className="absolute top-3 right-3 w-7 h-7 bg-white rounded-full flex items-center justify-center text-rose-400 active-scale shadow-sm border border-rose-100"><i className="fa-solid fa-xmark text-[11px]"></i></button>
              
              <div className="text-[10px] font-black uppercase tracking-widest mb-2 text-primary">Expression Target</div>
              <p className="text-[16px] font-black text-slate-800 mb-1">{explanation.text}</p>
              
              {explanation.ipa && (
                 <div className="flex items-center mb-3 text-slate-500 font-medium">
                    <i className="fa-solid fa-volume-off mr-1.5 opacity-70"></i>
                    <span className="font-mono text-[13px] tracking-wide bg-white px-2 py-0.5 rounded-md border border-slate-100">{explanation.ipa}</span>
                 </div>
              )}
              
              <p className="text-[13px] text-slate-600 bg-white px-3 py-1.5 inline-block rounded-xl border border-rose-100 font-bold shadow-sm">
                 <i className="fa-solid fa-lightbulb text-sunshine mr-1.5"></i> {explanation.hint}
              </p>
            </div>
          )}
        </div>
      );
    };

    const MindMap = ({ breakdown, colorTheme = "primary" }) => {
       const colorMap = {
          primary: 'text-primary bg-primary border-primary rgba(225,29,72,0.2)',
          orange: 'text-orange-500 bg-orange-500 border-orange-500 rgba(249,115,22,0.2)',
          purple: 'text-purple-500 bg-purple-500 border-purple-500 rgba(168,85,247,0.2)',
          rose: 'text-rose-500 bg-rose-500 border-rose-500 rgba(244,63,94,0.2)'
       };
       const themeClass = colorMap[colorTheme] || colorMap.primary;
       const [textColor, bgColor, borderColor, lineRgba] = themeClass.split(' ');

       return (
          <div className="bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 mb-6">
            <h3 className="font-black text-slate-800 text-[15px] mb-4 flex items-center border-b border-slate-100 pb-3">
              <i className={`fa-solid fa-sitemap ${textColor} mr-2`}></i> Keyword Map
            </h3>
            <div className="relative pl-3 space-y-5">
              {breakdown.map((item, idx) => (
                <div key={idx} className="relative flex items-start">
                   {idx < breakdown.length - 1 && <div className="absolute left-3.5 top-8 bottom-[-20px] w-0.5 bg-slate-100"></div>}
                   <div className={`w-7 h-7 rounded-full ${bgColor} text-white flex items-center justify-center font-black text-[12px] shadow-sm z-10 shrink-0 mt-0.5`}>
                     {item.step}
                   </div>
                   <div className="ml-3 flex-1 pb-1">
                      <div className={`text-[9px] uppercase text-slate-400 font-bold mb-0.5 tracking-widest`}>{item.type}</div>
                      <div className="text-[14px] font-black text-slate-800 leading-snug">{item.zh}</div>
                      <div className="text-[11px] font-serif font-bold text-slate-500 mt-0.5">{item.en}</div>
                   </div>
                </div>
              ))}
            </div>
          </div>
       );
    };


    // --- TAB VIEWS ---

    const ArsenalTab = () => {
      const [playingAudioId, setPlayingAudioId] = useState(null);
      const [activeHints, setActiveHints] = useState({});
      const [peacStep, setPeacStep] = useState(0);
      const [peacSelected, setPeacSelected] = useState(null);
      const [peacStatus, setPeacStatus] = useState(null);
      const [revealedTranscripts, setRevealedTranscripts] = useState({});

      const toggleHint = (id) => { setActiveHints(prev => ({ ...prev, [id]: !prev[id] })); playTone('pop'); };

      const handlePlayAudio = (id, text) => {
        setRevealedTranscripts(prev => ({ ...prev, [id]: true }));
        if (playingAudioId === id) { ElevenLabsTTS.stop(); setPlayingAudioId(null); return; }
        ElevenLabsTTS.play(text, () => setPlayingAudioId(id), () => setPlayingAudioId(null));
      };

      const handlePeacAnswer = (letter) => {
        if (peacStatus !== null) return;
        setPeacSelected(letter);
        if (letter === peacQuizData[peacStep].correct) { setPeacStatus('correct'); playTone('cheer'); }
        else { setPeacStatus('error'); playTone('wrong'); }
      };

      const nextPeacQuestion = () => {
        if (peacStep < peacQuizData.length - 1) {
          setPeacStep(prev => prev + 1); setPeacSelected(null); setPeacStatus(null); playTone('pop');
        } else {
          setPeacStep(0); setPeacSelected(null); setPeacStatus(null); playTone('success');
        }
      };

      return (
        <div className="p-4 pb-safe-scroll fade-in">
          
          <div className="mb-6 space-y-5">
            <h3 className="text-[18px] font-black text-slate-800 flex items-center ml-1">
              <i className="fa-solid fa-crown text-sunshine mr-2 text-xl"></i>Elite Hooks
            </h3>
            
            {arsenalData.expressions.map((exp, idx) => (
              <div key={idx} className="bg-white rounded-[24px] shadow-sm border border-slate-100 overflow-hidden">
                <div className="bg-rose-50/50 p-4 border-b border-rose-100">
                  <h4 className="font-black text-primaryDark text-[14px] text-center">{exp.name}</h4>
                </div>
                <div className="p-4 pb-2">
                  <div className="flex flex-col space-y-2 mb-4">
                    <div className="bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                      <div className="text-[9px] text-slate-400 font-bold uppercase mb-1">❌ Stop saying:</div>
                      <div className="text-[12px] font-mono text-slate-500 line-through">{exp.basic}</div>
                    </div>
                    <div className="bg-rose-50/50 p-2.5 rounded-xl border border-rose-100/60">
                      <div className="text-[9px] text-primary font-black uppercase mb-1">✅ Say this:</div>
                      <div className="text-[13px] font-bold text-primaryDark">{exp.elite}</div>
                    </div>
                  </div>

                  <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center">
                    <i className="fa-solid fa-headphones text-accent mr-1.5"></i> Audio PK Practice
                  </div>
                  <div className="space-y-2.5 mb-2">
                    {exp.pkTopics.map((pt, i) => {
                      const uniqueId = `audio-${idx}-${i}`;
                      const isPlaying = playingAudioId === uniqueId;
                      const isHintOpen = activeHints[uniqueId];
                      const isSubRevealed = revealedTranscripts[uniqueId];
                      
                      return (
                        <div key={i} className="flex flex-col bg-slate-50 border border-slate-200/60 rounded-xl overflow-hidden">
                          <div className="flex items-center justify-between p-2.5 pl-3">
                            <span className="font-bold text-[13px] text-slate-700">{pt.topic}</span>
                            <div className="flex space-x-2">
                              <button onClick={() => toggleHint(uniqueId)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors text-sm ${isHintOpen ? 'bg-amber-100 text-amber-600' : 'bg-white text-slate-400 active:bg-slate-100 shadow-sm border border-slate-100'}`}>
                                <i className="fa-solid fa-lightbulb"></i>
                              </button>
                              <button onClick={() => handlePlayAudio(uniqueId, pt.audioAns)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors text-sm shadow-sm ${isPlaying ? 'bg-primary text-white pulse-fast' : 'bg-white text-primary active-scale border border-rose-100'}`}>
                                <i className={`fa-solid ${isPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                              </button>
                            </div>
                          </div>
                          {isHintOpen && (
                            <div className="bg-amber-50 px-3 py-2 text-[11px] text-amber-800 border-t border-amber-100 font-mono animate-fadeIn">
                              💡 Hint: <span className="font-bold">{pt.vocab}</span>
                            </div>
                          )}
                          {isSubRevealed && (
                            <div className="bg-white px-3 py-2 text-[11px] text-slate-600 border-t border-slate-100 font-medium italic animate-fadeIn">
                              "{pt.audioAns}"
                            </div>
                          )}
                        </div>
                      )
                    })}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="bg-white rounded-[24px] shadow-sm border border-slate-100 p-5 mb-6">
            <h3 className="text-[16px] font-black text-slate-800 mb-4 flex items-center">
              <i className="fa-solid fa-brain text-accent mr-2"></i>The P.E.A.C. Model
            </h3>
            <div className="space-y-3">
              {arsenalData.framework.map((step, idx) => (
                <div key={idx} className="flex items-start p-3 bg-slate-50 rounded-xl border border-slate-100">
                  <div className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-black mr-3 shrink-0 text-sm shadow-sm mt-0.5">{step.letter}</div>
                  <div className="flex-1">
                    <div className="text-[13px] font-black text-slate-800 mb-0.5">{step.name}</div>
                    <div className="text-[11px] text-slate-500 mb-1.5 leading-snug">{step.desc}</div>
                    <div className="text-[10px] bg-rose-50 text-rose-800 p-2 rounded-lg border border-rose-100 font-serif italic font-bold">
                      e.g., {step.example}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-[24px] shadow-sm border border-slate-100 p-5 mb-6">
             <h3 className="text-[16px] font-black text-slate-800 flex items-center mb-1"><i className="fa-solid fa-headphones-simple text-primary mr-2"></i>P.E.A.C. Audio Quiz</h3>
             <p className="text-[11px] text-slate-400 mb-4 uppercase tracking-widest font-bold">Listen & Select: P, E, A, or C?</p>
             
             <div className="bg-slate-50 rounded-2xl border border-slate-200 p-4">
                <div className="flex justify-between items-center mb-4">
                  <h4 className="text-[11px] font-black text-primary bg-rose-100 px-3 py-1.5 rounded-full flex items-center tracking-widest uppercase">
                    Q <span className="text-sm mx-1">{peacStep + 1}</span> / {peacQuizData.length}
                  </h4>
                  <button onClick={() => handlePlayAudio(`peac-${peacStep}`, peacQuizData[peacStep].text)} className="bg-primary active:bg-primaryDark text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors flex items-center shadow-sm active-scale">
                    <i className={`fa-solid ${playingAudioId === `peac-${peacStep}` ? 'fa-pause pulse-fast' : 'fa-play'} mr-2`}></i> Listen
                  </button>
                </div>

                {revealedTranscripts[`peac-${peacStep}`] && (
                  <div className="mb-4 bg-white px-3 py-3 rounded-xl border border-slate-200 text-[13px] text-slate-700 italic font-medium animate-fadeIn text-center font-serif">
                     "{peacQuizData[peacStep].text}"
                  </div>
                )}

                <div className="grid grid-cols-4 gap-2 mb-4">
                  {['P', 'E', 'A', 'C'].map(letter => {
                    let btnClass = "bg-white border border-slate-200 text-slate-600 active:bg-slate-100 shadow-sm";
                    if (peacSelected === letter) {
                      if (peacStatus === 'correct') btnClass = "bg-emerald-50 border-emerald-500 text-emerald-700 font-black shadow-inner";
                      if (peacStatus === 'error') btnClass = "bg-rose-50 border-rose-500 text-rose-700 font-black";
                    } else if (peacStatus === 'error' && letter === peacQuizData[peacStep].correct) {
                      btnClass = "bg-emerald-50 border-emerald-500 border-dashed text-emerald-700 font-bold opacity-80";
                    }
                    return (
                      <button key={letter} disabled={peacStatus !== null} onClick={() => handlePeacAnswer(letter)} className={`py-3.5 rounded-xl text-xl font-black transition-all active-scale ${btnClass}`}>
                        {letter}
                      </button>
                    )
                  })}
                </div>
                
                {peacStatus !== null && (
                  <div className="animate-fadeIn mt-2">
                    <div className={`p-3 rounded-xl text-xs font-bold mb-4 leading-relaxed ${peacStatus === 'correct' ? 'bg-emerald-50 text-emerald-800 border border-emerald-200' : 'bg-rose-50 text-rose-800 border border-rose-200'}`}>
                      {peacStatus === 'correct' ? <i className="fa-solid fa-check-circle mr-1 text-emerald-500"></i> : <i className="fa-solid fa-xmark-circle mr-1 text-rose-500"></i>}
                      {peacQuizData[peacStep].explain}
                    </div>
                    <button onClick={nextPeacQuestion} className="w-full bg-slate-800 text-white py-3.5 rounded-xl text-sm font-bold uppercase tracking-widest active:bg-slate-700 transition-colors shadow-md active-scale">
                      {peacStep < peacQuizData.length - 1 ? 'Next Question' : 'Restart Quiz'}
                    </button>
                  </div>
                )}
             </div>
          </div>
        </div>
      );
    }

    const Topic1Tab = () => {
      const [showExam, setShowExam] = useState(false);

      if (showExam) {
        return <ExamSystem title="Role Model" rawBank={roleModelQuickFireData} onClose={() => setShowExam(false)} />
      }

      return (
        <div className="p-4 pb-safe-scroll fade-in">
           {/* Intro Card */}
           <div className="bg-white rounded-[24px] shadow-sm border border-slate-100 p-6 mb-6 mt-2 relative overflow-hidden">
              <div className="absolute -right-6 -top-6 text-[100px] text-primary/5 rotate-12"><i className="fa-solid fa-user-graduate"></i></div>
              <h2 className="text-[22px] font-black font-serif text-primaryDark mb-2 relative z-10">Role Model</h2>
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 bg-slate-50 inline-block px-3 py-1 rounded-full">Topic 1 · 2 mins · P.E.A.C.</div>
              <p className="text-[14px] font-medium text-slate-600 italic border-l-[3px] border-primary pl-3 relative z-10 leading-relaxed bg-gradient-to-r from-rose-50/50 to-transparent py-1">
                "Describe a person you admire the most. How does this person influence you?"
              </p>
           </div>

           {/* Exam Banner */}
           <div className="flex justify-between items-center bg-gradient-to-r from-rose-50 to-white border border-rose-200 rounded-[20px] p-4 mb-6 shadow-sm">
             <div className="flex items-center">
                <div className="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-primary mr-3 shadow-inner">
                   <i className="fa-solid fa-file-signature text-lg"></i>
                </div>
                <div className="flex flex-col">
                   <span className="font-black text-slate-800 text-[15px]">Exam Challenge</span>
                   <span className="text-[10px] text-primary font-bold uppercase tracking-widest">Test Your Memory</span>
                </div>
             </div>
             <button onClick={() => { playTone('pop'); setShowExam(true); }} className="px-4 py-2 bg-primary text-white text-[11px] font-black rounded-xl shadow-md active-scale tracking-wider uppercase">
                Start <i className="fa-solid fa-chevron-right ml-1"></i>
             </button>
           </div>

           <MindMap breakdown={roleModelBreakdown} colorTheme="primary" />
           <EssayBlock chunks={roleModelEssayChunks} />
        </div>
      );
    }

    const Topic2Tab = () => {
      const [hobbyId, setHobbyId] = useState('harrypotter');
      const [showExam, setShowExam] = useState(false);
      const data = readingData[hobbyId];

      if (showExam) {
        return <ExamSystem title="Reading Mega Exam" rawBank={topic2QuizBank} onClose={() => setShowExam(false)} />
      }

      const getThemeColor = (id) => {
        if(id === 'harrypotter') return 'orange';
        if(id === 'littleprince') return 'purple';
        if(id === 'stevejobs') return 'rose';
        return 'primary';
      }

      return (
        <div className="p-4 pb-safe-scroll fade-in">
           {/* Intro Card */}
           <div className="bg-white rounded-[24px] shadow-sm border border-slate-100 p-6 mb-6 mt-2 relative overflow-hidden">
              <div className="absolute -right-4 -top-4 text-[100px] text-accent/5 rotate-12"><i className="fa-solid fa-book-open-reader"></i></div>
              <h2 className="text-[22px] font-black font-serif text-slate-800 mb-2 relative z-10">Magic of Reading</h2>
              <div className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4 bg-slate-50 inline-block px-3 py-1 rounded-full">Topic 2 · Universal P.E.A.C.</div>
              <p className="text-[14px] font-medium text-slate-600 italic border-l-[3px] border-accent pl-3 relative z-10 leading-relaxed bg-gradient-to-r from-orange-50/50 to-transparent py-1">
                "What is your favorite book? What have you learned from reading it?"
              </p>
           </div>

           {/* Exam Banner */}
           <div className="flex justify-between items-center bg-gradient-to-r from-orange-50 to-white border border-orange-200 rounded-[20px] p-4 mb-6 shadow-sm">
             <div className="flex items-center">
                <div className="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 mr-3 shadow-inner">
                   <i className="fa-solid fa-earth-americas text-lg"></i>
                </div>
                <div className="flex flex-col">
                   <span className="font-black text-slate-800 text-[15px]">Mega Exam</span>
                   <span className="text-[10px] text-orange-500 font-bold uppercase tracking-widest">All Books</span>
                </div>
             </div>
             <button onClick={() => { playTone('pop'); setShowExam(true); }} className="px-4 py-2 bg-orange-500 text-white text-[11px] font-black rounded-xl shadow-md active-scale tracking-wider uppercase">
                Start <i className="fa-solid fa-chevron-right ml-1"></i>
             </button>
           </div>

           {/* Sub Topic Selector */}
           <div className="flex space-x-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
              {Object.values(readingData).map(h => (
                 <button 
                   key={h.id} onClick={() => { setHobbyId(h.id); playTone('pop'); }}
                   className={`flex-1 min-w-[100px] py-3.5 px-2 rounded-2xl font-black text-[13px] flex items-center justify-center transition-all border ${hobbyId === h.id ? `bg-white shadow-md transform scale-105 ${h.color} border-slate-100` : 'bg-slate-50 text-slate-400 border-transparent active-scale'}`}
                 >
                   <i className={`fa-solid ${h.icon} mr-1.5 ${hobbyId === h.id ? '' : 'opacity-60'}`}></i> {h.name}
                 </button>
              ))}
           </div>

           <div key={hobbyId} className="fade-in">
             <MindMap breakdown={data.breakdown} colorTheme={getThemeColor(hobbyId)} />
             <EssayBlock chunks={data.essayChunks} />
           </div>
        </div>
      );
    }


    // --- MAIN APP ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('arsenal'); 

      const tabs = [
        { id: 'arsenal', icon: 'fa-graduation-cap', label: '1. Elite Arsenal' },
        { id: 'topic1', icon: 'fa-user-graduate', label: '2. Role Model' },
        { id: 'topic2', icon: 'fa-book-open-reader', label: '3. Reading Magic' }
      ];

      return (
        <div className="flex flex-col min-h-screen w-full relative bg-slate-50">
          <Header tabs={tabs} activeTab={activeTab} setActiveTab={setActiveTab} />
          
          <main className="flex-1 relative flex flex-col">
            {activeTab === 'arsenal' && <ArsenalTab />}
            {activeTab === 'topic1' && <Topic1Tab />}
            {activeTab === 'topic2' && <Topic2Tab />}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
