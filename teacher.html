<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>老师后台 · 肖瑶启言</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --color-primary: #2F4A3A;
      --color-primary-deep: #1F3328;
      --color-accent: #C0674A;
      --color-accent-soft: #E8B89A;
      --color-bg: #FAF7EE;
      --color-bg-warm: #EDE5D2;
      --color-border: #D6CDB9;
      --color-text: #2C2C2C;
      --color-text-muted: #5A6B5E;
      --color-text-subtle: #8B9288;
    }
    html, body { margin:0;padding:0;width:100%;min-height:100%;background:var(--color-bg);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:var(--color-text);-webkit-tap-highlight-color:transparent; }
    .font-serif-en { font-family: Georgia,'STSong','宋体',serif; font-style: italic; }
    .font-serif-cn { font-family: 'Songti SC','STSong','SimSun','宋体',serif; }
    .font-sans { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; }
    .pb-safe { padding-bottom: calc(3rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    
    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
    }
    
    .modal-overlay { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .toggle { position: relative; display: inline-block; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #D6CDB9; transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #FAF7EE; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background: var(--color-primary); }
    input:checked + .slider:before { transform: translateX(18px); background: var(--color-accent-soft); }
    
    .input-field {
      width: 100%;
      padding: 10px 12px;
      background: var(--color-bg-warm);
      border: 0.5px solid var(--color-border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--color-text);
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    .input-field:focus {
      border-color: var(--color-primary);
      background: var(--color-bg);
    }
    .class-chip {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      border: 0.5px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text-muted);
    }
    .class-chip.active {
      background: var(--color-primary);
      color: var(--color-bg);
      border-color: var(--color-primary);
    }
    .code-block {
      background: var(--color-primary-deep);
      color: var(--color-accent-soft);
      padding: 12px;
      border-radius: 6px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="root" class="min-h-screen"></div>

  <script>
    const XY_CLASSES = [
      { code: 'adult',   name: '成人0基础口语',  level: 'ADULT · ZERO BASE',         time: '周四下午', short: 'Adult · Zero' },
      { code: 'swsy',    name: '深外素养',       level: 'SWSY · ELITE',              time: '周四晚上', short: 'SWSY · Elite' },
      { code: 'f2',      name: 'F2班',          level: 'TALENT F2 · FOUNDATION',    time: '周五晚上', short: 'F2 · Foundation' },
      { code: 'a2-1',    name: 'A2班(1班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周六早上', short: 'A2 · First' },
      { code: 'a1-plus', name: 'A1+班',         level: 'TALENT A1+ · BEGINNER+',    time: '周六下午', short: 'A1+ · Rise' },
      { code: 'ms',      name: '初中能力提升',    level: 'MIDDLE SCHOOL · ADVANCED',  time: '周六下午', short: 'MS · Advanced' },
      { code: 'econ',    name: '经济学人班',     level: 'ECONOMIST · PREMIUM',       time: '周六晚上', short: 'Economist' },
      { code: 'a2-plus', name: 'A2+班',         level: 'TALENT A2+ · ADVANCED',     time: '周日早上', short: 'A2+ · Advanced' },
      { code: 'a2-2',    name: 'A2班(2班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周日下午', short: 'A2 · Second' }
    ];
    const XY_STUDENTS = [
      { id: 'S01', password: '1234', name: '学生S01', classes: ['a2-1'] },
      { id: 'S02', password: '2345', name: '学生S02', classes: ['a2-1', 'f2'] },
      { id: 'S03', password: '3456', name: '学生S03', classes: ['swsy'] },
      { id: 'S04', password: '4567', name: '学生S04', classes: ['a2-plus', 'a1-plus'] }
    ];
    const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };
    const XY_HOMEWORK = [
      { id: 'a2-1-u6-1',   classCode: 'a2-1',    unit: 'U6-1', title: 'The Life Columnist',            date: '2026-04-20', file: 'a2-1/A2_U6-1.html',      status: 'open' },
      { id: 'a2plus-u6-3', classCode: 'a2-plus', unit: 'U6-3', title: 'Grammar Master',                date: '2026-04-24', file: 'a2-plus/A2_Unit_6-3.html', status: 'closed' },
      { id: 'a1plus-u6-4', classCode: 'a1-plus', unit: 'U6-4', title: 'Magic Review & Challenge',      date: '2026-04-24', file: 'a1-plus/A1_Unit_6-4.html', status: 'closed' }
    ];
    const XY_AUTH = {
      getCurrentUser: function() {
        try {
          const data = localStorage.getItem('xy_user');
          if (!data) return null;
          const stored = JSON.parse(data);
          if (stored.role === 'teacher' && stored.id === XY_TEACHER.id) return { user: XY_TEACHER, role: 'teacher' };
          return null;
        } catch (e) { return null; }
      },
      logout: function() { localStorage.removeItem('xy_user'); }
    };
    const STORAGE_KEY = 'xy_hw_status_overrides';
    function loadOverrides() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch (e) { return {}; } }
    function saveOverrides(obj) { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    const root = document.getElementById('root');
    const auth = XY_AUTH.getCurrentUser();

    if (!auth || auth.role !== 'teacher') {
      alert('请先以老师身份登录');
      window.location.href = 'index.html';
    } else {
      const overrides = loadOverrides();
      Object.keys(overrides).forEach(hwId => {
        const hw = XY_HOMEWORK.find(h => h.id === hwId);
        if (hw) hw.status = overrides[hwId];
      });
      renderDashboard();
    }

    function renderDashboard() {
      const openHw = XY_HOMEWORK.filter(h => h.status === 'open').length;
      const totalStudents = XY_STUDENTS.length;

      const classRows = XY_CLASSES.map((cls, i) => {
        const classHw = XY_HOMEWORK.filter(h => h.classCode === cls.code);
        const stats = {
          open: classHw.filter(h => h.status === 'open').length,
          closed: classHw.filter(h => h.status === 'closed').length
        };
        return `
          <button data-class-code="${cls.code}" class="class-row-btn active-scale" style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:16px;text-align:left;width:100%;display:flex;align-items:center;gap:14px;animation:fadeInUp 0.5s ease-out ${0.1 + i * 0.04}s both;">
            <div style="width:40px;height:40px;border-radius:8px;background:var(--color-bg-warm);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span class="font-serif-en" style="font-size:11px;color:var(--color-primary);font-weight:500;">${escapeHtml(cls.short.split(' · ')[0])}</span>
            </div>
            <div style="flex:1;min-width:0;">
              <div class="font-serif-cn" style="font-size:14px;color:var(--color-primary);font-weight:500;">${escapeHtml(cls.name)}</div>
              <div class="font-sans" style="font-size:10px;color:var(--color-text-subtle);margin-top:2px;">${escapeHtml(cls.time)}</div>
              <div style="display:flex;gap:6px;margin-top:6px;">
                <span style="background:#E4EAE1;color:#2F4A3A;padding:2px 7px;border-radius:999px;font-size:9px;font-weight:500;letter-spacing:1px;">OPEN ${stats.open}</span>
                <span style="background:var(--color-bg-warm);color:var(--color-text-muted);padding:2px 7px;border-radius:999px;font-size:9px;font-weight:500;letter-spacing:1px;">ARCHIVE ${stats.closed}</span>
              </div>
            </div>
            <i class="fa-solid fa-chevron-right text-xs" style="color:var(--color-text-subtle);"></i>
          </button>
        `;
      }).join('');

      root.className = 'min-h-screen pb-safe';
      root.innerHTML = `
        <div class="pt-safe sticky top-0 z-40" style="background:var(--color-primary-deep);">
          <div class="px-5 py-4 flex items-center justify-between">
            <button id="back-btn" class="active-scale" style="width:36px;height:36px;border-radius:50%;background:rgba(250,247,238,0.1);display:flex;align-items:center;justify-content:center;">
              <i class="fa-solid fa-chevron-left text-xs" style="color:var(--color-bg);"></i>
            </button>
            <div class="text-center">
              <div class="section-label" style="color:var(--color-accent-soft);margin-bottom:2px;">— ADMIN —</div>
              <div class="font-serif-cn" style="font-size:14px;font-weight:500;color:var(--color-bg);">老师后台</div>
            </div>
            <button id="logout-btn" class="active-scale" style="width:36px;height:36px;border-radius:50%;background:rgba(250,247,238,0.1);display:flex;align-items:center;justify-content:center;">
              <i class="fa-solid fa-right-from-bracket text-xs" style="color:var(--color-bg);"></i>
            </button>
          </div>
        </div>

        <div class="px-5 pt-8 pb-6 fade-in-up" style="background:var(--color-primary-deep);color:var(--color-bg);">
          <div class="section-label" style="color:var(--color-accent-soft);margin-bottom:6px;">WELCOME BACK</div>
          <div class="font-serif-cn" style="font-size:28px;font-weight:500;line-height:1.2;">${escapeHtml(auth.user.name)}</div>
          <div class="font-serif-en" style="font-size:13px;color:#A5B3AA;margin-top:4px;">Xiaoyao Studio Dashboard</div>
          
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:20px;">
            <div style="background:rgba(250,247,238,0.08);border-radius:8px;padding:14px 10px;">
              <div class="font-serif-en" style="font-size:28px;font-weight:500;color:var(--color-bg);line-height:1;">${XY_CLASSES.length}</div>
              <div class="font-sans" style="font-size:9px;color:#A5B3AA;margin-top:4px;letter-spacing:1.5px;">CLASSES</div>
            </div>
            <div style="background:rgba(250,247,238,0.08);border-radius:8px;padding:14px 10px;">
              <div class="font-serif-en" style="font-size:28px;font-weight:500;color:var(--color-accent-soft);line-height:1;">${openHw}</div>
              <div class="font-sans" style="font-size:9px;color:#A5B3AA;margin-top:4px;letter-spacing:1.5px;">OPEN</div>
            </div>
            <div style="background:rgba(250,247,238,0.08);border-radius:8px;padding:14px 10px;">
              <div class="font-serif-en" style="font-size:28px;font-weight:500;color:var(--color-bg);line-height:1;">${totalStudents}</div>
              <div class="font-sans" style="font-size:9px;color:#A5B3AA;margin-top:4px;letter-spacing:1.5px;">STUDENTS</div>
            </div>
          </div>
        </div>

        <div class="px-5 py-5">
          <div class="section-label mb-3" style="color:var(--color-primary);">— QUICK ACTIONS —</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button id="manage-students-btn" class="active-scale" style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:14px;text-align:left;display:flex;align-items:center;gap:10px;">
              <div style="width:36px;height:36px;border-radius:8px;background:var(--color-primary);display:flex;align-items:center;justify-content:center;">
                <i class="fa-solid fa-user-plus text-xs" style="color:var(--color-accent-soft);"></i>
              </div>
              <div>
                <div class="font-serif-cn" style="font-size:13px;color:var(--color-primary);font-weight:500;">学生管理</div>
                <div class="font-sans" style="font-size:9px;color:var(--color-accent);letter-spacing:1px;font-weight:500;">+ ADD NEW</div>
              </div>
            </button>
            <button id="show-help-btn" class="active-scale" style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:14px;text-align:left;display:flex;align-items:center;gap:10px;">
              <div style="width:36px;height:36px;border-radius:8px;background:var(--color-bg-warm);display:flex;align-items:center;justify-content:center;">
                <i class="fa-solid fa-circle-info text-xs" style="color:var(--color-accent);"></i>
              </div>
              <div>
                <div class="font-serif-cn" style="font-size:13px;color:var(--color-primary);font-weight:500;">使用帮助</div>
                <div class="font-sans" style="font-size:9px;color:var(--color-text-subtle);letter-spacing:1px;">GUIDE</div>
              </div>
            </button>
          </div>
        </div>

        <div class="px-5 mb-6">
          <div class="section-label mb-3" style="color:var(--color-primary);">— CLASSES · 点击管理 —</div>
          <div style="display:flex;flex-direction:column;gap:8px;">${classRows}</div>
        </div>

        <div class="px-5 mb-6">
          <div style="background:var(--color-bg-warm);border-left:3px solid var(--color-accent);border-radius:0 8px 8px 0;padding:14px 16px;">
            <div class="font-serif-cn" style="font-size:12px;color:var(--color-primary);font-weight:500;margin-bottom:4px;">关于作业开关</div>
            <div class="font-sans" style="font-size:11px;color:var(--color-text-muted);line-height:1.6;">
              切换开关立刻生效(保存在你当前的浏览器里)。如果要让所有设备同步,需要改 HTML 文件里 XY_HOMEWORK 的 status 字段。
            </div>
          </div>
        </div>

        <div id="modal-container"></div>
      `;

      document.getElementById('back-btn').addEventListener('click', () => window.location.href = 'index.html');
      document.getElementById('logout-btn').addEventListener('click', () => {
        if (confirm('退出登录?')) {
          XY_AUTH.logout();
          window.location.href = 'index.html';
        }
      });
      document.getElementById('manage-students-btn').addEventListener('click', showStudentManageModal);
      document.getElementById('show-help-btn').addEventListener('click', () => {
        alert('💡 更新作业操作流程:\n\n1. 把新作业的 HTML 文件上传到对应班级的 classes/ 文件夹\n\n2. 在所有 3 个 HTML (index.html / class.html / teacher.html) 里的 XY_HOMEWORK 数组添加一条记录\n\n3. 提交到 GitHub,Vercel 自动部署\n\n4. 想隐藏旧作业,来后台切换开关即可');
      });
      document.querySelectorAll('.class-row-btn').forEach(btn => {
        btn.addEventListener('click', () => showClassManageModal(btn.dataset.classCode));
      });
    }

    function showClassManageModal(code) {
      const classInfo = XY_CLASSES.find(c => c.code === code);
      if (!classInfo) return;
      const hwList = XY_HOMEWORK.filter(h => h.classCode === code).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      const items = hwList.length === 0 ? `
        <div class="text-center" style="padding:40px 20px;">
          <i class="fa-regular fa-folder-open text-3xl mb-3" style="color:var(--color-text-subtle);"></i>
          <div class="font-serif-cn" style="font-size:14px;color:var(--color-text-muted);">本班暂无作业</div>
        </div>
      ` : `
        <div class="section-label mb-3" style="color:var(--color-primary);">— 作业列表 · 绿色=开放 · 灰色=归档 —</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${hwList.map(hw => `
            <div style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;">
              <div style="width:36px;height:36px;border-radius:8px;background:${hw.status === 'open' ? 'var(--color-primary)' : 'var(--color-bg-warm)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-book text-xs" style="color:${hw.status === 'open' ? 'var(--color-accent-soft)' : 'var(--color-text-subtle)'};"></i>
              </div>
              <div style="flex:1;min-width:0;">
                <div class="font-sans" style="font-size:9px;color:var(--color-accent);letter-spacing:2px;font-weight:500;">UNIT ${escapeHtml(hw.unit)}</div>
                <div class="font-serif-cn" style="font-size:13px;color:var(--color-primary);font-weight:500;margin-top:1px;">${escapeHtml(hw.title)}</div>
                <div class="font-sans" style="font-size:9px;color:var(--color-text-subtle);margin-top:1px;">${escapeHtml(hw.date)}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                <label class="toggle">
                  <input type="checkbox" class="hw-toggle" data-hw-id="${hw.id}" ${hw.status === 'open' ? 'checked' : ''}>
                  <span class="slider"></span>
                </label>
                <a href="classes/${escapeHtml(hw.file)}" target="_blank" class="font-sans" style="font-size:9px;color:var(--color-accent);letter-spacing:1px;font-weight:500;">预览 ↗</a>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      const modalHtml = `
        <div id="class-modal" class="modal-overlay" style="position:fixed;inset:0;z-index:50;background:rgba(31,51,40,0.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;" onclick="if(event.target.id==='class-modal')closeModal()">
          <div class="modal-content" style="background:var(--color-bg);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;">
            <div style="background:var(--color-primary);padding:24px;position:sticky;top:0;z-index:10;">
              <div class="flex items-start justify-between">
                <div>
                  <div class="font-serif-en" style="font-size:13px;color:var(--color-accent-soft);">${escapeHtml(classInfo.short)}</div>
                  <div class="font-serif-cn" style="font-size:20px;font-weight:500;color:var(--color-bg);margin-top:2px;">${escapeHtml(classInfo.name)}</div>
                  <div class="font-sans" style="font-size:10px;color:#A5B3AA;margin-top:6px;letter-spacing:1px;">共 ${hwList.length} 份作业 · ${hwList.filter(h => h.status === 'open').length} 份开放</div>
                </div>
                <button id="class-modal-close" class="active-scale" style="width:34px;height:34px;border-radius:50%;background:rgba(250,247,238,0.15);display:flex;align-items:center;justify-content:center;">
                  <i class="fa-solid fa-xmark text-xs" style="color:var(--color-bg);"></i>
                </button>
              </div>
            </div>
            <div style="padding:18px;">${items}</div>
          </div>
        </div>
      `;

      document.getElementById('modal-container').innerHTML = modalHtml;
      document.getElementById('class-modal-close').addEventListener('click', closeModal);
      document.querySelectorAll('.hw-toggle').forEach(toggle => {
        toggle.addEventListener('change', e => {
          const hwId = e.target.dataset.hwId;
          const hw = XY_HOMEWORK.find(h => h.id === hwId);
          if (!hw) return;
          hw.status = e.target.checked ? 'open' : 'closed';
          const o = loadOverrides();
          o[hwId] = hw.status;
          saveOverrides(o);
          renderDashboard();
          showClassManageModal(code);
        });
      });
    }

    window.closeModal = function() {
      document.getElementById('modal-container').innerHTML = '';
    };

    // ============================================
    // 学生管理面板
    // ============================================
    
    let formState = { id: '', password: '', name: '', classes: [] };

    function suggestNextId() {
      const sNumbers = XY_STUDENTS
        .map(s => s.id)
        .filter(id => /^S\d+$/.test(id))
        .map(id => parseInt(id.slice(1), 10));
      const maxNum = sNumbers.length > 0 ? Math.max(...sNumbers) : 0;
      return 'S' + String(maxNum + 1).padStart(2, '0');
    }

    function generateRandomPassword() {
      return String(Math.floor(1000 + Math.random() * 9000));
    }

    function showStudentManageModal() {
      const nextId = suggestNextId();
      formState = {
        id: nextId,
        password: generateRandomPassword(),
        name: '学生' + nextId,
        classes: []
      };

      const modalHtml = `
        <div id="student-modal" class="modal-overlay" style="position:fixed;inset:0;z-index:50;background:rgba(31,51,40,0.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;" onclick="if(event.target.id==='student-modal')closeModal()">
          <div class="modal-content" style="background:var(--color-bg);border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;">
            <div style="background:var(--color-primary);padding:20px 24px;position:sticky;top:0;z-index:10;">
              <div class="flex items-start justify-between">
                <div>
                  <div class="section-label" style="color:var(--color-accent-soft);margin-bottom:4px;">— STUDENT MANAGER —</div>
                  <div class="font-serif-cn" style="font-size:20px;font-weight:500;color:var(--color-bg);">学生管理</div>
                  <div class="font-sans" style="font-size:10px;color:#A5B3AA;margin-top:4px;letter-spacing:1px;">添加新学生 · 查看名册</div>
                </div>
                <button id="student-modal-close" class="active-scale" style="width:34px;height:34px;border-radius:50%;background:rgba(250,247,238,0.15);display:flex;align-items:center;justify-content:center;">
                  <i class="fa-solid fa-xmark text-xs" style="color:var(--color-bg);"></i>
                </button>
              </div>
            </div>
            
            <div style="padding:18px;">
              
              <div style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:14px;">
                <div class="section-label" style="color:var(--color-primary);margin-bottom:14px;">— ADD NEW STUDENT —</div>
                
                <div style="margin-bottom:12px;">
                  <div class="font-sans" style="font-size:10px;color:var(--color-primary);letter-spacing:1.5px;margin-bottom:5px;font-weight:500;">账号 ID · ACCOUNT</div>
                  <input id="form-id" type="text" class="input-field" value="${escapeHtml(formState.id)}" placeholder="如 S05" autocapitalize="characters">
                </div>
                
                <div style="margin-bottom:12px;">
                  <div class="font-sans" style="font-size:10px;color:var(--color-primary);letter-spacing:1.5px;margin-bottom:5px;font-weight:500;display:flex;justify-content:space-between;align-items:center;">
                    <span>密码 · PASSWORD</span>
                    <button id="regen-pwd" class="active-scale" type="button" style="background:var(--color-bg-warm);border:none;color:var(--color-accent);font-size:10px;padding:3px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;">🎲 重新生成</button>
                  </div>
                  <input id="form-password" type="text" class="input-field" value="${escapeHtml(formState.password)}" placeholder="4 位数字">
                </div>
                
                <div style="margin-bottom:14px;">
                  <div class="font-sans" style="font-size:10px;color:var(--color-primary);letter-spacing:1.5px;margin-bottom:5px;font-weight:500;">姓名 · NAME</div>
                  <input id="form-name" type="text" class="input-field" value="${escapeHtml(formState.name)}" placeholder="可写真名或代号">
                </div>
                
                <div style="margin-bottom:14px;">
                  <div class="font-sans" style="font-size:10px;color:var(--color-primary);letter-spacing:1.5px;margin-bottom:8px;font-weight:500;">所在班级 · CLASSES <span style="color:var(--color-text-subtle);font-weight:400;">(可多选)</span></div>
                  <div id="class-chips" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                    ${XY_CLASSES.map(cls => `<div class="class-chip" data-class-code="${cls.code}">${escapeHtml(cls.name)}</div>`).join('')}
                  </div>
                </div>
                
                <button id="generate-code-btn" class="active-scale" type="button" style="width:100%;background:var(--color-accent);color:var(--color-bg);padding:12px;border:none;border-radius:6px;font-size:12px;letter-spacing:3px;font-weight:500;cursor:pointer;">📋 生成代码</button>
              </div>
              
              <div id="generated-code-section" style="display:none;background:var(--color-primary-deep);color:var(--color-bg);border-radius:10px;padding:16px;margin-bottom:14px;">
                <div class="section-label" style="color:var(--color-accent-soft);margin-bottom:10px;">📋 生成的代码 · 复制粘贴到 GitHub</div>
                <div id="generated-code" class="code-block"></div>
                <button id="copy-code-btn" class="active-scale" type="button" style="width:100%;background:var(--color-accent);color:var(--color-bg);padding:10px;border:none;border-radius:6px;font-size:11px;letter-spacing:2px;margin-top:10px;font-weight:500;cursor:pointer;">📎 一键复制</button>
                <button id="show-instructions-btn" class="active-scale" type="button" style="width:100%;background:rgba(250,247,238,0.1);color:var(--color-bg);padding:8px;border:0.5px solid rgba(250,247,238,0.3);border-radius:6px;font-size:10px;margin-top:8px;letter-spacing:1px;cursor:pointer;">📖 查看完整操作步骤</button>
              </div>
              
              <div style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:16px;">
                <div class="section-label" style="color:var(--color-primary);margin-bottom:12px;">— ROSTER · 当前学生 (${XY_STUDENTS.length}) —</div>
                <div style="display:flex;flex-direction:column;gap:6px;">
                  ${XY_STUDENTS.map(s => `
                    <div style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
                      <div style="width:32px;height:32px;border-radius:50%;background:var(--color-bg-warm);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-primary);font-weight:500;">${escapeHtml(s.id)}</div>
                      <div style="flex:1;min-width:0;">
                        <div class="font-serif-cn" style="font-size:12px;color:var(--color-primary);font-weight:500;">${escapeHtml(s.name)}</div>
                        <div class="font-sans" style="font-size:9px;color:var(--color-text-muted);margin-top:1px;">密码 ${escapeHtml(s.password)} · ${s.classes.map(c => {
                          const cls = XY_CLASSES.find(x => x.code === c);
                          return cls ? cls.name : c;
                        }).join(', ')}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
              
              <div style="background:var(--color-bg-warm);border-left:3px solid var(--color-accent);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:14px;">
                <div class="font-sans" style="font-size:10px;color:var(--color-text-muted);line-height:1.7;">
                  <div style="font-weight:500;color:var(--color-primary);margin-bottom:4px;">💡 工作原理</div>
                  这个工具帮你生成一行代码。复制后粘贴到 GitHub 仓库的 <span style="background:var(--color-bg);padding:1px 4px;border-radius:3px;font-family:monospace;color:var(--color-accent);">XY_STUDENTS</span> 数组(在 index.html, class.html, teacher.html 三个文件里),Commit 后新学生就能登录了。
                </div>
              </div>
              
            </div>
          </div>
        </div>
      `;

      document.getElementById('modal-container').innerHTML = modalHtml;
      
      document.getElementById('student-modal-close').addEventListener('click', closeModal);
      
      document.getElementById('form-id').addEventListener('input', e => {
        formState.id = e.target.value.trim().toUpperCase();
        e.target.value = formState.id;
      });
      document.getElementById('form-password').addEventListener('input', e => {
        formState.password = e.target.value.trim();
      });
      document.getElementById('form-name').addEventListener('input', e => {
        formState.name = e.target.value.trim();
      });
      
      document.getElementById('regen-pwd').addEventListener('click', () => {
        formState.password = generateRandomPassword();
        document.getElementById('form-password').value = formState.password;
      });
      
      document.querySelectorAll('.class-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const code = chip.dataset.classCode;
          if (formState.classes.includes(code)) {
            formState.classes = formState.classes.filter(c => c !== code);
            chip.classList.remove('active');
          } else {
            formState.classes.push(code);
            chip.classList.add('active');
          }
        });
      });
      
      document.getElementById('generate-code-btn').addEventListener('click', generateStudentCode);
      document.getElementById('copy-code-btn').addEventListener('click', copyGeneratedCode);
      document.getElementById('show-instructions-btn').addEventListener('click', showInstructions);
    }

    function generateStudentCode() {
      if (!formState.id) { alert('请填写账号 ID'); return; }
      if (!formState.password) { alert('请填写密码'); return; }
      if (!formState.name) { alert('请填写姓名'); return; }
      if (formState.classes.length === 0) { alert('请至少选择一个班级'); return; }
      
      if (XY_STUDENTS.find(s => s.id === formState.id)) {
        if (!confirm(`⚠️ 账号 "${formState.id}" 已存在!\n\n如果你确定要替换原有学生,点确定。\n如果想换一个 ID,点取消。`)) {
          return;
        }
      }
      
      const classesArr = formState.classes.map(c => `'${c}'`).join(', ');
      const code = `      { id: '${formState.id}', password: '${formState.password}', name: '${formState.name.replace(/'/g, "\\'")}', classes: [${classesArr}] },`;
      
      const section = document.getElementById('generated-code-section');
      const codeEl = document.getElementById('generated-code');
      codeEl.textContent = code;
      section.style.display = 'block';
      
      setTimeout(() => {
        section.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    function copyGeneratedCode() {
      const codeEl = document.getElementById('generated-code');
      const text = codeEl.textContent;
      
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
          flashCopySuccess();
        }).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        flashCopySuccess();
      } catch (e) {
        alert('复制失败,请手动选择代码复制');
      }
      document.body.removeChild(ta);
    }

    function flashCopySuccess() {
      const btn = document.getElementById('copy-code-btn');
      const originalText = btn.innerHTML;
      btn.innerHTML = '✓ 已复制到剪贴板!';
      setTimeout(() => {
        btn.innerHTML = originalText;
      }, 2000);
    }

    function showInstructions() {
      const text = `📖 添加新学生的完整步骤:

1️⃣ 复制上面那段代码
   (点"📎 一键复制"按钮)

2️⃣ 打开 GitHub 仓库

3️⃣ 修改 index.html
   - 点 index.html 进入文件
   - 右上角点铅笔图标 ✏️ 编辑
   - 用 Cmd+F 搜索 "XY_STUDENTS"
   - 找到 ]; 这一行
   - 在 ]; 上面那一行(最后一个学生),
     行末加上"逗号",换行
   - 粘贴你复制的代码
   - 滚到底部点 Commit changes

4️⃣ 重复步骤 3,改 class.html

5️⃣ 重复步骤 3,改 teacher.html

6️⃣ 等 30 秒,Vercel 自动部署

7️⃣ 用新学生账号登录测试

⚠️ 三个文件的 XY_STUDENTS 必须改成一样!
否则学生在不同页面看到的内容会不一致。`;
      alert(text);
    }
  </script>
</body>
</html>
