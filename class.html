<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>班级作业 · 肖瑶启言</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #F8F9FF; font-family: 'Nunito', 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: calc(3rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    .card-shadow { box-shadow: 0 1px 3px rgba(92, 45, 255, 0.04), 0 4px 20px rgba(92, 45, 255, 0.06); }
  </style>
</head>
<body class="bg-[#F8F9FF]">
  <div id="root" class="min-h-screen"></div>

  <script>
    // ========= 数据 =========
    const XY_CLASSES = [
      { code: 'adult',   name: '成人0基础口语',  level: 'ADULT · ZERO BASE',         time: '周四下午', icon: 'fa-briefcase',      gradient: 'from-violet-600 to-purple-700',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' },
      { code: 'swsy',    name: '深外素养',       level: 'SWSY · ELITE',              time: '周四晚上', icon: 'fa-crosshairs',     gradient: 'from-indigo-600 to-violet-700',  iconBg: 'bg-indigo-100', iconColor: 'text-indigo-600' },
      { code: 'f2',      name: 'F2班',          level: 'TALENT F2 · FOUNDATION',    time: '周五晚上', icon: 'fa-baby',           gradient: 'from-pink-500 to-rose-500',      iconBg: 'bg-pink-100',   iconColor: 'text-pink-600' },
      { code: 'a2-1',    name: 'A2班(1班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周六早上', icon: 'fa-graduation-cap', gradient: 'from-violet-500 to-purple-600',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' },
      { code: 'a1-plus', name: 'A1+班',         level: 'TALENT A1+ · BEGINNER+',    time: '周六下午', icon: 'fa-star',           gradient: 'from-amber-400 to-yellow-500',   iconBg: 'bg-amber-100',  iconColor: 'text-amber-600' },
      { code: 'ms',      name: '初中能力提升',    level: 'MIDDLE SCHOOL · ADVANCED',  time: '周六下午', icon: 'fa-trophy',         gradient: 'from-purple-600 to-fuchsia-600', iconBg: 'bg-purple-100', iconColor: 'text-purple-600' },
      { code: 'econ',    name: '经济学人班',     level: 'ECONOMIST · PREMIUM',       time: '周六晚上', icon: 'fa-newspaper',      gradient: 'from-rose-600 to-pink-700',      iconBg: 'bg-rose-100',   iconColor: 'text-rose-600' },
      { code: 'a2-plus', name: 'A2+班',         level: 'TALENT A2+ · ADVANCED',     time: '周日早上', icon: 'fa-rocket',         gradient: 'from-violet-600 to-indigo-700',  iconBg: 'bg-violet-100', iconColor: 'text-violet-700' },
      { code: 'a2-2',    name: 'A2班(2班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周日下午', icon: 'fa-book',           gradient: 'from-violet-500 to-purple-600',  iconBg: 'bg-violet-100', iconColor: 'text-violet-600' }
    ];
    const XY_STUDENTS = [
      { id: 'S01', password: '1234', name: '学生S01', classes: ['a2-1'] },
      { id: 'S02', password: '2345', name: '学生S02', classes: ['a2-1', 'f2'] },
      { id: 'S03', password: '3456', name: '学生S03', classes: ['swsy'] }
    ];
    const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };
    const XY_HOMEWORK = [
      { id: 'a2-1-u6-1', classCode: 'a2-1', unit: 'U6-1', title: 'The Life Columnist', date: '2026-04-20', file: 'a2-1/A2_U6-1.html', status: 'open' }
    ];
    const XY_AUTH = {
      getCurrentUser: function() {
        try {
          const data = localStorage.getItem('xy_user');
          if (!data) return null;
          const stored = JSON.parse(data);
          if (stored.role === 'teacher' && stored.id === XY_TEACHER.id) return { user: XY_TEACHER, role: 'teacher' };
          if (stored.role === 'student') {
            const s = XY_STUDENTS.find(x => x.id === stored.id);
            if (s) return { user: s, role: 'student' };
          }
          return null;
        } catch (e) { return null; }
      }
    };
    function loadOverrides() {
      try { return JSON.parse(localStorage.getItem('xy_hw_status_overrides') || '{}'); }
      catch (e) { return {}; }
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // ========= 渲染 =========
    const root = document.getElementById('root');

    // 应用 overrides
    const overrides = loadOverrides();
    Object.keys(overrides).forEach(hwId => {
      const hw = XY_HOMEWORK.find(h => h.id === hwId);
      if (hw) hw.status = overrides[hwId];
    });

    // 获取URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (!code) {
      root.innerHTML = renderNotFound();
    } else {
      const classInfo = XY_CLASSES.find(c => c.code === code);
      if (!classInfo) {
        root.innerHTML = renderNotFound();
      } else {
        const auth = XY_AUTH.getCurrentUser();
        root.className = 'min-h-screen bg-[#F8F9FF] pb-safe';

        if (!auth) {
          root.innerHTML = renderTopBar(classInfo) + renderAccessDenied();
        } else if (auth.role !== 'teacher' && !auth.user.classes.includes(code)) {
          root.innerHTML = renderTopBar(classInfo) + renderNotEnrolled(classInfo);
        } else {
          const isTeacher = auth.role === 'teacher';
          const hwList = isTeacher
            ? XY_HOMEWORK.filter(h => h.classCode === code).sort((a, b) => {
                if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
                return (b.date || '').localeCompare(a.date || '');
              })
            : XY_HOMEWORK.filter(h => h.classCode === code && h.status === 'open').sort((a, b) => (b.date || '').localeCompare(a.date || ''));

          root.innerHTML = renderTopBar(classInfo) + renderContent(classInfo, hwList, isTeacher);
        }
      }
    }

    // 绑定返回按钮
    const backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', () => window.location.href = 'index.html');

    // 绑定作业点击
    document.querySelectorAll('.hw-link').forEach(btn => {
      btn.addEventListener('click', () => {
        window.location.href = 'classes/' + btn.dataset.file;
      });
    });

    // ========= 组件函数 =========
    function renderTopBar(classInfo) {
      return `
        <div class="pt-safe sticky top-0 z-40 bg-[#F8F9FF]/80 backdrop-blur-lg">
          <div class="px-5 py-4 flex items-center justify-between">
            <button id="back-btn" class="active-scale bg-white w-10 h-10 rounded-full flex items-center justify-center card-shadow">
              <i class="fa-solid fa-chevron-left text-violet-600"></i>
            </button>
            <div class="flex flex-col items-center leading-tight">
              <span class="font-black text-gray-900 text-base">${escapeHtml(classInfo.name)}</span>
              <span class="text-[10px] text-gray-400 font-semibold tracking-widest">${escapeHtml(classInfo.level)}</span>
            </div>
            <div class="w-10 h-10"></div>
          </div>
        </div>
      `;
    }

    function renderContent(classInfo, hwList, isTeacher) {
      const header = `
        <div class="px-5 mb-6 fade-in-up">
          <div class="relative rounded-3xl overflow-hidden bg-gradient-to-br ${classInfo.gradient} p-6 shadow-xl shadow-violet-500/20">
            <div class="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
            <div class="absolute -bottom-12 -left-8 w-40 h-40 rounded-full bg-white/5 blur-3xl"></div>
            <div class="relative">
              <div class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4">
                <i class="fa-solid ${classInfo.icon} text-white text-2xl"></i>
              </div>
              <h1 class="text-white text-2xl font-black mb-1">${escapeHtml(classInfo.name)}</h1>
              <p class="text-white/80 text-xs font-bold tracking-widest mb-3">${escapeHtml(classInfo.level)}</p>
              <div class="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full">
                <i class="fa-regular fa-clock text-white text-xs"></i>
                <span class="text-white text-xs font-bold">${escapeHtml(classInfo.time)}</span>
              </div>
            </div>
          </div>
        </div>
      `;

      const teacherBanner = isTeacher ? `
        <div class="px-5 mb-4 fade-in-up">
          <div class="bg-amber-50 border border-amber-200 rounded-2xl p-3 flex items-center gap-3">
            <i class="fa-solid fa-user-shield text-amber-600"></i>
            <div class="flex-1">
              <div class="text-xs font-black text-amber-900">老师视图</div>
              <div class="text-[10px] text-amber-700 font-semibold">你能看到所有作业(包括已归档的)</div>
            </div>
            <a href="teacher.html" class="bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full active-scale">管理</a>
          </div>
        </div>
      ` : '';

      let homeworkSection = '';
      if (hwList.length === 0) {
        homeworkSection = `
          <div class="px-5 py-12 text-center fade-in-up">
            <div class="w-20 h-20 rounded-full bg-violet-50 flex items-center justify-center mx-auto mb-4">
              <i class="fa-regular fa-folder-open text-violet-300 text-3xl"></i>
            </div>
            <p class="text-gray-500 font-bold mb-1">本周作业准备中</p>
            <p class="text-xs text-gray-400">肖瑶老师正在精心准备,请稍候~</p>
          </div>
        `;
      } else {
        const items = hwList.map((hw, i) => {
          const isClosed = hw.status === 'closed';
          return `
            <button data-file="${escapeHtml(hw.file)}" class="hw-link scale-in active-scale w-full bg-white rounded-2xl p-5 card-shadow text-left flex items-center gap-4 relative ${isClosed ? 'opacity-60' : ''}" style="animation-delay:${0.1 + i * 0.05}s">
              ${isClosed ? `<div class="absolute top-3 right-3 bg-gray-100 text-gray-500 px-2 py-1 rounded-full text-[10px] font-black tracking-wider">已归档</div>` : ''}
              <div class="w-12 h-12 rounded-xl ${classInfo.iconBg} flex items-center justify-center flex-shrink-0">
                <i class="fa-solid fa-book-open ${classInfo.iconColor} text-lg"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-[10px] font-black tracking-widest mb-0.5 ${classInfo.iconColor}">UNIT ${escapeHtml(hw.unit)}</div>
                <div class="text-base font-black text-gray-900 truncate">${escapeHtml(hw.title)}</div>
                <div class="text-[10px] text-gray-400 font-semibold mt-0.5">${escapeHtml(hw.date)}</div>
              </div>
              ${!isClosed ? `<i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>` : ''}
            </button>
          `;
        }).join('');

        homeworkSection = `
          <div class="px-5 mb-6">
            <div class="flex items-center gap-2 mb-3 fade-in-up" style="animation-delay:0.1s">
              <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
              <span class="text-xs font-black text-gray-500 tracking-widest">${isTeacher ? '所有作业(含归档)' : '本周作业'}</span>
            </div>
            <div class="space-y-3">${items}</div>
          </div>
        `;
      }

      return `<div class="pt-2">${header}${teacherBanner}${homeworkSection}</div>`;
    }

    function renderAccessDenied() {
      return `
        <div class="px-5 py-12 text-center fade-in-up">
          <div class="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-lock text-red-400 text-2xl"></i>
          </div>
          <h2 class="text-xl font-black text-gray-900 mb-2">需要登录</h2>
          <p class="text-sm text-gray-500 font-medium mb-6 max-w-xs mx-auto">请先登录,只有该班级的学员才能查看作业内容</p>
          <a href="index.html" class="inline-block active-scale bg-gradient-to-r from-violet-600 to-purple-700 text-white font-black py-3 px-8 rounded-full tracking-wider shadow-lg shadow-violet-500/30">返回登录</a>
        </div>
      `;
    }

    function renderNotEnrolled(classInfo) {
      return `
        <div class="px-5 py-12 text-center fade-in-up">
          <div class="w-20 h-20 rounded-full bg-amber-50 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-triangle-exclamation text-amber-400 text-2xl"></i>
          </div>
          <h2 class="text-xl font-black text-gray-900 mb-2">无访问权限</h2>
          <p class="text-sm text-gray-500 font-medium mb-6 max-w-xs mx-auto">你不是"${escapeHtml(classInfo.name)}"的学员,无法查看本班作业</p>
          <a href="index.html" class="inline-block active-scale bg-gradient-to-r from-violet-600 to-purple-700 text-white font-black py-3 px-8 rounded-full tracking-wider shadow-lg shadow-violet-500/30">返回首页</a>
        </div>
      `;
    }

    function renderNotFound() {
      return `
        <div class="min-h-screen flex items-center justify-center p-6">
          <div class="text-center">
            <i class="fa-solid fa-circle-question text-gray-300 text-5xl mb-4"></i>
            <h2 class="text-xl font-black text-gray-700 mb-2">班级不存在</h2>
            <a href="index.html" class="inline-block mt-4 bg-violet-600 text-white font-bold px-6 py-3 rounded-full active-scale">返回首页</a>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
