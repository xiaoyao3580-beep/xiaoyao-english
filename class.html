<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>班级作业 · 肖瑶启言</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="data.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
    html, body { margin: 0; padding: 0; width: 100%; min-height: 100%; background-color: #F8F9FF; font-family: 'Nunito', 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
    #root { width: 100%; min-height: 100vh; }
    .pb-safe { padding-bottom: calc(3rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }
    .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .scale-in { animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    .card-shadow { box-shadow: 0 1px 3px rgba(92, 45, 255, 0.04), 0 4px 20px rgba(92, 45, 255, 0.06); }
  </style>
</head>
<body class="bg-[#F8F9FF]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 加载 teacher 做的状态 override
    function loadOverrides() {
      try {
        const data = localStorage.getItem('xy_hw_status_overrides');
        return data ? JSON.parse(data) : {};
      } catch (e) { return {}; }
    }

    const TopBar = ({ classInfo }) => (
      <div className="pt-safe sticky top-0 z-40 bg-[#F8F9FF]/80 backdrop-blur-lg">
        <div className="px-5 py-4 flex items-center justify-between">
          <button onClick={() => window.location.href = 'index.html'}
            className="active-scale bg-white w-10 h-10 rounded-full flex items-center justify-center card-shadow">
            <i className="fa-solid fa-chevron-left text-violet-600"></i>
          </button>
          <div className="flex flex-col items-center leading-tight">
            <span className="font-black text-gray-900 text-base">{classInfo ? classInfo.name : '班级'}</span>
            {classInfo && <span className="text-[10px] text-gray-400 font-semibold tracking-widest">{classInfo.level}</span>}
          </div>
          <div className="w-10 h-10"></div>
        </div>
      </div>
    );

    const ClassHeader = ({ classInfo }) => (
      <div className="px-5 mb-6 fade-in-up">
        <div className={`relative rounded-3xl overflow-hidden bg-gradient-to-br ${classInfo.gradient} p-6 shadow-xl shadow-violet-500/20`}>
          <div className="absolute -top-10 -right-10 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
          <div className="absolute -bottom-12 -left-8 w-40 h-40 rounded-full bg-white/5 blur-3xl"></div>
          <div className="relative">
            <div className="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4">
              <i className={`fa-solid ${classInfo.icon} text-white text-2xl`}></i>
            </div>
            <h1 className="text-white text-2xl font-black mb-1">{classInfo.name}</h1>
            <p className="text-white/80 text-xs font-bold tracking-widest mb-3">{classInfo.level}</p>
            <div className="inline-flex items-center gap-1.5 bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full">
              <i className="fa-regular fa-clock text-white text-xs"></i>
              <span className="text-white text-xs font-bold">{classInfo.time}</span>
            </div>
          </div>
        </div>
      </div>
    );

    const HomeworkList = ({ classInfo, homework, isTeacher }) => {
      if (homework.length === 0) {
        return (
          <div className="px-5 py-12 text-center fade-in-up">
            <div className="w-20 h-20 rounded-full bg-violet-50 flex items-center justify-center mx-auto mb-4">
              <i className="fa-regular fa-folder-open text-violet-300 text-3xl"></i>
            </div>
            <p className="text-gray-500 font-bold mb-1">本周作业准备中</p>
            <p className="text-xs text-gray-400">肖瑶老师正在精心准备,请稍候~</p>
          </div>
        );
      }

      return (
        <div className="px-5 mb-6">
          <div className="flex items-center gap-2 mb-3 fade-in-up" style={{animationDelay: '0.1s'}}>
            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span className="text-xs font-black text-gray-500 tracking-widest">
              {isTeacher ? '所有作业(含归档)' : '本周作业'}
            </span>
          </div>
          <div className="space-y-3">
            {homework.map((hw, i) => {
              const isClosed = hw.status === 'closed';
              return (
                <button key={hw.id}
                  onClick={() => window.location.href = `classes/${hw.file}`}
                  className={`scale-in active-scale w-full bg-white rounded-2xl p-5 card-shadow text-left flex items-center gap-4 relative ${isClosed ? 'opacity-60' : ''}`}
                  style={{animationDelay: `${0.1 + i * 0.05}s`}}>
                  {isClosed && (
                    <div className="absolute top-3 right-3 bg-gray-100 text-gray-500 px-2 py-1 rounded-full text-[10px] font-black tracking-wider">
                      已归档
                    </div>
                  )}
                  <div className={`w-12 h-12 rounded-xl ${classInfo.iconBg} flex items-center justify-center flex-shrink-0`}>
                    <i className={`fa-solid fa-book-open ${classInfo.iconColor} text-lg`}></i>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className={`text-[10px] font-black tracking-widest mb-0.5 ${classInfo.iconColor}`}>UNIT {hw.unit}</div>
                    <div className="text-base font-black text-gray-900 truncate">{hw.title}</div>
                    <div className="text-[10px] text-gray-400 font-semibold mt-0.5">{hw.date}</div>
                  </div>
                  {!isClosed && <i className="fa-solid fa-chevron-right text-gray-300 text-xs"></i>}
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const AccessDenied = () => (
      <div className="px-5 py-12 text-center fade-in-up">
        <div className="w-20 h-20 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-4">
          <i className="fa-solid fa-lock text-red-400 text-2xl"></i>
        </div>
        <h2 className="text-xl font-black text-gray-900 mb-2">需要登录</h2>
        <p className="text-sm text-gray-500 font-medium mb-6 max-w-xs mx-auto">请先登录,只有该班级的学员才能查看作业内容</p>
        <button onClick={() => window.location.href = 'index.html'}
          className="active-scale bg-gradient-to-r from-violet-600 to-purple-700 text-white font-black py-3 px-8 rounded-full tracking-wider shadow-lg shadow-violet-500/30">
          返回登录
        </button>
      </div>
    );

    const NotEnrolled = ({ classInfo }) => (
      <div className="px-5 py-12 text-center fade-in-up">
        <div className="w-20 h-20 rounded-full bg-amber-50 flex items-center justify-center mx-auto mb-4">
          <i className="fa-solid fa-triangle-exclamation text-amber-400 text-2xl"></i>
        </div>
        <h2 className="text-xl font-black text-gray-900 mb-2">无访问权限</h2>
        <p className="text-sm text-gray-500 font-medium mb-6 max-w-xs mx-auto">你不是"{classInfo.name}"的学员,无法查看本班作业</p>
        <button onClick={() => window.location.href = 'index.html'}
          className="active-scale bg-gradient-to-r from-violet-600 to-purple-700 text-white font-black py-3 px-8 rounded-full tracking-wider shadow-lg shadow-violet-500/30">
          返回首页
        </button>
      </div>
    );

    const App = () => {
      const [classInfo, setClassInfo] = useState(null);
      const [homework, setHomework] = useState([]);
      const [status, setStatus] = useState('loading');
      const [isTeacher, setIsTeacher] = useState(false);

      useEffect(() => {
        // 先应用 overrides
        const overrides = loadOverrides();
        Object.keys(overrides).forEach(hwId => {
          const hw = window.XY_HOMEWORK.find(h => h.id === hwId);
          if (hw) hw.status = overrides[hwId];
        });

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (!code) { setStatus('notFound'); return; }

        const cls = window.XY_UTILS.getClass(code);
        if (!cls) { setStatus('notFound'); return; }
        setClassInfo(cls);

        const auth = window.XY_AUTH.getCurrentUser();
        if (!auth) { setStatus('notLogin'); return; }

        if (auth.role === 'teacher') {
          setIsTeacher(true);
          const allHw = window.XY_UTILS.getAllHomework(code)
            .sort((a, b) => {
              if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
              return (b.date || '').localeCompare(a.date || '');
            });
          setHomework(allHw);
          setStatus('ok');
          return;
        }

        if (!auth.user.classes.includes(code)) {
          setStatus('notEnrolled');
          return;
        }

        const openHw = window.XY_UTILS.getOpenHomework(code)
          .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        setHomework(openHw);
        setStatus('ok');
      }, []);

      if (status === 'loading') {
        return (
          <div className="min-h-screen bg-[#F8F9FF] flex items-center justify-center">
            <div className="text-center">
              <i className="fa-solid fa-circle-notch fa-spin text-violet-500 text-3xl mb-3"></i>
              <p className="text-gray-500 font-bold">加载中...</p>
            </div>
          </div>
        );
      }

      if (status === 'notFound') {
        return (
          <div className="min-h-screen bg-[#F8F9FF] flex items-center justify-center p-6">
            <div className="text-center">
              <i className="fa-solid fa-circle-question text-gray-300 text-5xl mb-4"></i>
              <h2 className="text-xl font-black text-gray-700 mb-2">班级不存在</h2>
              <button onClick={() => window.location.href = 'index.html'}
                className="mt-4 bg-violet-600 text-white font-bold px-6 py-3 rounded-full active-scale">
                返回首页
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F8F9FF] pb-safe">
          <TopBar classInfo={classInfo} />
          {status === 'notLogin' && <AccessDenied />}
          {status === 'notEnrolled' && <NotEnrolled classInfo={classInfo} />}
          {status === 'ok' && (
            <div className="pt-2">
              <ClassHeader classInfo={classInfo} />
              {isTeacher && (
                <div className="px-5 mb-4 fade-in-up">
                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 flex items-center gap-3">
                    <i className="fa-solid fa-user-shield text-amber-600"></i>
                    <div className="flex-1">
                      <div className="text-xs font-black text-amber-900">老师视图</div>
                      <div className="text-[10px] text-amber-700 font-semibold">你能看到所有作业(包括已归档的)</div>
                    </div>
                    <button onClick={() => window.location.href = 'teacher.html'}
                      className="bg-amber-600 text-white text-xs font-bold px-3 py-1.5 rounded-full active-scale">
                      管理
                    </button>
                  </div>
                </div>
              )}
              <HomeworkList classInfo={classInfo} homework={homework} isTeacher={isTeacher} />
            </div>
          )}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
