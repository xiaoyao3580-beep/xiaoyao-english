<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>班级作业 · 肖瑶启言</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-primary: #2F4A3A;
      --color-primary-deep: #1F3328;
      --color-accent: #C0674A;
      --color-accent-soft: #E8B89A;
      --color-bg: #FAF7EE;
      --color-bg-warm: #EDE5D2;
      --color-border: #D6CDB9;
      --color-text: #2C2C2C;
      --color-text-muted: #5A6B5E;
      --color-text-subtle: #8B9288;
    }
    html, body { margin:0;padding:0;width:100%;min-height:100%;background:var(--color-bg);font-family:'Inter','Noto Serif SC',sans-serif;color:var(--color-text);-webkit-tap-highlight-color:transparent; }
    .font-serif-en { font-family: 'Cormorant Garamond', Georgia, serif; }
    .font-serif-cn { font-family: 'Noto Serif SC', serif; }
    .font-sans { font-family: 'Inter', sans-serif; }
    .pb-safe { padding-bottom: calc(3rem + env(safe-area-inset-bottom, 16px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0); }
    .fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .active-scale:active { transform: scale(0.97); transition: transform 0.1s; }
    
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      color: var(--color-primary);
    }
    .divider-small {
      width: 28px;
      height: 1px;
      background: var(--color-accent);
    }
  </style>
</head>
<body>
  <div id="root" class="min-h-screen"></div>

  <script>
    const XY_CLASSES = [
      { code: 'adult',   name: '成人0基础口语',  level: 'ADULT · ZERO BASE',         time: '周四下午', short: 'Adult · Zero' },
      { code: 'swsy',    name: '深外素养',       level: 'SWSY · ELITE',              time: '周四晚上', short: 'SWSY · Elite' },
      { code: 'f2',      name: 'F2班',          level: 'TALENT F2 · FOUNDATION',    time: '周五晚上', short: 'F2 · Foundation' },
      { code: 'a2-1',    name: 'A2班(1班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周六早上', short: 'A2 · First' },
      { code: 'a1-plus', name: 'A1+班',         level: 'TALENT A1+ · BEGINNER+',    time: '周六下午', short: 'A1+ · Rise' },
      { code: 'ms',      name: '初中能力提升',    level: 'MIDDLE SCHOOL · ADVANCED',  time: '周六下午', short: 'MS · Advanced' },
      { code: 'econ',    name: '经济学人班',     level: 'ECONOMIST · PREMIUM',       time: '周六晚上', short: 'Economist' },
      { code: 'a2-plus', name: 'A2+班',         level: 'TALENT A2+ · ADVANCED',     time: '周日早上', short: 'A2+ · Advanced' },
      { code: 'a2-2',    name: 'A2班(2班)',     level: 'TALENT A2 · INTERMEDIATE',  time: '周日下午', short: 'A2 · Second' }
    ];
    const XY_STUDENTS = [
      { id: 'S01', password: '1234', name: '学生S01', classes: ['a2-1'] },
      { id: 'S02', password: '2345', name: '学生S02', classes: ['a2-1', 'f2'] },
      { id: 'S03', password: '3456', name: '学生S03', classes: ['swsy'] }
    ];
    const XY_TEACHER = { id: 'xiaoyao', password: '929292', name: '肖瑶老师' };
    const XY_HOMEWORK = [
      { id: 'a2-1-u6-1', classCode: 'a2-1', unit: 'U6-1', title: 'The Life Columnist', date: '2026-04-20', file: 'a2-1/A2_U6-1.html', status: 'open' }
    ];
    const XY_AUTH = {
      getCurrentUser: function() {
        try {
          const data = localStorage.getItem('xy_user');
          if (!data) return null;
          const stored = JSON.parse(data);
          if (stored.role === 'teacher' && stored.id === XY_TEACHER.id) return { user: XY_TEACHER, role: 'teacher' };
          if (stored.role === 'student') {
            const s = XY_STUDENTS.find(x => x.id === stored.id);
            if (s) return { user: s, role: 'student' };
          }
          return null;
        } catch (e) { return null; }
      }
    };
    function loadOverrides() {
      try { return JSON.parse(localStorage.getItem('xy_hw_status_overrides') || '{}'); }
      catch (e) { return {}; }
    }
    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    const root = document.getElementById('root');

    // 应用 overrides
    const overrides = loadOverrides();
    Object.keys(overrides).forEach(hwId => {
      const hw = XY_HOMEWORK.find(h => h.id === hwId);
      if (hw) hw.status = overrides[hwId];
    });

    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (!code) {
      root.innerHTML = renderNotFound();
    } else {
      const classInfo = XY_CLASSES.find(c => c.code === code);
      if (!classInfo) {
        root.innerHTML = renderNotFound();
      } else {
        const auth = XY_AUTH.getCurrentUser();
        root.className = 'min-h-screen pb-safe';

        if (!auth) {
          root.innerHTML = renderTopBar(classInfo) + renderAccessDenied();
        } else if (auth.role !== 'teacher' && !auth.user.classes.includes(code)) {
          root.innerHTML = renderTopBar(classInfo) + renderNotEnrolled(classInfo);
        } else {
          const isTeacher = auth.role === 'teacher';
          const hwList = isTeacher
            ? XY_HOMEWORK.filter(h => h.classCode === code).sort((a, b) => {
                if (a.status !== b.status) return a.status === 'open' ? -1 : 1;
                return (b.date || '').localeCompare(a.date || '');
              })
            : XY_HOMEWORK.filter(h => h.classCode === code && h.status === 'open').sort((a, b) => (b.date || '').localeCompare(a.date || ''));
          root.innerHTML = renderTopBar(classInfo) + renderContent(classInfo, hwList, isTeacher);
        }
      }
    }

    const backBtn = document.getElementById('back-btn');
    if (backBtn) backBtn.addEventListener('click', () => window.location.href = 'index.html');

    document.querySelectorAll('.hw-link').forEach(btn => {
      btn.addEventListener('click', () => {
        window.location.href = 'classes/' + btn.dataset.file;
      });
    });

    function renderTopBar(classInfo) {
      return `
        <div class="pt-safe sticky top-0 z-40" style="background:rgba(250,247,238,0.85);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--color-border);">
          <div class="px-5 py-4 flex items-center justify-between">
            <button id="back-btn" class="active-scale" style="width:36px;height:36px;border-radius:50%;background:var(--color-bg);border:0.5px solid var(--color-border);display:flex;align-items:center;justify-content:center;">
              <i class="fa-solid fa-chevron-left text-xs" style="color:var(--color-primary);"></i>
            </button>
            <div class="text-center">
              <div class="font-serif-en" style="font-size:14px;font-style:italic;color:var(--color-accent);">${escapeHtml(classInfo.short)}</div>
              <div class="font-serif-cn" style="font-size:14px;font-weight:500;color:var(--color-primary);line-height:1.2;margin-top:1px;">${escapeHtml(classInfo.name)}</div>
            </div>
            <div style="width:36px;height:36px;"></div>
          </div>
        </div>
      `;
    }

    function renderContent(classInfo, hwList, isTeacher) {
      const header = `
        <div class="px-5 pt-10 pb-8 fade-in-up">
          <div class="section-label mb-4" style="color:var(--color-accent);">${escapeHtml(classInfo.level)}</div>
          <div class="font-serif-cn" style="font-size:30px;font-weight:500;color:var(--color-primary);line-height:1.1;letter-spacing:-0.5px;">${escapeHtml(classInfo.name)}</div>
          <div class="divider-small mt-5 mb-5"></div>
          <div class="font-sans" style="font-size:13px;color:var(--color-text-muted);letter-spacing:1px;">
            <i class="fa-regular fa-clock mr-2" style="color:var(--color-accent);"></i>${escapeHtml(classInfo.time)}
          </div>
        </div>
      `;

      const teacherBanner = isTeacher ? `
        <div class="px-5 mb-6 fade-in-up" style="animation-delay:0.1s;">
          <div style="background:var(--color-bg-warm);border-left:3px solid var(--color-accent);padding:14px 16px;border-radius:0 8px 8px 0;display:flex;align-items:center;gap:12px;">
            <i class="fa-solid fa-user-shield" style="color:var(--color-accent);"></i>
            <div style="flex:1;">
              <div class="font-serif-cn" style="font-size:13px;font-weight:500;color:var(--color-primary);">老师视图</div>
              <div class="font-sans" style="font-size:10px;color:var(--color-text-muted);">能看到所有作业(包括已归档)</div>
            </div>
            <a href="teacher.html" class="active-scale" style="background:var(--color-primary);color:var(--color-bg);padding:6px 12px;border-radius:6px;font-size:10px;letter-spacing:2px;font-weight:500;">管理</a>
          </div>
        </div>
      ` : '';

      let homeworkSection = '';
      if (hwList.length === 0) {
        homeworkSection = `
          <div class="px-5 py-16 text-center fade-in-up" style="animation-delay:0.2s;">
            <i class="fa-regular fa-folder-open text-4xl mb-4" style="color:var(--color-text-subtle);"></i>
            <div class="font-serif-cn" style="font-size:18px;color:var(--color-primary);font-weight:500;">本周作业准备中</div>
            <div class="font-sans mt-2" style="font-size:12px;color:var(--color-text-subtle);">Homework is being prepared.</div>
          </div>
        `;
      } else {
        const items = hwList.map((hw, i) => {
          const isClosed = hw.status === 'closed';
          return `
            <button data-file="${escapeHtml(hw.file)}" class="hw-link active-scale" style="background:var(--color-bg);border:0.5px solid var(--color-border);border-radius:10px;padding:18px;text-align:left;width:100%;display:flex;align-items:center;gap:14px;position:relative;opacity:${isClosed ? '0.6' : '1'};animation:fadeInUp 0.6s ease-out ${0.15 + i * 0.06}s both;">
              ${isClosed ? `<div style="position:absolute;top:12px;right:12px;background:var(--color-bg-warm);color:var(--color-text-muted);padding:3px 8px;border-radius:10px;font-size:9px;letter-spacing:1.5px;font-weight:500;">ARCHIVED</div>` : ''}
              <div style="width:44px;height:44px;border-radius:8px;background:var(--color-primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fa-solid fa-book-open-reader" style="color:var(--color-accent-soft);"></i>
              </div>
              <div style="flex:1;min-width:0;">
                <div class="font-sans" style="font-size:10px;color:var(--color-accent);letter-spacing:2px;font-weight:500;">UNIT ${escapeHtml(hw.unit)}</div>
                <div class="font-serif-cn" style="font-size:15px;color:var(--color-primary);font-weight:500;margin-top:2px;">${escapeHtml(hw.title)}</div>
                <div class="font-sans" style="font-size:10px;color:var(--color-text-subtle);margin-top:2px;">${escapeHtml(hw.date)}</div>
              </div>
              ${!isClosed ? `<i class="fa-solid fa-chevron-right text-xs" style="color:var(--color-text-subtle);"></i>` : ''}
            </button>
          `;
        }).join('');

        homeworkSection = `
          <div class="px-5 mb-8">
            <div class="section-label mb-4" style="color:var(--color-primary);">— ${isTeacher ? 'ALL HOMEWORK · 所有作业' : 'THIS WEEK · 本周作业'} —</div>
            <div style="display:flex;flex-direction:column;gap:10px;">${items}</div>
          </div>
        `;
      }

      return `${header}${teacherBanner}${homeworkSection}`;
    }

    function renderAccessDenied() {
      return `
        <div class="px-5 py-16 text-center fade-in-up">
          <i class="fa-solid fa-lock text-3xl mb-4" style="color:var(--color-accent);"></i>
          <div class="font-serif-cn" style="font-size:22px;color:var(--color-primary);font-weight:500;">需要登录</div>
          <div class="font-sans mt-3 mb-8" style="font-size:12px;color:var(--color-text-muted);max-width:280px;margin-left:auto;margin-right:auto;line-height:1.7;">请先登录,只有该班级的学员才能查看作业内容</div>
          <a href="index.html" class="active-scale inline-block" style="background:var(--color-primary);color:var(--color-bg);padding:12px 32px;border-radius:999px;font-size:11px;letter-spacing:3px;font-weight:500;">RETURN TO LOGIN</a>
        </div>
      `;
    }

    function renderNotEnrolled(classInfo) {
      return `
        <div class="px-5 py-16 text-center fade-in-up">
          <i class="fa-solid fa-triangle-exclamation text-3xl mb-4" style="color:var(--color-accent);"></i>
          <div class="font-serif-cn" style="font-size:22px;color:var(--color-primary);font-weight:500;">无访问权限</div>
          <div class="font-sans mt-3 mb-8" style="font-size:12px;color:var(--color-text-muted);max-width:280px;margin-left:auto;margin-right:auto;line-height:1.7;">你不是"${escapeHtml(classInfo.name)}"的学员,无法查看本班作业</div>
          <a href="index.html" class="active-scale inline-block" style="background:var(--color-primary);color:var(--color-bg);padding:12px 32px;border-radius:999px;font-size:11px;letter-spacing:3px;font-weight:500;">BACK HOME</a>
        </div>
      `;
    }

    function renderNotFound() {
      return `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
          <div class="text-center">
            <i class="fa-solid fa-circle-question text-5xl mb-4" style="color:var(--color-text-subtle);"></i>
            <div class="font-serif-cn" style="font-size:22px;color:var(--color-primary);font-weight:500;">班级不存在</div>
            <a href="index.html" class="active-scale inline-block mt-6" style="background:var(--color-primary);color:var(--color-bg);padding:12px 32px;border-radius:999px;font-size:11px;letter-spacing:3px;font-weight:500;">BACK HOME</a>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
